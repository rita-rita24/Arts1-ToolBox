<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trello Clone</title>
<!--
  Trello Clone - Local single-file implementation (シンプル版)
  Based on verified Trello specifications from Atlassian official documentation.
  Extensions (not in native Trello) marked clearly: Dark mode, JSON export/import.
  Intentionally NOT implemented: Members, attachments, cover images, comments,
  board archive/copy, notifications/watch, Power-Ups, Butler automation,
  card mirroring, custom fields. (個人用カンバン向けに簡素化)
-->

<!-- Material Symbols: Google Fonts CDN (Outlined style, with fill/weight axes) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,300..700,0..1,-25..0&display=block" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --tr-blue:       #0079BF;
    --tr-blue-dark:  #026AA7;
    --tr-sky:        #00AECC;

    /* Trello classic label palette (sourced from documented Trello hex values) */
    --lbl-green:  #61BD4F;
    --lbl-yellow: #F2D600;
    --lbl-orange: #FF9F1A;
    --lbl-red:    #EB5A46;
    --lbl-purple: #C377E0;
    --lbl-blue:   #0079BF;
    --lbl-sky:    #00C2E0;
    --lbl-lime:   #51E898;
    --lbl-pink:   #FF78CB;
    --lbl-black:  #344563;

    /* Due date badge colors (per Atlassian blog spec) */
    --due-grey:   #5E6C84;
    --due-yellow: #F2D600;
    --due-red:    #EB5A46;
    --due-green:  #61BD4F;

    --list-bg:    #EBECF0;
    --list-header:#DFE1E6;
    --card-bg:    #FFFFFF;
    --text-dark:  #172B4D;
    --text-mid:   #42526E;
    --text-light: #5E6C84;
    --border:     #DFE1E6;
    --hover-bg:   rgba(9, 30, 66, 0.08);
    --hover-strong: rgba(9, 30, 66, 0.13);
    --shadow-sm:  0 1px 0 rgba(9, 30, 66, 0.25);
    --shadow-md:  0 4px 8px -2px rgba(9, 30, 66, 0.25), 0 0 1px rgba(9, 30, 66, 0.31);
    --shadow-lg:  0 8px 16px -4px rgba(9, 30, 66, 0.25), 0 0 1px rgba(9, 30, 66, 0.31);
    --radius:     3px;
  }

  [data-theme="dark"] {
    --list-bg:    #22272B;
    --list-header:#2C3338;
    --card-bg:    #282E33;
    --text-dark:  #B6C2CF;
    --text-mid:   #9FADBC;
    --text-light: #8C9BAB;
    --border:     #3C4247;
    --hover-bg:   rgba(255, 255, 255, 0.08);
    --hover-strong: rgba(255, 255, 255, 0.13);
  }

  html, body { height: 100%; }

  body {
    font-family: "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--text-dark);
    background: var(--board-bg, linear-gradient(135deg, #0079BF, #026AA7));
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    min-height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
  }

  /* Material Symbols defaults */
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    vertical-align: middle;
    user-select: none;
  }
  .msi-sm { font-size: 16px; }
  .msi-md { font-size: 20px; }
  .msi-lg { font-size: 24px; }
  .msi-fill { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

  /* ===== Top Bar ===== */
  #topbar {
    height: 48px;
    background: rgba(0, 0, 0, 0.32);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    color: #FFF;
    position: relative;
    z-index: 50;
  }

  .tb-btn {
    background: rgba(255, 255, 255, 0.2);
    border: none;
    color: #FFF;
    padding: 6px 10px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 14px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s;
    font-family: inherit;
    line-height: 1.2;
  }
  .tb-btn:hover { background: rgba(255, 255, 255, 0.32); }
  .tb-btn:active { background: rgba(255, 255, 255, 0.4); }
  .tb-icon-btn {
    background: transparent;
    border: none;
    color: #FFF;
    cursor: pointer;
    width: 36px; height: 36px;
    border-radius: var(--radius);
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .tb-icon-btn:hover { background: rgba(255, 255, 255, 0.2); }

  .tb-logo {
    display: flex; align-items: center; gap: 6px;
    font-weight: 700; font-size: 17px; padding: 0 8px; white-space: nowrap;
  }
  .tb-spacer { flex: 1; }
  .tb-board-title {
    font-weight: 700; font-size: 18px; padding: 4px 10px; border-radius: var(--radius);
    cursor: pointer; max-width: 40vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    background: transparent; border: none; color: #FFF; font-family: inherit;
  }
  .tb-board-title:hover { background: rgba(255, 255, 255, 0.2); }
  .tb-board-title:focus-visible { outline: 2px solid rgba(255,255,255,0.92); outline-offset: 2px; }

  .tb-search {
    background: rgba(255, 255, 255, 0.24);
    border: 1px solid transparent;
    color: #FFF;
    padding: 6px 8px 6px 30px;
    border-radius: var(--radius);
    width: 200px;
    font-family: inherit; font-size: 14px;
    transition: background 0.15s, width 0.15s;
  }
  .tb-search::placeholder { color: rgba(255, 255, 255, 0.8); }
  .tb-search:focus { outline: none; background: #FFF; color: var(--text-dark); width: 280px; }
  .tb-search:focus::placeholder { color: var(--text-light); }
  .tb-search-wrap { position: relative; display: inline-flex; align-items: center; }
  .tb-search-icon {
    position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
    font-size: 18px; color: rgba(255, 255, 255, 0.9); pointer-events: none;
    transition: color 0.15s;
  }
  .tb-search-wrap:focus-within .tb-search-icon { color: var(--text-light); }

  /* ===== Board Area ===== */
  #board {
    height: calc(100vh - 48px);
    overflow-x: auto;
    overflow-y: hidden;
    padding: 12px 8px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  #board::-webkit-scrollbar { height: 12px; }
  #board::-webkit-scrollbar-track { background: rgba(0,0,0,0.15); }
  #board::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 6px; }

  /* ===== List ===== */
  .list {
    background: var(--list-bg);
    border-radius: 12px;
    width: 272px;
    min-width: 272px;
    max-height: calc(100vh - 80px);
    display: flex; flex-direction: column;
    box-shadow: var(--shadow-sm);
  }
  .list.drag-over { outline: 2px dashed rgba(255,255,255,0.6); }

  .list-header {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 8px 8px 12px;
  }
  .list-title {
    flex: 1;
    font-weight: 600; font-size: 14px;
    color: var(--text-dark);
    background: transparent; border: 2px solid transparent;
    padding: 4px 8px; border-radius: var(--radius);
    cursor: pointer; font-family: inherit;
  }
  .list-title:focus { background: var(--card-bg); border-color: var(--tr-blue); outline: none; }
  .list-count {
    font-size: 12px; color: var(--text-light);
    background: var(--hover-bg); padding: 2px 6px; border-radius: 10px;
  }
  .list-menu-btn {
    background: transparent; border: none; cursor: pointer;
    width: 28px; height: 28px; border-radius: var(--radius);
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--text-mid);
  }
  .list-menu-btn:hover { background: var(--hover-bg); }

  .list-cards {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 0 4px 2px 4px;
    margin: 0 4px;
    min-height: 12px;
  }
  .list-cards::-webkit-scrollbar { width: 8px; }
  .list-cards::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 4px; }

  .list-add {
    padding: 4px 8px 10px 8px;
  }
  .list-add-btn {
    width: 100%; padding: 8px;
    background: transparent; border: none; border-radius: var(--radius);
    color: var(--text-light); cursor: pointer; text-align: left;
    display: flex; align-items: center; gap: 6px; font-family: inherit; font-size: 14px;
  }
  .list-add-btn:hover { background: var(--hover-bg); color: var(--text-dark); }

  .list-composer {
    padding: 4px 8px 8px 8px;
  }
  .list-composer textarea, .list-composer input {
    width: 100%;
    background: var(--card-bg);
    border: none; border-radius: 8px;
    padding: 8px 10px;
    font-family: inherit; font-size: 14px;
    color: var(--text-dark);
    resize: none;
    box-shadow: var(--shadow-sm);
  }
  .list-composer textarea:focus, .list-composer input:focus { outline: 2px solid var(--tr-blue); }
  .composer-actions { display: flex; gap: 6px; margin-top: 6px; align-items: center; }
  .btn-primary {
    background: var(--tr-blue); color: #FFF; border: none; padding: 6px 12px;
    border-radius: var(--radius); cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 500;
  }
  .btn-primary:hover { background: var(--tr-blue-dark); }
  .btn-icon {
    background: transparent; border: none; cursor: pointer;
    width: 32px; height: 32px; border-radius: var(--radius);
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--text-mid);
  }
  .btn-icon:hover { background: var(--hover-bg); }

  /* Add list */
  .add-list-btn {
    background: rgba(255, 255, 255, 0.24);
    color: #FFF;
    border: none;
    padding: 10px 12px;
    border-radius: 12px;
    width: 272px;
    min-width: 272px;
    cursor: pointer;
    font-family: inherit; font-size: 14px;
    display: flex; align-items: center; gap: 6px;
    transition: background 0.15s;
  }
  .add-list-btn:hover { background: rgba(255, 255, 255, 0.32); }

  .add-list-composer {
    background: var(--list-bg);
    border-radius: 12px;
    padding: 6px 8px 8px 8px;
    width: 272px;
    min-width: 272px;
  }
  .add-list-composer input {
    width: 100%; padding: 8px 10px; border: 2px solid var(--tr-blue); border-radius: var(--radius);
    font-family: inherit; font-size: 14px;
  }
  .add-list-composer input:focus { outline: none; }

  /* ===== Card ===== */
  .card {
    background: var(--card-bg);
    border-radius: 8px;
    padding: 6px 8px 8px 8px;
    margin-bottom: 8px;
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    position: relative;
    border: 1px solid transparent;
    color: var(--text-dark);
  }
  .card:hover { border-color: var(--border); }
  .card.dragging { opacity: 0.4; }
  .card-edit-btn {
    position: absolute; top: 4px; right: 4px;
    width: 26px; height: 26px;
    border: none; background: var(--card-bg); border-radius: var(--radius);
    display: none; align-items: center; justify-content: center;
    color: var(--text-mid); cursor: pointer;
    box-shadow: 0 1px 2px rgba(9, 30, 66, 0.18);
  }
  .card:hover .card-edit-btn { display: inline-flex; }
  .card-edit-btn:hover { background: var(--hover-strong); color: var(--text-dark); }

  .card-labels {
    display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 4px;
  }
  .label-pill {
    height: 8px; min-width: 40px; border-radius: 4px;
    cursor: pointer;
    transition: height 0.15s, padding 0.15s, min-width 0.15s, filter 0.15s;
  }
  .label-pill:hover { filter: brightness(0.92); }
  body.show-label-names .label-pill {
    height: auto;
    min-width: 56px;
    max-width: 100%;
    padding: 2px 8px;
    font-size: 12px;
    color: #FFF;
    font-weight: 500;
    line-height: 16px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .card-title-row {
    display: flex; align-items: flex-start; gap: 4px;
  }
  .card-complete-icon {
    flex-shrink: 0;
    font-size: 18px;
    color: var(--text-light);
    margin-top: 1px;
    opacity: 0.4;
    transition: opacity 0.15s, color 0.15s;
  }
  .card:hover .card-complete-icon { opacity: 1; }
  .card-complete-icon.done {
    color: var(--due-green);
    opacity: 1;
    font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  .card-complete-icon:hover { color: var(--due-green); opacity: 1; }

  .card-title {
    flex: 1;
    font-size: 14px; line-height: 20px; color: var(--text-dark);
    word-wrap: break-word;
    padding-right: 22px;
  }
  .card.archived .card-title { color: var(--text-light); text-decoration: line-through; }

  .card-badges {
    display: flex; flex-wrap: wrap; gap: 4px 8px; margin-top: 6px;
    font-size: 12px; color: var(--text-light);
    align-items: center;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 4px; border-radius: var(--radius);
  }
  .badge .material-symbols-outlined { font-size: 14px; }
  .badge-due { padding: 2px 6px; font-weight: 500; }
  .badge-due.grey   { background: var(--hover-bg); color: var(--text-mid); }
  .badge-due.yellow { background: rgba(242, 214, 0, 0.24); color: #594300; }
  .badge-due.red    { background: #FFEBE6; color: #BF2600; }
  .badge-due.green  { background: #E3FCEF; color: #064; }
  [data-theme="dark"] .badge-due.grey   { background: rgba(255,255,255,0.08); color: var(--text-mid); }
  [data-theme="dark"] .badge-due.yellow { background: rgba(242, 214, 0, 0.24); color: #F2D600; }
  [data-theme="dark"] .badge-due.red    { background: rgba(235, 90, 70, 0.28); color: #FF7452; }
  [data-theme="dark"] .badge-due.green  { background: rgba(97, 189, 79, 0.24); color: #61BD4F; }

  .badge-checklist.complete {
    background: #E3FCEF; color: #064;
  }
  [data-theme="dark"] .badge-checklist.complete { background: rgba(97, 189, 79, 0.24); color: #61BD4F; }

  mark.search-hit {
    background: #FDF6B0; color: inherit; padding: 0 2px; border-radius: 2px;
  }

  /* ===== Modal (Card Back) ===== */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.64);
    z-index: 200;
    display: flex; justify-content: center; align-items: flex-start;
    padding: 48px 12px;
    overflow-y: auto;
  }
  .modal {
    background: #F4F5F7;
    color: var(--text-dark);
    width: 100%; max-width: 768px;
    border-radius: 12px;
    box-shadow: var(--shadow-lg);
    position: relative;
  }
  [data-theme="dark"] .modal { background: #1D2125; }

  .modal-close {
    position: absolute; top: 12px; right: 12px;
    background: transparent; border: none; cursor: pointer;
    width: 32px; height: 32px; border-radius: var(--radius);
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--text-mid); z-index: 2;
  }
  .modal-close:hover { background: var(--hover-bg); }

  .modal-header {
    padding: 12px 48px 0 56px;
    position: relative;
  }
  .modal-header-icon {
    position: absolute; left: 20px; top: 14px;
    color: var(--text-mid);
    font-size: 24px;
  }
  .modal-title {
    font-size: 20px; font-weight: 600;
    width: 100%; border: 2px solid transparent; background: transparent;
    color: var(--text-dark); padding: 4px 8px; border-radius: var(--radius);
    font-family: inherit; line-height: 1.3; resize: none;
    overflow: hidden;
  }
  .modal-title:focus { background: var(--card-bg); border-color: var(--tr-blue); outline: none; }
  .modal-sub {
    font-size: 12px; color: var(--text-mid); margin: 4px 8px 0 8px;
  }
  .modal-sub strong { font-weight: 600; }

  .modal-body {
    display: grid;
    grid-template-columns: 1fr 184px;
    gap: 16px;
    padding: 8px 16px 20px 16px;
  }
  @media (max-width: 680px) {
    .modal-body { grid-template-columns: 1fr; }
  }

  .modal-main { padding: 0 8px 0 40px; min-width: 0; }
  .modal-side { display: flex; flex-direction: column; gap: 6px; min-width: 0; }

  /* Section header: icon naturally inside flex (no absolute trickery) */
  .section-header {
    display: flex; align-items: center; gap: 8px;
    margin: 18px 0 8px -32px;
    padding-right: 8px;
    color: var(--text-mid);
    min-width: 0;
  }
  .section-header > .section-icon {
    width: 24px; flex: 0 0 24px;
    display: inline-flex; justify-content: center;
    color: var(--text-mid); font-size: 20px;
  }
  .section-title {
    font-size: 16px; font-weight: 600; color: var(--text-dark);
    flex: 1; min-width: 0;
  }
  .section-header .checklist-title {
    flex: 1; min-width: 0;
  }
  .section-header > .btn-icon {
    flex: 0 0 32px;
  }

  /* Quick-add actions bar under title (Trello-style pill row) */
  .quick-actions {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 0 16px 0 56px;
    margin: 4px 0 12px 0;
  }
  .qa-btn {
    background: var(--hover-bg); color: var(--text-dark);
    border: none; border-radius: var(--radius);
    padding: 6px 12px;
    font-family: inherit; font-size: 14px; font-weight: 500;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .qa-btn:hover { background: var(--hover-strong); }
  .qa-btn .material-symbols-outlined { font-size: 18px; }

  /* Tab buttons (e.g. archive-popover) */
  .tab-btn {
    flex: 1;
    background: var(--hover-bg); color: var(--text-dark);
    border: none; border-radius: var(--radius);
    padding: 6px 10px;
    font-family: inherit; font-size: 14px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .tab-btn:hover { background: var(--hover-strong); }
  .tab-btn.active { background: var(--hover-strong); font-weight: 600; }

  .side-title {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em;
    color: var(--text-mid); margin: 4px 4px;
  }
  .side-btn {
    width: 100%; text-align: left;
    background: var(--hover-bg); border: none;
    padding: 6px 10px; border-radius: var(--radius);
    cursor: pointer; font-family: inherit; font-size: 14px;
    color: var(--text-dark);
    display: flex; align-items: center; gap: 8px;
    transition: background 0.15s;
  }
  .side-btn:hover { background: var(--hover-strong); }
  .side-btn.danger:hover { background: rgba(235, 90, 70, 0.18); color: var(--due-red); }

  .desc-box {
    min-height: 48px;
    background: var(--hover-bg);
    border-radius: var(--radius);
    padding: 10px 12px;
    cursor: pointer;
    color: var(--text-dark);
    white-space: pre-wrap;
    line-height: 1.5;
    overflow-wrap: break-word;
  }
  .desc-box.empty { color: var(--text-light); }
  .desc-box:hover { background: var(--hover-strong); }
  .desc-edit textarea {
    width: 100%; min-height: 100px;
    padding: 8px 10px; border: 2px solid var(--tr-blue); border-radius: var(--radius);
    font-family: inherit; font-size: 14px;
    resize: vertical;
    background: var(--card-bg); color: var(--text-dark);
  }
  .desc-edit textarea:focus { outline: none; }

  .checklist {
    margin-bottom: 16px;
  }
  .checklist-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 8px;
  }
  .checklist-title {
    flex: 1;
    font-weight: 600; font-size: 15px;
    background: transparent; border: 2px solid transparent;
    padding: 4px 8px; border-radius: var(--radius);
    font-family: inherit; color: var(--text-dark);
  }
  .checklist-title:focus { background: var(--card-bg); border-color: var(--tr-blue); outline: none; }
  .checklist-progress {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px; font-size: 11px; color: var(--text-mid);
  }
  .checklist-progress-bar {
    flex: 1;
    height: 8px; background: var(--hover-bg); border-radius: 4px; overflow: hidden;
  }
  .checklist-progress-fill {
    height: 100%; background: var(--tr-blue); transition: width 0.2s;
  }
  .checklist-progress-fill.complete { background: var(--due-green); }
  .checklist-item {
    display: flex; align-items: flex-start; gap: 6px;
    padding: 4px 8px; border-radius: var(--radius);
  }
  .checklist-item:hover { background: var(--hover-bg); }
  .checklist-item input[type=checkbox] { margin-top: 4px; }
  .checklist-item-text {
    flex: 1; padding: 4px 0; font-size: 14px; line-height: 1.4;
    color: var(--text-dark); cursor: pointer;
    word-wrap: break-word;
  }
  .checklist-item-text.done { text-decoration: line-through; color: var(--text-light); }
  .checklist-item-delete {
    opacity: 0; transition: opacity 0.15s;
  }
  .checklist-item:hover .checklist-item-delete { opacity: 1; }

  /* ===== Popover ===== */
  .popover-backdrop {
    position: fixed; inset: 0; z-index: 300;
  }
  .popover {
    position: absolute; z-index: 301;
    background: var(--card-bg); color: var(--text-dark);
    border-radius: 8px;
    box-shadow: var(--shadow-lg);
    width: 304px; max-width: calc(100vw - 24px);
    overflow: hidden;
  }
  .popover-header {
    padding: 8px 36px 8px 12px;
    border-bottom: 1px solid var(--border);
    position: relative;
    font-weight: 600; text-align: center; font-size: 14px;
    color: var(--text-dark);
  }
  .popover-close {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    background: transparent; border: none; cursor: pointer;
    width: 28px; height: 28px; border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-mid);
  }
  .popover-close:hover { background: var(--hover-bg); }
  .popover-body {
    padding: 8px 12px 12px 12px;
    max-height: 400px; overflow-y: auto;
  }
  .popover-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; border-radius: var(--radius);
    cursor: pointer; font-size: 14px;
    color: var(--text-dark); user-select: none;
    border: none; background: transparent; width: 100%; text-align: left;
    font-family: inherit;
  }
  .popover-item:hover { background: var(--hover-bg); }
  .popover-item .label-chip {
    flex: 1;
    height: 32px; border-radius: var(--radius);
    padding: 6px 10px;
    color: #FFF; font-weight: 500; font-size: 13px;
    display: flex; align-items: center; gap: 4px;
  }
  .popover-item .label-check {
    margin-left: auto; opacity: 0;
  }
  .popover-item.active .label-check { opacity: 1; }
  .popover-section-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
    color: var(--text-mid); margin: 8px 4px 4px;
  }

  /* Date picker */
  .date-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }
  .date-row label { flex: 0 0 80px; font-size: 13px; color: var(--text-mid); }
  .date-row input[type=date], .date-row input[type=time] {
    flex: 1; padding: 6px 8px; border: 1px solid var(--border); border-radius: var(--radius);
    font-family: inherit; font-size: 14px;
    background: var(--card-bg); color: var(--text-dark);
  }
  .date-row input[type=checkbox] { flex: 0 0 auto; }

  /* ===== Toast ===== */
  #toaster {
    position: fixed; bottom: 16px; left: 16px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 400;
  }
  .toast {
    background: #172B4D;
    color: #FFF;
    padding: 10px 14px;
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    display: flex; align-items: center; gap: 12px;
    max-width: 360px;
    animation: slideIn 0.2s ease-out;
  }
  @keyframes slideIn {
    from { transform: translateY(8px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .toast button {
    background: transparent; border: none; color: #79B8FF;
    cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 600;
    text-transform: uppercase;
  }
  .toast button:hover { text-decoration: underline; }

  /* ===== Boards menu (left drawer) ===== */
  .drawer-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 150;
  }
  .drawer {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: 320px; max-width: 90vw;
    background: var(--card-bg);
    box-shadow: var(--shadow-lg);
    z-index: 151;
    display: flex; flex-direction: column;
    animation: slideRight 0.2s ease-out;
  }
  @keyframes slideRight {
    from { transform: translateX(-100%); }
    to { transform: translateX(0); }
  }
  .drawer-header {
    padding: 12px 12px 12px 16px;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .drawer-title { flex: 1; font-weight: 700; font-size: 16px; }
  .drawer-body { flex: 1; overflow-y: auto; padding: 8px; }
  .board-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: var(--radius);
    cursor: pointer;
    margin-bottom: 4px;
  }
  .board-item:hover { background: var(--hover-bg); }
  .board-item.current { background: var(--hover-strong); }
  .board-swatch {
    width: 32px; height: 32px; border-radius: var(--radius);
    flex-shrink: 0;
  }
  .board-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .board-item-actions { display: flex; gap: 2px; }

  /* Background picker */
  .bg-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .bg-swatch {
    aspect-ratio: 16 / 10;
    border-radius: var(--radius);
    cursor: pointer;
    border: 2px solid transparent;
    background-size: cover; background-position: center;
    position: relative;
  }
  .bg-swatch.selected { border-color: var(--tr-blue); }
  .bg-swatch.selected::after {
    content: 'check';
    font-family: 'Material Symbols Outlined';
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #FFF;
    font-size: 24px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }

  /* Filter chips */
  .filter-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 8px; background: var(--hover-bg);
    border-radius: 12px; font-size: 12px;
    color: var(--text-dark);
    margin: 2px;
  }
  .filter-chip button {
    background: transparent; border: none; cursor: pointer;
    color: var(--text-mid); display: inline-flex; align-items: center;
  }

  /* Shortcuts modal */
  .shortcuts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 4px 16px;
  }
  .shortcut-row {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 0; font-size: 13px;
  }
  kbd {
    background: var(--hover-bg); border: 1px solid var(--border);
    border-radius: 4px; padding: 2px 6px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px; color: var(--text-dark);
    white-space: nowrap;
  }

  /* Modal label & date chips */
  .modal-chip-row {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .modal-label-chip {
    height: 32px; min-width: 48px;
    padding: 0 12px;
    color: #FFF; font-weight: 500; font-size: 13px;
    border: none; border-radius: var(--radius);
    cursor: pointer;
    display: inline-flex; align-items: center;
    transition: filter 0.15s;
  }
  .modal-label-chip:hover { filter: brightness(0.92); }
  .modal-date-chip {
    background: var(--hover-bg); color: var(--text-dark);
    border: none; border-radius: var(--radius);
    padding: 6px 10px;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    font-family: inherit; font-size: 14px;
    transition: background 0.15s;
  }
  .modal-date-chip:hover { background: var(--hover-strong); }
  .modal-date-chip .material-symbols-outlined { font-size: 18px; color: var(--text-mid); }

  /* Utility */
  .hidden { display: none !important; }
  .muted { color: var(--text-light); }
  .row { display: flex; align-items: center; gap: 8px; }
  .grow { flex: 1; }
</style>

<script>
/* ============================================================================
   Trello Clone — single-file implementation
   References: Atlassian official support & blog (see copious header comment)
   ============================================================================ */

// ===== Constants (Trello spec) =====

const LABEL_COLORS = [
  { key: 'green',  hex: '#61BD4F', num: 1 },
  { key: 'yellow', hex: '#F2D600', num: 2 },
  { key: 'orange', hex: '#FF9F1A', num: 3 },
  { key: 'red',    hex: '#EB5A46', num: 4 },
  { key: 'purple', hex: '#C377E0', num: 5 },
  { key: 'blue',   hex: '#0079BF', num: 6 },
  { key: 'sky',    hex: '#00C2E0', num: 7 },
  { key: 'lime',   hex: '#51E898', num: 8 },
  { key: 'pink',   hex: '#FF78CB', num: 9 },
  { key: 'black',  hex: '#344563', num: 0 }
];

// Board backgrounds (Trello has color & photo options; here: curated solid+gradient+photo URLs)
const BG_COLORS = [
  { key: 'blue',   value: 'linear-gradient(135deg, #0079BF, #026AA7)' },
  { key: 'orange', value: 'linear-gradient(135deg, #D29034, #A06121)' },
  { key: 'green',  value: 'linear-gradient(135deg, #519839, #356119)' },
  { key: 'red',    value: 'linear-gradient(135deg, #B04632, #7A2F23)' },
  { key: 'purple', value: 'linear-gradient(135deg, #89609E, #5E4373)' },
  { key: 'pink',   value: 'linear-gradient(135deg, #CD5A91, #9B3F6C)' },
  { key: 'lime',   value: 'linear-gradient(135deg, #4BBF6B, #306F3D)' },
  { key: 'sky',    value: 'linear-gradient(135deg, #00AECC, #007589)' },
  { key: 'grey',   value: 'linear-gradient(135deg, #838C91, #4F5A65)' }
];

const DEFAULT_LABEL_NAME_BY_COLOR = Object.freeze({
  red: 'Do First (緊急×重要)',
  orange: 'Schedule (重要)',
  yellow: '期限あり',
  green: 'Quick Win (短時間)',
  blue: 'Deep Work (集中作業)',
  sky: 'Waiting For (依頼・返答待ち)',
  purple: 'Review / Approval',
  lime: 'Next Action',
  pink: 'Someday / Maybe',
  black: 'Blocker'
});

const DEFAULT_LIST_TEMPLATES = Object.freeze([
  {
    title: 'Inbox',
    cards: [
      {
        title: 'このボードの使い方を確認する',
        description: '1. まずは Inbox に思いついたタスクを全部入れる\n2. 次アクション化できたら「Next Actions」へ移動\n3. 実作業に入ったら「In Progress」へ移動\n4. 待ちが発生したら「Waiting For」へ移動\n5. 完了したら「Done」へ移動',
        labelColors: ['lime', 'blue']
      },
      {
        title: '今週やることを3件書き出す',
        description: '',
        labelColors: ['orange']
      }
    ]
  },
  {
    title: 'Next Actions',
    cards: [
      {
        title: '次に実行する具体アクションを1件作る',
        description: '例: 「請求書フォーマットを更新して送付」など、次に取る行動が明確な形で記入',
        labelColors: ['lime']
      }
    ]
  },
  {
    title: 'In Progress',
    cards: []
  },
  {
    title: 'Waiting For',
    cards: []
  },
  {
    title: 'Someday / Maybe',
    cards: []
  },
  {
    title: 'Done',
    cards: []
  }
]);

const DEFAULT_LABELS = () => LABEL_COLORS.map(c => ({
  id: uid(), color: c.key, name: DEFAULT_LABEL_NAME_BY_COLOR[c.key] || ''
}));

const STORAGE_KEY = 'trello-clone-data-v2';

// ===== Utilities =====

function uid() {
  return 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
}

function nowIso() { return new Date().toISOString(); }

function labelHex(colorKey) {
  const c = LABEL_COLORS.find(x => x.key === colorKey);
  return c ? c.hex : '#5E6C84';
}

function bgValue(key) {
  const b = BG_COLORS.find(x => x.key === key);
  return b ? b.value : BG_COLORS[0].value;
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function formatDateShort(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const y = d.getFullYear();
  const now = new Date();
  const m = d.getMonth() + 1;
  const day = d.getDate();
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  const dateStr = (y === now.getFullYear()) ? `${m}月${day}日` : `${y}/${m}/${day}`;
  if (d.getHours() === 0 && d.getMinutes() === 0) return dateStr;
  return `${dateStr} ${hh}:${mm}`;
}

function formatRelative(iso) {
  const d = new Date(iso);
  const diff = Date.now() - d.getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'たった今';
  if (mins < 60) return `${mins}分前`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}時間前`;
  const days = Math.floor(hrs / 24);
  if (days < 7) return `${days}日前`;
  return formatDateShort(iso);
}

function toLocalDateInputValue(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (Number.isNaN(d.getTime())) return '';
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function toLocalTimeInputValue(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (Number.isNaN(d.getTime())) return '';
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  return `${hh}:${mm}`;
}

function localDateToIso(dateValue) {
  if (!dateValue) return null;
  const [y, m, d] = dateValue.split('-').map(Number);
  if (!y || !m || !d) return null;
  return new Date(y, m - 1, d, 0, 0, 0, 0).toISOString();
}

function localDateTimeToIso(dateValue, timeValue) {
  if (!dateValue) return null;
  const [y, m, d] = dateValue.split('-').map(Number);
  if (!y || !m || !d) return null;
  const [hhRaw, mmRaw] = (timeValue || '23:59').split(':');
  const hh = Number(hhRaw);
  const mm = Number(mmRaw);
  if (Number.isNaN(hh) || Number.isNaN(mm)) return null;
  return new Date(y, m - 1, d, hh, mm, 0, 0).toISOString();
}

/**
 * Due date badge color per Atlassian blog spec:
 *  - grey: >24h future
 *  - yellow: <24h future
 *  - red: overdue (stays red 24h)
 *  - green: marked complete
 */
function dueStatus(iso, complete) {
  if (!iso) return null;
  if (complete) return 'green';
  const t = new Date(iso).getTime();
  const now = Date.now();
  const diff = t - now;
  if (diff < 0) return 'red';
  if (diff < 24 * 3600 * 1000) return 'yellow';
  return 'grey';
}

// ===== State =====

let state = loadState();
let dragData = null;
let undoStack = [];
let redoStack = [];
let currentModal = null;
let activePopover = null;
let filterCriteria = { text: '', labelIds: [], due: '' };

function defaultState() {
  const board = createDefaultBoard('ようこそボード');
  return {
    boards: [board],
    currentBoardId: board.id,
    theme: 'light',
    showLabelNames: false
  };
}

function createDefaultLists(labels) {
  const labelIdByColor = Object.fromEntries(labels.map(label => [label.color, label.id]));
  return DEFAULT_LIST_TEMPLATES.map((template) => ({
    id: uid(),
    title: template.title,
    archived: false,
    cards: template.cards.map((templateCard) => ({
      ...newCardTemplate(),
      title: templateCard.title,
      description: templateCard.description,
      labelIds: (templateCard.labelColors || [])
        .map(colorKey => labelIdByColor[colorKey])
        .filter(Boolean)
    }))
  }));
}

function createDefaultBoard(name) {
  const labels = DEFAULT_LABELS();
  return {
    id: uid(),
    name,
    background: 'blue',
    labels,
    lists: createDefaultLists(labels)
  };
}

function newCardTemplate() {
  return {
    id: uid(),
    title: '',
    description: '',
    labelIds: [],
    startDate: null,
    dueDate: null,
    dueComplete: false,
    checklists: [],
    archived: false,
    createdAt: nowIso(),
    updatedAt: nowIso()
  };
}

function isPlainObject(v) {
  return !!v && typeof v === 'object' && !Array.isArray(v);
}

function toValidIso(v) {
  if (!v) return null;
  const d = new Date(v);
  return Number.isNaN(d.getTime()) ? null : d.toISOString();
}

function normalizeChecklist(raw) {
  if (!isPlainObject(raw)) return null;
  const title = typeof raw.title === 'string' ? raw.title : 'チェックリスト';
  const items = Array.isArray(raw.items) ? raw.items : [];
  return {
    id: (typeof raw.id === 'string' && raw.id) ? raw.id : uid(),
    title,
    items: items
      .filter(isPlainObject)
      .map(it => ({
        id: (typeof it.id === 'string' && it.id) ? it.id : uid(),
        text: typeof it.text === 'string' ? it.text : '',
        done: !!it.done
      }))
  };
}

function normalizeCard(raw, labelSet) {
  const card = newCardTemplate();
  if (!isPlainObject(raw)) return card;
  card.id = (typeof raw.id === 'string' && raw.id) ? raw.id : uid();
  card.title = typeof raw.title === 'string' ? raw.title : '';
  card.description = typeof raw.description === 'string' ? raw.description : '';
  card.labelIds = Array.isArray(raw.labelIds)
    ? raw.labelIds.filter(id => typeof id === 'string' && labelSet.has(id))
    : [];
  card.startDate = toValidIso(raw.startDate);
  card.dueDate = toValidIso(raw.dueDate);
  card.dueComplete = !!raw.dueComplete && !!card.dueDate;
  card.archived = !!raw.archived;
  card.createdAt = toValidIso(raw.createdAt) || nowIso();
  card.updatedAt = toValidIso(raw.updatedAt) || card.createdAt;
  card.checklists = Array.isArray(raw.checklists)
    ? raw.checklists.map(normalizeChecklist).filter(Boolean)
    : [];
  return card;
}

function normalizeList(raw, labelSet) {
  if (!isPlainObject(raw) || !Array.isArray(raw.cards)) return null;
  return {
    id: (typeof raw.id === 'string' && raw.id) ? raw.id : uid(),
    title: (typeof raw.title === 'string' && raw.title.trim()) ? raw.title.trim() : '無題リスト',
    archived: !!raw.archived,
    cards: raw.cards.map(c => normalizeCard(c, labelSet))
  };
}

function normalizeBoard(raw, idx) {
  if (!isPlainObject(raw) || raw.closed) return null;
  if (!Array.isArray(raw.labels) || !Array.isArray(raw.lists)) return null;
  const labels = raw.labels
    .filter(isPlainObject)
    .map((lbl, i) => ({
      id: (typeof lbl.id === 'string' && lbl.id) ? lbl.id : uid(),
      color: LABEL_COLORS.some(c => c.key === lbl.color) ? lbl.color : LABEL_COLORS[i % LABEL_COLORS.length].key,
      name: typeof lbl.name === 'string' ? lbl.name : ''
    }));
  const labelSet = new Set(labels.map(l => l.id));
  const lists = raw.lists.map(l => normalizeList(l, labelSet));
  if (lists.some(l => !l)) return null;
  return {
    id: (typeof raw.id === 'string' && raw.id) ? raw.id : uid(),
    name: (typeof raw.name === 'string' && raw.name.trim()) ? raw.name.trim() : `ボード${idx + 1}`,
    background: BG_COLORS.some(c => c.key === raw.background) ? raw.background : 'blue',
    labels,
    lists
  };
}

function normalizeStateShape(raw, strict) {
  if (!isPlainObject(raw) || !Array.isArray(raw.boards) || !raw.boards.length) {
    return { ok: false, error: 'boards 配列が不正です' };
  }
  const boards = [];
  for (let i = 0; i < raw.boards.length; i++) {
    const board = normalizeBoard(raw.boards[i], i);
    if (!board) {
      if (strict) return { ok: false, error: `boards[${i}] の構造が不正です` };
      continue;
    }
    boards.push(board);
  }
  if (!boards.length) return { ok: false, error: '有効なボードがありません' };
  let currentBoardId = typeof raw.currentBoardId === 'string' ? raw.currentBoardId : '';
  if (!boards.some(b => b.id === currentBoardId)) currentBoardId = boards[0].id;
  return {
    ok: true,
    data: {
      boards,
      currentBoardId,
      theme: raw.theme === 'dark' ? 'dark' : 'light',
      showLabelNames: !!raw.showLabelNames
    }
  };
}

function loadPersistedState() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return null;
  const parsed = JSON.parse(raw);
  const normalized = normalizeStateShape(parsed, false);
  return normalized.ok ? normalized.data : null;
}

function loadState() {
  try {
    return loadPersistedState() || defaultState();
  } catch (e) {
    console.warn('loadState failed, using default', e);
    return defaultState();
  }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    return true;
  } catch (e) {
    console.warn('saveState failed', e);
    try {
      const restored = loadPersistedState();
      if (restored) state = restored;
    } catch (restoreErr) {
      console.warn('restore after save failure failed', restoreErr);
    }
    showToast('保存に失敗しました。直前の保存済み状態に戻しました', null, 3500);
    renderAll();
    return false;
  }
}

function pushUndo(action) {
  undoStack.push(action);
  if (undoStack.length > 50) undoStack.shift();
  redoStack = [];
}

function resetHistory() {
  undoStack = [];
  redoStack = [];
}

function doUndo() {
  if (!undoStack.length) { showToast('元に戻す操作がありません', null, 1500); return; }
  const a = undoStack.pop();
  redoStack.push(a);
  a.undo();
  if (!saveState()) return;
  renderAll();
  showToast('元に戻しました', null, 1500);
}

function doRedo() {
  if (!redoStack.length) { showToast('やり直す操作がありません', null, 1500); return; }
  const a = redoStack.pop();
  undoStack.push(a);
  a.redo();
  if (!saveState()) return;
  renderAll();
  showToast('やり直しました', null, 1500);
}

// ===== State helpers =====

function currentBoard() {
  return state.boards.find(b => b.id === state.currentBoardId);
}

function findList(boardId, listId) {
  const b = state.boards.find(x => x.id === boardId);
  return b ? b.lists.find(l => l.id === listId) : null;
}

function findCard(boardId, cardId) {
  const b = state.boards.find(x => x.id === boardId);
  if (!b) return null;
  for (const l of b.lists) {
    const c = l.cards.find(x => x.id === cardId);
    if (c) return { list: l, card: c };
  }
  return null;
}

// ===== Rendering =====

function renderAll() {
  document.body.setAttribute('data-theme', state.theme);
  document.getElementById('theme-icon').textContent = state.theme === 'dark' ? 'light_mode' : 'dark_mode';
  document.body.classList.toggle('show-label-names', !!state.showLabelNames);

  const board = currentBoard();
  if (!board) {
    document.getElementById('board').innerHTML = '';
    document.getElementById('current-board-title').textContent = '—';
    return;
  }
  document.getElementById('current-board-title').textContent = board.name;
  document.body.style.setProperty('--board-bg', bgValue(board.background));

  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  for (const list of board.lists) {
    if (list.archived) continue;
    boardEl.appendChild(renderList(list, board));
  }
  boardEl.appendChild(renderAddList());
}

function renderList(list, board) {
  const el = document.createElement('div');
  el.className = 'list';
  el.dataset.listId = list.id;
  // Note: draggable is set later, after content is rendered

  const visibleCards = list.cards.filter(c => !c.archived && matchesFilter(c));

  el.innerHTML = `
    <div class="list-header" data-drag-handle>
      <input class="list-title" value="${escapeHtml(list.title)}" data-list-id="${list.id}" aria-label="リスト名">
      <span class="list-count">${visibleCards.length}</span>
      <button class="list-menu-btn" data-list-menu="${list.id}" title="リストメニュー">
        <span class="material-symbols-outlined msi-md">more_horiz</span>
      </button>
    </div>
    <div class="list-cards" data-cards-container="${list.id}"></div>
    <div class="list-add" data-list-add="${list.id}">
      <button class="list-add-btn">
        <span class="material-symbols-outlined msi-md">add</span>カードを追加
      </button>
    </div>
  `;

  const cardsEl = el.querySelector('[data-cards-container]');
  for (const card of visibleCards) {
    cardsEl.appendChild(renderCard(card, list));
  }

  // Events
  el.querySelector('.list-title').addEventListener('blur', (e) => {
    const v = e.target.value.trim();
    if (!v) { e.target.value = list.title; return; }
    if (v === list.title) return;
    const oldT = list.title;
    list.title = v;
    pushUndo({
      undo: () => { list.title = oldT; },
      redo: () => { list.title = v; }
    });
    saveState();
  });
  el.querySelector('.list-title').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); }
    if (e.key === 'Escape') { e.target.value = list.title; e.target.blur(); }
  });

  el.querySelector('[data-list-menu]').addEventListener('click', (e) => {
    e.stopPropagation();
    openListMenu(list, e.currentTarget);
  });

  el.querySelector('.list-add-btn').addEventListener('click', () => openCardComposer(list, el));

  // Drag & drop for cards
  cardsEl.addEventListener('dragover', (e) => {
    if (!dragData || dragData.type !== 'card') return;
    e.preventDefault();
    const afterEl = getDragAfter(cardsEl, e.clientY, '.card:not(.dragging)');
    const draggingEl = document.querySelector('.card.dragging');
    if (!draggingEl) return;
    if (afterEl == null) cardsEl.appendChild(draggingEl);
    else cardsEl.insertBefore(draggingEl, afterEl);
  });
  cardsEl.addEventListener('drop', (e) => {
    if (!dragData || dragData.type !== 'card') return;
    e.preventDefault();
    const cards = [...cardsEl.querySelectorAll('.card')].map(n => n.dataset.cardId);
    relocateCard(dragData.cardId, list.id, cards);
  });

  // Drag-drop for entire list — always draggable, but block when target is interactive
  el.draggable = true;
  el.addEventListener('dragstart', (e) => {
    // Don't start a list drag if user is interacting with input/button/card etc.
    const t = e.target;
    if (t !== el && t.closest('input, textarea, button, .card, .list-cards, .list-add, .list-composer')) {
      e.preventDefault();
      return;
    }
    dragData = { type: 'list', listId: list.id };
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setData('text/plain', list.id); } catch (ex) {}
  });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    dragData = null;
  });

  return el;
}

function renderAddList() {
  const el = document.createElement('div');
  el.className = 'add-list-wrap';
  el.innerHTML = `
    <button class="add-list-btn">
      <span class="material-symbols-outlined">add</span>
      別のリストを追加
    </button>
  `;
  const btn = el.querySelector('button');
  btn.addEventListener('click', () => {
    el.innerHTML = `
      <div class="add-list-composer">
        <input type="text" placeholder="リストのタイトルを入力..." />
        <div class="composer-actions" style="margin-top:8px;">
          <button class="btn-primary" data-add>リストを追加</button>
          <button class="btn-icon" data-cancel aria-label="キャンセル">
            <span class="material-symbols-outlined msi-md">close</span>
          </button>
        </div>
      </div>
    `;
    const input = el.querySelector('input');
    input.focus();
    input.addEventListener('keydown', (ev) => {
      if (ev.key === 'Enter') { ev.preventDefault(); submit(); }
      if (ev.key === 'Escape') renderAll();
    });
    el.querySelector('[data-add]').addEventListener('click', submit);
    el.querySelector('[data-cancel]').addEventListener('click', () => renderAll());
    function submit() {
      const title = input.value.trim();
      if (!title) return;
      const b = currentBoard();
      const newList = { id: uid(), title, archived: false, cards: [] };
      b.lists.push(newList);
      pushUndo({
        undo: () => { b.lists = b.lists.filter(l => l.id !== newList.id); },
        redo: () => { b.lists.push(newList); }
      });
      saveState();
      renderAll();
    }
  });

  // Allow dropping a list here
  el.addEventListener('dragover', (e) => {
    if (dragData && dragData.type === 'list') e.preventDefault();
  });

  return el;
}

function renderCard(card, list) {
  const el = document.createElement('div');
  el.className = 'card';
  el.dataset.cardId = card.id;
  el.draggable = true;
  el.tabIndex = 0;
  el.setAttribute('role', 'button');
  el.setAttribute('aria-label', card.title ? `カード: ${card.title}` : 'カード');

  const status = dueStatus(card.dueDate, card.dueComplete);
  const board = currentBoard();
  const cardLabels = card.labelIds.map(id => board.labels.find(l => l.id === id)).filter(Boolean);

  const editBtn = `<button class="card-edit-btn" data-quick-edit aria-label="クイック編集">
    <span class="material-symbols-outlined" style="font-size:16px;">edit</span>
  </button>`;

  el.innerHTML = renderCardInner(card, cardLabels, status) + editBtn;

  el.addEventListener('click', (e) => {
    if (e.target.closest('[data-quick-edit]')) { e.stopPropagation(); openQuickEdit(card, el); return; }
    if (e.target.closest('[data-complete-toggle]')) { e.stopPropagation(); toggleComplete(card); return; }
    if (e.target.closest('[data-label-pill]')) {
      e.stopPropagation();
      if (!state.showLabelNames) {
        state.showLabelNames = true;
        if (!saveState()) return;
        renderAll();
      } else {
        state.showLabelNames = false;
        if (!saveState()) return;
        renderAll();
      }
      return;
    }
    openCardModal(card);
  });

  el.addEventListener('dragstart', (e) => {
    e.stopPropagation(); // Prevent list dragstart from also firing
    dragData = { type: 'card', cardId: card.id, fromListId: list.id };
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setData('text/plain', card.id); } catch (ex) {}
  });
  el.addEventListener('dragend', (e) => {
    e.stopPropagation();
    el.classList.remove('dragging');
    dragData = null;
  });

  return el;
}

function renderCardInner(card, cardLabels, status) {
  const labelsHtml = cardLabels.length
    ? `<div class="card-labels">${cardLabels.map(l =>
        `<div class="label-pill" data-label-pill style="background:${labelHex(l.color)};"${l.name ? ` title="${escapeHtml(l.name)}"` : ''}>${escapeHtml(l.name || '')}</div>`
      ).join('')}</div>`
    : '';

  const title = highlightSearch(escapeHtml(card.title));

  const completeIcon = card.dueDate
    ? `<span class="material-symbols-outlined card-complete-icon ${card.dueComplete ? 'done' : ''}" data-complete-toggle title="完了としてマーク">${card.dueComplete ? 'check_circle' : 'radio_button_unchecked'}</span>`
    : '';

  const badges = [];

  if (card.description && card.description.trim()) {
    badges.push(`<span class="badge" title="説明あり"><span class="material-symbols-outlined">notes</span></span>`);
  }
  const clTotal = card.checklists.reduce((s, cl) => s + cl.items.length, 0);
  const clDone = card.checklists.reduce((s, cl) => s + cl.items.filter(i => i.done).length, 0);
  if (clTotal) {
    const allDone = clDone === clTotal;
    badges.push(`<span class="badge badge-checklist ${allDone ? 'complete' : ''}" title="チェックリスト"><span class="material-symbols-outlined">${allDone ? 'task_alt' : 'checklist'}</span>${clDone}/${clTotal}</span>`);
  }
  if (card.startDate || card.dueDate) {
    const iso = card.dueDate || card.startDate;
    const statusClass = card.dueDate ? (status || 'grey') : 'grey';
    const icon = card.dueDate ? (card.dueComplete ? 'check_circle' : 'schedule') : 'play_arrow';
    badges.push(`<span class="badge badge-due ${statusClass}" title="期限"><span class="material-symbols-outlined">${icon}</span>${formatDateShort(iso)}</span>`);
  }

  const badgesHtml = badges.length ? `<div class="card-badges">${badges.join('')}</div>` : '';

  return `
    ${labelsHtml}
    <div class="card-title-row">
      ${completeIcon}
      <div class="card-title">${title}</div>
    </div>
    ${badgesHtml}
  `;
}

function highlightSearch(html) {
  const q = filterCriteria.text;
  if (!q) return html;
  try {
    const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return html.replace(new RegExp(esc, 'gi'), (m) => `<mark class="search-hit">${m}</mark>`);
  } catch (e) { return html; }
}

function matchesFilter(card) {
  // Text filter
  if (filterCriteria.text) {
    const q = filterCriteria.text.toLowerCase();
    const hay = (card.title + ' ' + (card.description || '')).toLowerCase();
    if (!hay.includes(q)) return false;
  }
  // Label filter
  if (filterCriteria.labelIds && filterCriteria.labelIds.length) {
    if (!filterCriteria.labelIds.every(id => card.labelIds.includes(id))) return false;
  }
  // Due filter
  if (filterCriteria.due) {
    const status = dueStatus(card.dueDate, card.dueComplete);
    if (filterCriteria.due === 'no-due' && card.dueDate) return false;
    if (filterCriteria.due === 'overdue' && status !== 'red') return false;
    if (filterCriteria.due === 'due-soon' && status !== 'yellow') return false;
    if (filterCriteria.due === 'complete' && !card.dueComplete) return false;
    if (filterCriteria.due === 'incomplete' && card.dueComplete) return false;
  }
  return true;
}

// ===== Card operations =====

function relocateCard(cardId, toListId, orderedIds) {
  const board = currentBoard();
  let src = null, srcIdx = -1;
  for (const l of board.lists) {
    const i = l.cards.findIndex(c => c.id === cardId);
    if (i !== -1) { src = l; srcIdx = i; break; }
  }
  if (!src) return;
  const [card] = src.cards.splice(srcIdx, 1);
  const dest = board.lists.find(l => l.id === toListId);
  if (!dest) { src.cards.splice(srcIdx, 0, card); return; }

  const visibleOrder = orderedIds.includes(cardId) ? orderedIds : [...orderedIds, cardId];
  const baseCards = dest.cards.filter(c => c.id !== cardId);
  const byId = new Map(baseCards.map(c => [c.id, c]));
  byId.set(cardId, card);
  const visibleQueue = visibleOrder.map(id => byId.get(id)).filter(Boolean);
  const merged = [];
  for (const c of baseCards) {
    if (!c.archived && matchesFilter(c)) merged.push(visibleQueue.shift() || c);
    else merged.push(c);
  }
  if (visibleQueue.length) merged.push(...visibleQueue);
  dest.cards = merged;
  card.updatedAt = nowIso();
  if (!saveState()) return;
  renderAll();
}

function toggleComplete(card) {
  if (!card.dueDate) {
    showToast('期限日があるカードのみ完了にできます', null, 2000);
    return;
  }
  card.dueComplete = !card.dueComplete;
  card.updatedAt = nowIso();
  if (!saveState()) return;
  renderAll();
}

function archiveCard(card, list) {
  card.archived = true;
  if (!saveState()) return;
  renderAll();
  showToast('カードをアーカイブしました', () => {
    card.archived = false;
    if (!saveState()) return;
    renderAll();
  }, 5000);
}

function deleteCardPermanent(card, list) {
  if (!confirm('このカードを完全に削除します。元に戻せません。よろしいですか?')) return;
  const idx = list.cards.findIndex(c => c.id === card.id);
  if (idx < 0) return;
  const removed = list.cards.splice(idx, 1)[0];
  pushUndo({
    undo: () => { list.cards.splice(idx, 0, removed); },
    redo: () => { list.cards.splice(idx, 1); }
  });
  if (!saveState()) return;
  renderAll();
  if (currentModal) closeModal();
  showToast('カードを削除しました', null, 3000);
}

function copyCard(card, list) {
  const copy = JSON.parse(JSON.stringify(card));
  copy.id = uid();
  copy.title = card.title + ' のコピー';
  copy.archived = false;
  copy.createdAt = nowIso();
  copy.updatedAt = nowIso();
  if (copy.checklists) {
    copy.checklists.forEach(cl => {
      cl.id = uid();
      if (cl.items) cl.items.forEach(it => { it.id = uid(); });
    });
  }
  const idx = list.cards.findIndex(c => c.id === card.id);
  list.cards.splice(idx + 1, 0, copy);
  if (!saveState()) return;
  renderAll();
  showToast('カードを複製しました', null, 2000);
}

function moveCardTo(card, targetListId, position) {
  const board = currentBoard();
  const src = board.lists.find(l => l.cards.some(c => c.id === card.id));
  if (!src) return;
  const dest = board.lists.find(l => l.id === targetListId);
  if (!dest) return;
  src.cards = src.cards.filter(c => c.id !== card.id);
  const pos = Math.max(0, Math.min(dest.cards.length, position));
  dest.cards.splice(pos, 0, card);
  card.updatedAt = nowIso();
  if (!saveState()) return;
  renderAll();
}

function archiveList(list) {
  list.archived = true;
  if (!saveState()) return;
  renderAll();
  showToast('リストをアーカイブしました', () => {
    list.archived = false;
    if (!saveState()) return;

  }, 5000);
}

function deleteListPermanent(list) {

  if (idx < 0) return;

  });

  showToast('リストを削除しました', null, 3000);

function archiveAllCardsInList(list) {
  list.cards.forEach(c => c.archived = true);
  if (!saveState()) return;
  renderAll();
  showToast(`${list.cards.length}件のカードをアーカイブしました`, null, 3000);
}

function copyList(list) {
  const board = currentBoard();
  const copy = JSON.parse(JSON.stringify(list));
  copy.id = uid();
  copy.title = list.title + ' のコピー';
  copy.cards.forEach(c => { c.id = uid(); });
  const idx = board.lists.findIndex(l => l.id === list.id);
  board.lists.splice(idx + 1, 0, copy);
  if (!saveState()) return;
  renderAll();
}

function sortList(list, by) {
  const order = (a, b) => {
    switch (by) {
      case 'created-newest': return new Date(b.createdAt) - new Date(a.createdAt);
      case 'created-oldest': return new Date(a.createdAt) - new Date(b.createdAt);
      case 'due-soonest':
        if (!a.dueDate && !b.dueDate) return 0;
        if (!a.dueDate) return 1;
        if (!b.dueDate) return -1;
        return new Date(a.dueDate) - new Date(b.dueDate);
      case 'name': return (a.title || '').localeCompare(b.title || '', 'ja');
      default: return 0;
    }
  };
  list.cards.sort(order);
  saveState(); renderAll();
}

// ===== Composer (Add card) =====

function openCardComposer(list, listEl) {
  const addBox = listEl.querySelector('[data-list-add]');
  addBox.innerHTML = `
    <div class="list-composer">
      <textarea rows="3" placeholder="このカードのタイトルを入力..."></textarea>
      <div class="composer-actions">
        <button class="btn-primary" data-add>カードを追加</button>
        <button class="btn-icon" data-cancel aria-label="キャンセル">
          <span class="material-symbols-outlined msi-md">close</span>
        </button>
      </div>
    </div>
  `;
  const ta = addBox.querySelector('textarea');
  ta.focus();
  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
    if (e.key === 'Escape') renderAll();
  });
  addBox.querySelector('[data-add]').addEventListener('click', submit);
  addBox.querySelector('[data-cancel]').addEventListener('click', () => renderAll());

  function submit() {
    const title = ta.value.trim();
    if (!title) return;
    const card = { ...newCardTemplate(), title };
    list.cards.push(card);
    const addedId = card.id;
    pushUndo({
      undo: () => { list.cards = list.cards.filter(c => c.id !== addedId); },
      redo: () => { list.cards.push(card); }
    });
    saveState();
    renderAll();
    // reopen composer for rapid entry
    const listElNow = document.querySelector(`[data-list-id="${list.id}"]`);
    if (listElNow) openCardComposer(list, listElNow);
  }
}

// ===== Quick edit popover =====
