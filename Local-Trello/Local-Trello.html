// ===== Card Modal =====

function openCardModal(card) {
  closePopover();
  currentModal = { card };
  const { list } = findCard(state.currentBoardId, card.id) || {};
  const overlay = document.createElement('div');
  overlay.className = 'modal-backdrop';
  overlay.innerHTML = `<div class="modal" role="dialog" aria-modal="true"></div>`;
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
  document.body.appendChild(overlay);
  renderCardModal(card, list, overlay.querySelector('.modal'));
}

function closeModal() {
  // Force-blur any active editable element so its blur handler can save
  if (document.activeElement && typeof document.activeElement.blur === 'function') {
    document.activeElement.blur();
  }
  const m = document.querySelector('.modal-backdrop');
  if (m) m.remove();
  currentModal = null;
  saveState();
  renderAll();
}

function renderCardModal(card, list, modalEl) {
  const board = currentBoard();

  const cardLabels = card.labelIds.map(id => board.labels.find(l => l.id === id)).filter(Boolean);

  modalEl.innerHTML = `
    <button class="modal-close" aria-label="閉じる">
      <span class="material-symbols-outlined msi-lg">close</span>
    </button>
    <div class="modal-header">
      <span class="material-symbols-outlined modal-header-icon">${card.dueComplete ? 'check_circle' : 'credit_card'}</span>
      <textarea class="modal-title" rows="1" data-field="title">${escapeHtml(card.title)}</textarea>
      <div class="modal-sub">リスト <strong>${escapeHtml(list.title)}</strong> 内</div>
    </div>

    <div class="quick-actions" data-quick-actions></div>

    <div class="modal-body">
      <div class="modal-main">
        ${cardLabels.length ? `
          <div class="section-header">
            <span class="material-symbols-outlined section-icon">label</span>
            <span class="section-title">ラベル</span>
          </div>
          <div id="modal-labels" style="padding-left:4px;"></div>
        ` : ''}

        ${(card.startDate || card.dueDate) ? `
          <div class="section-header">
            <span class="material-symbols-outlined section-icon">schedule</span>
            <span class="section-title">日付</span>
          </div>
          <div id="modal-dates" style="padding-left:4px;"></div>
        ` : ''}

        <div class="section-header">
          <span class="material-symbols-outlined section-icon">notes</span>
          <span class="section-title">説明</span>
        </div>
        <div id="modal-description"></div>

        <div id="modal-checklists"></div>
      </div>

      <div class="modal-side">
        <div class="side-title">追加</div>
        <button class="side-btn" data-add-labels><span class="material-symbols-outlined msi-md">label</span>ラベル</button>
        <button class="side-btn" data-add-dates><span class="material-symbols-outlined msi-md">schedule</span>日付</button>
        <button class="side-btn" data-add-checklist><span class="material-symbols-outlined msi-md">checklist</span>チェックリスト</button>

        <div class="side-title">アクション</div>
        <button class="side-btn" data-action-move><span class="material-symbols-outlined msi-md">arrow_forward</span>移動</button>
        <button class="side-btn" data-action-copy><span class="material-symbols-outlined msi-md">content_copy</span>コピー</button>
        ${card.archived
          ? `<button class="side-btn" data-action-unarchive><span class="material-symbols-outlined msi-md">unarchive</span>ボードに戻す</button>
             <button class="side-btn danger" data-action-delete><span class="material-symbols-outlined msi-md">delete_forever</span>削除</button>`
          : `<button class="side-btn" data-action-archive><span class="material-symbols-outlined msi-md">archive</span>アーカイブ</button>`
        }
      </div>
    </div>
  `;

  // Quick actions (pill-style)
  const qa = modalEl.querySelector('[data-quick-actions]');
  qa.innerHTML = `
    <button class="qa-btn" data-qa-labels><span class="material-symbols-outlined">label</span>ラベル</button>
    <button class="qa-btn" data-qa-dates><span class="material-symbols-outlined">schedule</span>日付</button>
    <button class="qa-btn" data-qa-checklist><span class="material-symbols-outlined">checklist</span>チェックリスト</button>
    ${card.dueDate ? `<button class="qa-btn" data-qa-complete>
      <span class="material-symbols-outlined">${card.dueComplete ? 'check_circle' : 'radio_button_unchecked'}</span>
      ${card.dueComplete ? '未完了に戻す' : '完了にする'}
    </button>` : ''}
  `;

  // Title
  const titleEl = modalEl.querySelector('[data-field="title"]');
  autoResizeTextarea(titleEl);
  titleEl.addEventListener('input', () => autoResizeTextarea(titleEl));
  titleEl.addEventListener('blur', () => {
    const v = titleEl.value.trim();
    if (!v) { titleEl.value = card.title; return; }
    if (v === card.title) return;
    card.title = v;
    card.updatedAt = nowIso();
    saveState();
    // Update only board cards in background, modal stays open
    const boardEl = document.getElementById('board');
    const cardEl = boardEl?.querySelector(`.card[data-card-id="${card.id}"] .card-title`);
    if (cardEl) cardEl.textContent = v;
  });

  // Modal close
  modalEl.querySelector('.modal-close').addEventListener('click', closeModal);

  // Labels
  if (cardLabels.length) {
    const ll = modalEl.querySelector('#modal-labels');
    ll.className = 'modal-chip-row';
    for (const lbl of cardLabels) {
      const chip = document.createElement('button');
      chip.className = 'modal-label-chip';
      chip.style.background = labelHex(lbl.color);
      chip.textContent = lbl.name || '';
      chip.addEventListener('click', (e) => openLabelsPopover(card, e.currentTarget.getBoundingClientRect(), () => renderCardModal(card, list, modalEl)));
      ll.appendChild(chip);
    }
  }

  // Dates
  if (card.startDate || card.dueDate) {
    const de = modalEl.querySelector('#modal-dates');
    const status = dueStatus(card.dueDate, card.dueComplete);
    de.innerHTML = `
      <div class="modal-chip-row">
        ${card.dueDate ? `<button class="modal-date-chip" data-edit-dates>
          <input type="checkbox" ${card.dueComplete ? 'checked' : ''} data-toggle-complete aria-label="完了">
          <span class="badge-due ${status}" style="padding:2px 8px;border-radius:3px;">${formatDateShort(card.dueDate)}</span>
          ${card.dueComplete ? '<span class="muted">(完了)</span>' : ''}
        </button>` : ''}
        ${card.startDate ? `<button class="modal-date-chip" data-edit-dates>
          <span class="material-symbols-outlined">play_arrow</span>
          <span>開始: ${formatDateShort(card.startDate)}</span>
        </button>` : ''}
      </div>
    `;
    const toggle = de.querySelector('[data-toggle-complete]');
    if (toggle) toggle.addEventListener('change', (e) => { e.stopPropagation(); toggleComplete(card); renderCardModal(card, list, modalEl); });
    de.querySelectorAll('[data-edit-dates]').forEach(b => b.addEventListener('click', (e) => {
      if (e.target.matches('[data-toggle-complete]')) return;
      openDatesPopover(card, e.currentTarget.getBoundingClientRect(), () => renderCardModal(card, list, modalEl));
    }));
  }

  // Description
  renderDescription(modalEl.querySelector('#modal-description'), card, () => renderCardModal(card, list, modalEl));

  // Checklists
  renderChecklistsSection(modalEl.querySelector('#modal-checklists'), card, () => renderCardModal(card, list, modalEl));

  // Side/quick actions
  const rerender = () => renderCardModal(card, list, modalEl);
  const bindAdd = (sel, handler) => modalEl.querySelectorAll(sel).forEach(b => b.addEventListener('click', (e) => handler(e.currentTarget)));

  bindAdd('[data-add-labels],[data-qa-labels]', (btn) => openLabelsPopover(card, btn.getBoundingClientRect(), rerender));
  bindAdd('[data-add-dates],[data-qa-dates]',   (btn) => openDatesPopover(card, btn.getBoundingClientRect(), rerender));
  bindAdd('[data-add-checklist],[data-qa-checklist]', (btn) => openChecklistPopover(card, btn.getBoundingClientRect(), rerender));
  bindAdd('[data-qa-complete]', () => { toggleComplete(card); rerender(); });
  bindAdd('[data-action-move]', (btn) => openMoveCardPopover(card, btn.getBoundingClientRect(), () => { closeModal(); }));
  bindAdd('[data-action-copy]', () => { copyCard(card, list); closeModal(); });
  bindAdd('[data-action-archive]', () => { archiveCard(card, list); closeModal(); });
  bindAdd('[data-action-unarchive]', () => { card.archived = false; saveState(); rerender(); });
  bindAdd('[data-action-delete]', () => deleteCardPermanent(card, list));
}

function autoResizeTextarea(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function renderDescription(el, card, rerender) {
  const empty = !card.description || !card.description.trim();
  el.innerHTML = empty
    ? `<div class="desc-box empty">より詳細な説明を追加...</div>`
    : `<div class="desc-box">${escapeHtml(card.description)}</div>`;
  el.querySelector('.desc-box').addEventListener('click', () => {
    el.innerHTML = `
      <div class="desc-edit">
        <textarea placeholder="より詳細な説明を追加...">${escapeHtml(card.description || '')}</textarea>
        <div class="composer-actions" style="margin-top:8px;">
          <button class="btn-primary" data-save>保存</button>
          <button class="btn-icon" data-cancel aria-label="キャンセル">
            <span class="material-symbols-outlined msi-md">close</span>
          </button>
        </div>
      </div>
    `;
    const ta = el.querySelector('textarea');
    ta.focus();
    ta.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); save(); }
      if (e.key === 'Escape') rerender();
    });
    el.querySelector('[data-save]').addEventListener('click', save);
    el.querySelector('[data-cancel]').addEventListener('click', rerender);
    function save() {
      card.description = ta.value;
      card.updatedAt = nowIso();
      saveState(); rerender();
    }
  });
}

function renderChecklistsSection(container, card, rerender) {
  container.innerHTML = '';
  card.checklists.forEach(cl => {
    const wrap = document.createElement('div');
    wrap.className = 'checklist';
    const total = cl.items.length;
    const done = cl.items.filter(i => i.done).length;
    const pct = total ? Math.round(done / total * 100) : 0;
    wrap.innerHTML = `
      <div class="section-header">
        <span class="material-symbols-outlined section-icon">checklist</span>
        <input class="checklist-title" value="${escapeHtml(cl.title)}">
        <button class="btn-icon" data-delete-cl title="チェックリストを削除"><span class="material-symbols-outlined msi-md">delete</span></button>
      </div>
      <div class="checklist-progress">
        <span style="min-width:32px;text-align:right;">${pct}%</span>
        <div class="checklist-progress-bar"><div class="checklist-progress-fill ${pct === 100 ? 'complete' : ''}" style="width:${pct}%"></div></div>
      </div>
      <div class="checklist-items"></div>
      <div class="checklist-add" style="padding-left:4px;margin-top:6px;">
        <button class="side-btn" data-add-item><span class="material-symbols-outlined msi-md">add</span>アイテムを追加</button>
      </div>
    `;
    const itemsEl = wrap.querySelector('.checklist-items');
    cl.items.forEach(it => {
      const row = document.createElement('div');
      row.className = 'checklist-item';
      row.innerHTML = `
        <input type="checkbox" ${it.done ? 'checked' : ''}>
        <div class="checklist-item-text ${it.done ? 'done' : ''}">${escapeHtml(it.text)}</div>
        <button class="btn-icon checklist-item-delete" data-del title="削除"><span class="material-symbols-outlined msi-md">close</span></button>
      `;
      row.querySelector('input').addEventListener('change', (e) => {
        it.done = e.target.checked;
        card.updatedAt = nowIso();
        saveState(); rerender();
      });
      row.querySelector('.checklist-item-text').addEventListener('click', (e) => {
        const cur = it.text;
        const input = document.createElement('input');
        input.value = cur;
        input.style.cssText = 'flex:1;padding:4px 6px;border:2px solid var(--tr-blue);border-radius:3px;font-family:inherit;font-size:14px;background:var(--card-bg);color:var(--text-dark);';
        e.currentTarget.replaceWith(input);
        input.focus();
        input.select();
        const commit = () => {
          it.text = input.value.trim() || it.text;
          card.updatedAt = nowIso();
          saveState(); rerender();
        };
        input.addEventListener('blur', commit);
        input.addEventListener('keydown', (ev) => {
          if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
          if (ev.key === 'Escape') rerender();
        });
      });
      row.querySelector('[data-del]').addEventListener('click', () => {
        cl.items = cl.items.filter(x => x.id !== it.id);
        card.updatedAt = nowIso();
        saveState(); rerender();
      });
      itemsEl.appendChild(row);
    });
    wrap.querySelector('.checklist-title').addEventListener('blur', (e) => {
      cl.title = e.target.value.trim() || cl.title;
      saveState(); rerender();
    });
    wrap.querySelector('[data-delete-cl]').addEventListener('click', () => {
      if (!confirm(`チェックリスト「${cl.title}」を削除しますか?`)) return;
      card.checklists = card.checklists.filter(x => x.id !== cl.id);
      saveState(); rerender();
    });
    wrap.querySelector('[data-add-item]').addEventListener('click', (e) => {
      const btn = e.currentTarget;
      const composer = document.createElement('div');
      composer.innerHTML = `
        <input type="text" placeholder="新しいアイテム" style="width:100%;padding:8px;border:2px solid var(--tr-blue);border-radius:3px;font-family:inherit;font-size:14px;background:var(--card-bg);color:var(--text-dark);">
        <div class="composer-actions" style="margin-top:6px;">
          <button class="btn-primary" data-save>追加</button>
          <button class="btn-icon" data-cancel><span class="material-symbols-outlined msi-md">close</span></button>
        </div>
      `;
      btn.replaceWith(composer);
      const input = composer.querySelector('input');
      input.focus();
      const save = () => {
        const v = input.value.trim();
        if (!v) return;
        cl.items.push({ id: uid(), text: v, done: false });
        card.updatedAt = nowIso();
        saveState(); rerender();
      };
      input.addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter') { ev.preventDefault(); save(); }
        if (ev.key === 'Escape') rerender();
      });
      composer.querySelector('[data-save]').addEventListener('click', save);
      composer.querySelector('[data-cancel]').addEventListener('click', rerender);
    });

    container.appendChild(wrap);
  });
}

// ===== Popovers =====

function showPopover({ title, anchor, body, width }) {
  closePopover();
  const bd = document.createElement('div');
  bd.className = 'popover-backdrop';
  bd.addEventListener('click', closePopover);
  document.body.appendChild(bd);

  const pop = document.createElement('div');
  pop.className = 'popover';
  if (width) pop.style.width = width + 'px';
  pop.innerHTML = `
    <div class="popover-header">
      ${escapeHtml(title)}
      <button class="popover-close" aria-label="閉じる"><span class="material-symbols-outlined msi-md">close</span></button>
    </div>
    <div class="popover-body"></div>
  `;
  pop.querySelector('.popover-close').addEventListener('click', closePopover);
  pop.addEventListener('click', (e) => e.stopPropagation());

  const bodyEl = pop.querySelector('.popover-body');
  const content = typeof body === 'function' ? body(pop) : body;
  if (typeof content === 'string') bodyEl.innerHTML = content;
  else if (content instanceof Node) bodyEl.appendChild(content);

  document.body.appendChild(pop);

  // Position
  const padding = 8;
  const w = pop.offsetWidth;
  const h = pop.offsetHeight;
  let x = (anchor.left || 100);
  let y = (anchor.bottom || 100) + 4;
  if (x + w > window.innerWidth - padding) x = window.innerWidth - w - padding;
  if (x < padding) x = padding;
  if (y + h > window.innerHeight - padding) y = Math.max(padding, (anchor.top || 100) - h - 4);
  pop.style.left = x + 'px';
  pop.style.top = y + 'px';

  activePopover = { backdrop: bd, pop };
}

function closePopover() {
  if (!activePopover) return;
  activePopover.backdrop.remove();
  activePopover.pop.remove();
  activePopover = null;
}

function openLabelsPopover(card, anchor, onChange) {
  const board = currentBoard();
  showPopover({
    title: 'ラベル',
    anchor,
    body: () => {
      const wrap = document.createElement('div');
      wrap.innerHTML = `<input type="text" placeholder="ラベルを検索..." style="width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:3px;font-family:inherit;font-size:14px;margin-bottom:8px;background:var(--card-bg);color:var(--text-dark);">`;
      const search = wrap.querySelector('input');
      const list = document.createElement('div');
      wrap.appendChild(list);
      const render = () => {
        list.innerHTML = '';
        const q = search.value.trim().toLowerCase();
        const labels = board.labels.filter(l => !q || (l.name && l.name.toLowerCase().includes(q)) || l.color.includes(q));
        for (const lbl of labels) {
          const active = card.labelIds.includes(lbl.id);
          const row = document.createElement('button');
          row.className = 'popover-item' + (active ? ' active' : '');
          row.innerHTML = `
            <div class="label-chip" style="background:${labelHex(lbl.color)};">${escapeHtml(lbl.name || '')}</div>
            <span class="material-symbols-outlined msi-md label-check">check</span>
            <button class="btn-icon" data-edit-label="${lbl.id}" aria-label="編集"><span class="material-symbols-outlined msi-md">edit</span></button>
          `;
          row.addEventListener('click', (e) => {
            if (e.target.closest('[data-edit-label]')) {
              e.stopPropagation();
              openEditLabelPopover(lbl, e.currentTarget.getBoundingClientRect(), () => { render(); if (onChange) onChange(); });
              return;
            }
            if (active) card.labelIds = card.labelIds.filter(id => id !== lbl.id);
            else card.labelIds.push(lbl.id);
            card.updatedAt = nowIso();
            saveState();
            renderAll();
            if (onChange) onChange();
            render();
          });
          list.appendChild(row);
        }
        const create = document.createElement('button');
        create.className = 'popover-item';
        create.style.justifyContent = 'center';
        create.innerHTML = `<span class="material-symbols-outlined msi-md">add</span>新しいラベルを作成`;
        create.addEventListener('click', (e) => openEditLabelPopover(null, e.currentTarget.getBoundingClientRect(), () => { render(); if (onChange) onChange(); }));
        list.appendChild(create);
      };
      search.addEventListener('input', render);
      render();
      return wrap;
    }
  });
}

function openEditLabelPopover(label, anchor, onChange) {
  const board = currentBoard();
  showPopover({
    title: label ? 'ラベルを編集' : 'ラベルを作成',
    anchor,
    body: () => {
      const wrap = document.createElement('div');
      wrap.innerHTML = `
        <div style="margin-bottom:8px;font-weight:600;font-size:12px;color:var(--text-mid);">名前</div>
        <input type="text" id="lbl-name" value="${label ? escapeHtml(label.name) : ''}" placeholder="ラベル名を入力..." style="width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:3px;font-family:inherit;font-size:14px;margin-bottom:12px;background:var(--card-bg);color:var(--text-dark);">
        <div style="font-weight:600;font-size:12px;color:var(--text-mid);margin-bottom:6px;">色を選択</div>
        <div id="colors" style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px;"></div>
        <div style="display:flex;gap:6px;">
          <button class="btn-primary" data-save>${label ? '保存' : '作成'}</button>
          ${label ? `<button class="side-btn danger" data-delete style="width:auto;padding:6px 12px;"><span class="material-symbols-outlined msi-md">delete</span>削除</button>` : ''}
        </div>
      `;
      const colors = wrap.querySelector('#colors');
      let selected = label ? label.color : LABEL_COLORS[0].key;
      const renderColors = () => {
        colors.innerHTML = '';
        for (const c of LABEL_COLORS) {
          const swatch = document.createElement('button');
          swatch.style.cssText = `height:32px;border-radius:3px;border:${c.key === selected ? '3px solid var(--text-dark)' : '2px solid transparent'};background:${c.hex};cursor:pointer;`;
          swatch.addEventListener('click', () => { selected = c.key; renderColors(); });
          colors.appendChild(swatch);
        }
      };
      renderColors();
      wrap.querySelector('[data-save]').addEventListener('click', () => {
        const name = wrap.querySelector('#lbl-name').value.trim();
        if (label) {
          label.name = name;
          label.color = selected;
        } else {
          board.labels.push({ id: uid(), color: selected, name });
        }
        saveState();
        closePopover();
        if (onChange) onChange();
        renderAll();
      });
      const delBtn = wrap.querySelector('[data-delete]');
      if (delBtn) {
        delBtn.addEventListener('click', () => {
          if (!confirm(`ラベル「${label.name || label.color}」をボードから削除します。このラベルが付いた全カードから外されます。よろしいですか?`)) return;
          board.labels = board.labels.filter(l => l.id !== label.id);
          for (const l of board.lists) {
            for (const c of l.cards) c.labelIds = c.labelIds.filter(id => id !== label.id);
          }
          saveState();
          closePopover();
          if (onChange) onChange();
          renderAll();
        });
      }
      return wrap;
    }
  });
}

function openDatesPopover(card, anchor, onChange) {
  showPopover({
    title: '日付',
    anchor,
    body: () => {
      const wrap = document.createElement('div');
      const start = card.startDate ? new Date(card.startDate) : null;
      const due = card.dueDate ? new Date(card.dueDate) : null;
      const formatDate = (d) => d ? toLocalDateInputValue(d.toISOString()) : '';
      const formatTime = (d) => d ? toLocalTimeInputValue(d.toISOString()) : '';
      wrap.innerHTML = `
        <div class="date-row">
          <label><input type="checkbox" id="chk-start" ${start ? 'checked' : ''}> 開始日</label>
          <input type="date" id="start-date" value="${formatDate(start)}" ${start ? '' : 'disabled'}>
        </div>
        <div class="date-row">
          <label><input type="checkbox" id="chk-due" ${due ? 'checked' : ''}> 期限日</label>
          <input type="date" id="due-date" value="${formatDate(due)}" ${due ? '' : 'disabled'}>
          <input type="time" id="due-time" value="${formatTime(due)}" ${due ? '' : 'disabled'}>
        </div>
        <label style="display:flex;gap:6px;align-items:center;margin:8px 0;">
          <input type="checkbox" id="chk-complete" ${card.dueComplete ? 'checked' : ''} ${due ? '' : 'disabled'}>
          完了としてマーク
        </label>
        <div style="display:flex;gap:6px;margin-top:8px;">
          <button class="btn-primary" data-save>保存</button>
          <button class="side-btn danger" data-remove style="width:auto;padding:6px 12px;">削除</button>
        </div>
      `;
      const chkStart = wrap.querySelector('#chk-start');
      const chkDue = wrap.querySelector('#chk-due');
      const sd = wrap.querySelector('#start-date');
      const dd = wrap.querySelector('#due-date');
      const dt = wrap.querySelector('#due-time');
      const chkComplete = wrap.querySelector('#chk-complete');
      chkStart.addEventListener('change', (e) => sd.disabled = !e.target.checked);
      const syncComplete = () => {
        chkComplete.disabled = !chkDue.checked;
        if (!chkDue.checked) chkComplete.checked = false;
      };
      chkDue.addEventListener('change', (e) => {
        dd.disabled = !e.target.checked;
        dt.disabled = !e.target.checked;
        syncComplete();
      });
      syncComplete();
      wrap.querySelector('[data-save]').addEventListener('click', () => {
        card.startDate = chkStart.checked && sd.value ? localDateToIso(sd.value) : null;
        let nextDueDate = null;
        if (chkDue.checked && dd.value) {
          nextDueDate = localDateTimeToIso(dd.value, dt.value || '23:59');
        }
        card.dueDate = nextDueDate;
        card.dueComplete = !!nextDueDate && !!chkComplete.checked;
        card.updatedAt = nowIso();
        saveState(); closePopover(); if (onChange) onChange(); renderAll();
      });
      wrap.querySelector('[data-remove]').addEventListener('click', () => {
        card.startDate = null; card.dueDate = null; card.dueComplete = false;
        card.updatedAt = nowIso();

      });

// ===== Drag & Drop helpers =====

function getDragAfter(container, y, selector) {
  const draggables = [...container.querySelectorAll(selector)];
  let closest = { offset: -Infinity, element: null };
  for (const el of draggables) {
    const box = el.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) {
      closest = { offset, element: el };
    }
  }
  return closest.element;
}

// Lists drag support
document.addEventListener('dragover', (e) => {
  if (!dragData || dragData.type !== 'list') return;
  e.preventDefault();
  const boardEl = document.getElementById('board');
  const after = getDragAfter(boardEl, e.clientX, '.list:not(.dragging)');
  // Use X axis for lists
  const lists = [...boardEl.querySelectorAll('.list:not(.dragging)')];
  let afterList = null;
  for (const l of lists) {
    const rect = l.getBoundingClientRect();
    if (e.clientX < rect.left + rect.width / 2) { afterList = l; break; }
  }
  const dragging = document.querySelector('.list.dragging');
  if (!dragging) return;
  if (afterList) boardEl.insertBefore(dragging, afterList);
  else {
    const addBtn = boardEl.querySelector('.add-list-wrap');
    if (addBtn) boardEl.insertBefore(dragging, addBtn);
  }
});
document.addEventListener('drop', (e) => {
  if (!dragData || dragData.type !== 'list') return;
  e.preventDefault();
  const boardEl = document.getElementById('board');
  const ids = [...boardEl.querySelectorAll('.list')].map(n => n.dataset.listId).filter(Boolean);
  const board = currentBoard();
  const visibleQueue = ids.map(id => board.lists.find(l => l.id === id)).filter(Boolean);
  board.lists = board.lists.map(list => (list.archived ? list : (visibleQueue.shift() || list)));
  saveState();
  renderAll();
});

function showToast(message, undoHandler, ttl) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<span>${escapeHtml(message)}</span>`;
  if (undoHandler) {
    const btn = document.createElement('button');
    btn.textContent = '元に戻す';
    btn.addEventListener('click', () => { undoHandler(); el.remove(); });
    el.appendChild(btn);
  }
  const close = document.createElement('button');
  close.innerHTML = `<span class="material-symbols-outlined msi-md">close</span>`;
  close.style.color = '#FFF';
  close.addEventListener('click', () => el.remove());
  el.appendChild(close);
  document.getElementById('toaster').appendChild(el);
  setTimeout(() => { if (el.parentNode) el.remove(); }, ttl || 3000);
}

// ===== Export / Import =====

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const ts = new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-');
  a.download = `trello-clone-${ts}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('JSONをエクスポートしました', null, 2000);
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/json,.json';
  input.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        const normalized = normalizeStateShape(data, true);
        if (!normalized.ok) throw new Error(`不正なファイル形式です: ${normalized.error}`);
        if (!confirm('現在のデータは上書きされます。続行しますか?')) return;
        state = normalized.data;
        resetHistory();
        if (!saveState()) return;
        closeDrawer();
        renderAll();
        showToast('データをインポートしました', null, 2000);
      } catch (err) {
        alert('インポートに失敗しました: ' + err.message);
      }
    };
    reader.readAsText(file);
  });
  input.click();
}

// ===== Keyboard Shortcuts =====

let hoveredCardId = null;

document.addEventListener('mouseover', (e) => {
  const card = e.target.closest('.card');
  hoveredCardId = card ? card.dataset.cardId : null;
});
document.addEventListener('mouseout', (e) => {
  if (!e.relatedTarget || !e.relatedTarget.closest?.('.card')) hoveredCardId = null;
});
document.addEventListener('focusin', (e) => {
  const card = e.target.closest('.card');
  if (card) hoveredCardId = card.dataset.cardId;
});
document.addEventListener('focusout', (e) => {
  if (!e.relatedTarget || !e.relatedTarget.closest?.('.card')) hoveredCardId = null;
});

document.addEventListener('keydown', (e) => {
  const tag = (e.target.tagName || '').toUpperCase();
  const typing = tag === 'INPUT' || tag === 'TEXTAREA' || e.target.isContentEditable;

  // Escape always works
  if (e.key === 'Escape') {
    if (currentModal) { closeModal(); return; }
    if (activePopover) { closePopover(); return; }
    document.querySelector('.modal-backdrop')?.remove();
    document.querySelector('.drawer-backdrop')?.remove();
    document.querySelector('.drawer')?.remove();
    return;
  }

  if (typing) return;

  // Disable all other shortcuts when any overlay is open (modal/popover/drawer)
  // This prevents accidental shortcut triggers when user is interacting with overlays.
  const overlayOpen = !!(currentModal
    || activePopover
    || document.querySelector('.modal-backdrop')
    || document.querySelector('.drawer'));
  if (overlayOpen) return;

  // Global
  if (e.key === '?') { e.preventDefault(); openShortcutsModal(); return; }
  if (e.key === '/') { e.preventDefault(); document.getElementById('search-input').focus(); return; }
  if (e.key.toLowerCase() === 'b') { e.preventDefault(); openBoardsDrawer(); return; }
  if (e.key.toLowerCase() === 'w') { e.preventDefault(); document.getElementById('btn-settings').click(); return; }
  if (e.key.toLowerCase() === 'f') {
    e.preventDefault();
    openFilterPopover(document.getElementById('btn-filter').getBoundingClientRect());
    return;
  }
  if (e.key.toLowerCase() === 'x') {
    e.preventDefault();
    filterCriteria = { text: '', labelIds: [], due: '' };
    document.getElementById('search-input').value = '';
    renderAll();
    showToast('フィルターをクリアしました', null, 1500);
    return;
  }
  if (e.key === ';') {
    e.preventDefault();
    state.showLabelNames = !state.showLabelNames;
    saveState(); renderAll();
    return;
  }
  if (e.key.toLowerCase() === 'z' && !e.shiftKey) { e.preventDefault(); doUndo(); return; }
  if (e.key.toLowerCase() === 'z' && e.shiftKey)  { e.preventDefault(); doRedo(); return; }

  // Card-hover shortcuts (only when no overlay open)
  if (!hoveredCardId) return;
  const found = findCard(state.currentBoardId, hoveredCardId);
  if (!found) return;
  const { list, card } = found;

  if (e.key === 'Enter') { e.preventDefault(); openCardModal(card); return; }
  if (e.key.toLowerCase() === 'c') { e.preventDefault(); archiveCard(card, list); return; }
  if (e.key.toLowerCase() === 'd') {
    e.preventDefault();
    const cardEl = document.querySelector(`.card[data-card-id="${card.id}"]`);
    if (cardEl) openDatesPopover(card, cardEl.getBoundingClientRect(), () => renderAll());
    return;
  }
  if (e.key.toLowerCase() === 'l') {
    e.preventDefault();
    const cardEl = document.querySelector(`.card[data-card-id="${card.id}"]`);
    if (cardEl) openLabelsPopover(card, cardEl.getBoundingClientRect(), () => renderAll());
    return;
  }
  if (e.key.toLowerCase() === 'e') {
    e.preventDefault();
    const cardEl = document.querySelector(`.card[data-card-id="${card.id}"]`);
    if (cardEl) openQuickEdit(card, cardEl);
    return;
  }
  if (e.key.toLowerCase() === 't') {
    e.preventDefault();
    openCardModal(card);
    setTimeout(() => document.querySelector('[data-field="title"]')?.focus(), 50);
    return;
  }
  if (e.key.toLowerCase() === 'n') {
    e.preventDefault();
    const listEl = document.querySelector(`[data-list-id="${list.id}"]`);
    if (listEl) openCardComposer(list, listEl);
    return;
  }
  if (e.key === ',' || e.key === '.' || e.key === '<' || e.key === '>') {
    e.preventDefault();
    const board = currentBoard();
    const lists = board.lists.filter(l => !l.archived);
    const idx = lists.findIndex(l => l.id === list.id);
    let target = null;
    if (e.key === ',' || e.key === '<') target = lists[idx - 1];
    if (e.key === '.' || e.key === '>') target = lists[idx + 1];
    if (target) moveCardTo(card, target.id, target.cards.length);
    return;
  }
  // 0-9 label shortcuts
  if (/^[0-9]$/.test(e.key)) {
    e.preventDefault();
    const num = parseInt(e.key, 10);
    const colorEntry = LABEL_COLORS.find(c => c.num === num);
    if (!colorEntry) return;
    const board = currentBoard();
    const lbl = board.labels.find(l => l.color === colorEntry.key);
    if (!lbl) return;
    if (card.labelIds.includes(lbl.id)) card.labelIds = card.labelIds.filter(id => id !== lbl.id);
    else card.labelIds.push(lbl.id);
    card.updatedAt = nowIso();
    saveState(); renderAll();
  }
});

// ===== Top bar events =====

document.getElementById('btn-boards').addEventListener('click', openBoardsDrawer);
document.getElementById('btn-home').addEventListener('click', openBoardsDrawer);
document.getElementById('current-board-title').addEventListener('click', () => {
  const b = currentBoard();
  if (!b) return;
  const name = prompt('ボード名', b.name);
  if (name && name.trim()) { b.name = name.trim(); saveState(); renderAll(); }
});
document.getElementById('btn-filter').addEventListener('click', (e) => openFilterPopover(e.currentTarget.getBoundingClientRect()));
document.getElementById('btn-label-names').addEventListener('click', () => {
  state.showLabelNames = !state.showLabelNames;
  saveState(); renderAll();
});
document.getElementById('btn-theme').addEventListener('click', () => {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  saveState(); renderAll();
});
document.getElementById('btn-shortcuts').addEventListener('click', openShortcutsModal);
document.getElementById('btn-settings').addEventListener('click', (e) => {
  const b = currentBoard();
  if (!b) return;
  showPopover({
    title: 'ボード設定',
    anchor: e.currentTarget.getBoundingClientRect(),
    body: () => {
      const wrap = document.createElement('div');
      wrap.innerHTML = `
        <button class="popover-item" data-bg><span class="material-symbols-outlined msi-md">palette</span>背景を変更</button>
        <button class="popover-item" data-rename><span class="material-symbols-outlined msi-md">edit</span>ボード名を変更</button>
        <button class="popover-item" data-labels><span class="material-symbols-outlined msi-md">label</span>ラベルを管理</button>
        <button class="popover-item" data-archived><span class="material-symbols-outlined msi-md">inventory_2</span>アーカイブ済みアイテム</button>
      `;
      wrap.querySelector('[data-bg]').addEventListener('click', (ev) => {
        closePopover();
        openBackgroundPicker(b, ev.currentTarget.getBoundingClientRect());
      });
      wrap.querySelector('[data-rename]').addEventListener('click', () => {
        const n = prompt('ボード名', b.name);
        if (n && n.trim()) { b.name = n.trim(); saveState(); renderAll(); }
        closePopover();
      });
      wrap.querySelector('[data-labels]').addEventListener('click', (ev) => {
        closePopover();
        openBoardLabelsManager(ev.currentTarget.getBoundingClientRect());
      });
      const arch = wrap.querySelector('[data-archived]');
      if (arch) arch.addEventListener('click', (ev) => { closePopover(); openArchivedPopover(ev.currentTarget.getBoundingClientRect()); });
      return wrap;
    }
  });
});

function openBoardLabelsManager(anchor) {
  const board = currentBoard();
  showPopover({
    title: 'ラベル管理',
    anchor,
    body: () => {
      const wrap = document.createElement('div');
      const list = document.createElement('div');
      const refresh = () => {
        list.innerHTML = '';
        for (const lbl of board.labels) {
          const row = document.createElement('button');
          row.className = 'popover-item';
          row.innerHTML = `
            <div class="label-chip" style="background:${labelHex(lbl.color)};">${escapeHtml(lbl.name || '(名前なし)')}</div>
            <span class="material-symbols-outlined msi-md">edit</span>
          `;
          row.addEventListener('click', (e) => openEditLabelPopover(lbl, e.currentTarget.getBoundingClientRect(), refresh));
          list.appendChild(row);
        }
        const create = document.createElement('button');
        create.className = 'popover-item';
        create.style.justifyContent = 'center';
        create.innerHTML = `<span class="material-symbols-outlined msi-md">add</span>新しいラベル`;
        create.addEventListener('click', (e) => openEditLabelPopover(null, e.currentTarget.getBoundingClientRect(), refresh));
        list.appendChild(create);
      };
      refresh();
      wrap.appendChild(list);
      return wrap;
    }
  });
}

function openArchivedPopover(anchor) {
  const board = currentBoard();
  showPopover({
    title: 'アーカイブ済みアイテム',
    anchor,
    body: () => {
      const wrap = document.createElement('div');
      const tabs = document.createElement('div');
      tabs.style.cssText = 'display:flex;gap:4px;margin-bottom:8px;';
      let mode = 'cards';
      const body = document.createElement('div');
      const render = () => {
        body.innerHTML = '';
        tabs.innerHTML = `
          <button class="tab-btn ${mode==='cards'?'active':''}" data-tab="cards">カード</button>
          <button class="tab-btn ${mode==='lists'?'active':''}" data-tab="lists">リスト</button>
        `;
        tabs.querySelectorAll('[data-tab]').forEach(b => b.addEventListener('click', () => { mode = b.dataset.tab; render(); }));
        if (mode === 'cards') {
          const archivedCards = [];
          for (const l of board.lists) for (const c of l.cards) if (c.archived) archivedCards.push({ list: l, card: c });
          if (!archivedCards.length) body.innerHTML = '<div class="muted" style="padding:8px;">アーカイブされたカードはありません</div>';
          else for (const { list, card } of archivedCards) {
            const row = document.createElement('div');
            row.className = 'popover-item';
            row.innerHTML = `<div style="flex:1;">${escapeHtml(card.title)}<br><span class="muted" style="font-size:11px;">${escapeHtml(list.title)}</span></div>
              <button class="btn-icon" data-restore title="ボードに戻す"><span class="material-symbols-outlined msi-md">unarchive</span></button>
              <button class="btn-icon" data-delete title="完全削除"><span class="material-symbols-outlined msi-md" style="color:var(--due-red);">delete_forever</span></button>`;
            row.querySelector('[data-restore]').addEventListener('click', () => { card.archived = false; saveState(); render(); renderAll(); });
            row.querySelector('[data-delete]').addEventListener('click', () => { deleteCardPermanent(card, list); render(); });
            body.appendChild(row);
          }
        } else {
          const archivedLists = board.lists.filter(l => l.archived);
          if (!archivedLists.length) body.innerHTML = '<div class="muted" style="padding:8px;">アーカイブされたリストはありません</div>';
          else for (const list of archivedLists) {
            const row = document.createElement('div');
            row.className = 'popover-item';
            row.innerHTML = `<div style="flex:1;">${escapeHtml(list.title)} <span class="muted" style="font-size:11px;">(${list.cards.length}枚)</span></div>
              <button class="btn-icon" data-restore title="ボードに戻す"><span class="material-symbols-outlined msi-md">unarchive</span></button>
              <button class="btn-icon" data-delete title="完全削除"><span class="material-symbols-outlined msi-md" style="color:var(--due-red);">delete_forever</span></button>`;
            row.querySelector('[data-restore]').addEventListener('click', () => { list.archived = false; saveState(); render(); renderAll(); });
            row.querySelector('[data-delete]').addEventListener('click', () => { deleteListPermanent(list); render(); });
            body.appendChild(row);
          }
        }
      };
      wrap.appendChild(tabs);
      wrap.appendChild(body);
      render();
      return wrap;
    }
  });
}

// Search input
let searchTimer = null;
document.getElementById('search-input').addEventListener('input', (e) => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    filterCriteria.text = e.target.value.trim();
    renderAll();
  }, 120);
});

// Initial render
renderAll();
</script>
