<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BindSQLforSQLBuilder</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23f97316'/%3E%3Cpath d='M16 20c0-4.4 7.2-8 16-8s16 3.6 16 8-7.2 8-16 8-16-3.6-16-8Zm0 10c0 4.4 7.2 8 16 8s16-3.6 16-8v8c0 4.4-7.2 8-16 8s-16-3.6-16-8v-8Zm0 18c0 4.4 7.2 8 16 8s16-3.6 16-8v-8c0 4.4-7.2 8-16 8s-16-3.6-16-8v8Z' fill='%23fff7ed'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,500,0,0" />
  <style>
    @layer reset, base, component, utility;

    @layer reset {
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body,
      h1,
      h2,
      p,
      pre,
      textarea,
      button {
        margin: 0;
      }

      button,
      textarea {
        font: inherit;
        color: inherit;
      }
    }

    @layer base {
      :root {
        --bg: oklch(0.98 0.01 250);
        --surface: oklch(1 0 0);
        --surface-muted: oklch(0.96 0.01 248);
        --border: oklch(0.84 0.02 250);
        --text: oklch(0.23 0.02 250);
        --text-muted: oklch(0.5 0.02 250);
        --primary: oklch(0.58 0.18 258);
        --primary-strong: oklch(0.48 0.19 258);
        --primary-text: oklch(0.99 0.01 250);
        --good: oklch(0.66 0.16 150);
        --warn: oklch(0.71 0.17 40);
        --focus-ring: oklch(0.66 0.12 258 / 40%);
        --shadow: 0 18px 44px oklch(0.2 0.02 250 / 10%);
      }

      :root[data-theme="dark"] {
        --bg: oklch(0.19 0.02 250);
        --surface: oklch(0.24 0.02 250);
        --surface-muted: oklch(0.28 0.02 250);
        --border: oklch(0.38 0.03 250);
        --text: oklch(0.95 0.01 250);
        --text-muted: oklch(0.77 0.02 250);
        --primary: oklch(0.72 0.16 258);
        --primary-strong: oklch(0.78 0.18 258);
        --primary-text: oklch(0.2 0.02 250);
        --good: oklch(0.78 0.17 150);
        --warn: oklch(0.8 0.16 45);
        --focus-ring: oklch(0.72 0.15 258 / 36%);
        --shadow: 0 22px 48px oklch(0.05 0.02 250 / 45%);
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        background:
          radial-gradient(circle at 10% 10%, oklch(0.86 0.07 250 / 22%), transparent 40%),
          radial-gradient(circle at 90% 90%, oklch(0.86 0.06 180 / 20%), transparent 42%),
          var(--bg);
        color: var(--text);
        font-family: "Avenir Next", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", sans-serif;
        line-height: 1.5;
      }
    }

    @layer component {
      .app {
        min-height: 100vh;
        padding: clamp(0.9rem, 1.7vw, 1.4rem);
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: clamp(0.9rem, 1.4vw, 1.2rem);

        @media (max-width: 980px) {
          grid-template-columns: 1fr;
        }
      }

      .panel {
        display: grid;
        grid-template-rows: auto 1fr auto;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: var(--shadow);
        min-height: min(82vh, 860px);

        &.panel--output {
          background: linear-gradient(165deg, var(--surface), var(--surface-muted));
        }
      }

      .panel__header {
        padding: 0.95rem 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.6rem;
        border-bottom: 1px solid var(--border);
        background: oklch(from var(--surface-muted) l c h / 65%);

        & .panel__title-wrap {
          display: grid;
          gap: 0.15rem;
        }

        & .panel__eyebrow {
          font-size: 0.7rem;
          letter-spacing: 0.1em;
          text-transform: uppercase;
          color: var(--text-muted);
          font-weight: 700;
        }

        & .panel__title {
          font-size: 0.95rem;
          font-weight: 700;
        }
      }

      .panel__body {
        padding: 0.95rem 1rem 1rem;
        display: grid;
        gap: 0.75rem;
        align-content: stretch;
        min-height: 0;
      }

      .form-label {
        font-size: 0.78rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        font-weight: 700;
        color: var(--text-muted);
      }

      .field {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 0.35rem;
        min-height: 0;
      }

      .textarea {
        width: 100%;
        min-height: 0;
        height: 100%;
        resize: vertical;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.75rem 0.85rem;
        background: var(--surface);
        color: var(--text);
        font-family: "Monaco", "Menlo", "Consolas", monospace;
        font-size: 0.9rem;
        line-height: 1.55;

        &:focus-visible {
          outline: 2px solid var(--focus-ring);
          outline-offset: 1px;
        }
      }

      .output {
        min-height: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.9rem;
        background: var(--surface);
        font-family: "Monaco", "Menlo", "Consolas", monospace;
        font-size: 0.9rem;
        line-height: 1.6;
        color: var(--text);
        white-space: pre-wrap;
        word-break: break-word;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.35rem;
        border: 1px solid transparent;
        border-radius: 999px;
        padding: 0.45rem 0.9rem;
        font-size: 0.8rem;
        font-weight: 700;
        cursor: pointer;
        transition: background-color 160ms ease, border-color 160ms ease, color 160ms ease;

        &:focus-visible {
          outline: 2px solid var(--focus-ring);
          outline-offset: 1px;
        }
      }

      .button__icon {
        width: 1rem;
        height: 1rem;
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-family: "Material Symbols Rounded";
        font-style: normal;
        font-weight: 500;
        font-size: 1rem;
        line-height: 1;
        font-variation-settings: "FILL" 0, "wght" 500, "GRAD" 0, "opsz" 20;
        font-feature-settings: "liga";
        text-transform: none;
        vertical-align: middle;
        -webkit-font-smoothing: antialiased;
      }

      .button--ghost {
        background: var(--surface);
        border-color: var(--border);

        &:hover {
          background: var(--surface-muted);
        }
      }

      .button--primary {
        background: var(--primary);
        color: var(--primary-text);

        &:hover {
          background: var(--primary-strong);
        }
      }

      .flash {
        position: fixed;
        right: 1rem;
        bottom: 1rem;
        max-width: min(92vw, 360px);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.62rem 0.8rem;
        background: var(--surface);
        color: var(--text);
        font-size: 0.82rem;
        box-shadow: var(--shadow);
        opacity: 0;
        transform: translateY(8px);
        pointer-events: none;
        transition: opacity 180ms ease, transform 180ms ease;

        &.is-visible {
          opacity: 1;
          transform: translateY(0);
        }
      }

    }

    @layer utility {
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel panel--input" aria-label="入力エリア">
      <header class="panel__header">
        <div class="panel__title-wrap">
          <p class="panel__eyebrow">Input</p>
          <h1 class="panel__title">SQL + バインド変数</h1>
        </div>
        <button class="button button--ghost" type="button" data-action="clear">
          <span class="button__icon" aria-hidden="true">backspace</span>
          <span>クリア</span>
        </button>
      </header>

      <div class="panel__body">
        <div class="field">
          <label class="form-label" for="raw-input">貼り付け欄</label>
          <textarea
            id="raw-input"
            class="textarea"
            data-role="raw-input"
            spellcheck="false"
          ></textarea>
        </div>
      </div>

    </section>

    <section class="panel panel--output" aria-label="出力エリア">
      <header class="panel__header">
        <div class="panel__title-wrap">
          <p class="panel__eyebrow">Output</p>
          <h2 class="panel__title">実行可能 SQL</h2>
        </div>
        <button class="button button--primary" type="button" data-action="copy">
          <span class="button__icon" aria-hidden="true">content_copy</span>
          <span>コピー</span>
        </button>
      </header>

      <div class="panel__body">
        <pre class="output" data-role="output">-- ここに変換後SQLが表示されます --</pre>
      </div>
    </section>
  </main>

  <p class="flash" data-role="flash" aria-live="polite"></p>

  <script>
    (() => {

      const qs = (sel, root = document) => root.querySelector(sel);

      const CLAUSE_KEYWORDS = [
        "WITH",
        "UNION ALL",
        "UNION",
        "SELECT",
        "INSERT INTO",
        "UPDATE",
        "DELETE FROM",
        "FROM",
        "WHERE",
        "GROUP BY",
        "HAVING",
        "ORDER BY",
        "LIMIT",
        "OFFSET",
        "VALUES",
        "SET",
        "INNER JOIN",
        "LEFT JOIN",
        "RIGHT JOIN",
        "FULL JOIN",
        "CROSS JOIN",
        "JOIN"
      ];
      const INLINE_KEYWORDS = ["ON", "AND", "OR"];
      const PLACEHOLDER_TEXT = "-- ここに変換後SQLが表示されます --";
      const NAMED_BIND_PATTERN = /^:?(?<name>[A-Za-z_][A-Za-z0-9_$]*)\s*(?:=>|=|:)\s*(?<value>.+)$/;
      const POSITIONAL_BIND_PATTERN = /^(?:\[(?<indexA>\d+)\]|(?<indexB>\d+))\s*(?:=>|=|:)\s*(?<value>.+)$/;
      const PARAMETER_ENTRY_PATTERN = /^(?<key>:?[A-Za-z_][A-Za-z0-9_$]*|\[\d+\]|\d+)\s*(?:=>|=|:)\s*(?<value>.+)$/;
      const SQL_PARAMETER_BLOCK_PATTERN = /^\s*sql\s*=\s*\[(?<sql>[\s\S]*?)\]\s*(?:parameters?|params?)\s*=\s*\[(?<parameters>[\s\S]*?)\]\s*$/i;
      const BIND_HEADER_PATTERN = /^(?:bind(?:\s+variables?)?|params?|parameters?)\s*:?\s*$/i;
      const SQL_PREFIX_PATTERN = /^\s*sql\s*[:=]\s*(?<sql>.+)$/i;
      const SQL_ASSIGNMENT_NAMES = new Set([
        "SELECT",
        "FROM",
        "WHERE",
        "AND",
        "OR",
        "ORDER",
        "GROUP",
        "HAVING",
        "JOIN",
        "LEFT",
        "RIGHT",
        "INNER",
        "FULL",
        "CROSS",
        "LIMIT",
        "OFFSET",
        "INSERT",
        "UPDATE",
        "DELETE",
        "VALUES",
        "SET",
        "WITH",
        "SQL"
      ]);

      const $rawInput = qs('[data-role="raw-input"]');
      const $output = qs('[data-role="output"]');
      const $flash = qs('[data-role="flash"]');

      const _state = {
        _lastSql: "",
        _flashTimer: 0
      };

      const _escapeRegExp = (_value) => _value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");

      const _isQuotedValue = (_value) =>
        (_value.startsWith("'") && _value.endsWith("'")) ||
        (_value.startsWith('"') && _value.endsWith('"')) ||
        (_value.startsWith("“") && _value.endsWith("”"));

      const _isSqlLiteralValue = (_value) =>
        /^null$/i.test(_value) ||
        /^(true|false)$/i.test(_value) ||
        /^[+-]?(?:\d+\.?\d*|\.\d+)$/.test(_value) ||
        _isQuotedValue(_value);

      const _quoteParameterValue = (_value) => {
        const _trimmed = _value.trim();
        if (!_trimmed || _isSqlLiteralValue(_trimmed)) {
          return _trimmed;
        }

        return `"${_trimmed.replace(/\\/g, "\\\\").replace(/"/g, '\\"')}"`;
      };

      const _splitParameterEntries = (_parametersText) => {
        const _entries = [];
        let _current = "";
        let _quote = "";
        let _isEscaped = false;

        for (const _character of _parametersText) {
          if (_quote) {
            _current += _character;
            if (_character === "\\" && !_isEscaped) {
              _isEscaped = true;
              continue;
            }
            if (_character === _quote && !_isEscaped) {
              _quote = "";
            }
            _isEscaped = false;
            continue;
          }

          if (_character === "'" || _character === '"') {
            _quote = _character;
            _current += _character;
            continue;
          }

          if (_character === ",") {
            const _entry = _current.trim();
            if (_entry) {
              _entries.push(_entry);
            }
            _current = "";
            continue;
          }

          _current += _character;
        }

        const _entry = _current.trim();
        if (_entry) {
          _entries.push(_entry);
        }

        return _entries;
      };

      const _normalizeParameterEntry = (_entry) => {
        const _match = _entry.match(PARAMETER_ENTRY_PATTERN);
        if (!_match?.groups) {
          return _entry;
        }

        return `${_match.groups.key} = ${_quoteParameterValue(_match.groups.value)}`;
      };

      const _readSqlProtectedSegment = (_sql, _startIndex) => {
        const _startCharacter = _sql[_startIndex];

        if (_startCharacter === "'") {
          let _index = _startIndex + 1;
          while (_index < _sql.length) {
            const _character = _sql[_index];
            if (_character === "'" && _sql[_index + 1] === "'") {
              _index += 2;
              continue;
            }
            if (_character === "\\") {
              _index += 2;
              continue;
            }
            if (_character === "'") {
              _index += 1;
              break;
            }
            _index += 1;
          }
          return _sql.slice(_startIndex, _index);
        }

        if (_startCharacter === '"') {
          let _index = _startIndex + 1;
          while (_index < _sql.length) {
            const _character = _sql[_index];
            if (_character === '"' && _sql[_index + 1] === '"') {
              _index += 2;
              continue;
            }
            if (_character === "\\") {
              _index += 2;
              continue;
            }
            if (_character === '"') {
              _index += 1;
              break;
            }
            _index += 1;
          }
          return _sql.slice(_startIndex, _index);
        }

        if (_startCharacter === "-" && _sql[_startIndex + 1] === "-") {
          const _endIndex = _sql.indexOf("\n", _startIndex);
          return _sql.slice(_startIndex, _endIndex === -1 ? _sql.length : _endIndex);
        }

        if (_startCharacter === "/" && _sql[_startIndex + 1] === "*") {
          const _endIndex = _sql.indexOf("*/", _startIndex + 2);
          return _sql.slice(_startIndex, _endIndex === -1 ? _sql.length : _endIndex + 2);
        }

        return "";
      };

      const _maskSqlProtectedSegments = (_sql) => {
        const _segments = [];
        let _masked = "";
        let _index = 0;

        while (_index < _sql.length) {
          const _segment = _readSqlProtectedSegment(_sql, _index);
          if (_segment) {
            const _token = `@@SQLBINDMERGE_SEGMENT_${_segments.length}@@`;
            _segments.push(_segment);
            _masked += _token;
            _index += _segment.length;
            continue;
          }

          _masked += _sql[_index];
          _index += 1;
        }

        return { _masked, _segments };
      };

      const _restoreSqlProtectedSegments = (_sql, _segments) =>
        _sql.replace(/@@SQLBINDMERGE_SEGMENT_(\d+)@@/g, (_all, _indexText) => {
          const _index = Number(_indexText);
          return _segments[_index] ?? "";
        });

      const _applyColorScheme = () => {
        const _scheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.dataset.theme = _scheme;
        document.documentElement.style.colorScheme = _scheme;
      };

      const _normalizeBindValue = (_rawValue) => {
        const _value = _rawValue.trim();
        if (!_value) {
          return "";
        }

        if ((_value.startsWith('"') && _value.endsWith('"')) || (_value.startsWith("“") && _value.endsWith("”"))) {
          const _inner = _value.slice(1, -1).replace(/\\"/g, '"').replace(/'/g, "''");
          return `'${_inner}'`;
        }

        if (/^null$/i.test(_value)) {
          return "NULL";
        }

        if (/^(true|false)$/i.test(_value)) {
          return _value.toUpperCase();
        }

        return _value;
      };

      const _isBindDefinitionLine = (_trimmed, _allowBareName = false) => {
        const _positionalMatch = _trimmed.match(POSITIONAL_BIND_PATTERN);
        if (_positionalMatch?.groups?.value) {
          return true;
        }

        const _namedMatch = _trimmed.match(NAMED_BIND_PATTERN);
        if (!_namedMatch?.groups?.name) {
          return false;
        }

        if (_trimmed.startsWith(":")) {
          return true;
        }

        if (!_allowBareName) {
          return false;
        }

        return !SQL_ASSIGNMENT_NAMES.has(_namedMatch.groups.name.toUpperCase());
      };

      const _splitInputText = (_inputText) => {
        const _parameterBlockMatch = _inputText.match(SQL_PARAMETER_BLOCK_PATTERN);
        if (_parameterBlockMatch?.groups) {
          return {
            _sqlText: _parameterBlockMatch.groups.sql.trim(),
            _bindLines: _splitParameterEntries(_parameterBlockMatch.groups.parameters).map(_normalizeParameterEntry)
          };
        }

        const _sqlLines = [];
        const _bindLines = [];
        let _bindSectionStarted = false;

        const _lines = _inputText.split(/\r?\n/);
        for (const _line of _lines) {
          const _trimmed = _line.trim();
          if (!_trimmed) {
            if (!_bindSectionStarted) {
              _sqlLines.push("");
            }
            continue;
          }

          if (BIND_HEADER_PATTERN.test(_trimmed)) {
            _bindSectionStarted = true;
            continue;
          }

          const _sqlPrefixMatch = _line.match(SQL_PREFIX_PATTERN);
          if (_sqlPrefixMatch?.groups?.sql) {
            _sqlLines.push(_sqlPrefixMatch.groups.sql.trim());
            continue;
          }

          if (_isBindDefinitionLine(_trimmed, _bindSectionStarted)) {
            _bindLines.push(_trimmed);
            _bindSectionStarted = true;
            continue;
          }

          _sqlLines.push(_line);
        }

        return {
          _sqlText: _sqlLines.join("\n").trim(),
          _bindLines
        };
      };

      const _parseBindVariables = (_bindLines) => {
        const _named = new Map();
        const _positional = [];

        for (const _line of _bindLines) {
          const _trimmed = _line.trim();
          if (!_trimmed || _trimmed.startsWith("--") || _trimmed.startsWith("#")) {
            continue;
          }

          const _namedMatch = _trimmed.match(NAMED_BIND_PATTERN);
          if (_namedMatch?.groups) {
            _named.set(_namedMatch.groups.name, _normalizeBindValue(_namedMatch.groups.value));
            continue;
          }

          const _positionalMatch = _trimmed.match(POSITIONAL_BIND_PATTERN);
          if (_positionalMatch?.groups?.value) {
            const _index = Number(_positionalMatch.groups.indexA ?? _positionalMatch.groups.indexB ?? "0");
            if (_index > 0) {
              _positional.push({ _index, _value: _normalizeBindValue(_positionalMatch.groups.value) });
            }
          }
        }

        _positional.sort((_left, _right) => _left._index - _right._index);

        return {
          _named,
          _positional: _positional.map((_entry) => _entry._value)
        };
      };

      const _replaceNamedBind = (_sql, _name, _value) => {
        const _pattern = new RegExp(`(^|[^:]):${_escapeRegExp(_name)}\\b`, "g");
        let _count = 0;
        const _nextSql = _sql.replace(_pattern, (_all, _prefix) => {
          _count += 1;
          return `${_prefix}${_value}`;
        });
        return { _nextSql, _count };
      };

      const _mergeSqlAndBinds = (_sql, _binds) => {
        const _protectedStore = _maskSqlProtectedSegments(_sql);
        let _workingSql = _protectedStore._masked;

        for (const [_name, _value] of _binds._named.entries()) {
          const _result = _replaceNamedBind(_workingSql, _name, _value);
          _workingSql = _result._nextSql;
        }

        let _cursor = 0;
        _workingSql = _workingSql.replace(/\?/g, () => {
          const _value = _binds._positional[_cursor];
          if (typeof _value === "undefined") {
            return "?";
          }
          _cursor += 1;
          return _value;
        });

        return {
          _sql: _restoreSqlProtectedSegments(_workingSql, _protectedStore._segments)
        };
      };

      const _upperCaseKeywords = (_sql) => {
        let _result = _sql;
        const _expressionKeywords = [
          "DISTINCT",
          "CASE",
          "WHEN",
          "THEN",
          "ELSE",
          "END",
          "AS",
          "EXISTS"
        ];
        const _allKeywords = [...CLAUSE_KEYWORDS, ...INLINE_KEYWORDS, ..._expressionKeywords].sort((a, b) => b.length - a.length);

        for (const _keyword of _allKeywords) {
          const _pattern = new RegExp(`\\b${_keyword.replace(/\s+/g, "\\s+")}\\b`, "gi");
          _result = _result.replace(_pattern, _keyword.toUpperCase());
        }

        return _result;
      };

      const _addSpaceAroundOperators = (_sql) =>
        _sql
          .replace(/\s*\.\s*/g, ".")
          .replace(/\s*(<>|!=|<=|>=|=|<|>)\s*/g, " $1 ")
          .replace(/\s*(\+|\/)\s*/g, " $1 ")
          .replace(/(?<=[0-9A-Za-z_)\]])\s*\*\s*(?=[0-9A-Za-z_(\[])/g, " * ")
          .replace(/\s*\|\|\s*/g, " || ")
          .replace(/\s*,\s*/g, ", ")
          .replace(/\s+/g, " ")
          .trim();

      const _breakBeforeKeyword = (_sql, _keyword, _indent = "") => {
        const _pattern = new RegExp(`\\s+${_keyword.replace(/\s+/g, "\\s+")}\\b`, "g");
        return _sql.replace(_pattern, `\n${_indent}${_keyword}`);
      };

      const _breakBareJoin = (_sql) =>
        _sql.replace(/\s+JOIN\b/g, (_match, _offset, _source) => {
          const _left = _source.slice(Math.max(0, _offset - 8), _offset);
          if (/\b(INNER|LEFT|RIGHT|FULL|CROSS)$/i.test(_left)) {
            return _match;
          }
          return "\nJOIN";
        });

      const _stripClausePrefix = (_line, _keyword) => {
        const _pattern = new RegExp(`^${_keyword.replace(/\s+/g, "\\s+")}\\b\\s*`);
        return _line.replace(_pattern, "").trim();
      };

      const _splitTopLevelCommaSeparated = (_text) => {
        const _items = [];
        let _current = "";
        let _parenDepth = 0;

        for (const _character of _text) {
          if (_character === "(") {
            _parenDepth += 1;
            _current += _character;
            continue;
          }

          if (_character === ")") {
            _parenDepth = Math.max(0, _parenDepth - 1);
            _current += _character;
            continue;
          }

          if (_character === "," && _parenDepth === 0) {
            const _entry = _current.trim();
            if (_entry) {
              _items.push(_entry);
            }
            _current = "";
            continue;
          }

          _current += _character;
        }

        const _tail = _current.trim();
        if (_tail) {
          _items.push(_tail);
        }

        return _items;
      };

      const _formatCaseExpressionLines = (_text) => {
        if (!/\bCASE\b/.test(_text)) {
          return [_text.trim()];
        }

        const _isSimpleCase = /^\s*CASE\s+(?!WHEN\b)\S+/i.test(_text);
        const _normalized = _text
          .replace(/\s+\bWHEN\b/g, "\nWHEN")
          .replace(/\s+\bTHEN\b/g, "\nTHEN")
          .replace(/\s+\bELSE\b/g, "\nELSE")
          .replace(/\s+\bEND\b/g, "\nEND");

        const _lines = _normalized
          .split("\n")
          .map((_line) => _line.trim())
          .filter(Boolean);

        if (_isSimpleCase) {
          const _mergedLines = [];
          for (let _index = 0; _index < _lines.length; _index += 1) {
            const _current = _lines[_index];
            const _next = _lines[_index + 1] ?? "";
            if (/^WHEN\b/.test(_current) && /^THEN\b/.test(_next)) {
              _mergedLines.push(`${_current} ${_next}`);
              _index += 1;
              continue;
            }
            _mergedLines.push(_current);
          }
          return _mergedLines.map((_line) => (/^(WHEN|ELSE)\b/.test(_line) ? `  ${_line}` : _line));
        }

        return _lines.map((_line) => (/^(WHEN|THEN|ELSE)\b/.test(_line) ? `  ${_line}` : _line));
      };

      const _formatCommaSeparatedRemainder = (_remainder, _indent = "  ") => {
        if (!_remainder) {
          return [];
        }

        const _items = _splitTopLevelCommaSeparated(_remainder);
        if (_items.length <= 1) {
          return [`${_indent}${_remainder}`];
        }

        const _lines = [];
        _items.forEach((_item, _index) => {
          const _prefix = _index === 0 ? "" : ", ";
          _lines.push(`${_indent}${_prefix}${_item}`);
        });
        return _lines;
      };

      const _formatSelectRemainder = (_remainder) => {
        if (!_remainder) {
          return [];
        }

        const _columns = _splitTopLevelCommaSeparated(_remainder);
        if (_columns.length <= 1) {
          return [`  ${_remainder}`];
        }

        const _lines = [];
        _columns.forEach((_column, _index) => {
          const _columnLines = _formatCaseExpressionLines(_column);
          const _prefix = _index === 0 ? "  " : "  , ";
          _lines.push(`${_prefix}${_columnLines[0]}`);

          for (let _lineIndex = 1; _lineIndex < _columnLines.length; _lineIndex += 1) {
            _lines.push(`    ${_columnLines[_lineIndex]}`);
          }
        });
        return _lines;
      };

      const _formatStructuredLines = (_sql) => {
        const _rawLines = _sql.split("\n").map((_line) => _line.trim()).filter(Boolean);
        const _formattedLines = [];
        let _context = "";

        for (const _line of _rawLines) {
          if (/^WITH\b/.test(_line)) {
            _context = "WITH";
            _formattedLines.push(_line);
            continue;
          }

          if (/^SELECT\b/.test(_line)) {
            _context = "SELECT";
            _formattedLines.push("SELECT");
            _formattedLines.push(..._formatSelectRemainder(_stripClausePrefix(_line, "SELECT")));
            continue;
          }

          if (/^(INSERT INTO|UPDATE|DELETE FROM|UNION ALL|UNION)\b/.test(_line)) {
            _context = "";
            _formattedLines.push(_line);
            continue;
          }

          if (/^FROM\b/.test(_line)) {
            _context = "FROM";
            _formattedLines.push("FROM");
            const _remainder = _stripClausePrefix(_line, "FROM");
            if (_remainder) {
              if (/^\(SELECT\b/.test(_remainder)) {
                _formattedLines.push("  (");
                _formattedLines.push(`  ${_remainder.slice(1).trim()}`);
                continue;
              }
              _formattedLines.push(`  ${_remainder}`);
            }
            continue;
          }

          if (/^(INNER JOIN|LEFT JOIN|RIGHT JOIN|FULL JOIN|CROSS JOIN|JOIN)\b/.test(_line)) {
            _context = "ON";
            const _joinSubqueryMatch = _line.match(/^(INNER JOIN|LEFT JOIN|RIGHT JOIN|FULL JOIN|CROSS JOIN|JOIN)\s+\((SELECT.+)$/);
            if (_joinSubqueryMatch) {
              _formattedLines.push(`  ${_joinSubqueryMatch[1]} (`);
              _formattedLines.push(`    ${_joinSubqueryMatch[2]}`);
              continue;
            }
            _formattedLines.push(`  ${_line}`);
            continue;
          }

          if (/^ON\b/.test(_line)) {
            _context = "ON";
            _formattedLines.push(`    ${_line}`);
            continue;
          }

          if (/^WHERE\b/.test(_line)) {
            _context = "WHERE";
            _formattedLines.push("WHERE");
            const _remainder = _stripClausePrefix(_line, "WHERE");
            if (_remainder) {
              _formattedLines.push(`  ${_remainder}`);
            }
            continue;
          }

          if (/^GROUP BY\b/.test(_line)) {
            _context = "GROUP BY";
            _formattedLines.push("GROUP BY");
            _formattedLines.push(..._formatCommaSeparatedRemainder(_stripClausePrefix(_line, "GROUP BY")));
            continue;
          }

          if (/^HAVING\b/.test(_line)) {
            _context = "HAVING";
            _formattedLines.push("HAVING");
            const _remainder = _stripClausePrefix(_line, "HAVING");
            if (_remainder) {
              _formattedLines.push(`  ${_remainder}`);
            }
            continue;
          }

          if (/^ORDER BY\b/.test(_line)) {
            _context = "ORDER BY";
            _formattedLines.push("ORDER BY");
            _formattedLines.push(..._formatCommaSeparatedRemainder(_stripClausePrefix(_line, "ORDER BY")));
            continue;
          }

          if (/^SET\b/.test(_line)) {
            _context = "SET";
            _formattedLines.push("SET");
            _formattedLines.push(..._formatCommaSeparatedRemainder(_stripClausePrefix(_line, "SET")));
            continue;
          }

          if (/^VALUES\b/.test(_line)) {
            _context = "VALUES";
            _formattedLines.push("VALUES");
            const _remainder = _stripClausePrefix(_line, "VALUES");
            if (_remainder) {
              _formattedLines.push(`  ${_remainder}`);
            }
            continue;
          }

          if (/^(LIMIT|OFFSET)\b/.test(_line)) {
            _context = "";
            _formattedLines.push(_line);
            continue;
          }

          if (/^(AND|OR)\b/.test(_line)) {
            const _indent = _context === "ON" ? "    " : "  ";
            _formattedLines.push(`${_indent}${_line}`);
            continue;
          }

          if (/^(WHEN|THEN|ELSE|END)\b/.test(_line)) {
            _formattedLines.push(`    ${_line}`);
            continue;
          }

          const _indent = _context === "ON" ? "    " : _context ? "  " : "";
          _formattedLines.push(`${_indent}${_line}`);
        }

        return _formattedLines;
      };

      const _applyParenthesisIndent = (_lines) => {
        const _result = [];
        let _parenDepth = 0;

        for (const _line of _lines) {
          const _trimmed = _line.trim();
          if (!_trimmed) {
            continue;
          }

          const _baseIndentSize = _line.match(/^\s*/)?.[0].length ?? 0;
          const _leadingCloseCount = _trimmed.match(/^\)+/)?.[0].length ?? 0;
          const _effectiveDepth = Math.max(0, _parenDepth - _leadingCloseCount);
          const _minimumParenIndent = _effectiveDepth > 0 ? (_effectiveDepth * 2) + 2 : 0;
          const _indentSize = Math.max(_baseIndentSize, _minimumParenIndent);
          _result.push(`${" ".repeat(_indentSize)}${_trimmed}`);

          const _openCount = (_trimmed.match(/\(/g) ?? []).length;
          const _closeCount = (_trimmed.match(/\)/g) ?? []).length;
          _parenDepth = Math.max(0, _effectiveDepth + _openCount - _closeCount);
        }

        return _result;
      };

      const _formatSql = (_sql) => {
        const _protectedStore = _maskSqlProtectedSegments(_sql.replace(/\r\n?/g, "\n"));
        let _formatted = _protectedStore._masked.replace(/\s+/g, " ").trim();
        if (!_formatted) {
          return "";
        }

        _formatted = _addSpaceAroundOperators(_formatted);
        _formatted = _upperCaseKeywords(_formatted);
        _formatted = _formatted.replace(/\bAS(?=[A-Za-z0-9_"`\[@])/g, "AS ");

        for (const _keyword of [
          "WITH",
          "UNION ALL",
          "UNION",
          "SELECT",
          "INSERT INTO",
          "UPDATE",
          "DELETE FROM",
          "FROM",
          "WHERE",
          "GROUP BY",
          "HAVING",
          "ORDER BY",
          "LIMIT",
          "OFFSET",
          "VALUES",
          "SET",
          "INNER JOIN",
          "LEFT JOIN",
          "RIGHT JOIN",
          "FULL JOIN",
          "CROSS JOIN"
        ]) {
          _formatted = _breakBeforeKeyword(_formatted, _keyword);
        }

        _formatted = _breakBareJoin(_formatted);
        _formatted = _breakBeforeKeyword(_formatted, "ON");
        _formatted = _breakBeforeKeyword(_formatted, "AND");
        _formatted = _breakBeforeKeyword(_formatted, "OR");
        _formatted = _formatted.replace(/\b(AND|OR|ON)\(/g, "$1 (");

        const _structuredLines = _formatStructuredLines(_formatted);
        const _indentedLines = _applyParenthesisIndent(_structuredLines);
        const _normalizedOutput = _indentedLines.join("\n").replace(/\n{3,}/g, "\n\n").trim();
        return _restoreSqlProtectedSegments(_normalizedOutput, _protectedStore._segments);
      };

      const _showFlash = (_message) => {
        $flash.textContent = _message;
        $flash.classList.add("is-visible");
        window.clearTimeout(_state._flashTimer);
        _state._flashTimer = window.setTimeout(() => {
          $flash.classList.remove("is-visible");
        }, 1500);
      };

      const _copyWithFallback = (_text) => {
        const $temporary = document.createElement("textarea");
        $temporary.value = _text;
        $temporary.setAttribute("readonly", "true");
        $temporary.style.position = "fixed";
        $temporary.style.top = "0";
        $temporary.style.left = "0";
        $temporary.style.opacity = "0";
        document.body.append($temporary);
        $temporary.select();
        const _copied = document.execCommand("copy");
        $temporary.remove();
        return _copied;
      };

      const _copyResult = async () => {
        if (!_state._lastSql) {
          _showFlash("コピーできるSQLがありません");
          return;
        }

        try {
          await navigator.clipboard.writeText(_state._lastSql);
          _showFlash("SQL をコピーしました");
          return;
        } catch (_error) {
          const _copied = _copyWithFallback(_state._lastSql);
          if (_copied) {
            _showFlash("SQL をコピーしました");
            return;
          }
        }

        _showFlash("コピーに失敗しました");
      };

      const _render = () => {
        const _input = _splitInputText($rawInput.value);
        const _binds = _parseBindVariables(_input._bindLines);
        const _sqlText = _input._sqlText;
        const _merged = _mergeSqlAndBinds(_sqlText, _binds);
        const _formatted = _formatSql(_merged._sql);

        _state._lastSql = _formatted;
        $output.textContent = _formatted || PLACEHOLDER_TEXT;
      };

      const _handleInputEvent = (event) => {
        const $target = event.target;
        if ($target instanceof HTMLElement && $target.matches('[data-role="raw-input"]')) {
          _render();
        }
      };

      const _handleClickEvent = (event) => {
        const $action = event.target instanceof HTMLElement ? event.target.closest("[data-action]") : null;
        if (!$action) {
          return;
        }

        const _actionType = $action.getAttribute("data-action");
        if (_actionType === "clear") {
          $rawInput.value = "";
          _render();
          $rawInput.focus();
          return;
        }

        if (_actionType === "copy") {
          void _copyResult();
        }
      };

      const _bindEvents = () => {
        document.addEventListener("input", _handleInputEvent);
        document.addEventListener("click", _handleClickEvent);

        const _mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");
        if (typeof _mediaQuery.addEventListener === "function") {
          _mediaQuery.addEventListener("change", _applyColorScheme);
        } else {
          _mediaQuery.addListener(_applyColorScheme);
        }
      };

      const _init = () => {
        _applyColorScheme();
        _bindEvents();
        _render();
      };

      _init();
    })();
  </script>
</body>
</html>
