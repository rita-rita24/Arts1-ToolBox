<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CommitPreChecker-Admin</title>
  <style>
    @layer reset, base, component, utility;

    @layer reset {
      *, *::before, *::after {
        box-sizing: border-box;
      }

      html, body,
      h1, h2, h3, p,
      ul, ol, li,
      textarea, input, select, button {
        margin: 0;
        padding: 0;
      }

      button, input, select, textarea {
        font: inherit;
        color: inherit;
      }
    }

    @layer base {
      :root {
        --claude-black: oklch(0.205 0.008 92);
        --claude-dark-surface: oklch(0.306 0.01 92);
        --claude-parchment: oklch(0.962 0.014 92);
        --claude-ivory: oklch(0.981 0.01 92);
        --claude-white: oklch(1 0 0);
        --claude-brand: oklch(0.62 0.14 45);
        --claude-brand-soft: oklch(0.69 0.12 45);
        --claude-text-primary: oklch(0.205 0.008 92);
        --claude-text-secondary: oklch(0.458 0.01 92);
        --claude-text-tertiary: oklch(0.63 0.01 92);
        --claude-warm-silver: oklch(0.76 0.015 92);
        --claude-border-cream: oklch(0.946 0.012 92);
        --claude-border-warm: oklch(0.915 0.015 92);
        --claude-ring: oklch(0.85 0.015 92);
        --claude-focus: oklch(0.68 0.16 250);
        --claude-shadow-whisper: oklch(0 0 0 / 0.05) 0px 4px 24px;
        --font-serif: "Anthropic Serif", Georgia, serif;
        --font-sans: "Anthropic Sans", Arial, sans-serif;
        --font-mono: "Anthropic Mono", Menlo, Monaco, Consolas, monospace;
      }

      html {
        font-size: 14px;
      }

      body {
        min-height: 100dvh;
        font-family: var(--font-sans), "Hiragino Sans", "Yu Gothic UI", sans-serif;
        color: var(--claude-text-primary);
        background: var(--claude-parchment);
      }

      code, kbd, pre, .u-mono {
        font-family: var(--font-mono);
      }
    }

    @layer component {
      .topbar {
        position: sticky;
        top: 0;
        z-index: 40;
        border-bottom: 1px solid var(--claude-border-cream);
        backdrop-filter: saturate(140%) blur(10px);
        background-color: rgba(245, 244, 237, 0.92);

        & .topbar__inner {
          max-width: 1200px;
          margin-inline: auto;
          padding: 0.9rem 1.25rem;
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 1rem;
        }

        & .brand {
          display: inline-flex;
          align-items: center;
          gap: 0.62rem;
          color: var(--claude-text-primary);
          font-family: var(--font-sans);
          font-size: 1rem;
          font-weight: 500;
          line-height: 1;
        }

        & .brand__dot {
          inline-size: 0.7rem;
          block-size: 0.7rem;
          border-radius: 50%;
          background: var(--claude-brand);
        }

        & .topbar__meta {
          color: var(--claude-text-secondary);
          font-size: 0.88rem;
          line-height: 1.43;
        }
      }

      .layout {
        max-width: 1200px;
        margin-inline: auto;
        padding: 0 1.25rem 2rem;
        display: grid;
        gap: 1.15rem;
      }

      .card {
        border: 1px solid var(--claude-border-cream);
        border-radius: 16px;
        background-color: var(--claude-ivory);
      }

      .glass {
        background-color: var(--claude-ivory);
      }

      .hero {
        padding: 3.3rem 1.4rem 2.7rem;
        background: var(--claude-ivory);
        border-radius: 16px;

        & h1 {
          color: var(--claude-text-primary);
          font-family: var(--font-serif);
          font-size: clamp(1.4rem, 2.8vw, 1.9rem);
          font-weight: 500;
          line-height: 1.1;
          text-align: center;
        }

        & p {
          margin-top: 0.9rem;
          color: var(--claude-text-secondary);
          font-family: var(--font-sans);
          font-size: 1rem;
          font-weight: 400;
          line-height: 1.6;
          text-align: center;
        }
      }

      .form-card {
        padding: 1.2rem;

        & form {
          display: grid;
          gap: 1rem;
        }
      }

      .section {
        border: 1px solid var(--claude-border-cream);
        border-radius: 12px;
        background: var(--claude-ivory);
        padding: 1rem;
        display: grid;
        gap: 0.85rem;
        box-shadow: 0 0 0 1px var(--claude-border-cream);

        & .section__title {
          display: flex;
          align-items: baseline;
          justify-content: space-between;
          gap: 0.6rem;
        }

        & h2 {
          font-family: var(--font-serif);
          font-size: 1.35rem;
          font-weight: 500;
          line-height: 1.1;
          color: var(--claude-text-primary);
        }

        & p {
          color: var(--claude-text-tertiary);
          font-family: var(--font-sans);
          font-size: 0.88rem;
          line-height: 1.43;
        }
      }

      .field-grid {
        display: grid;
        gap: 0.75rem;
        grid-template-columns: repeat(2, minmax(0, 1fr));

        @media (max-width: 768px) {
          grid-template-columns: 1fr;
        }
      }

      .field {
        display: grid;
        gap: 0.35rem;

        & label {
          color: var(--claude-text-secondary);
          font-family: var(--font-sans);
          font-size: 0.88rem;
          font-weight: 500;
          line-height: 1.6;
        }

        & input,
        & select,
        & textarea {
          inline-size: 100%;
          border: 1px solid var(--claude-border-warm);
          border-radius: 12px;
          background-color: var(--claude-white);
          padding: 0.55rem 0.75rem;
          line-height: 1.6;
          transition: border-color 0.14s ease, box-shadow 0.14s ease;
        }

        & textarea {
          min-block-size: 5.8rem;
          resize: vertical;
        }

        & input:focus,
        & select:focus,
        & textarea:focus {
          outline: none;
          border-color: var(--claude-focus);
          box-shadow: 0 0 0 2px var(--claude-focus);
        }
      }

      .field--full {
        grid-column: 1 / -1;
      }

      .check-list {
        display: grid;
        gap: 0.45rem;
        grid-template-columns: repeat(2, minmax(0, 1fr));

        @media (max-width: 768px) {
          grid-template-columns: 1fr;
        }

        & label {
          display: flex;
          align-items: center;
          gap: 0.42rem;
          color: var(--claude-text-secondary);
          font-family: var(--font-sans);
          font-size: 0.9rem;
          line-height: 1.6;
        }

        & input[type="checkbox"] {
          accent-color: var(--claude-brand);
          inline-size: 1.05rem;
          block-size: 1.05rem;
        }
      }

      .severity-grid {
        display: grid;
        gap: 0.7rem;
        grid-template-columns: repeat(2, minmax(0, 1fr));

        @media (max-width: 768px) {
          grid-template-columns: 1fr;
        }

        & .severity-item {
          border: 1px solid var(--claude-border-warm);
          border-radius: 8px;
          background-color: var(--claude-parchment);
          padding: 0.75rem;
          display: grid;
          gap: 0.46rem;

          & strong {
            font-family: var(--font-serif);
            font-size: 1.05rem;
            font-weight: 500;
            line-height: 1.2;
            color: var(--claude-text-primary);
          }

          & small {
            color: var(--claude-text-tertiary);
            font-family: var(--font-sans);
            font-size: 0.75rem;
            line-height: 1.6;
          }

          & select {
            border: 1px solid var(--claude-border-warm);
            border-radius: 12px;
            padding: 0.4rem 0.62rem;
            background: var(--claude-white);
          }
        }
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.55rem;
      }

      .btn {
        border: 1px solid transparent;
        border-radius: 12px;
        padding: 0.52rem 0.96rem;
        font-family: var(--font-sans);
        font-size: 1rem;
        font-weight: 500;
        line-height: 1.25;
        cursor: pointer;
        transition: background-color 0.14s ease, color 0.14s ease, border-color 0.14s ease, box-shadow 0.14s ease;

        &:disabled {
          cursor: not-allowed;
          opacity: 0.5;
        }
      }

      .btn--primary {
        background: var(--claude-brand);
        color: var(--claude-ivory);
        border-color: var(--claude-brand);
        box-shadow: 0 0 0 1px var(--claude-brand);
      }

      .btn--secondary {
        border-color: var(--claude-ring);
        background: var(--claude-border-warm);
        color: #4d4c48;
        box-shadow: 0 0 0 1px var(--claude-ring);
      }

      .btn--ghost {
        border-color: var(--claude-ring);
        background: var(--claude-border-warm);
        color: #4d4c48;
        box-shadow: 0 0 0 1px var(--claude-ring);
      }

      .status-card {
        padding: 1rem 1.05rem;
        display: grid;
        gap: 0.7rem;
        background: var(--claude-ivory);
        border-color: var(--claude-border-cream);
        color: var(--claude-text-primary);
      }

      .status {
        border: 1px solid var(--claude-border-warm);
        border-radius: 8px;
        padding: 0.75rem 0.8rem;
        font-size: 0.88rem;
        line-height: 1.6;
        background-color: var(--claude-parchment);

        &[data-tone="success"] {
          border-color: rgba(201, 100, 66, 0.45);
          background-color: rgba(201, 100, 66, 0.14);
        }

        &[data-tone="warning"] {
          border-color: rgba(176, 174, 165, 0.52);
          background-color: rgba(176, 174, 165, 0.12);
        }

        &[data-tone="error"] {
          border-color: rgba(181, 51, 51, 0.5);
          background-color: rgba(181, 51, 51, 0.12);
        }
      }

      .meta-list {
        display: grid;
        gap: 0.42rem;

        & .meta-list__item {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 0.8rem;
          border: 1px solid var(--claude-border-warm);
          border-radius: 8px;
          background-color: var(--claude-parchment);
          padding: 0.54rem 0.6rem;
          font-size: 0.82rem;

          & span:first-child {
            color: var(--claude-text-secondary);
          }

          & span:last-child {
            font-weight: 500;
            overflow-wrap: anywhere;
            text-align: right;
          }
        }
      }

      .footer-note {
        max-width: 1200px;
        margin-inline: auto;
        padding: 0 1.25rem 1.8rem;
        color: var(--claude-text-tertiary);
        font-family: var(--font-sans);
        font-size: 0.75rem;
        line-height: 1.6;
      }

      button:focus-visible,
      input:focus-visible,
      select:focus-visible,
      textarea:focus-visible {
        outline: 2px solid var(--claude-focus);
        outline-offset: 2px;
      }
    }

    @layer utility {
      .u-hidden {
        display: none !important;
      }

      .u-mono {
        font-family: var(--font-mono);
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <div class="brand">
        <span class="brand__dot" aria-hidden="true"></span>
        <span>CommitPreChecker-Admin</span>
      </div>
      <div class="topbar__meta" id="profile-summary">共通ルールセット</div>
    </div>
  </header>

  <main class="layout">
    <section class="card glass">
      <div class="hero">
        <h1>配布用HTML生成コンソール</h1>
        <p>共通チェック観点を設定し、利用者向けの配布用HTML（単一ファイル）を生成します。</p>
      </div>

      <div class="form-card">
        <form id="admin-form" novalidate>
          <section class="section">
            <div class="section__title">
              <h2>基本情報</h2>
              <p>配布表示用</p>
            </div>
            <div class="field-grid">
              <div class="field">
                <label for="ruleSetName">ルールセット名</label>
                <input id="ruleSetName" name="ruleSetName" type="text" placeholder="標準共通ルール" required />
              </div>
              <div class="field">
                <label for="profileStatus">ステータス</label>
                <select id="profileStatus" name="profileStatus">
                  <option value="draft">下書き</option>
                  <option value="published">公開中</option>
                  <option value="deprecated">廃止</option>
                </select>
              </div>
              <div class="field field--full">
                <label for="ruleSetDescription">説明</label>
                <textarea id="ruleSetDescription" name="ruleSetDescription" placeholder="このルールセットの説明"></textarea>
              </div>
            </div>
          </section>

          <section class="section">
            <div class="section__title">
              <h2>共通ルール設定</h2>
              <p>言語非依存</p>
            </div>
            <div class="field-grid">
              <div class="field">
                <label for="indentType">インデント方式</label>
                <select id="indentType" name="indentType">
                  <option value="spaces">スペース</option>
                  <option value="tabs">タブ</option>
                  <option value="either">どちらも許可</option>
                </select>
              </div>
              <div class="field">
                <label for="indentSize">インデント幅（スペース時）</label>
                <input id="indentSize" name="indentSize" type="number" min="1" max="8" step="1" />
              </div>
              <div class="field">
                <label for="lineEnding">改行コード</label>
                <select id="lineEnding" name="lineEnding">
                  <option value="LF">LF</option>
                  <option value="CRLF">CRLF</option>
                  <option value="either">どちらも許可</option>
                </select>
              </div>
              <div class="field">
                <label for="requireFinalNewline">ファイル末尾改行</label>
                <select id="requireFinalNewline" name="requireFinalNewline">
                  <option value="required">必須</option>
                  <option value="optional">任意</option>
                  <option value="forbidden">禁止</option>
                </select>
              </div>
              <div class="field">
                <label for="allowFullWidthSpace">全角スペース</label>
                <select id="allowFullWidthSpace" name="allowFullWidthSpace">
                  <option value="error">エラー</option>
                  <option value="warning">警告</option>
                  <option value="allow">許可</option>
                </select>
              </div>
              <div class="field">
                <label for="allowInvisibleChars">不可視文字</label>
                <select id="allowInvisibleChars" name="allowInvisibleChars">
                  <option value="error">エラー</option>
                  <option value="warning">警告</option>
                  <option value="allow">許可</option>
                </select>
              </div>
              <div class="field">
                <label for="maxBlankLines">連続空行の上限</label>
                <input id="maxBlankLines" name="maxBlankLines" type="number" min="0" step="1" />
              </div>
              <div class="field">
                <label for="maxLineLength">1行の最大文字数</label>
                <input id="maxLineLength" name="maxLineLength" type="number" min="1" step="1" />
              </div>
            </div>
            <div class="check-list">
              <label><input id="trimTrailingWhitespace" name="trimTrailingWhitespace" type="checkbox" />行末空白を禁止する</label>
              <label><input id="forbidBom" name="forbidBom" type="checkbox" />BOMを禁止する</label>
            </div>
          </section>

          <section class="section">
            <div class="section__title">
              <h2>重大度設定</h2>
              <p>チェック観点別</p>
            </div>
            <div class="severity-grid" id="severity-grid"></div>
          </section>

          <section class="section">
            <div class="section__title">
              <h2>配布オプション</h2>
              <p>出力設定</p>
            </div>
            <div class="field-grid">
              <div class="field">
                <label for="toolName">配布ツール名</label>
                <input id="toolName" name="toolName" type="text" placeholder="CommitPreChecker" />
              </div>
              <div class="field">
                <label for="theme">テーマ</label>
                <select id="theme" name="theme">
                  <option value="light">ライト</option>
                  <option value="dark">ダーク</option>
                  <option value="auto">システム連動</option>
                </select>
              </div>
              <div class="field">
                <label for="expireAt">有効期限（任意）</label>
                <input id="expireAt" name="expireAt" type="datetime-local" />
              </div>
            </div>
            <div class="check-list">
              <label><input id="showRuleInfo" name="showRuleInfo" type="checkbox" />ルール情報ボタンを表示する</label>
              <label><input id="enableAutoFix" name="enableAutoFix" type="checkbox" />自動修正機能を有効にする</label>
            </div>
          </section>

          <div class="toolbar">
            <button class="btn btn--primary" id="generateHtmlBtn" type="button">配布用HTMLを生成 (Generate HTML)</button>
            <button class="btn btn--secondary" id="exportJsonBtn" type="button">設定JSONを保存</button>
            <button class="btn btn--secondary" id="importJsonBtn" type="button">設定JSONを読込</button>
            <button class="btn btn--ghost" id="resetBtn" type="button">初期値に戻す</button>
            <input class="u-hidden" id="profileFileInput" type="file" accept="application/json" />
          </div>
        </form>
      </div>
    </section>

    <section class="card status-card">
      <div class="status" id="statusMessage" data-tone="neutral">設定を編集すると下書き保存されます。</div>
      <div class="meta-list">
        <div class="meta-list__item"><span>出力ファイル</span><span id="generatedFileName">-</span></div>
        <div class="meta-list__item"><span>チェックサム</span><span id="checksumPreview">-</span></div>
      </div>
      <div class="toolbar">
        <button class="btn btn--secondary" id="downloadLastBtn" type="button" disabled>直前生成HTMLを再ダウンロード</button>
      </div>
    </section>
  </main>

  <p class="footer-note">配布物は単一HTMLとして出力され、ルールは埋め込み固定です。外部通信は行いません。</p>

  <script>
    (() => {
      "use strict";

      const qs = (sel, root = document) => root.querySelector(sel);
      const qsa = (sel, root = document) => [...root.querySelectorAll(sel)];

      const STORAGE_KEY = "commit-prechecker-admin-profile-v2";

      const CHECKPOINTS = [
        { key: "mixedIndent", label: "インデント方式の混在", description: "行頭でタブとスペースが混在していないか" },
        { key: "indentWidth", label: "インデント幅の不一致", description: "スペースインデントが指定幅の倍数か" },
        { key: "trailingWhitespace", label: "行末空白", description: "行末の不要な空白を検出" },
        { key: "lineEnding", label: "改行コードの不一致", description: "LF / CRLF のルール違反を検出" },
        { key: "finalNewline", label: "ファイル末尾改行", description: "末尾改行の必須・禁止ルールを検出" },
        { key: "fullWidthSpace", label: "全角スペース", description: "全角スペースの混入を検出" },
        { key: "invisibleChars", label: "不可視文字", description: "ゼロ幅文字やNBSPなどを検出" },
        { key: "blankLines", label: "連続空行の超過", description: "連続空行数が上限を超えていないか" },
        { key: "bom", label: "BOM混入", description: "UTF-8 BOMの混入を検出" },
        { key: "lineLength", label: "行長超過", description: "最大行長を超える行を検出" }
      ];

      const DEFAULT_PROFILE = {
        meta: {
          ruleSetName: "標準共通ルール",
          description: "コミット前の基本整形ルール",
          status: "draft"
        },
        rules: {
          indentType: "spaces",
          indentSize: 4,
          lineEnding: "LF",
          trimTrailingWhitespace: true,
          requireFinalNewline: "required",
          allowFullWidthSpace: "error",
          allowInvisibleChars: "warning",
          maxBlankLines: 1,
          maxLineLength: 120,
          forbidBom: true
        },
        severity: {
          mixedIndent: "error",
          indentWidth: "warning",
          trailingWhitespace: "error",
          lineEnding: "error",
          finalNewline: "warning",
          fullWidthSpace: "error",
          invisibleChars: "warning",
          blankLines: "warning",
          bom: "warning",
          lineLength: "info"
        },
        options: {
          toolName: "CommitPreChecker",
          showRuleInfo: true,
          enableAutoFix: true,
          theme: "light",
          expireAt: null
        }
      };

      const $form = qs("#admin-form");
      const $statusMessage = qs("#statusMessage");
      const $profileSummary = qs("#profile-summary");
      const $generatedFileName = qs("#generatedFileName");
      const $checksumPreview = qs("#checksumPreview");
      const $downloadLastBtn = qs("#downloadLastBtn");
      const $profileFileInput = qs("#profileFileInput");
      const $severityGrid = qs("#severity-grid");

      const $generateHtmlBtn = qs("#generateHtmlBtn");
      const $exportJsonBtn = qs("#exportJsonBtn");
      const $importJsonBtn = qs("#importJsonBtn");
      const $resetBtn = qs("#resetBtn");
      const $theme = qs("#theme");

      let _lastGeneratedHtml = "";
      let _lastGeneratedFileName = "";
      let _saveTimer = 0;

      _initialize();

      function _initialize() {
        _renderSeverityControls();

        const _draft = _loadDraft();
        _writeStateToForm(_draft || DEFAULT_PROFILE);

        _renderProfileSummary();
        _refreshSummaryPreview();
        _bindEvents();
        _updateAdminColorScheme();
      }

      function _renderSeverityControls() {
        $severityGrid.textContent = "";

        for (const _checkpoint of CHECKPOINTS) {
          const $item = document.createElement("div");
          $item.className = "severity-item";

          const $title = document.createElement("strong");
          $title.textContent = _checkpoint.label;

          const $desc = document.createElement("small");
          $desc.textContent = _checkpoint.description;

          const $select = document.createElement("select");
          $select.id = `sev-${_checkpoint.key}`;

          const _labels = {
            error: "エラー",
            warning: "警告",
            info: "情報",
            off: "無効"
          };

          for (const _level of ["error", "warning", "info", "off"]) {
            const $option = document.createElement("option");
            $option.value = _level;
            $option.textContent = _labels[_level] || _level;
            $select.appendChild($option);
          }

          $item.appendChild($title);
          $item.appendChild($desc);
          $item.appendChild($select);
          $severityGrid.appendChild($item);
        }
      }

      function _bindEvents() {
        $form.addEventListener("input", () => {
          _renderProfileSummary();
          _refreshSummaryPreview();
          _scheduleDraftSave();
        });

        $form.addEventListener("change", () => {
          _renderProfileSummary();
          _refreshSummaryPreview();
          _scheduleDraftSave();
        });

        $generateHtmlBtn.addEventListener("click", async () => {
          await _handleGenerateHtml();
        });

        $exportJsonBtn.addEventListener("click", () => {
          _handleExportJson();
        });

        $importJsonBtn.addEventListener("click", () => {
          $profileFileInput.click();
        });

        $profileFileInput.addEventListener("change", async (event) => {
          const $file = event.target.files?.[0];
          if (!$file) {
            return;
          }
          await _handleImportJson($file);
          event.target.value = "";
        });

        $downloadLastBtn.addEventListener("click", () => {
          if (!_lastGeneratedHtml || !_lastGeneratedFileName) {
            _setStatus("まだ配布HTMLを生成していません。", "warning");
            return;
          }
          _downloadTextFile(_lastGeneratedFileName, _lastGeneratedHtml);
          _setStatus("直前に生成した配布HTMLを再ダウンロードしました。", "success");
        });

        $resetBtn.addEventListener("click", () => {
          _writeStateToForm(DEFAULT_PROFILE);
          _persistDraft(DEFAULT_PROFILE);
          _renderProfileSummary();
          _refreshSummaryPreview();
          _updateAdminColorScheme();
          _setStatus("初期設定に戻しました。", "success");
        });

        $theme.addEventListener("change", () => {
          _updateAdminColorScheme();
        });
      }

      function _renderProfileSummary() {
        const _state = _readStateFromForm();
        $profileSummary.textContent = _state.meta.ruleSetName || "共通ルールセット";
      }

      function _refreshSummaryPreview() {
        const _state = _readStateFromForm();
        const _config = _buildEmbeddedConfig(_state, null, "");
        const _fileName = _buildOutputFileName(_config);
        $generatedFileName.textContent = _fileName;
        $checksumPreview.textContent = _config.meta.checksum || "（生成時に計算）";
      }

      function _scheduleDraftSave() {
        window.clearTimeout(_saveTimer);
        _saveTimer = window.setTimeout(() => {
          const _state = _readStateFromForm();
          _persistDraft(_state);
        }, 140);
      }

      async function _handleGenerateHtml() {
        const _state = _readStateFromForm();
        const _errors = _validateState(_state);
        if (_errors.length > 0) {
          _setStatus(_errors.join("\n"), "error");
          return;
        }

        const _generatedAt = new Date().toISOString();
        const _configWithoutChecksum = _buildEmbeddedConfig(_state, _generatedAt, "");
        const _checksumSource = JSON.stringify(_configWithoutChecksum);
        const _checksum = await _sha256Hex(_checksumSource);
        const _config = _buildEmbeddedConfig(_state, _generatedAt, `sha256-${_checksum}`);

        const _html = _buildDistributionHtml(_config);
        const _fileName = _buildOutputFileName(_config);

        _lastGeneratedHtml = _html;
        _lastGeneratedFileName = _fileName;
        $downloadLastBtn.disabled = false;

        $generatedFileName.textContent = _fileName;
        $checksumPreview.textContent = _config.meta.checksum;

        _downloadTextFile(_fileName, _html);
        _persistDraft(_state);

        _setStatus("配布用HTMLを生成しました。ダウンロードを開始しました。", "success");
      }

      function _handleExportJson() {
        const _state = _readStateFromForm();
        const _fileName = `commit-prechecker-setting-${_makeDateStamp()}.json`;
        _downloadTextFile(_fileName, JSON.stringify(_state, null, 2));
        _setStatus("設定JSONを保存しました。", "success");
      }

      async function _handleImportJson(_file) {
        try {
          const _text = await _file.text();
          const _json = JSON.parse(_text);
          _writeStateToForm(_json);
          _persistDraft(_readStateFromForm());
          _renderProfileSummary();
          _refreshSummaryPreview();
          _updateAdminColorScheme();
          _setStatus("設定JSONを読み込みました。", "success");
        } catch (_error) {
          _setStatus("設定JSONの読込に失敗しました。形式を確認してください。", "error");
        }
      }

      function _readStateFromForm() {
        return {
          meta: {
            ruleSetName: qs("#ruleSetName").value.trim(),
            description: qs("#ruleSetDescription").value.trim(),
            status: qs("#profileStatus").value
          },
          rules: {
            indentType: qs("#indentType").value,
            indentSize: _toSafeInteger(qs("#indentSize").value, 4),
            lineEnding: qs("#lineEnding").value,
            trimTrailingWhitespace: qs("#trimTrailingWhitespace").checked,
            requireFinalNewline: qs("#requireFinalNewline").value,
            allowFullWidthSpace: qs("#allowFullWidthSpace").value,
            allowInvisibleChars: qs("#allowInvisibleChars").value,
            maxBlankLines: _toSafeInteger(qs("#maxBlankLines").value, 1),
            maxLineLength: _toSafeInteger(qs("#maxLineLength").value, 120),
            forbidBom: qs("#forbidBom").checked
          },
          severity: _readSeverityFromForm(),
          options: {
            toolName: qs("#toolName").value.trim() || "CommitPreChecker",
            showRuleInfo: qs("#showRuleInfo").checked,
            enableAutoFix: qs("#enableAutoFix").checked,
            theme: qs("#theme").value,
            expireAt: qs("#expireAt").value.trim() || null
          }
        };
      }

      function _writeStateToForm(_state) {
        const _source = _mergeWithDefault(_state);

        qs("#ruleSetName").value = _source.meta.ruleSetName;
        qs("#ruleSetDescription").value = _source.meta.description;
        qs("#profileStatus").value = _source.meta.status;

        qs("#indentType").value = _source.rules.indentType;
        qs("#indentSize").value = String(_source.rules.indentSize);
        qs("#lineEnding").value = _source.rules.lineEnding;
        qs("#trimTrailingWhitespace").checked = Boolean(_source.rules.trimTrailingWhitespace);
        qs("#requireFinalNewline").value = _source.rules.requireFinalNewline;
        qs("#allowFullWidthSpace").value = _source.rules.allowFullWidthSpace;
        qs("#allowInvisibleChars").value = _source.rules.allowInvisibleChars;
        qs("#maxBlankLines").value = String(_source.rules.maxBlankLines);
        qs("#maxLineLength").value = String(_source.rules.maxLineLength);
        qs("#forbidBom").checked = Boolean(_source.rules.forbidBom);

        for (const _checkpoint of CHECKPOINTS) {
          const $select = qs(`#sev-${_checkpoint.key}`);
          if ($select) {
            $select.value = _source.severity[_checkpoint.key] || "warning";
          }
        }

        qs("#toolName").value = _source.options.toolName;
        qs("#showRuleInfo").checked = Boolean(_source.options.showRuleInfo);
        qs("#enableAutoFix").checked = Boolean(_source.options.enableAutoFix);
        qs("#theme").value = _source.options.theme;
        qs("#expireAt").value = _source.options.expireAt ? _toDatetimeLocal(_source.options.expireAt) : "";
      }

      function _mergeWithDefault(_state) {
        const _source = _state || {};
        return {
          meta: {
            ruleSetName: _source.meta?.ruleSetName ?? DEFAULT_PROFILE.meta.ruleSetName,
            description: _source.meta?.description ?? DEFAULT_PROFILE.meta.description,
            status: _source.meta?.status ?? DEFAULT_PROFILE.meta.status
          },
          rules: {
            indentType: _source.rules?.indentType ?? DEFAULT_PROFILE.rules.indentType,
            indentSize: _source.rules?.indentSize ?? DEFAULT_PROFILE.rules.indentSize,
            lineEnding: _source.rules?.lineEnding ?? DEFAULT_PROFILE.rules.lineEnding,
            trimTrailingWhitespace: _source.rules?.trimTrailingWhitespace ?? DEFAULT_PROFILE.rules.trimTrailingWhitespace,
            requireFinalNewline: _source.rules?.requireFinalNewline ?? DEFAULT_PROFILE.rules.requireFinalNewline,
            allowFullWidthSpace: _source.rules?.allowFullWidthSpace ?? DEFAULT_PROFILE.rules.allowFullWidthSpace,
            allowInvisibleChars: _source.rules?.allowInvisibleChars ?? DEFAULT_PROFILE.rules.allowInvisibleChars,
            maxBlankLines: _source.rules?.maxBlankLines ?? DEFAULT_PROFILE.rules.maxBlankLines,
            maxLineLength: _source.rules?.maxLineLength ?? DEFAULT_PROFILE.rules.maxLineLength,
            forbidBom: _source.rules?.forbidBom ?? DEFAULT_PROFILE.rules.forbidBom
          },
          severity: {
            ...DEFAULT_PROFILE.severity,
            ...(_source.severity || {})
          },
          options: {
            toolName: _source.options?.toolName ?? DEFAULT_PROFILE.options.toolName,
            showRuleInfo: _source.options?.showRuleInfo ?? DEFAULT_PROFILE.options.showRuleInfo,
            enableAutoFix: _source.options?.enableAutoFix ?? DEFAULT_PROFILE.options.enableAutoFix,
            theme: _source.options?.theme ?? DEFAULT_PROFILE.options.theme,
            expireAt: _source.options?.expireAt ?? DEFAULT_PROFILE.options.expireAt
          }
        };
      }

      function _readSeverityFromForm() {
        const _severity = {};
        for (const _checkpoint of CHECKPOINTS) {
          const $select = qs(`#sev-${_checkpoint.key}`);
          if ($select) {
            _severity[_checkpoint.key] = $select.value;
          }
        }
        return _severity;
      }

      function _validateState(_state) {
        const _errors = [];

        if (!_state.meta.ruleSetName) {
          _errors.push("・ルールセット名は必須です。");
        }

        if (_state.rules.indentType === "spaces" && _state.rules.indentSize < 1) {
          _errors.push("・スペース指定時のインデント幅は1以上にしてください。");
        }

        if (_state.rules.maxBlankLines < 0) {
          _errors.push("・連続空行の上限は0以上で入力してください。");
        }

        if (_state.rules.maxLineLength < 1) {
          _errors.push("・1行の最大文字数は1以上で入力してください。");
        }

        if (_state.options.expireAt) {
          const _time = Date.parse(_state.options.expireAt);
          if (Number.isNaN(_time)) {
            _errors.push("・有効期限の日時形式が不正です。");
          }
        }

        return _errors;
      }

      function _buildEmbeddedConfig(_state, _generatedAt, _checksum) {
        return {
          meta: {
            toolName: _state.options.toolName || "CommitPreChecker",
            ruleSetName: _state.meta.ruleSetName,
            description: _state.meta.description,
            status: _state.meta.status,
            generatedAt: _generatedAt,
            checksum: _checksum
          },
          rules: {
            ..._state.rules
          },
          severity: {
            ..._state.severity
          },
          options: {
            showRuleInfo: _state.options.showRuleInfo,
            enableAutoFix: _state.options.enableAutoFix,
            theme: _state.options.theme,
            expireAt: _toIsoIfValid(_state.options.expireAt)
          }
        };
      }

      function _buildOutputFileName(_config) {
        const _name = _sanitizeForFile(_config.meta.ruleSetName || "common-rules");
        return `commit-prechecker-${_name}-${_makeDateStamp()}.html`;
      }

      function _buildDistributionHtml(_config) {
        const _embeddedConfig = _escapeScriptTag(JSON.stringify(_config, null, 2));
        const _runtimeCode = _escapeScriptTag(`(${_distributionRuntime.toString()})();`);
        const _style = _distributionCss();
        const _toolName = _escapeHtml(_config.meta.toolName || "CommitPreChecker");

        return `<!DOCTYPE html>

      }

            });
          }

          if (_rules.requireFinalNewline === "required" && _text.length > 0 && !/(\r\n|\n|\r)$/.test(_text)) {
            _addIssue(_issues, {
              key: "finalNewline",
              line: _lines.length,
              level: _resolveSeverity("finalNewline", "warning"),
              message: CHECKPOINTS.finalNewline.message,
              suggestion: "ファイル末尾に改行を追加してください。",
              preview: "ファイル末尾"
            });
          }

          if (_rules.requireFinalNewline === "forbidden" && /(\r\n|\n|\r)$/.test(_text)) {
            _addIssue(_issues, {
              key: "finalNewline",
              line: _lines.length,
              level: _resolveSeverity("finalNewline", "warning"),
              message: CHECKPOINTS.finalNewline.message,
              suggestion: "ファイル末尾の改行を削除してください。",
              preview: "ファイル末尾"
            });
          }

          _issues.sort((a, b) => {
            const _levelDiff = (SEVERITY_ORDER[a.level] ?? 9) - (SEVERITY_ORDER[b.level] ?? 9);
            if (_levelDiff !== 0) {
              return _levelDiff;
            }
            if (a.line !== b.line) {
              return a.line - b.line;
            }
            return a.key.localeCompare(b.key);
          });

          const _counts = { error: 0, warning: 0, info: 0 };
          for (const _issue of _issues) {
            if (_counts[_issue.level] !== undefined) {
              _counts[_issue.level] += 1;
            }
          }

          return { issues: _issues, counts: _counts };
        }

        function _autoFixText(_text) {
          let _fixed = _text;
          const _rules = _config.rules || {};

          if (_rules.forbidBom && _fixed.startsWith(BOM_CHAR)) {
            _fixed = _fixed.slice(1);
          }

          if (_rules.trimTrailingWhitespace) {
            _fixed = _fixed.replace(/[ \t]+$/gm, "");
          }

          const _lineEndingStats = _countLineEndings(_fixed);
          let _newline = "\n";
          if (_rules.lineEnding === "CRLF") {
            _newline = "\r\n";
          } else if (_rules.lineEnding === "LF") {
            _newline = "\n";
          } else if (_lineEndingStats.crlf > _lineEndingStats.lf) {
            _newline = "\r\n";
          }

          _fixed = _fixed.replace(/\r\n/g, "\n").replace(/\r/g, "\n");

          const _size = Math.max(1, Number(_rules.indentSize) || 4);
          if (_rules.indentType === "spaces") {
            _fixed = _fixed.replace(/^[ \t]+/gm, (_indent) => {
              const _columns = _leadingColumns(_indent, _size);
              return " ".repeat(_columns);
            });
          }

          if (_rules.indentType === "tabs") {
            _fixed = _fixed.replace(/^[ \t]+/gm, (_indent) => {
              const _columns = _leadingColumns(_indent, _size);
              return _columnsToTabsAndSpaces(_columns, _size);
            });
          }

          const _maxBlankLines = Math.max(0, Number(_rules.maxBlankLines) || 0);
          _fixed = _clampBlankLines(_fixed, _maxBlankLines);

          if (_rules.requireFinalNewline === "required" && _fixed.length > 0 && !_fixed.endsWith("\n")) {
            _fixed += "\n";
          }

          if (_rules.requireFinalNewline === "forbidden") {
            _fixed = _fixed.replace(/(\r\n|\n|\r)+$/, "");
          }

          if (_newline === "\r\n") {
            _fixed = _fixed.replace(/\n/g, "\r\n");
          }

          return _fixed;
        }

        function _clampBlankLines(_text, _maxBlankLines) {
          const _lines = _text.split("\n");
          const _result = [];
          let _blankRun = 0;

          for (const _line of _lines) {
            if (_line.trim() === "") {
              _blankRun += 1;
              if (_blankRun > _maxBlankLines) {
                continue;
              }
            } else {
              _blankRun = 0;
            }
            _result.push(_line);
          }

          return _result.join("\n");
        }

        function _renderHeader() {
          const _meta = _config.meta || {};
          qs("#brand-name").textContent = _meta.toolName || "CommitPreChecker";
          qs("#tool-title").textContent = _meta.toolName || "CommitPreChecker";
          qs("#meta-ruleset").textContent = `ルールセット: ${_meta.ruleSetName || "-"}`;

          const _showRuleInfo = _config.options?.showRuleInfo !== false;
          for (const $button of qsa("[data-action='open-rules']")) {
            $button.classList.toggle("u-hidden", !_showRuleInfo);
            $button.disabled = !_showRuleInfo;
          }

          const _enableAutoFix = _config.options?.enableAutoFix !== false;
          for (const $button of qsa("[data-action='apply-safe-fix']")) {
            $button.disabled = !_enableAutoFix;
          }
        }

        function _renderRulesModal() {
          const $ruleList = qs("#rule-list");
          $ruleList.textContent = "";

          const _addRow = (_label, _value) => {
            const $row = document.createElement("div");
            $row.className = "rule-list__row";

            const $key = document.createElement("strong");
            $key.textContent = _label;

            const $val = document.createElement("span");
            $val.textContent = _serializeValue(_value);

            $row.appendChild($key);
            $row.appendChild($val);
            $ruleList.appendChild($row);
          };

          _addRow("ルールセット名", _config.meta?.ruleSetName);
          _addRow("説明", _config.meta?.description || "-");
          _addRow("チェックサム", _config.meta?.checksum || "-");
          _addRow("ステータス", _config.meta?.status || "-");

          _addRow("インデント方式", _config.rules?.indentType);
          _addRow("インデント幅", _config.rules?.indentSize);
          _addRow("改行コード", _config.rules?.lineEnding);
          _addRow("行末空白禁止", _config.rules?.trimTrailingWhitespace);
          _addRow("ファイル末尾改行", _config.rules?.requireFinalNewline);
          _addRow("全角スペース", _config.rules?.allowFullWidthSpace);
          _addRow("不可視文字", _config.rules?.allowInvisibleChars);
          _addRow("連続空行上限", _config.rules?.maxBlankLines);
          _addRow("最大行長", _config.rules?.maxLineLength);
          _addRow("BOM禁止", _config.rules?.forbidBom);

          for (const [_key, _level] of Object.entries(_config.severity || {})) {
            _addRow(`重大度: ${_checkpointLabel(_key)}`, _severityLabel(_level));
          }
        }

        function _applyTheme() {
          const _theme = _config.options?.theme || "light";
          let _resolvedTheme = "light";

          if (_theme === "dark") {
            _resolvedTheme = "dark";
          } else if (_theme === "auto") {
            _resolvedTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }

          document.documentElement.dataset.theme = _resolvedTheme;
          document.documentElement.style.colorScheme = _resolvedTheme;
        }

        function _evaluateExpireAt() {
          const _expireAt = _config.options?.expireAt;
          if (!_expireAt) {
            return;
          }

          const _expireTime = Date.parse(_expireAt);
          if (Number.isNaN(_expireTime)) {
            return;
          }

          if (Date.now() > _expireTime) {
            _isExpired = true;
            const $expiredBanner = qs("#expired-banner");
            $expiredBanner.textContent = `この配布HTMLは ${_formatDate(_expireAt)} に有効期限を迎えています。管理者へ最新版を依頼してください。`;
            $expiredBanner.classList.remove("u-hidden");

            for (const $button of qsa("[data-requires-active='true']")) {
              $button.disabled = true;
            }
          }
        }

        function _renderCounters(_counts, _total) {
          qs("#count-total").textContent = String(_total);
          qs("#count-error").textContent = String(_counts.error || 0);
          qs("#count-warning").textContent = String(_counts.warning || 0);
          qs("#count-info").textContent = String(_counts.info || 0);
        }

        function _resetCounters() {
          _renderCounters({ error: 0, warning: 0, info: 0 }, 0);
        }

        function _renderIssues(_issues) {
          $issuesList.textContent = "";

          if (_issues.length === 0) {
            _renderEmptyIssues("問題は検出されませんでした。");
            return;
          }

          for (const _issue of _issues) {
            const $item = document.createElement("article");
            $item.className = `issue-card issue-card--${_issue.level}`;

            const $head = document.createElement("div");
            $head.className = "issue-card__head";

            const $title = document.createElement("strong");
            $title.textContent = _checkpointLabel(_issue.key);

            const $meta = document.createElement("small");
            $meta.textContent = `行 ${_issue.line} / ${_severityLabel(_issue.level)}`;

            $head.appendChild($title);
            $head.appendChild($meta);

            const $message = document.createElement("p");
            $message.className = "issue-card__message";
            $message.textContent = _issue.message;

            const $suggestion = document.createElement("p");
            $suggestion.className = "issue-card__suggestion";
            $suggestion.textContent = `修正案: ${_issue.suggestion}`;

            const $preview = document.createElement("p");
            $preview.className = "issue-card__preview";
            $preview.textContent = `該当行: ${_issue.preview}`;

            $item.appendChild($head);
            $item.appendChild($message);
            $item.appendChild($suggestion);
            $item.appendChild($preview);
            $issuesList.appendChild($item);
          }
        }

        function _renderEmptyIssues(_text) {
          $issuesList.textContent = "";
          const $empty = document.createElement("p");
          $empty.className = "issue-empty";
          $empty.textContent = _text;
          $issuesList.appendChild($empty);
        }

        function _setStatus(_text, _tone) {
          $statusText.textContent = _text;
          $statusText.dataset.tone = _tone;
        }

        function _openModal(_selector) {
          const $modal = qs(_selector);
          if (!$modal) {
            return;
          }
          $modal.classList.remove("u-hidden");
          $modal.setAttribute("aria-hidden", "false");
        }

        function _closeModal(_selector) {
          const $modal = qs(_selector);
          if (!$modal) {
            return;
          }
          $modal.classList.add("u-hidden");
          $modal.setAttribute("aria-hidden", "true");
        }

        function _resolveSeverity(_key, _fallback) {
          const _configured = (_config.severity || {})[_key];
          if (!_configured) {
            return _fallback;
          }

          const _value = String(_configured).toLowerCase();
          if (["error", "warning", "info", "off"].includes(_value)) {
            return _value;
          }
          return _fallback;
        }

        function _addIssue(_issues, _issue) {
          if (_issue.level === "off") {
            return;
          }
          _issues.push(_issue);
        }

        function _checkpointLabel(_key) {
          return CHECKPOINTS[_key]?.label || _key;
        }

        function _severityLabel(_level) {
          const _labels = {
            error: "エラー",
            warning: "警告",
            info: "情報",
            off: "無効"
          };
          return _labels[_level] || String(_level || "-");
        }

        function _countLineEndings(_text) {
          const _crlf = (_text.match(/\r\n/g) || []).length;
          const _withoutCrlf = _text.replace(/\r\n/g, "");
          const _cr = (_withoutCrlf.match(/\r/g) || []).length;
          const _lf = (_withoutCrlf.match(/\n/g) || []).length;
          return { crlf: _crlf, cr: _cr, lf: _lf };
        }

        function _leadingColumns(_indent, _tabSize) {
          const _size = Math.max(1, Number(_tabSize) || 4);
          let _columns = 0;
          for (const _char of _indent) {
            if (_char === "\t") {
              const _offset = _columns % _size;
              _columns += _offset === 0 ? _size : _size - _offset;
            } else {
              _columns += 1;
            }
          }
          return _columns;
        }

        function _columnsToTabsAndSpaces(_columns, _tabSize) {
          const _size = Math.max(1, Number(_tabSize) || 4);
          const _safeColumns = Math.max(0, Number(_columns) || 0);
          const _tabs = Math.floor(_safeColumns / _size);
          const _spaces = _safeColumns % _size;
          return "\t".repeat(_tabs) + " ".repeat(_spaces);
        }

        function _isLikelyContinuationLine(_currentTrimmed, _previousTrimmed) {
          if (!_currentTrimmed || !_previousTrimmed) {
            return false;
          }

          if (_previousTrimmed.endsWith("\\")) {
            return true;
          }

          const _tailContinuation = /(?:[([{,?:]|&&|\|\||\+|-|\*|\/|%|=|=>)$/.test(_previousTrimmed);
          const _headContinuation = /^(?:[)\]},.:?]|&&|\|\||\+|-|\*|\/|%)/.test(_currentTrimmed);
          return _tailContinuation || _headContinuation;
        }

        function _splitLines(_text) {
          if (_text === "") {
            return [""];
          }
          return _text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n");
        }

        function _linePreview(_line) {
          const _value = _line.replace(/\t/g, "\\t");
          if (_value.length <= 140) {
            return _value;
          }
          return `${_value.slice(0, 137)}...`;
        }

        function _showFatal(_message) {
          $app.classList.add("u-hidden");
          $fatal.classList.remove("u-hidden");
          $fatalMessage.textContent = _message;
        }

        function _serializeValue(_value) {
          if (_value === null || _value === undefined || _value === "") {
            return "-";
          }
          if (typeof _value === "boolean") {
            return _value ? "はい" : "いいえ";
          }

          const _labelMap = {
            spaces: "スペース",
            tabs: "タブ",
            either: "どちらも許可",
            required: "必須",
            optional: "任意",
            forbidden: "禁止",
            allow: "許可",
            error: "エラー",
            warning: "警告",
            info: "情報",
            off: "無効",
            draft: "下書き",
            published: "公開中",
            deprecated: "廃止",
            light: "ライト",
            dark: "ダーク",
            auto: "システム連動",
            LF: "LF",
            CRLF: "CRLF"
          };

          const _mapped = _labelMap[String(_value)];
          if (_mapped) {
            return _mapped;
          }
          return String(_value);
        }

        function _formatDate(_value) {
          if (!_value) {
            return "-";
          }

          const _date = new Date(_value);
          if (Number.isNaN(_date.getTime())) {
            return String(_value);
          }

          return _date.toLocaleString("ja-JP", {
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit"
          });
        }
      }

      function _toSafeInteger(_value, _fallback) {
        const _parsed = Number.parseInt(String(_value), 10);
        if (Number.isNaN(_parsed)) {
          return _fallback;
        }
        return _parsed;
      }

      function _persistDraft(_state) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(_state));
        } catch (_error) {
          _setStatus("下書き保存に失敗しました。ブラウザの保存制限を確認してください。", "warning");
        }
      }

      function _loadDraft() {
        try {
          const _raw = localStorage.getItem(STORAGE_KEY);
          if (!_raw) {
            return null;
          }
          return JSON.parse(_raw);
        } catch (_error) {
          return null;
        }
      }

      function _downloadTextFile(_fileName, _content) {
        const _blob = new Blob([_content], { type: "text/plain;charset=utf-8" });
        const _url = URL.createObjectURL(_blob);
        const $link = document.createElement("a");
        $link.href = _url;
        $link.download = _fileName;
        $link.click();
        URL.revokeObjectURL(_url);
      }

      function _sanitizeForFile(_value) {
        return String(_value)
          .toLowerCase()
          .replace(/[^a-z0-9._-]+/g, "-")
          .replace(/-+/g, "-")
          .replace(/^-|-$/g, "") || "rules";
      }

      function _makeDateStamp() {
        const _now = new Date();
        const _yy = String(_now.getFullYear());
        const _mm = String(_now.getMonth() + 1).padStart(2, "0");
        const _dd = String(_now.getDate()).padStart(2, "0");
        const _hh = String(_now.getHours()).padStart(2, "0");
        const _mi = String(_now.getMinutes()).padStart(2, "0");
        const _ss = String(_now.getSeconds()).padStart(2, "0");
        return `${_yy}${_mm}${_dd}-${_hh}${_mi}${_ss}`;
      }

      function _toIsoIfValid(_value) {
        if (!_value) {
          return null;
        }
        const _date = new Date(_value);
        if (Number.isNaN(_date.getTime())) {
          return null;
        }
        return _date.toISOString();
      }

      function _toDatetimeLocal(_value) {
        const _date = new Date(_value);
        if (Number.isNaN(_date.getTime())) {
          return "";
        }

        const _offset = _date.getTimezoneOffset();
        const _local = new Date(_date.getTime() - _offset * 60 * 1000);
        return _local.toISOString().slice(0, 16);
      }

      function _escapeScriptTag(_text) {
        return String(_text).replace(/<\/script/gi, "<\\/script");
      }

      function _escapeHtml(_text) {
        return String(_text)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      async function _sha256Hex(_text) {
        if (window.crypto && window.crypto.subtle) {
          const _buffer = await window.crypto.subtle.digest("SHA-256", new TextEncoder().encode(_text));
          return [...new Uint8Array(_buffer)].map((byte) => byte.toString(16).padStart(2, "0")).join("");
        }

        let _hash = 2166136261;
        for (let _index = 0; _index < _text.length; _index += 1) {
          _hash ^= _text.charCodeAt(_index);
          _hash = Math.imul(_hash, 16777619);
        }
        return Math.abs(_hash >>> 0).toString(16).padStart(8, "0");
      }

      function _setStatus(_message, _tone = "neutral") {
        $statusMessage.textContent = _message;
        $statusMessage.dataset.tone = _tone;
      }

      function _updateAdminColorScheme() {
        const _mode = $theme.value;
        let _resolved = "light";
        if (_mode === "dark") {
          _resolved = "dark";
        } else if (_mode === "auto") {
          _resolved = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.style.colorScheme = _resolved;
      }
    })();
  </script>
</body>
