<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSV ツール</title>

  <!-- ファビコン -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%232563eb' d='M10 10.02h5V21h-5zM17 21h3c1.1 0 2-.9 2-2v-9h-5v11zm3-18H5c-1.1 0-2 .9-2 2v3h19V5c0-1.1-.9-2-2-2zM3 19c0 1.1.9 2 2 2h3V10.02H3V19z'/></svg>">

  <!-- Material Symbols アイコンフォント -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <style>
    :root {
      --sidebar-width: 220px;
      --sidebar-collapsed-width: 0px;
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-muted: #64748b;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
    }

    [data-theme="dark"] {
      --bg: #000000;
      --surface: #121212;
      --border: #404040;
      --text: #ffffff;
      --text-muted: #a3a3a3;
      --primary: #3b82f6;
      --primary-hover: #60a5fa;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      font-size: 1.25em;
      line-height: 1;
      display: inline-block;
      vertical-align: middle;
    }

    /* サイドバー */
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background: var(--surface);
      border-right: 1px solid var(--border);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      transition: width 0.25s ease, min-width 0.25s ease;
      z-index: 100;
      overflow: hidden;
    }

    .sidebar.collapsed {
      width: var(--sidebar-collapsed-width);
      min-width: var(--sidebar-collapsed-width);
    }

    .sidebar-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 52px;
    }

    .sidebar-toggle-btn {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s ease;
    }

    .sidebar-toggle-btn:hover {
      background: var(--bg);
    }

    .sidebar-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
    }

    .sidebar-nav {
      flex: 1;
      padding: 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow: hidden;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-muted);
      font-size: 0.9rem;
      text-align: left;
      width: 100%;
      white-space: nowrap;
      transition: background 0.15s ease;
    }

    .nav-item:hover {
      background: var(--bg);
    }

    .nav-item.active {
      background: var(--primary);
      color: #ffffff;
    }

    .nav-item .material-symbols-outlined {
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    .nav-item-label {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .nav-item-title {
      font-weight: 600;
    }

    .nav-item-desc {
      font-size: 0.75rem;
      opacity: 0.7;
      margin-top: 2px;
    }

    /* 折り畳み時にテキストを隠す */
    .sidebar.collapsed .sidebar-title,
    .sidebar.collapsed .nav-item-label,
    .sidebar.collapsed .nav-item-desc {
      display: none;
    }

    /* 展開ボタン（折り畳み時に表示） */
    .expand-btn {
      display: none;
      position: fixed;
      top: 8px;
      left: 8px;
      z-index: 200;
      width: 36px;
      height: 36px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
    }

    .sidebar.collapsed ~ .main-content .expand-btn {
      display: flex;
    }

    /* メインコンテンツ */
    .main-content {
      flex: 1;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .tool-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }

    .tool-frame.active {
      display: block;
    }

    /* モバイル対応 */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        transform: translateX(-100%);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar.collapsed {
        width: var(--sidebar-width);
        min-width: var(--sidebar-width);
        transform: translateX(-100%);
      }

      .sidebar-overlay.open {
        display: block;
      }

      .expand-btn,
      .sidebar.collapsed ~ .main-content .expand-btn {
        display: flex;
      }

      .main-content {
        width: 100%;
      }
    }

    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 90;
    }
  </style>
</head>

<body>
  <!-- オーバーレイ（モバイル用） -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- サイドバー -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="sidebar-toggle-btn" onclick="toggleSidebar()" title="メニューを折り畳む">
        <span class="material-symbols-outlined">menu</span>
      </button>
      <span class="sidebar-title">CSV ツール</span>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item active" data-tool="editor" onclick="switchTool('editor')">
        <span class="material-symbols-outlined">table_view</span>
        <span class="nav-item-label">
          <span class="nav-item-title">CSV/TSV エディタ</span>
          <span class="nav-item-desc">テーブル形式で編集</span>
        </span>
      </button>

      <button class="nav-item" data-tool="generator" onclick="switchTool('generator')">
        <span class="material-symbols-outlined">build</span>
        <span class="nav-item-label">
          <span class="nav-item-title">CSV ジェネレーター</span>
          <span class="nav-item-desc">定義からCSVを生成</span>
        </span>
      </button>
    </nav>
  </aside>

  <!-- メインコンテンツ -->
  <main class="main-content">
    <!-- 展開ボタン（サイドバー折り畳み時に表示） -->
    <button class="expand-btn" id="expandBtn" onclick="toggleSidebar()">
      <span class="material-symbols-outlined">menu</span>
    </button>

    <iframe class="tool-frame active" id="frame-editor" src="csv-tsv-editor.html"></iframe>
    <iframe class="tool-frame" id="frame-generator" src="csv-tool-generator.html"></iframe>
  </main>

  <script>
    const STORAGE_KEY = 'csvTool_settings';

    function loadSettings() {
      try {
        const data = localStorage.getItem(STORAGE_KEY);
        return data ? JSON.parse(data) : {};
      } catch (e) {
        return {};
      }
    }

    function saveSettings(settings) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
      } catch (e) {
        console.error('Storage error:', e);
      }
    }

    // ツール切り替え
    function switchTool(tool) {
      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.toggle('active', item.dataset.tool === tool);
      });

      document.querySelectorAll('.tool-frame').forEach(frame => {
        frame.classList.remove('active');
      });
      document.getElementById('frame-' + tool).classList.add('active');

      const settings = loadSettings();
      settings.activeTool = tool;
      saveSettings(settings);

      // モバイルでは切り替え後にサイドバーを閉じる
      if (window.innerWidth <= 768) {
        closeSidebar();
      }
    }

    // サイドバー折り畳み
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');

      if (window.innerWidth <= 768) {
        // モバイル: スライドイン/アウト
        sidebar.classList.toggle('open');
        document.getElementById('sidebarOverlay').classList.toggle('open');
      } else {
        // デスクトップ: 折り畳み
        sidebar.classList.toggle('collapsed');
        const settings = loadSettings();
        settings.sidebarCollapsed = sidebar.classList.contains('collapsed');
        saveSettings(settings);
      }
    }

    function closeSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('open');
    }

    // テーマ同期（iframe内のテーマ変更を検知してサイドバーに反映）
    function syncThemeFromIframe() {
      document.querySelectorAll('.tool-frame').forEach(frame => {
        try {
          const iframeTheme = frame.contentDocument.documentElement.getAttribute('data-theme');
          if (iframeTheme) {
            document.documentElement.setAttribute('data-theme', iframeTheme);
          }
        } catch (e) { /* cross-origin fallback */ }
      });
    }

    // 初期化
    function init() {
      const settings = loadSettings();

      // アクティブツール復元
      if (settings.activeTool) {
        switchTool(settings.activeTool);
      }

      // サイドバー折り畳み状態を復元
      if (settings.sidebarCollapsed && window.innerWidth > 768) {
        document.getElementById('sidebar').classList.add('collapsed');
      }

      // iframe読み込み後にテーマを同期
      document.querySelectorAll('.tool-frame').forEach(frame => {
        frame.addEventListener('load', () => {
          syncThemeFromIframe();

          // iframe内のテーマ変更を監視
          try {
            const observer = new MutationObserver(() => {
              syncThemeFromIframe();
            });
            observer.observe(frame.contentDocument.documentElement, {
              attributes: true,
              attributeFilter: ['data-theme']
            });
          } catch (e) { /* cross-origin fallback */ }
        });
      });
    }

    init();
  </script>
</body>

</html>
