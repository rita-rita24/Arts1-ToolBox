  <style>
    /* =========================================================
       Layer Architecture
       ========================================================= */
    @layer reset, tokens, base, component, utility;

    /* =========================================================
       RESET
       ========================================================= */
    @layer reset {
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-block-size: 100dvh;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      button {
        font: inherit;
        color: inherit;
        background: none;
        border: none;
        cursor: pointer;
      }

      textarea {
        font: inherit;
        color: inherit;
        border: none;
        outline: none;
        resize: none;
      }

      img, svg {
        display: block;
        max-inline-size: 100%;
      }
    }

    /* =========================================================
       DESIGN TOKENS
       ========================================================= */
    @layer tokens {
      :root {
        /* --- Spacing Scale --- */
        --space-2xs: 0.25rem;
        --space-xs: 0.5rem;
        --space-sm: 0.75rem;
        --space-md: 1rem;
        --space-lg: 1.5rem;
        --space-xl: 2rem;
        --space-2xl: 3rem;
        --space-3xl: 4rem;

        /* --- Radius --- */
        --radius-xs: 0.25rem;
        --radius-sm: 0.5rem;
        --radius-md: 0.75rem;
        --radius-lg: 1rem;
        --radius-xl: 1.25rem;
        --radius-full: 9999px;

        /* --- Typography --- */
        --font-display: 'DotGothic16', monospace;
        --font-body: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
        --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;

        --text-xs: 0.6875rem;
        --text-sm: 0.75rem;
        --text-base: 0.875rem;
        --text-md: 1rem;
        --text-lg: 1.125rem;
        --text-xl: 1.5rem;
        --text-2xl: 2rem;
        --text-3xl: 2.5rem;
        --text-4xl: 3.5rem;

        --leading-tight: 1.2;
        --leading-normal: 1.6;
        --leading-relaxed: 1.8;

        /* --- Layout --- */
        --container-max: 52rem;
        --container-narrow: 42rem;

        /* --- Transitions --- */
        --ease-spring: linear(0, 0.006, 0.025 2.8%, 0.101 6.1%, 0.539 18.9%, 0.721 25.3%, 0.849 31.5%, 0.937 38.1%, 0.968 41.8%, 0.991 45.7%, 1.006 50.1%, 1.015 55%, 1.017 63.9%, 1.001 85.6%, 1);
        --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        --ease-bounce: linear(0, 0.004, 0.016, 0.035, 0.063, 0.098, 0.141, 0.191, 0.25, 0.316, 0.391 36.8%, 0.563, 0.766, 1 58.8%, 0.946, 0.908 69.1%, 0.895, 0.89, 0.892 74.2%, 0.979, 1.035, 1.063 83%, 1.067, 1.064, 1.053, 1.037, 1.019, 1 95.2%, 0.994, 0.991, 0.99, 0.992, 0.995, 1);
        --duration-fast: 150ms;
        --duration-normal: 250ms;
        --duration-slow: 400ms;

        /* --- Neo-retro accent colors (constant) --- */
        --accent-green: oklch(80% 0.2 155);
        --accent-pink: oklch(75% 0.2 350);
        --accent-amber: oklch(82% 0.18 85);
        --accent-cyan: oklch(78% 0.15 200);

        /* --- Z-index scale --- */
        --z-base: 1;
        --z-sticky: 100;
        --z-modal: 500;
        --z-toast: 600;

        color-scheme: dark;
      }

      /* --- Dark Theme (default) --- */
      [data-theme="dark"] {
        --bg-root: oklch(12% 0.01 270);
        --bg-surface: oklch(16% 0.012 270);
        --bg-surface-raised: oklch(19% 0.012 270);
        --bg-surface-overlay: oklch(20% 0.015 270 / 0.85);
        --bg-input: oklch(13% 0.008 270);
        --bg-hero: linear-gradient(135deg, oklch(18% 0.04 280), oklch(14% 0.03 320));

        --border-subtle: oklch(50% 0 0 / 0.1);
        --border-default: oklch(50% 0 0 / 0.15);
        --border-strong: oklch(60% 0 0 / 0.2);

        --text-primary: oklch(93% 0.005 270);
        --text-secondary: oklch(72% 0.01 270);
        --text-muted: oklch(55% 0.01 270);
        --text-faint: oklch(42% 0.01 270);

        --glow-green: oklch(80% 0.2 155 / 0.15);
        --glow-pink: oklch(75% 0.2 350 / 0.1);
        --glow-ambient: oklch(60% 0.15 280 / 0.05);

        --hero-number: oklch(88% 0.18 155);
        --hero-label: oklch(65% 0.05 270);
        --hero-sub-number: oklch(80% 0.05 270);
        --hero-sub-label: oklch(50% 0.03 270);

        --shadow-inset-top: inset 0 1px 0 oklch(100% 0 0 / 0.04);
        --shadow-card: 0 1px 3px oklch(0% 0 0 / 0.3), 0 0 0 1px oklch(50% 0 0 / 0.08);

        --scanline-opacity: 0.03;

        --skeleton-base: oklch(18% 0.01 270);
        --skeleton-shine: oklch(25% 0.01 270);

        --danger: oklch(65% 0.22 25);
        --danger-bg: oklch(65% 0.22 25 / 0.1);

        --toast-success-bg: oklch(25% 0.06 155 / 0.92);
        --toast-info-bg: oklch(22% 0.03 270 / 0.92);
        --toast-error-bg: oklch(25% 0.08 25 / 0.92);
      }

      /* --- Light Theme --- */
      [data-theme="light"] {
        --bg-root: oklch(96% 0.005 80);
        --bg-surface: oklch(99% 0.003 80);
        --bg-surface-raised: oklch(100% 0 0);
        --bg-surface-overlay: oklch(99% 0.003 80 / 0.88);
        --bg-input: oklch(97% 0.004 80);
        --bg-hero: linear-gradient(135deg, oklch(25% 0.04 280), oklch(20% 0.04 320));

        --border-subtle: oklch(50% 0 0 / 0.08);
        --border-default: oklch(50% 0 0 / 0.12);
        --border-strong: oklch(40% 0 0 / 0.18);

        --text-primary: oklch(20% 0.01 270);
        --text-secondary: oklch(40% 0.01 270);
        --text-muted: oklch(55% 0.01 270);
        --text-faint: oklch(70% 0.01 270);

        --glow-green: oklch(80% 0.2 155 / 0.08);
        --glow-pink: oklch(75% 0.2 350 / 0.06);
        --glow-ambient: oklch(60% 0.15 280 / 0.03);

        --hero-number: oklch(88% 0.2 155);
        --hero-label: oklch(75% 0.03 270);
        --hero-sub-number: oklch(90% 0.04 270);
        --hero-sub-label: oklch(65% 0.02 270);

        --shadow-inset-top: inset 0 1px 0 oklch(100% 0 0 / 0.6);
        --shadow-card: 0 1px 3px oklch(0% 0 0 / 0.06), 0 0 0 1px oklch(50% 0 0 / 0.06);

        --scanline-opacity: 0;

        --skeleton-base: oklch(93% 0.005 80);
        --skeleton-shine: oklch(97% 0.003 80);

        --danger: oklch(55% 0.22 25);
        --danger-bg: oklch(55% 0.22 25 / 0.08);

        --toast-success-bg: oklch(40% 0.1 155 / 0.94);
        --toast-info-bg: oklch(30% 0.03 270 / 0.94);
        --toast-error-bg: oklch(40% 0.12 25 / 0.94);

        color-scheme: light;
      }
    }

    /* =========================================================
       BASE
       ========================================================= */
    @layer base {
      body {
        font-family: var(--font-body);
        font-size: var(--text-base);
        line-height: var(--leading-normal);
        color: var(--text-primary);
        background-color: var(--bg-root);
        transition: background-color var(--duration-slow) var(--ease-out),
                    color var(--duration-slow) var(--ease-out);
      }

      ::selection {
        background: oklch(80% 0.2 155 / 0.3);
        color: var(--text-primary);
      }

      /* Scanline overlay */
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          oklch(0% 0 0 / var(--scanline-opacity)) 2px,
          oklch(0% 0 0 / var(--scanline-opacity)) 4px
        );
        transition: opacity var(--duration-slow) var(--ease-out);
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: oklch(50% 0 0 / 0.2);
        border-radius: var(--radius-full);
      }

      /* Text wrap */
      h1, h2, h3 { text-wrap: balance; }
      p { text-wrap: pretty; }
    }

    /* =========================================================
       COMPONENTS
       ========================================================= */
    @layer component {
      /* --- Container --- */
      .app-container {
        max-inline-size: var(--container-narrow);
        margin-inline: auto;
        padding-inline: var(--space-md);
        padding-block-start: var(--space-lg);
        padding-block-end: var(--space-3xl);
      }

      /* --- Header --- */
      .app-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-block-end: var(--space-lg);
        gap: var(--space-md);
      }

      .app-header__brand {
        display: flex;
        align-items: center;
        gap: var(--space-sm);
      }

      .app-header__icon {
        display: flex;
        align-items: center;
        justify-content: center;
        inline-size: 2.75rem;
        block-size: 2.75rem;
        border-radius: var(--radius-md);
        background: var(--bg-surface);
        border: 1px solid var(--border-default);
        box-shadow: var(--shadow-inset-top);
        position: relative;
        overflow: hidden;
      }

      .app-header__icon svg {
        inline-size: 1.5rem;
        block-size: 1.5rem;
      }

      .app-header__title {
        font-family: var(--font-display);
        font-size: var(--text-lg);
        font-weight: 400;
        color: var(--text-primary);
        letter-spacing: 0.02em;
        line-height: var(--leading-tight);
      }

      .app-header__subtitle {
        font-size: var(--text-xs);
        color: var(--text-muted);
        margin-block-start: 0.125rem;
      }

      .app-header__actions {
        display: flex;
        align-items: center;
        gap: var(--space-xs);
      }

      .save-indicator {
        display: flex;
        align-items: center;
        gap: var(--space-2xs);
        font-size: var(--text-xs);
        color: var(--accent-green);
        font-weight: 500;
        opacity: 0;
        transition: opacity var(--duration-fast) var(--ease-out);
      }

      .save-indicator.visible {
        opacity: 1;
        animation: save-fade 1.5s var(--ease-out) forwards;
      }

      @keyframes save-fade {
        0% { opacity: 1; }
        70% { opacity: 1; }
        100% { opacity: 0; }
      }

      /* --- Theme Toggle --- */
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        inline-size: 2.25rem;
        block-size: 2.25rem;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border-subtle);
        background: var(--bg-surface);
        color: var(--text-secondary);
        transition: background var(--duration-fast) var(--ease-out),
                    color var(--duration-fast) var(--ease-out),
                    border-color var(--duration-fast) var(--ease-out),
                    transform var(--duration-fast) var(--ease-spring);
      }

      .theme-toggle:hover {
        color: var(--accent-amber);
        border-color: var(--border-strong);
        transform: translateY(-1px);
      }

      .theme-toggle:active {
        transform: translateY(0) scale(0.95);
      }

      .theme-toggle .material-symbols-outlined {
        font-size: 20px;
        transition: transform var(--duration-normal) var(--ease-spring);
      }

      .theme-toggle:hover .material-symbols-outlined {
        transform: rotate(25deg);
      }

      /* --- Hero Card --- */
      .hero-card {
        background: var(--bg-hero);
        border-radius: var(--radius-xl);
        padding: var(--space-lg);
        margin-block-end: var(--space-md);
        border: 1px solid oklch(50% 0 0 / 0.1);
        position: relative;
        overflow: hidden;
      }

      .hero-card::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse 60% 50% at 80% 20%, var(--glow-green), transparent),
          radial-gradient(ellipse 40% 40% at 20% 80%, var(--glow-pink), transparent);
        pointer-events: none;
      }

      /* Pixel decoration on hero */
      .hero-card::after {
        content: '';
        position: absolute;
        inset-block-start: var(--space-sm);
        inset-inline-end: var(--space-sm);
        inline-size: 4px;
        block-size: 4px;
        background: var(--accent-pink);
        box-shadow:
          6px 0 0 var(--accent-amber),
          12px 0 0 var(--accent-green),
          0 6px 0 oklch(50% 0 0 / 0.15),
          6px 6px 0 oklch(50% 0 0 / 0.1),
          12px 6px 0 oklch(50% 0 0 / 0.05);
        opacity: 0.7;
        pointer-events: none;
      }

      .hero-card__inner {
        position: relative;
        z-index: var(--z-base);
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: var(--space-md);
      }

      .hero-card__main {
        flex: 1;
      }

      .hero-card__label {
        font-size: var(--text-xs);
        font-weight: 600;
        color: var(--hero-label);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-family: var(--font-display);
      }

      .hero-card__count {
        font-family: var(--font-display);
        font-size: var(--text-4xl);
        font-weight: 400;
        color: var(--hero-number);
        line-height: 1;
        margin-block-start: var(--space-xs);
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.02em;
        text-shadow: 0 0 40px var(--glow-green);
        transition: transform var(--duration-fast) var(--ease-spring);
      }

      .hero-card__count.bump {
        transform: scale(1.04);
      }

      .hero-card__sub {
        display: flex;
        flex-direction: column;
        gap: var(--space-xs);
        align-items: flex-end;
        flex-shrink: 0;
      }

      .hero-sub-row {
        display: flex;
        align-items: center;
        gap: var(--space-sm);
      }

      .hero-sub-row__label {
        font-size: var(--text-xs);
        color: var(--hero-sub-label);
        white-space: nowrap;
      }

      .hero-sub-row__value {
        font-family: var(--font-display);
        font-size: var(--text-base);
        font-weight: 400;
        color: var(--hero-sub-number);
        font-variant-numeric: tabular-nums;
        min-inline-size: 2.5em;
        text-align: end;
        transition: transform var(--duration-fast) var(--ease-spring);
      }

      .hero-sub-row__value.bump {
        transform: scale(1.06);
      }

      /* --- Stat Grid --- */
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: var(--space-xs);
        margin-block-end: var(--space-lg);
      }

      @media (min-width: 640px) {
        .stat-grid {
          grid-template-columns: repeat(4, 1fr);
          gap: var(--space-sm);
        }
      }

      .stat-card {
        background: var(--bg-surface);
        border-radius: var(--radius-md);
        border: 1px solid var(--border-subtle);
        padding-inline: var(--space-md);
        padding-block: var(--space-sm);
        box-shadow: var(--shadow-inset-top);
        transition: transform var(--duration-fast) var(--ease-spring),
                    box-shadow var(--duration-fast) var(--ease-out),
                    border-color var(--duration-fast) var(--ease-out);
      }

      .stat-card:hover {
        transform: translateY(-1px);
        border-color: var(--border-default);
      }

      .stat-card__label {
        font-size: var(--text-xs);
        color: var(--text-muted);
        font-weight: 500;
      }

      .stat-card__value {
        font-family: var(--font-display);
        font-size: var(--text-xl);
        color: var(--text-primary);
        margin-block-start: 0.125rem;
        font-variant-numeric: tabular-nums;
        transition: transform var(--duration-fast) var(--ease-spring);
      }

      .stat-card__value.bump {
        transform: scale(1.06);
      }

      .stat-card__value--dual {
        display: flex;
        align-items: baseline;
        gap: var(--space-2xs);
      }

      .stat-card__separator {
        color: var(--text-faint);
        font-size: var(--text-base);
      }

      /* --- Editor Panel --- */
      .editor-panel {
        background: var(--bg-surface);
        border-radius: var(--radius-xl);
        border: 1px solid var(--border-subtle);
        box-shadow: var(--shadow-card);
        overflow: hidden;
      }

      .editor-panel__toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-inline: var(--space-md);
        padding-block: var(--space-xs);
        border-block-end: 1px solid var(--border-subtle);
        background: var(--bg-surface-raised);
      }

      .editor-panel__toolbar-label {
        font-size: var(--text-sm);
        font-weight: 600;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        gap: var(--space-2xs);
      }

      .editor-panel__toolbar-label .material-symbols-outlined {
        font-size: 16px;
        color: var(--accent-green);
      }

      .editor-panel__toolbar-actions {
        display: flex;
        gap: var(--space-2xs);
      }

      .editor-panel__textarea {
        display: block;
        inline-size: 100%;
        min-block-size: 10rem;
        padding: var(--space-md);
        background: var(--bg-input);
        color: var(--text-primary);
        font-size: 15px;
        line-height: var(--leading-relaxed);
        font-family: var(--font-body);
        transition: background var(--duration-fast) var(--ease-out);
      }

      .editor-panel__textarea::placeholder {
        color: var(--text-faint);
      }

      .editor-panel__textarea:focus {
        background: var(--bg-surface);
      }

      .editor-panel__format-bar {
        padding: var(--space-sm) var(--space-md);
        border-block-start: 1px solid var(--border-subtle);
        background: var(--bg-surface-raised);
      }

      .format-bar__label {
        display: flex;
        align-items: center;
        gap: var(--space-2xs);
        font-size: var(--text-xs);
        font-weight: 600;
        color: var(--accent-cyan);
        margin-block-end: var(--space-xs);
        letter-spacing: 0.04em;
      }

      .format-bar__label .material-symbols-outlined {
        font-size: 14px;
      }

      .format-bar__actions {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: var(--space-xs);
      }

      /* --- Empty State --- */
      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding-block: var(--space-2xl);
        padding-inline: var(--space-md);
        text-align: center;
      }

      .empty-state__illustration {
        margin-block-end: var(--space-md);
        opacity: 0.7;
      }

      .empty-state__message {
        font-size: var(--text-base);
        color: var(--text-muted);
        margin-block-end: var(--space-md);
        font-family: var(--font-display);
      }

      /* --- Buttons --- */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2xs);
        padding-inline: var(--space-md);
        padding-block: var(--space-xs);
        border-radius: var(--radius-sm);
        font-size: var(--text-sm);
        font-weight: 600;
        white-space: nowrap;
        transition: all var(--duration-fast) var(--ease-spring);
        position: relative;
        overflow: hidden;
      }

      .btn .material-symbols-outlined {
        font-size: 16px;
      }

      /* Primary */
      .btn--primary {
        background: linear-gradient(135deg, var(--accent-green), oklch(70% 0.18 180));
        color: oklch(15% 0.02 155);
        border: 1px solid oklch(80% 0.2 155 / 0.3);
      }

      .btn--primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 16px var(--glow-green);
      }

      .btn--primary:active {
        transform: translateY(0) scale(0.97);
        box-shadow: none;
      }

      /* Secondary */
      .btn--secondary {
        background: transparent;
        color: var(--text-secondary);
        border: 1px solid var(--border-default);
      }

      .btn--secondary:hover {
        background: var(--bg-surface-raised);
        border-color: var(--border-strong);
        color: var(--text-primary);
      }

      .btn--secondary:active {
        transform: scale(0.97);
      }

      /* Ghost */
      .btn--ghost {
        background: transparent;
        color: var(--text-muted);
        border: 1px solid transparent;
      }

      .btn--ghost:hover {
        color: var(--text-secondary);
        border-color: var(--border-subtle);
        background: var(--bg-surface);
      }

      .btn--ghost:active {
        transform: scale(0.96);
      }

      /* Danger */
      .btn--danger {
        background: transparent;
        color: var(--danger);
        border: 1px solid transparent;
      }

      .btn--danger:hover {
        background: var(--danger-bg);
        border-color: var(--danger);
      }

      .btn--danger:active {
        transform: scale(0.96);
      }

      /* Format button */
      .btn--format {
        background: var(--bg-surface);
        color: var(--text-secondary);
        border: 1px solid var(--border-subtle);
        padding-block: var(--space-xs);
        font-size: var(--text-xs);
        font-weight: 500;
      }

      .btn--format:hover {
        border-color: var(--accent-cyan);
        color: var(--accent-cyan);
        background: oklch(78% 0.15 200 / 0.06);
      }

      .btn--format:active {
        transform: scale(0.96);
      }

      .btn--format .material-symbols-outlined {
        font-size: 14px;
      }

      /* Copy feedback */
      .btn--copy-done .material-symbols-outlined {
        animation: check-morph var(--duration-normal) var(--ease-spring);
      }

      @keyframes check-morph {
        0% { transform: scale(0) rotate(-45deg); }
        60% { transform: scale(1.2) rotate(5deg); }
        100% { transform: scale(1) rotate(0); }
      }

      /* --- Toast --- */
      .toast-container {
        position: fixed;
        inset-block-end: var(--space-lg);
        inset-inline: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: var(--space-xs);
        pointer-events: none;
        z-index: var(--z-toast);
      }

      .toast {
        display: inline-flex;
        align-items: center;
        gap: var(--space-xs);
        padding-inline: var(--space-md);
        padding-block: var(--space-xs);
        border-radius: var(--radius-full);
        font-size: var(--text-sm);
        font-weight: 500;
        color: oklch(95% 0 0);
        backdrop-filter: blur(12px) saturate(1.2);
        -webkit-backdrop-filter: blur(12px) saturate(1.2);
        pointer-events: auto;
        animation: toast-in var(--duration-normal) var(--ease-bounce),
                   toast-out var(--duration-normal) var(--ease-out) 1.5s forwards;
      }

      .toast--success { background: var(--toast-success-bg); }
      .toast--info { background: var(--toast-info-bg); }
      .toast--error { background: var(--toast-error-bg); }

      .toast .material-symbols-outlined {
        font-size: 16px;
      }

      @keyframes toast-in {
        0% {
          opacity: 0;
          transform: translateY(16px) scale(0.9);
        }
        60% {
          opacity: 1;
          transform: translateY(-4px) scale(1.02);
        }
        100% {
          transform: translateY(0) scale(1);
        }
      }

      @keyframes toast-out {
        0% { opacity: 1; }
        100% { opacity: 0; transform: translateY(-8px) scale(0.95); }
      }

      /* --- Modal (dialog) --- */
      dialog.modal {
        position: fixed;
        inset: 0;
        margin: auto;
        max-inline-size: 24rem;
        inline-size: calc(100% - var(--space-xl) * 2);
        padding: var(--space-lg);
        border: 1px solid var(--border-default);
        border-radius: var(--radius-lg);
        background: var(--bg-surface-overlay);
        color: var(--text-primary);
        backdrop-filter: blur(16px) saturate(1.3);
        -webkit-backdrop-filter: blur(16px) saturate(1.3);
        box-shadow: 0 24px 48px oklch(0% 0 0 / 0.4);
        z-index: var(--z-modal);
      }

      dialog.modal::backdrop {
        background: oklch(0% 0 0 / 0.5);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        animation: fade-in var(--duration-normal) var(--ease-out);
      }

      dialog.modal[open] {
        animation: modal-in var(--duration-normal) var(--ease-spring);
      }

      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes modal-in {
        from {
          opacity: 0;
          transform: scale(0.92) translateY(12px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      .modal__title {
        font-family: var(--font-display);
        font-size: var(--text-lg);
        margin-block-end: var(--space-xs);
      }

      .modal__body {
        font-size: var(--text-base);
        color: var(--text-secondary);
        margin-block-end: var(--space-lg);
        line-height: var(--leading-normal);
      }

      .modal__actions {
        display: flex;
        gap: var(--space-xs);
        justify-content: flex-end;
      }

      /* --- Skeleton --- */
      .skeleton {
        background: var(--skeleton-base);
        border-radius: var(--radius-sm);
        position: relative;
        overflow: hidden;
      }

      .skeleton::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          transparent,
          var(--skeleton-shine),
          transparent
        );
        animation: shimmer 1.5s infinite;
      }

      @keyframes shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }

      /* --- Scroll-triggered reveals --- */
      .reveal {
        animation: reveal-up both;
        animation-timeline: view();
        animation-range: entry 0% entry 25%;
      }

      @keyframes reveal-up {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* --- Footer --- */
      .site-footer {
        margin-block-start: var(--space-2xl);
        padding-block: var(--space-lg);
        text-align: center;
        border-block-start: 1px solid var(--border-subtle);
      }

      .site-footer__copy {
        font-size: var(--text-xs);
        color: var(--text-faint);
      }

      /* --- Privacy Badge --- */
      .privacy-badge {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2xs);
        margin-block-start: var(--space-md);
        font-size: var(--text-xs);
        color: var(--text-muted);
      }

      .privacy-badge .material-symbols-outlined {
        font-size: 14px;
        color: var(--accent-green);
      }

      /* Pixel decoration helper */
      .pixel-dots {
        display: inline-flex;
        gap: 3px;
      }

      .pixel-dot {
        inline-size: 3px;
        block-size: 3px;
        border-radius: 0;
      }

      /* --- Input shake animation --- */
      .shake {
        animation: shake-x var(--duration-normal) var(--ease-spring);
      }

      @keyframes shake-x {
        0%, 100% { transform: translateX(0); }
        20% { transform: translateX(-4px); }
        40% { transform: translateX(4px); }
        60% { transform: translateX(-2px); }
        80% { transform: translateX(2px); }
      }
    }

    /* =========================================================
       UTILITIES
       ========================================================= */
    @layer utility {
      .visually-hidden {
        position: absolute;
        inline-size: 1px;
        block-size: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
        clip-path: inset(50%);
        white-space: nowrap;
        border: 0;
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }

        body::after {
          display: none;
        }
      }
    }
  </style>
</head>

<body>
  <div class="app-container">
    <!-- ===== Header ===== -->
    <header class="app-header">
      <div class="app-header__brand">
        <div class="app-header__icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="3" width="3" height="3" rx="0.5" fill="oklch(80% 0.2 155)" opacity="0.8" />
            <rect x="18" y="3" width="3" height="3" rx="0.5" fill="oklch(75% 0.2 350)" opacity="0.7" />
            <rect x="3" y="18" width="3" height="3" rx="0.5" fill="oklch(82% 0.18 85)" opacity="0.6" />
            <text x="12" y="15.5" font-size="10" font-weight="bold" fill="oklch(80% 0.2 155)" text-anchor="middle"
              font-family="monospace">文</text>
          </svg>
        </div>
        <div>
          <h1 class="app-header__title">スマート文字数カウント</h1>
          <p class="app-header__subtitle">入力するだけで即座にカウント。便利な整形機能付き。</p>
        </div>
      </div>
      <div class="app-header__actions">
        <span id="js-save-indicator" class="save-indicator">
          <span class="material-symbols-outlined" style="font-size:14px">check_circle</span>
          保存済み
        </span>
        <button id="js-theme-toggle" class="theme-toggle" aria-label="テーマ切替">
          <span class="material-symbols-outlined">dark_mode</span>
        </button>
      </div>
    </header>

    <!-- ===== Hero Stat ===== -->
    <section class="hero-card">
      <div class="hero-card__inner">
        <div class="hero-card__main">
          <p class="hero-card__label">文字数</p>
          <p id="js-count-total" class="hero-card__count">0</p>
        </div>
        <div class="hero-card__sub">
          <div class="hero-sub-row">
            <span class="hero-sub-row__label">空白抜き</span>
            <span id="js-count-nospace" class="hero-sub-row__value">0</span>
          </div>
          <div class="hero-sub-row">
            <span class="hero-sub-row__label">改行・空白抜き</span>
            <span id="js-count-pure" class="hero-sub-row__value">0</span>
          </div>
          <div class="hero-sub-row">
            <span class="hero-sub-row__label">半角0.5換算</span>
            <span id="js-count-half" class="hero-sub-row__value">0</span>
          </div>
        </div>
      </div>
    </section>

    <!-- ===== Stat Grid ===== -->
    <div class="stat-grid">
      <div class="stat-card">
        <p class="stat-card__label">空白</p>
        <p id="js-count-spaces" class="stat-card__value">0</p>
      </div>
      <div class="stat-card">
        <p class="stat-card__label">行数</p>
        <p id="js-count-lines" class="stat-card__value">0</p>
      </div>
      <div class="stat-card">
        <p class="stat-card__label">段落数</p>
        <p id="js-count-paragraphs" class="stat-card__value">0</p>
      </div>
      <div class="stat-card">
        <p class="stat-card__label">全角 / 半角</p>
        <div class="stat-card__value stat-card__value--dual">
          <span id="js-count-fw">0</span>
          <span class="stat-card__separator">/</span>
          <span id="js-count-hw">0</span>
        </div>
      </div>
    </div>

    <!-- ===== Editor Panel ===== -->
    <div class="editor-panel reveal">
      <!-- Toolbar -->
      <div class="editor-panel__toolbar">
        <span class="editor-panel__toolbar-label">
          <span class="material-symbols-outlined">edit_note</span>
          テキスト入力
        </span>
        <div class="editor-panel__toolbar-actions">
          <button id="js-btn-copy" class="btn btn--ghost" aria-label="コピー">
            <span class="material-symbols-outlined">content_copy</span>
            コピー
          </button>
          <button id="js-btn-clear" class="btn btn--danger" aria-label="クリア">
            <span class="material-symbols-outlined">delete_outline</span>
            クリア
          </button>
        </div>
      </div>

      <!-- Empty state / Textarea -->
      <div id="js-editor-body" class="editor-panel__body">
        <textarea id="js-textarea" class="editor-panel__textarea" rows="8"
          placeholder="テキストを入力してください..."></textarea>
      </div>

      <!-- Format toolbar -->
      <div class="editor-panel__format-bar">
        <div class="format-bar__label">
          <span class="material-symbols-outlined">auto_fix_high</span>
          テキスト整形
        </div>
        <div class="format-bar__actions">
          <button id="js-btn-join" class="btn btn--format">
            <span class="material-symbols-outlined">wrap_text</span>
            改行を連結
          </button>
          <button id="js-btn-trim" class="btn btn--format">
            <span class="material-symbols-outlined">format_align_left</span>
            空白を整理
          </button>
          <button id="js-btn-remove-empty" class="btn btn--format">
            <span class="material-symbols-outlined">density_small</span>
            空行を削除
          </button>
        </div>
      </div>
    </div>

    <!-- Privacy badge -->
    <div class="privacy-badge reveal">
      <span class="material-symbols-outlined">shield</span>
      テキストはブラウザ内のみで処理され、外部サーバーには送信されません。
    </div>

    <!-- Footer -->
    <footer class="site-footer reveal">
      <p class="site-footer__copy">&copy; スマート文字数カウント</p>
    </footer>
  </div>

  <!-- Confirm dialog -->
  <dialog id="js-confirm-dialog" class="modal">
    <h2 class="modal__title" id="js-modal-title">テキストを消去しますか？</h2>
    <p class="modal__body" id="js-modal-body">この操作は元に戻せません。入力したテキストがすべて削除されます。</p>
    <div class="modal__actions">
      <button id="js-modal-cancel" class="btn btn--secondary">キャンセル</button>
      <button id="js-modal-confirm" class="btn btn--primary" style="background:var(--danger);border-color:oklch(65% 0.22 25 / 0.3);">消去する</button>
    </div>
  </dialog>

  <!-- Toast container -->
  <div id="js-toast-container" class="toast-container"></div>

  <script>
    /* =========================================================
       Utility helpers
       ========================================================= */
    const qs = (sel, root = document) => root.querySelector(sel);
    const qsa = (sel, root = document) => [...root.querySelectorAll(sel)];

    /* =========================================================
       DOM References ($-prefixed)
       ========================================================= */
    const $textarea = qs('#js-textarea');
    const $btnCopy = qs('#js-btn-copy');
    const $btnClear = qs('#js-btn-clear');
    const $btnJoin = qs('#js-btn-join');
    const $btnTrim = qs('#js-btn-trim');
    const $btnRemoveEmpty = qs('#js-btn-remove-empty');
    const $themeToggle = qs('#js-theme-toggle');
    const $saveIndicator = qs('#js-save-indicator');
    const $toastContainer = qs('#js-toast-container');
    const $confirmDialog = qs('#js-confirm-dialog');
    const $modalCancel = qs('#js-modal-cancel');
    const $modalConfirm = qs('#js-modal-confirm');

    const $countTotal = qs('#js-count-total');
    const $countNospace = qs('#js-count-nospace');
    const $countPure = qs('#js-count-pure');
    const $countHalf = qs('#js-count-half');
    const $countSpaces = qs('#js-count-spaces');
    const $countLines = qs('#js-count-lines');
    const $countParagraphs = qs('#js-count-paragraphs');
    const $countFw = qs('#js-count-fw');
    const $countHw = qs('#js-count-hw');

    const STORAGE_KEY = 'charCountToolText';
    const THEME_KEY = 'charCountTheme';

    /* =========================================================
       Theme Management
       ========================================================= */
    const getStoredTheme = () => {
      try { return localStorage.getItem(THEME_KEY); } catch { return null; }
    };

    const applyTheme = (theme) => {
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.style.colorScheme = theme;
      const $icon = qs('.material-symbols-outlined', $themeToggle);
      $icon.textContent = theme === 'dark' ? 'light_mode' : 'dark_mode';
      try { localStorage.setItem(THEME_KEY, theme); } catch {}
    };

    const toggleTheme = () => {
      const current = document.documentElement.getAttribute('data-theme') ?? 'dark';
      applyTheme(current === 'dark' ? 'light' : 'dark');
    };

    // Initialize theme
    applyTheme(getStoredTheme() ?? 'dark');
    $themeToggle.addEventListener('click', toggleTheme);

    /* =========================================================
       Character Analysis
       ========================================================= */
    const isHalfwidth = (char) => {
      const code = char.codePointAt(0);
      return (code >= 0x0020 && code <= 0x007E) ||
        (code >= 0xFF61 && code <= 0xFF9F);
    };

    const isFullwidth = (char) => {
      const code = char.codePointAt(0);
      return (code >= 0x3000 && code <= 0x9FFF) ||
        (code >= 0xF900 && code <= 0xFAFF) ||
        (code >= 0xFF01 && code <= 0xFF60) ||
        (code >= 0xFFA0 && code <= 0xFFEF) ||
        (code >= 0x20000 && code <= 0x2FA1F);
    };

    const analyze = (text) => {
      const chars = [...text];
      const countTotal = chars.length;
      const countNoSpace = [...text.replace(/[ \t\u3000]/g, '')].length;
      const countNoSpaceNewline = [...text.replace(/[\s\u3000]/g, '')].length;

      let halfCount = 0;
      for (const c of chars) {
        if (/[\r\n]/.test(c)) continue;
        halfCount += isHalfwidth(c) ? 0.5 : 1;
      }

      const countSpaces = (text.match(/[ \u3000]/g) ?? []).length;
      const countLines = text === '' ? 0 : text.split('\n').length;

      let countParagraphs = 0;
      if (text.trim() !== '') {
        countParagraphs = text.trim().split(/\n{2,}/).filter(p => p.trim() !== '').length;
      }

      let fullwidth = 0, halfwidth = 0;
      for (const c of chars) {
        if (/[\s\u3000]/.test(c)) continue;
        isHalfwidth(c) ? halfwidth++ : fullwidth++;
      }

      return {
        countTotal, countNoSpace, countNoSpaceNewline,
        countHalf: halfCount, countSpaces, countLines,
        countParagraphs, fullwidth, halfwidth
      };
    };

    /* =========================================================
       DOM update with animations
       ========================================================= */
    const animateBump = ($el) => {
      $el.classList.remove('bump');
      void $el.offsetWidth;
      $el.classList.add('bump');
      setTimeout(() => $el.classList.remove('bump'), 200);
    };

    const updateElement = ($el, value) => {
      const formatted = typeof value === 'number' && value % 1 !== 0
        ? value.toLocaleString(undefined, { minimumFractionDigits: 1, maximumFractionDigits: 1 })
        : Number(value).toLocaleString();
      if ($el.textContent !== formatted) {
        $el.textContent = formatted;
        animateBump($el);
      }
    };

    const updateStats = () => {
      const stats = analyze($textarea.value);
      updateElement($countTotal, stats.countTotal);
      updateElement($countNospace, stats.countNoSpace);
      updateElement($countPure, stats.countNoSpaceNewline);
      updateElement($countHalf, stats.countHalf);
      updateElement($countSpaces, stats.countSpaces);
      updateElement($countLines, stats.countLines);
      updateElement($countParagraphs, stats.countParagraphs);
      updateElement($countFw, stats.fullwidth);
      updateElement($countHw, stats.halfwidth);
    };

    /* =========================================================
       Storage
       ========================================================= */
    const saveToStorage = () => {
      try {
        localStorage.setItem(STORAGE_KEY, $textarea.value);
        showSaveIndicator();
      } catch {}
    };

    const loadFromStorage = () => {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved !== null) {
          $textarea.value = saved;
        }
      } catch {}
    };

    const showSaveIndicator = () => {
      $saveIndicator.classList.remove('visible');
      void $saveIndicator.offsetWidth;
      $saveIndicator.classList.add('visible');
    };

    /* =========================================================
       Toast
       ========================================================= */
    const showToast = (message, type = 'success') => {
      const icons = {
        success: 'check_circle',
        info: 'info',
        error: 'error'
      };
      const $toast = document.createElement('div');
      $toast.className = `toast toast--${type}`;
      $toast.innerHTML = `<span class="material-symbols-outlined">${icons[type] ?? 'info'}</span>${message}`;
      $toastContainer.appendChild($toast);
      setTimeout(() => $toast.remove(), 2000);
    };

    /* =========================================================
       Modal (dialog)
       ========================================================= */
    let modalResolve = null;

    const showConfirmDialog = ({ title, body }) => {
      qs('#js-modal-title').textContent = title;
      qs('#js-modal-body').textContent = body;
      $confirmDialog.showModal();
      return new Promise((resolve) => {
        modalResolve = resolve;
      });
    };

    $modalCancel.addEventListener('click', () => {
      $confirmDialog.close();
      modalResolve?.(false);
    });

    $modalConfirm.addEventListener('click', () => {
      $confirmDialog.close();
      modalResolve?.(true);
    });

    $confirmDialog.addEventListener('click', (e) => {
      if (e.target === $confirmDialog) {
        $confirmDialog.close();
        modalResolve?.(false);
      }
    });

    $confirmDialog.addEventListener('close', () => {
      modalResolve?.(false);
      modalResolve = null;
    });

    /* =========================================================
       Text formatting
       ========================================================= */
    const joinLines = (text) => {
      const PH = '\x00PARA\x00';
      let result = text.replace(/\n{2,}/g, PH);
      result = result.replace(/([^\x00-\x7F])\n(?=[^\x00-\x7F])/g, '$1');
      result = result.replace(/\n/g, ' ');
      result = result.replaceAll(PH, '\n\n');
      return result;
    };

    const trimSpaces = (text) => {
      let result = text
        .split('\n')
        .map(line => {
          line = line.replace(/^[\s\u3000]+|[\s\u3000]+$/g, '');
          line = line.replace(/[ \u3000]{2,}/g, ' ');
          return line;
        })
        .join('\n');

      result = result.replace(/([\u3000-\u9FFF\uF900-\uFAFF\uFF01-\uFF60]) ([\u3000-\u9FFF\uF900-\uFAFF\uFF01-\uFF60])/g, '$1$2');
      result = result.replace(/([\u3000-\u9FFF\uF900-\uFAFF\uFF01-\uFF60]) ([\u3000-\u9FFF\uF900-\uFAFF\uFF01-\uFF60])/g, '$1$2');
      return result;
    };

    const removeEmptyLines = (text) => {
      return text.split('\n').filter(line => line.trim() !== '').join('\n');
    };

    const applyText = (newText, toastMsg) => {
      if ($textarea.value === newText) {
        showToast('変更箇所がありません', 'info');
        return;
      }
      $textarea.value = newText;
      updateStats();
      saveToStorage();
      showToast(toastMsg);
    };

    /* =========================================================
       Copy with icon feedback
       ========================================================= */
    const handleCopy = async () => {
      if (!$textarea.value) {
        showToast('テキストがありません', 'info');
        return;
      }
      try {
        await navigator.clipboard.writeText($textarea.value);
      } catch {
        $textarea.select();
        document.execCommand('copy');
      }

      const $icon = qs('.material-symbols-outlined', $btnCopy);
      const originalText = $icon.textContent;
      $icon.textContent = 'check';
      $btnCopy.classList.add('btn--copy-done');
      showToast('コピーしました');

      setTimeout(() => {
        $icon.textContent = originalText;
        $btnCopy.classList.remove('btn--copy-done');
      }, 1200);
    };

    /* =========================================================
       Event Listeners
       ========================================================= */
    $textarea.addEventListener('input', () => {
      updateStats();
      saveToStorage();
    });

    $btnCopy.addEventListener('click', handleCopy);

    $btnClear.addEventListener('click', async () => {
      if (!$textarea.value) return;
      const confirmed = await showConfirmDialog({
        title: 'テキストを消去しますか？',
        body: 'この操作は元に戻せません。入力したテキストがすべて削除されます。'
      });
      if (confirmed) {
        $textarea.value = '';
        try { localStorage.removeItem(STORAGE_KEY); } catch {}
        updateStats();
        showToast('消去しました', 'info');
      }
    });

    $btnJoin.addEventListener('click', () => {
      if (!$textarea.value) { showToast('テキストがありません', 'info'); return; }
      applyText(joinLines($textarea.value), '改行を連結しました');
    });

    $btnTrim.addEventListener('click', () => {
      if (!$textarea.value) { showToast('テキストがありません', 'info'); return; }
      applyText(trimSpaces($textarea.value), '空白を整理しました');
    });

    $btnRemoveEmpty.addEventListener('click', () => {
      if (!$textarea.value) { showToast('テキストがありません', 'info'); return; }
      applyText(removeEmptyLines($textarea.value), '空行を削除しました');
    });

    /* =========================================================
       Initialization
       ========================================================= */
    loadFromStorage();
    updateStats();
  </script>
</body>

</html>
