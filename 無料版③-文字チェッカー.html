<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TextForge — ペースト即浄化テキストクリーナー</title>
<meta name="description" content="テキストをペーストした瞬間に不要改行・連続空白・Markdown記号・ゼロ幅文字を自動検出。ワンクリック一括除去のスマートクリーナー。">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23181420'/><rect x='4' y='4' width='4' height='4' fill='%2300ffa3' opacity='.8'/><rect x='24' y='4' width='4' height='4' fill='%23ff6ec7' opacity='.8'/><rect x='4' y='24' width='4' height='4' fill='%23ffbe0b' opacity='.6'/><path d='M10 22L16 10L22 22' stroke='%2300ffa3' stroke-width='2' fill='none' stroke-linecap='round'/></svg>">

<style>
/* =========================================================
   Layer Architecture
   ========================================================= */
@layer reset, tokens, base, component, utility;

/* =========================================================
   RESET
   ========================================================= */
@layer reset {
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  body {
    min-block-size: 100dvh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
  textarea { font: inherit; color: inherit; border: none; outline: none; resize: none; background: none; }
  img, svg { display: block; max-inline-size: 100%; }
  dialog { border: none; padding: 0; background: none; }
}

/* =========================================================
   DESIGN TOKENS — light-dark() for automatic theming
   ========================================================= */
@layer tokens {
  :root {
    color-scheme: dark;

    /* --- Spacing Scale --- */
    --space-2xs: 0.25rem;
    --space-xs: 0.5rem;
    --space-sm: 0.75rem;
    --space-md: 1rem;
    --space-lg: 1.5rem;
    --space-xl: 2rem;
    --space-2xl: 3rem;
    --space-3xl: 4rem;

    /* --- Radius --- */
    --radius-xs: 0.25rem;
    --radius-sm: 0.5rem;
    --radius-md: 0.75rem;
    --radius-lg: 1rem;
    --radius-xl: 1.25rem;
    --radius-full: 9999px;

    /* --- Typography --- */
    --font-display: 'Syne', sans-serif;
    --font-pixel: 'DotGothic16', monospace;
    --font-body: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', monospace;

    --text-2xs: 0.625rem;
    --text-xs: 0.6875rem;
    --text-sm: 0.75rem;
    --text-base: 0.875rem;
    --text-md: 1rem;
    --text-lg: 1.125rem;
    --text-xl: 1.5rem;
    --text-2xl: 2rem;
    --text-3xl: 2.5rem;
    --text-hero: clamp(2.5rem, 6vw, 4rem);

    --leading-tight: 1.1;
    --leading-snug: 1.3;
    --leading-normal: 1.6;
    --leading-relaxed: 1.8;

    /* --- Layout --- */
    --container-max: 48rem;

    /* --- Transitions --- */
    --ease-spring: linear(0, 0.006, 0.025 2.8%, 0.101 6.1%, 0.539 18.9%, 0.721 25.3%, 0.849 31.5%, 0.937 38.1%, 0.968 41.8%, 0.991 45.7%, 1.006 50.1%, 1.015 55%, 1.017 63.9%, 1.001 85.6%, 1);
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-bounce: linear(0, 0.004, 0.016, 0.035, 0.063, 0.098, 0.141, 0.191, 0.25, 0.316, 0.391 36.8%, 0.563, 0.766, 1 58.8%, 0.946, 0.908 69.1%, 0.895, 0.89, 0.892 74.2%, 0.979, 1.035, 1.063 83%, 1.067, 1.064, 1.053, 1.037, 1.019, 1 95.2%, 0.994, 0.991, 0.99, 0.992, 0.995, 1);
    --dur-fast: 150ms;
    --dur-normal: 250ms;
    --dur-slow: 400ms;

    /* --- Backgrounds (light-dark) --- */
    --bg-root: light-dark(oklch(96.5% 0.004 80), oklch(9.5% 0.005 270));
    --bg-surface: light-dark(oklch(99% 0.003 80), oklch(13.5% 0.01 270));
    --bg-raised: light-dark(oklch(100% 0 0), oklch(16.5% 0.01 270));
    --bg-input: light-dark(oklch(97.5% 0.004 80), oklch(11% 0.007 270));
    --bg-overlay: light-dark(oklch(99% 0.003 80 / 0.88), oklch(16% 0.012 270 / 0.85));

    /* Hero gradient stops */
    --hero-g1: light-dark(oklch(96% 0.01 280), oklch(15% 0.04 280));
    --hero-g2: light-dark(oklch(93% 0.015 325), oklch(11% 0.03 320));

    /* --- Borders --- */
    --border-subtle: light-dark(oklch(50% 0 0 / 0.07), oklch(50% 0 0 / 0.1));
    --border-default: light-dark(oklch(50% 0 0 / 0.11), oklch(50% 0 0 / 0.15));
    --border-strong: light-dark(oklch(40% 0 0 / 0.16), oklch(60% 0 0 / 0.2));

    /* --- Text --- */
    --text-1: light-dark(oklch(18% 0.01 270), oklch(93% 0.005 270));
    --text-2: light-dark(oklch(38% 0.01 270), oklch(70% 0.01 270));
    --text-3: light-dark(oklch(54% 0.01 270), oklch(48% 0.01 270));
    --text-4: light-dark(oklch(68% 0.01 270), oklch(36% 0.01 270));

    /* --- Accents (constant) --- */
    --accent-green: oklch(80% 0.2 155);
    --accent-pink: oklch(75% 0.2 350);
    --accent-amber: oklch(82% 0.18 85);
    --accent-cyan: oklch(78% 0.15 200);
    --accent-green-dim: light-dark(oklch(80% 0.2 155 / 0.08), oklch(80% 0.2 155 / 0.12));
    --accent-pink-dim: light-dark(oklch(75% 0.2 350 / 0.06), oklch(75% 0.2 350 / 0.08));

    /* --- Semantic --- */
    --danger: oklch(65% 0.22 25);
    --danger-dim: light-dark(oklch(65% 0.22 25 / 0.07), oklch(65% 0.22 25 / 0.1));
    --success: oklch(75% 0.18 155);
    --success-dim: light-dark(oklch(75% 0.18 155 / 0.08), oklch(75% 0.18 155 / 0.12));

    /* --- Glows --- */
    --glow-green: light-dark(oklch(80% 0.2 155 / 0.06), oklch(80% 0.2 155 / 0.15));
    --glow-pink: light-dark(oklch(75% 0.2 350 / 0.04), oklch(75% 0.2 350 / 0.1));

    /* --- Shadow color --- */
    --shadow-color: light-dark(oklch(0% 0 0 / 0.06), oklch(0% 0 0 / 0.3));
    --shadow-card: 0 1px 3px var(--shadow-color), 0 0 0 1px var(--border-subtle);
    --shadow-inset-top: light-dark(
      inset 0 1px 0 oklch(100% 0 0 / 0.5),
      inset 0 1px 0 oklch(100% 0 0 / 0.04)
    );

    /* --- Skeleton --- */
    --skeleton-base: light-dark(oklch(93% 0.004 80), oklch(16% 0.008 270));
    --skeleton-shine: light-dark(oklch(97% 0.003 80), oklch(22% 0.008 270));

    /* --- Toast --- */
    --toast-bg: light-dark(oklch(22% 0.02 270 / 0.92), oklch(20% 0.02 270 / 0.92));
    --toast-text: light-dark(oklch(95% 0 0), oklch(93% 0 0));

    /* --- Hero text --- */
    --hero-number: oklch(88% 0.18 155);
    --hero-label: light-dark(oklch(42% 0.03 270), oklch(56% 0.04 270));
    --hero-sub-val: light-dark(oklch(30% 0.04 270), oklch(78% 0.04 270));
    --hero-sub-label: light-dark(oklch(50% 0.02 270), oklch(46% 0.02 270));

    /* --- Scanline --- */
    --scanline-opacity: light-dark(0, 0.025);

    /* --- Z-index --- */
    --z-base: 1;
    --z-sticky: 100;
    --z-modal: 500;
    --z-toast: 600;
  }
}

/* =========================================================
   BASE
   ========================================================= */
@layer base {
  body {
    font-family: var(--font-body);
    font-size: var(--text-base);
    line-height: var(--leading-normal);
    color: var(--text-1);
    background-color: var(--bg-root);
    transition: background-color var(--dur-slow) var(--ease-out),
                color var(--dur-slow) var(--ease-out);
  }

  ::selection {
    background: oklch(80% 0.2 155 / 0.25);
    color: var(--text-1);
  }

  /* Scanline overlay — dark mode only */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      oklch(0% 0 0 / var(--scanline-opacity)) 2px,
      oklch(0% 0 0 / var(--scanline-opacity)) 4px
    );
    transition: opacity var(--dur-slow) var(--ease-out);
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: oklch(50% 0 0 / 0.2); border-radius: var(--radius-full); }

  h1, h2, h3 { text-wrap: balance; }
  p { text-wrap: pretty; }
}

/* =========================================================
   COMPONENTS
   ========================================================= */
@layer component {

  /* --- App Shell --- */
  .app-shell {
    max-inline-size: var(--container-max);
    margin-inline: auto;
    padding-inline: var(--space-md);
    padding-block-start: var(--space-lg);
    padding-block-end: var(--space-3xl);
    container-type: inline-size;
  }

  /* Skeleton fade-out */
  .app-shell.loading .skel-target { visibility: hidden; opacity: 0; }
  .app-shell.loading .skeleton-block { display: block; }
  .app-shell:not(.loading) .skel-target {
    visibility: visible;
    opacity: 1;
    animation: fade-up var(--dur-slow) var(--ease-spring) both;
  }
  .app-shell:not(.loading) .skeleton-block { display: none; }

  /* --- Header --- */
  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-block-end: var(--space-lg);
    gap: var(--space-md);
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
  }

  .header-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    inline-size: 2.75rem;
    block-size: 2.75rem;
    border-radius: var(--radius-md);
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    box-shadow: var(--shadow-inset-top);
    position: relative;
    overflow: hidden;
  }

  .header-icon svg { inline-size: 1.5rem; block-size: 1.5rem; }

  .header-title {
    font-family: var(--font-display);
    font-size: var(--text-lg);
    font-weight: 700;
    color: var(--text-1);
    letter-spacing: -0.01em;
    line-height: var(--leading-tight);
  }

  .header-title .accent {
    color: var(--accent-green);
  }

  .header-subtitle {
    font-size: var(--text-xs);
    color: var(--text-3);
    margin-block-start: 0.125rem;
    font-family: var(--font-pixel);
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: var(--space-xs);
  }

  .save-indicator {
    display: flex;
    align-items: center;
    gap: var(--space-2xs);
    font-size: var(--text-xs);
    color: var(--accent-green);
    font-weight: 500;
    opacity: 0;
    transition: opacity var(--dur-fast) var(--ease-out);
  }

  .save-indicator.visible {
    opacity: 1;
    animation: save-fade 1.8s var(--ease-out) forwards;
  }

  @keyframes save-fade {
    0% { opacity: 1; }
    75% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* --- Theme Toggle --- */
  .theme-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    inline-size: 2.25rem;
    block-size: 2.25rem;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-subtle);
    background: var(--bg-surface);
    color: var(--text-2);
    transition: background var(--dur-fast) var(--ease-out),
                color var(--dur-fast) var(--ease-out),
                border-color var(--dur-fast) var(--ease-out),
                transform var(--dur-fast) var(--ease-spring);
  }
  .theme-toggle:hover {
    color: var(--accent-amber);
    border-color: var(--border-strong);
    transform: translateY(-1px);
  }
  .theme-toggle:active { transform: translateY(0) scale(0.95); }
  .theme-toggle .material-symbols-outlined {
    font-size: 20px;
    transition: transform var(--dur-normal) var(--ease-spring);
  }
  .theme-toggle:hover .material-symbols-outlined { transform: rotate(25deg); }

  /* --- Hero Card --- */
  .hero-card {
    background: linear-gradient(135deg, var(--hero-g1), var(--hero-g2));
    border-radius: var(--radius-xl);
    padding: var(--space-lg) var(--space-xl);
    margin-block-end: var(--space-md);
    border: 1px solid var(--border-default);
    position: relative;
    overflow: hidden;
  }

  .hero-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 55% 50% at 75% 20%, var(--glow-green), transparent),
      radial-gradient(ellipse 35% 40% at 20% 80%, var(--glow-pink), transparent);
    pointer-events: none;
  }

  /* Pixel dots */
  .hero-card::after {
    content: '';
    position: absolute;
    inset-block-start: var(--space-sm);
    inset-inline-end: var(--space-sm);
    inline-size: 4px;
    block-size: 4px;
    background: var(--accent-pink);
    box-shadow:
      6px 0 0 var(--accent-amber),
      12px 0 0 var(--accent-green),
      0 6px 0 oklch(50% 0 0 / 0.12),
      6px 6px 0 oklch(50% 0 0 / 0.08);
    opacity: 0.7;
    pointer-events: none;
  }

  .hero-inner {
    position: relative;
    z-index: var(--z-base);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: var(--space-md);
    flex-wrap: wrap;
  }

  .hero-main { flex: 1 1 auto; }

  .hero-label {
    font-size: var(--text-xs);
    font-weight: 600;
    color: var(--hero-label);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: var(--font-pixel);
  }

  .hero-count {
    display: block;
    font-family: var(--font-mono);
    font-size: var(--text-hero);
    font-weight: 600;
    color: var(--hero-number);
    line-height: var(--leading-tight);
    margin-block-start: var(--space-2xs);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.03em;
    text-shadow: 0 0 40px var(--glow-green);
    transition: transform var(--dur-fast) var(--ease-spring);
  }
  .hero-count.bump { transform: scale(1.04); }

  .hero-sub {
    display: flex;
    flex-direction: column;
    gap: var(--space-xs);
    align-items: flex-end;
    flex-shrink: 0;
  }

  .hero-sub-row {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
  }

  .hero-sub-row__label {
    font-size: var(--text-xs);
    color: var(--hero-sub-label);
    white-space: nowrap;
  }

  .hero-sub-row__value {
    font-family: var(--font-mono);
    font-size: var(--text-base);
    font-weight: 500;
    color: var(--hero-sub-val);
    font-variant-numeric: tabular-nums;
    min-inline-size: 2.5em;
    text-align: end;
    transition: transform var(--dur-fast) var(--ease-spring);
  }
  .hero-sub-row__value.bump { transform: scale(1.06); }

  /* --- Issue Bar --- */
  .issue-bar {
    display: flex;
    align-items: center;
    gap: var(--space-xs);
    flex-wrap: wrap;
    min-block-size: 2rem;
    margin-block-end: var(--space-md);
    container-type: inline-size;
  }

  .issue-badge {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2xs);
    block-size: 1.75rem;
    padding-inline: var(--space-sm);
    border-radius: var(--radius-full);
    font-size: var(--text-xs);
    font-weight: 600;
    letter-spacing: 0.01em;
    animation: badge-pop var(--dur-normal) var(--ease-bounce) both;
  }

  @keyframes badge-pop {
    from { opacity: 0; transform: scale(0.8) translateY(4px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .issue-badge--warn {
    background: var(--danger-dim);
    color: var(--danger);
    border: 1px solid oklch(65% 0.22 25 / 0.2);
  }

  .issue-badge--clean {
    background: var(--success-dim);
    color: var(--success);
    border: 1px solid oklch(75% 0.18 155 / 0.2);
  }

  .issue-badge .material-symbols-outlined { font-size: 14px; }

  .issue-badge__fix {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    inline-size: 1.125rem;
    block-size: 1.125rem;
    border-radius: var(--radius-full);
    margin-inline-start: var(--space-2xs);
    background: oklch(65% 0.22 25 / 0.15);
    color: var(--danger);
    font-size: 12px;
    transition: all var(--dur-fast) var(--ease-spring);
  }
  .issue-badge__fix:hover {
    background: var(--danger);
    color: oklch(100% 0 0);
    transform: scale(1.1);
  }
  .issue-badge__fix:active { transform: scale(0.9); }
  .issue-badge__fix .material-symbols-outlined { font-size: 12px; }

  /* --- Buttons --- */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-2xs);
    padding-inline: var(--space-md);
    padding-block: var(--space-xs);
    border-radius: var(--radius-sm);
    font-size: var(--text-sm);
    font-weight: 600;
    white-space: nowrap;
    transition: all var(--dur-fast) var(--ease-spring);
    position: relative;
    overflow: hidden;
    letter-spacing: 0.01em;
  }
  .btn .material-symbols-outlined { font-size: 16px; }

  .btn--primary {
    background: linear-gradient(135deg, var(--accent-green), oklch(70% 0.18 180));
    color: oklch(12% 0.02 155);
    border: 1px solid oklch(80% 0.2 155 / 0.3);
  }
  .btn--primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px var(--glow-green);
  }
  .btn--primary:active { transform: translateY(0) scale(0.97); box-shadow: none; }

  .btn--secondary {
    background: transparent;
    color: var(--text-2);
    border: 1px solid var(--border-default);
  }
  .btn--secondary:hover {
    background: var(--bg-raised);
    border-color: var(--border-strong);
    color: var(--text-1);
    transform: translateY(-1px);
  }
  .btn--secondary:active { transform: scale(0.97); }

  .btn--ghost {
    background: transparent;
    color: var(--text-3);
    border: 1px solid transparent;
  }
  .btn--ghost:hover {
    color: var(--text-2);
    border-color: var(--border-subtle);
    background: var(--bg-surface);
  }
  .btn--ghost:active { transform: scale(0.96); }

  .btn--danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid transparent;
  }
  .btn--danger:hover {
    background: var(--danger-dim);
    border-color: var(--danger);
    transform: translateY(-1px);
  }
  .btn--danger:active { transform: scale(0.96); }

  .btn--pill {
    border-radius: var(--radius-full);
    padding-inline: var(--space-md);
    block-size: 1.875rem;
  }

  /* Copy feedback */
  .btn--copy-done .material-symbols-outlined {
    animation: check-morph var(--dur-normal) var(--ease-spring);
  }
  @keyframes check-morph {
    0% { transform: scale(0) rotate(-45deg); }
    60% { transform: scale(1.2) rotate(5deg); }
    100% { transform: scale(1) rotate(0); }
  }

  /* --- Editor Panel --- */
  .editor-panel {
    background: var(--bg-surface);
    border-radius: var(--radius-xl);
    border: 1px solid var(--border-subtle);
    box-shadow: var(--shadow-card);
    overflow: hidden;
    transition: border-color var(--dur-fast) var(--ease-out);
  }
  .editor-panel:focus-within { border-color: var(--border-default); }

  .editor-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-inline: var(--space-md);
    padding-block: var(--space-xs);
    border-block-end: 1px solid var(--border-subtle);
    background: var(--bg-raised);
  }

  .toolbar-left {
    display: flex;
    align-items: center;
    gap: var(--space-xs);
  }

  .toolbar-dot {
    inline-size: 6px;
    block-size: 6px;
    border-radius: var(--radius-full);
    background: var(--accent-green);
    opacity: 0.4;
    transition: opacity var(--dur-normal);
  }
  .editor-panel:focus-within .toolbar-dot {
    opacity: 1;
    animation: dot-pulse 2s ease infinite;
  }
  @keyframes dot-pulse {
    0%, 100% { box-shadow: 0 0 0 0 oklch(80% 0.2 155 / 0.3); }
    50% { box-shadow: 0 0 0 5px transparent; }
  }

  .toolbar-label {
    font-size: var(--text-xs);
    font-weight: 600;
    color: var(--text-3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-family: var(--font-pixel);
  }

  .toolbar-right { display: flex; gap: var(--space-2xs); }

  .tool-btn {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    block-size: 1.75rem;
    padding-inline: var(--space-xs);
    border-radius: var(--radius-xs);
    font-size: var(--text-xs);
    font-weight: 500;
    color: var(--text-3);
    transition: all var(--dur-fast) var(--ease-spring);
  }
  .tool-btn:hover { color: var(--text-2); background: var(--bg-input); }
  .tool-btn:active { transform: scale(0.96); }
  .tool-btn .material-symbols-outlined { font-size: 15px; }

  /* Textarea area */
  .editor-body { position: relative; }

  .editor-textarea {
    display: block;
    inline-size: 100%;
    min-block-size: 14rem;
    padding: var(--space-md);
    background: var(--bg-input);
    color: var(--text-1);
    font-size: 15px;
    line-height: var(--leading-relaxed);
    font-family: var(--font-body);
    transition: background var(--dur-fast) var(--ease-out);
  }
  .editor-textarea::placeholder { color: var(--text-4); }
  .editor-textarea:focus { background: var(--bg-surface); }

  /* --- Empty State --- */
  .empty-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: var(--space-xl);
    text-align: center;
    pointer-events: none;
    opacity: 1;
    transition: opacity var(--dur-normal) var(--ease-out);
    z-index: 2;
  }
  .empty-state.hidden { opacity: 0; pointer-events: none; }
  .empty-state:not(.hidden) { pointer-events: auto; }

  .empty-state__illustration {
    margin-block-end: var(--space-md);
    opacity: 0.65;
  }

  .empty-state__message {
    font-size: var(--text-base);
    color: var(--text-3);
    margin-block-end: var(--space-md);
    font-family: var(--font-pixel);
    max-inline-size: 24rem;
    line-height: var(--leading-normal);
  }

  /* --- Diff Panel --- */
  .diff-panel {
    border-block-start: 1px solid var(--border-subtle);
    background: var(--bg-raised);
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows var(--dur-normal) var(--ease-out);
  }
  .diff-panel.open { grid-template-rows: 1fr; }

  .diff-panel__inner { overflow: hidden; }

  .diff-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-xs) var(--space-md);
    border-block-end: 1px solid var(--border-subtle);
  }

  .diff-title {
    display: flex;
    align-items: center;
    gap: var(--space-2xs);
    font-size: var(--text-xs);
    font-weight: 600;
    color: var(--accent-cyan);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-family: var(--font-pixel);
  }
  .diff-title .material-symbols-outlined { font-size: 14px; }

  .diff-close {
    display: flex;
    align-items: center;
    justify-content: center;
    inline-size: 1.5rem;
    block-size: 1.5rem;
    border-radius: var(--radius-xs);
    color: var(--text-3);
    transition: all var(--dur-fast) var(--ease-out);
  }
  .diff-close:hover { color: var(--text-1); background: var(--bg-input); }
  .diff-close .material-symbols-outlined { font-size: 14px; }

  .diff-body {
    padding: var(--space-sm) var(--space-md);
    font-size: var(--text-sm);
    line-height: var(--leading-relaxed);
    color: var(--text-2);
    max-block-size: 12rem;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    font-family: var(--font-mono);
  }

  .diff-rm {
    background: oklch(65% 0.22 25 / 0.15);
    color: oklch(70% 0.2 25);
    text-decoration: line-through;
    border-radius: 2px;
    padding-inline: 2px;
  }

  /* --- Editor Footer / Privacy --- */
  .editor-footer {
    padding: var(--space-xs) var(--space-md);
    border-block-start: 1px solid var(--border-subtle);
    background: var(--bg-raised);
    display: flex;
    align-items: center;
    gap: var(--space-2xs);
    font-size: var(--text-xs);
    color: var(--text-4);
  }
  .editor-footer .material-symbols-outlined { font-size: 13px; color: var(--accent-green); }

  /* --- Toast --- */
  .toast-container {
    position: fixed;
    inset-block-end: var(--space-lg);
    inset-inline: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--space-xs);
    pointer-events: none;
    z-index: var(--z-toast);
  }

  .toast {
    display: inline-flex;
    align-items: center;
    gap: var(--space-xs);
    padding-inline: var(--space-md);
    padding-block: var(--space-xs);
    border-radius: var(--radius-full);
    font-size: var(--text-sm);
    font-weight: 500;
    color: var(--toast-text);
    background: var(--toast-bg);
    backdrop-filter: blur(12px) saturate(1.2);
    -webkit-backdrop-filter: blur(12px) saturate(1.2);
    border: 1px solid oklch(50% 0 0 / 0.12);
    pointer-events: auto;
    animation: toast-in var(--dur-normal) var(--ease-bounce),
               toast-out var(--dur-normal) var(--ease-out) 1.6s forwards;
  }
  .toast .material-symbols-outlined { font-size: 16px; }

  @keyframes toast-in {
    0% { opacity: 0; transform: translateY(16px) scale(0.9); }
    60% { opacity: 1; transform: translateY(-4px) scale(1.02); }
    100% { transform: translateY(0) scale(1); }
  }
  @keyframes toast-out {
    0% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-8px) scale(0.95); }
  }

  /* --- Modal Dialog --- */
  dialog.modal {
    position: fixed;
    inset: 0;
    margin: auto;
    max-inline-size: 24rem;
    inline-size: calc(100% - var(--space-xl) * 2);
    padding: var(--space-lg);
    border-radius: var(--radius-lg);
    background: var(--bg-overlay);
    color: var(--text-1);
    backdrop-filter: blur(20px) saturate(1.3);
    -webkit-backdrop-filter: blur(20px) saturate(1.3);
    border: 1px solid var(--border-default);
    box-shadow: 0 24px 48px oklch(0% 0 0 / 0.35);
    z-index: var(--z-modal);
  }

  dialog.modal::backdrop {
    background: oklch(0% 0 0 / 0.45);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    animation: fade-in var(--dur-normal) var(--ease-out);
  }

  dialog.modal[open] { animation: modal-in var(--dur-normal) var(--ease-spring); }

  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes modal-in {
    from { opacity: 0; transform: scale(0.92) translateY(12px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal__title {
    font-family: var(--font-display);
    font-size: var(--text-lg);
    font-weight: 700;
    margin-block-end: var(--space-xs);
  }

  .modal__body {
    font-size: var(--text-base);
    color: var(--text-2);
    margin-block-end: var(--space-lg);
    line-height: var(--leading-normal);
  }

  .modal__actions {
    display: flex;
    gap: var(--space-xs);
    justify-content: flex-end;
  }

  /* --- Skeleton --- */
  .skeleton-block {
    background: var(--skeleton-base);
    border-radius: var(--radius-sm);
    position: relative;
    overflow: hidden;
    display: none;
  }

  .skeleton-block::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, var(--skeleton-shine), transparent);
    animation: shimmer 1.5s infinite;
  }

  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  .skeleton-hero {
    block-size: 7.5rem;
    border-radius: var(--radius-xl);
    margin-block-end: var(--space-md);
  }

  .skeleton-badges {
    block-size: 2rem;
    margin-block-end: var(--space-md);
  }

  .skeleton-editor {
    block-size: 18rem;
    border-radius: var(--radius-xl);
  }

  /* --- Scroll Reveal --- */
  .reveal {
    animation: reveal-up both;
    animation-timeline: view();
    animation-range: entry 0% entry 20%;
  }

  @keyframes reveal-up {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* --- Fade up (JS triggered) --- */
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* --- Footer --- */
  .site-footer {
    margin-block-start: var(--space-2xl);
    padding-block: var(--space-lg);
    text-align: center;
    border-block-start: 1px solid var(--border-subtle);
  }

  .footer-copy {
    font-size: var(--text-xs);
    color: var(--text-4);
    font-family: var(--font-pixel);
  }

  /* --- Shake animation --- */
  .shake {
    animation: shake-x var(--dur-normal) var(--ease-spring);
  }
  @keyframes shake-x {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-4px); }
    40% { transform: translateX(4px); }
    60% { transform: translateX(-2px); }
    80% { transform: translateX(2px); }
  }

  /* --- Container responsive --- */
  @container (max-width: 480px) {
    .hero-inner { flex-direction: column; align-items: flex-start; }
    .hero-sub { align-items: flex-start; flex-direction: row; gap: var(--space-md); flex-wrap: wrap; }
    .hero-count { font-size: 2.5rem; }
    .toolbar-right { flex-wrap: wrap; }
  }
}

/* =========================================================
   UTILITIES
   ========================================================= */
@layer utility {
  .visually-hidden {
    position: absolute;
    inline-size: 1px; block-size: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0 0 0 0);
    clip-path: inset(50%);
    white-space: nowrap; border: 0;
  }

  .hidden { display: none !important; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
    body::after { display: none; }
  }
}
</style>
</head>

<script>
/* =========================================================
   Utility helpers
   ========================================================= */
const qs = (sel, root = document) => root.querySelector(sel);
const qsa = (sel, root = document) => [...root.querySelectorAll(sel)];

/* =========================================================
   DOM References ($-prefixed)
   ========================================================= */
const $app = qs('#js-app');
const $textarea = qs('#js-textarea');
const $countTotal = qs('#js-count-total');
const $countNospace = qs('#js-count-nospace');
const $countPure = qs('#js-count-pure');
const $countHalf = qs('#js-count-half');
const $countLines = qs('#js-count-lines');
const $issueBar = qs('#js-issue-bar');
const $emptyState = qs('#js-empty');
const $emptyPaste = qs('#js-empty-paste');
const $btnCopy = qs('#js-btn-copy');
const $btnPaste = qs('#js-btn-paste');
const $btnClear = qs('#js-btn-clear');
const $btnUndo = qs('#js-btn-undo');
const $btnDiff = qs('#js-btn-diff');
const $diffPanel = qs('#js-diff-panel');
const $diffBody = qs('#js-diff-body');
const $diffClose = qs('#js-diff-close');
const $saveInd = qs('#js-save-ind');
const $themeToggle = qs('#js-theme-toggle');
const $toastContainer = qs('#js-toast-container');
const $dialog = qs('#js-dialog');
const $dialogCancel = qs('#js-dialog-cancel');
const $dialogConfirm = qs('#js-dialog-confirm');

const STORAGE_KEY = 'textforge_text';
const THEME_KEY = 'textforge_theme';

/* State */
let undoStack = [];
let lastDiffHtml = '';

/* =========================================================
   Theme Management (color-scheme toggle)
   ========================================================= */
const getStoredTheme = () => {
  try { return localStorage.getItem(THEME_KEY); } catch { return null; }
};

const applyTheme = (theme) => {
  document.documentElement.style.colorScheme = theme;
  document.documentElement.setAttribute('data-theme', theme);
  const $icon = qs('.material-symbols-outlined', $themeToggle);
  $icon.textContent = theme === 'dark' ? 'light_mode' : 'dark_mode';
  try { localStorage.setItem(THEME_KEY, theme); } catch {}
};

const toggleTheme = () => {
  const current = document.documentElement.getAttribute('data-theme') ?? 'dark';
  applyTheme(current === 'dark' ? 'light' : 'dark');
};

applyTheme(getStoredTheme() ?? 'dark');
$themeToggle.addEventListener('click', toggleTheme);

/* =========================================================
   Character Analysis
   ========================================================= */
const isHalfwidth = (char) => {
  const code = char.codePointAt(0);
  return (code >= 0x0020 && code <= 0x007E) || (code >= 0xFF61 && code <= 0xFF9F);
};

const analyze = (text) => {
  const chars = [...text];
  const total = chars.length;
  const noSpace = [...text.replace(/[ \t\u3000]/g, '')].length;
  const pure = [...text.replace(/[\s\u3000]/g, '')].length;
  const lines = text === '' ? 0 : text.split('\n').length;

  let halfCount = 0;
  for (const c of chars) {
    if (/[\r\n]/.test(c)) continue;
    halfCount += isHalfwidth(c) ? 0.5 : 1;
  }

  return { total, noSpace, pure, halfCount, lines };
};

/* =========================================================
   Cleaning Rules
   ========================================================= */
const RULES = [
  {
    id: 'zero-width',
    label: 'ゼロ幅文字',
    icon: 'visibility_off',
    test: (t) => (t.match(/[\u200B\u200C\u200D\uFEFF\u00AD\u2060\u180E]/g) ?? []).length,
    clean: (t) => t.replace(/[\u200B\u200C\u200D\uFEFF\u00AD\u2060\u180E]/g, ''),
  },
  {
    id: 'markdown',
    label: 'Markdown記号',
    icon: 'tag',
    test: (t) => (t.match(/^#{1,6}\s|(?:^|\n)\*{1,3}(?=\S)|(?:^|\n)-{3,}|(?:^|\n)>\s|\*{1,2}[^*\n]+\*{1,2}|`[^`\n]+`|~~[^~\n]+~~|\[([^\]]+)\]\([^)]+\)/gm) ?? []).length,
    clean: (t) => {
      let r = t;
      r = r.replace(/^(#{1,6})\s+/gm, '');
      r = r.replace(/\*{1,3}([^*\n]+)\*{1,3}/g, '$1');
      r = r.replace(/~~([^~\n]+)~~/g, '$1');
      r = r.replace(/`([^`\n]+)`/g, '$1');
      r = r.replace(/\[([^\]]+)\]\([^)]+\)/g, '$1');
      r = r.replace(/^>\s+/gm, '');
      r = r.replace(/^-{3,}$/gm, '');
      r = r.replace(/^(\*|-|\+)\s+/gm, '');
      return r;
    },
  },
  {
    id: 'multi-blank',
    label: '連続空行',
    icon: 'density_large',
    test: (t) => {
      const m = t.match(/\n{3,}/g);
      return m ? m.reduce((a, v) => a + v.length - 2, 0) : 0;
    },
    clean: (t) => t.replace(/\n{3,}/g, '\n\n'),
  },
  {
    id: 'multi-space',
    label: '連続空白',
    icon: 'space_bar',
    test: (t) => {
      const m = t.match(/[^\S\n]{2,}/g);
      return m ? m.reduce((a, v) => a + v.length - 1, 0) : 0;
    },
    clean: (t) => t.replace(/[^\S\n]{2,}/g, ' '),
  },
  {
    id: 'trailing',
    label: '行末空白',
    icon: 'keyboard_tab',
    test: (t) => (t.match(/[ \t\u3000]+$/gm) ?? []).length,
    clean: (t) => t.replace(/[ \t\u3000]+$/gm, ''),
  },
];

const detectIssues = (text) =>
  RULES.map((r) => ({ ...r, count: r.test(text) })).filter((r) => r.count > 0);

const cleanByRule = (text, ruleId) => {
  const rule = RULES.find((r) => r.id === ruleId);
  return rule ? rule.clean(text) : text;
};

const cleanAll = (text) => RULES.reduce((t, r) => r.clean(t), text);

/* =========================================================
   Diff Generation
   ========================================================= */
const generateDiffHtml = (original, cleaned) => {
  const oChars = [...original];
  const cStr = [...cleaned];
  const segments = [];
  let ci = 0;
  let rmBuf = '';
  let keepBuf = '';

  for (const ch of oChars) {
    if (ci < cStr.length && ch === cStr[ci]) {
      if (rmBuf) { segments.push({ type: 'rm', text: rmBuf }); rmBuf = ''; }
      keepBuf += ch;
      ci++;
    } else {
      if (keepBuf) { segments.push({ type: 'keep', text: keepBuf }); keepBuf = ''; }
      rmBuf += ch;
    }
  }
  if (keepBuf) segments.push({ type: 'keep', text: keepBuf });
  if (rmBuf) segments.push({ type: 'rm', text: rmBuf });

  return segments.map((s) => {
    const escaped = s.text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '↵\n')
      .replace(/ /g, '·')
      .replace(/\t/g, '→');
    return s.type === 'rm' ? `<span class="diff-rm">${escaped}</span>` : escaped;
  }).join('');
};

/* =========================================================
   DOM update helpers
   ========================================================= */
const bumpEl = ($el) => {
  $el.classList.remove('bump');
  void $el.offsetWidth;
  $el.classList.add('bump');
  setTimeout(() => $el.classList.remove('bump'), 200);
};

const updateEl = ($el, value) => {
  const formatted = typeof value === 'number' && value % 1 !== 0
    ? value.toLocaleString(undefined, { minimumFractionDigits: 1, maximumFractionDigits: 1 })
    : Number(value).toLocaleString();
  if ($el.textContent !== formatted) {
    $el.textContent = formatted;
    bumpEl($el);
  }
};

/* =========================================================
   Update metrics
   ========================================================= */
const updateMetrics = () => {
  const { total, noSpace, pure, halfCount, lines } = analyze($textarea.value);
  updateEl($countTotal, total);
  updateEl($countNospace, noSpace);
  updateEl($countPure, pure);
  updateEl($countHalf, halfCount);
  updateEl($countLines, lines);
};

/* =========================================================
   Update issue badges
   ========================================================= */
const updateIssues = () => {
  const text = $textarea.value;
  const issues = detectIssues(text);
  $issueBar.innerHTML = '';

  if (text.length === 0) return;

  if (issues.length === 0) {
    const badge = document.createElement('span');
    badge.className = 'issue-badge issue-badge--clean';
    badge.innerHTML = `<span class="material-symbols-outlined">check_circle</span>クリーン`;
    $issueBar.appendChild(badge);
    return;
  }

  /* Individual issue badges */
  issues.forEach((issue, i) => {
    const badge = document.createElement('span');
    badge.className = 'issue-badge issue-badge--warn';
    badge.style.animationDelay = `${i * 40}ms`;
    badge.innerHTML = `
      <span class="material-symbols-outlined">${issue.icon}</span>
      ${issue.label} <strong>${issue.count}</strong>
      <button class="issue-badge__fix" data-rule="${issue.id}" title="${issue.label}を除去">
        <span class="material-symbols-outlined">close</span>
      </button>`;
    $issueBar.appendChild(badge);
  });

  /* Bulk clean button */
  if (issues.length > 0) {
    const totalCount = issues.reduce((a, r) => a + r.count, 0);
    const btn = document.createElement('button');
    btn.className = 'btn btn--primary btn--pill';
    btn.id = 'js-btn-clean-all';
    btn.innerHTML = `<span class="material-symbols-outlined">auto_fix_high</span>一括クリーン (${totalCount})`;
    btn.addEventListener('click', handleCleanAll);
    btn.style.animation = `badge-pop var(--dur-normal) var(--ease-bounce) ${issues.length * 40}ms both`;
    $issueBar.appendChild(btn);
  }

  /* Individual fix button events */
  qsa('.issue-badge__fix', $issueBar).forEach(($btn) => {
    $btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const ruleId = $btn.dataset.rule;
      handleCleanSingle(ruleId);
    });
  });
};

/* =========================================================
   Clean handlers
   ========================================================= */
const performClean = (newText, label) => {
  const original = $textarea.value;
  if (original === newText) {
    showToast('変更箇所がありません', 'info');
    return;
  }

  undoStack.push(original);
  $textarea.value = newText;

  lastDiffHtml = generateDiffHtml(original, newText);
  $diffBody.innerHTML = lastDiffHtml;

  $btnUndo.classList.remove('hidden');
  $btnDiff.classList.remove('hidden');

  updateMetrics();
  updateIssues();
  updateEmptyState();
  saveToStorage();

  const removed = [...original].length - [...newText].length;
  showToast(`${label}: ${removed}文字を除去`, 'success');
};

const handleCleanAll = () => {
  performClean(cleanAll($textarea.value), '一括クリーン');
};

const handleCleanSingle = (ruleId) => {
  const rule = RULES.find((r) => r.id === ruleId);
  if (!rule) return;
  performClean(cleanByRule($textarea.value, ruleId), rule.label);
};

/* =========================================================
   Empty state
   ========================================================= */
const updateEmptyState = () => {
  const hasText = $textarea.value.length > 0;
  $emptyState.classList.toggle('hidden', hasText);
};

/* =========================================================
   Storage
   ========================================================= */
const saveToStorage = () => {
  try { localStorage.setItem(STORAGE_KEY, $textarea.value); } catch {}
  $saveInd.classList.remove('visible');
  void $saveInd.offsetWidth;
  $saveInd.classList.add('visible');
};

const loadFromStorage = () => {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved !== null) $textarea.value = saved;
  } catch {}
};

/* =========================================================
   Toast
   ========================================================= */
const showToast = (message, type = 'success') => {
  const icons = { success: 'check_circle', info: 'info', error: 'error' };
  const $toast = document.createElement('div');
  $toast.className = `toast`;
  $toast.innerHTML = `<span class="material-symbols-outlined" style="color:${type === 'success' ? 'var(--success)' : type === 'error' ? 'var(--danger)' : 'var(--accent-cyan)'}">${icons[type] ?? 'info'}</span>${message}`;
  $toastContainer.appendChild($toast);
  setTimeout(() => $toast.remove(), 2200);
};

/* =========================================================
   Modal (dialog)
   ========================================================= */
let modalResolve = null;

const showDialog = ({ title, body }) => {
  qs('#js-dialog-title').textContent = title;
  qs('#js-dialog-body').textContent = body;
  $dialog.showModal();
  return new Promise((resolve) => { modalResolve = resolve; });
};

$dialogCancel.addEventListener('click', () => { $dialog.close(); modalResolve?.(false); });
$dialogConfirm.addEventListener('click', () => { $dialog.close(); modalResolve?.(true); });
$dialog.addEventListener('click', (e) => {
  if (e.target === $dialog) { $dialog.close(); modalResolve?.(false); }
});
$dialog.addEventListener('close', () => { modalResolve?.(false); modalResolve = null; });

/* =========================================================
   Copy with icon morph feedback
   ========================================================= */
const handleCopy = async () => {
  if (!$textarea.value) {
    showToast('テキストがありません', 'info');
    return;
  }
  try {
    await navigator.clipboard.writeText($textarea.value);
  } catch {
    $textarea.select();
    document.execCommand('copy');
  }

  const $icon = qs('.material-symbols-outlined', $btnCopy);
  const originalText = $icon.textContent;
  $icon.textContent = 'check';
  $btnCopy.classList.add('btn--copy-done');
  showToast('コピーしました');

  setTimeout(() => {
    $icon.textContent = originalText;
    $btnCopy.classList.remove('btn--copy-done');
  }, 1200);
};

/* =========================================================
   Paste handler
   ========================================================= */
const handlePaste = async () => {
  try {
    const text = await navigator.clipboard.readText();
    $textarea.value = text;
    updateMetrics();
    updateIssues();
    updateEmptyState();
    saveToStorage();
    $textarea.focus();
  } catch {
    showToast('ペーストに失敗しました', 'error');
    $textarea.focus();
  }
};

/* =========================================================
   Event Listeners
   ========================================================= */

/* Textarea input */
$textarea.addEventListener('input', () => {
  updateMetrics();
  updateIssues();
  updateEmptyState();
  saveToStorage();
});

/* Paste auto-detect */
$textarea.addEventListener('paste', () => {
  setTimeout(() => {
    updateMetrics();
    updateIssues();
    updateEmptyState();
    saveToStorage();
  }, 0);
});

/* Focus/blur for empty state */
$textarea.addEventListener('focus', () => { $emptyState.classList.add('hidden'); });
$textarea.addEventListener('blur', () => { updateEmptyState(); });
$emptyState.addEventListener('click', (e) => {
  if (e.target.closest('button')) return;
  $textarea.focus();
});

/* Copy */
$btnCopy.addEventListener('click', handleCopy);

/* Paste buttons */
$btnPaste.addEventListener('click', handlePaste);
$emptyPaste.addEventListener('click', handlePaste);

/* Clear */
$btnClear.addEventListener('click', async () => {
  if (!$textarea.value) return;
  const confirmed = await showDialog({
    title: 'テキストを消去しますか？',
    body: 'この操作は元に戻せません。入力したテキストがすべて削除されます。',
  });
  if (confirmed) {
    $textarea.value = '';
    undoStack = [];
    lastDiffHtml = '';
    $btnUndo.classList.add('hidden');
    $btnDiff.classList.add('hidden');
    $diffPanel.classList.remove('open');
    try { localStorage.removeItem(STORAGE_KEY); } catch {}
    updateMetrics();
    updateIssues();
    updateEmptyState();
    showToast('消去しました', 'info');
  }
});

/* Undo */
$btnUndo.addEventListener('click', () => {
  if (undoStack.length === 0) return;
  $textarea.value = undoStack.pop();
  if (undoStack.length === 0) {
    $btnUndo.classList.add('hidden');
  }
  $btnDiff.classList.add('hidden');
  $diffPanel.classList.remove('open');
  lastDiffHtml = '';
  updateMetrics();
  updateIssues();
  updateEmptyState();
  saveToStorage();
  showToast('元に戻しました', 'info');
});

/* Diff toggle */
$btnDiff.addEventListener('click', () => {
  $diffPanel.classList.toggle('open');
});

$diffClose.addEventListener('click', () => {
  $diffPanel.classList.remove('open');
});

/* =========================================================
   Skeleton → Reveal transition
   ========================================================= */
const initApp = () => {
  loadFromStorage();
  updateMetrics();
  updateIssues();
  updateEmptyState();

  /* Remove skeleton after a short delay for the shimmer effect */
  setTimeout(() => {
    $app.classList.remove('loading');
  }, 400);
};

/* =========================================================
   Boot
   ========================================================= */
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initApp);
} else {
  initApp();
}
</script>
</body>
</html>
