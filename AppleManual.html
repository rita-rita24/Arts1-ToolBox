<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ManualCrafter - Elegant Manual Generator</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           1. CSS Variables & Design System (8px Grid)
           ========================================================================== */
        :root {
            /* Colors */
            --c-bg: #F5F5F7;
            --c-surface: #FFFFFF;
            --c-text-primary: #1D1D1F;
            --c-text-secondary: #86868B;
            --c-text-tertiary: #A1A1A6;
            --c-accent: #0071E3;
            --c-accent-hover: #0077ED;
            --c-border: #D2D2D7;
            --c-border-focus: #0071E3;
            --c-danger: #FF3B30;
            --c-danger-hover: #FF453A;

            /* Typography */
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --text-h1: 600 32px/1.2 var(--font-family);
            --text-h2: 600 24px/1.2 var(--font-family);
            --text-body: 400 16px/1.5 var(--font-family);
            --text-caption: 400 14px/1.4 var(--font-family);
            --text-button: 500 16px/1 var(--font-family);

            /* Spacing (8px Grid System) */
            --s-1: 8px;
            --s-2: 16px;
            --s-3: 24px;
            --s-4: 32px;
            --s-6: 48px;

            /* Effects */
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --transition-standard: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        /* ==========================================================================
           2. Reset & Base Styles
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--c-bg);
            color: var(--c-text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        h1, h2, h3 { color: var(--c-text-primary); }
        
        /* ==========================================================================
           3. Layout & Structure
           ========================================================================== */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--s-2) var(--s-4);
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .app-title {
            font: var(--text-h2);
            font-size: 20px;
            letter-spacing: -0.02em;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--s-4);
            padding: var(--s-4);
            flex: 1;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        @media (min-width: 992px) {
            .main-container {
                grid-template-columns: 400px 1fr; /* Fixed left input, fluid right preview */
                height: calc(100vh - 70px);
                overflow: hidden;
            }
        }

        /* ==========================================================================
           4. Input Section (Left Pane)
           ========================================================================== */
        .editor-pane {
            background-color: var(--c-surface);
            border-radius: var(--radius-lg);
            padding: var(--s-4);
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            gap: var(--s-3);
            overflow-y: auto;
            /* Scrollbar styling for elegance */
            scrollbar-width: thin;
            scrollbar-color: var(--c-border) transparent;
        }

        .editor-pane::-webkit-scrollbar { width: 6px; }
        .editor-pane::-webkit-scrollbar-thumb { background-color: var(--c-border); border-radius: 4px; }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: var(--s-1);
        }

        label {
            font: var(--text-caption);
            color: var(--c-text-secondary);
            font-weight: 500;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: var(--s-2);
            border: 1px solid var(--c-border);
            border-radius: var(--radius-md);
            font: var(--text-body);
            color: var(--c-text-primary);
            background-color: var(--c-surface);
            transition: var(--transition-standard);
            outline: none;
        }

        input[type="text"]:hover, textarea:hover {
            border-color: #a1a1a6;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: var(--c-border-focus);
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Steps List */
        .steps-container {
            display: flex;
            flex-direction: column;
            gap: var(--s-3);
        }

        .step-item {
            position: relative;
            padding: var(--s-3);
            border: 1px solid var(--c-border);
            border-radius: var(--radius-md);
            background-color: #FAFAFA;
            display: flex;
            flex-direction: column;
            gap: var(--s-2);
            animation: slideIn 0.3s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .step-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font: var(--text-caption);
            font-weight: 600;
            color: var(--c-text-primary);
        }

        /* ==========================================================================
           5. Buttons & Controls
           ========================================================================== */
        button {
            cursor: pointer;
            border: none;
            border-radius: var(--radius-md);
            font: var(--text-button);
            padding: var(--s-2) var(--s-3);
            transition: var(--transition-standard);
            outline: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--s-1);
        }

        button:active { transform: scale(0.98); }
        
        button:focus-visible {
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.3);
        }

        .btn-primary {
            background-color: var(--c-accent);
            color: #FFF;
        }

        .btn-primary:hover { background-color: var(--c-accent-hover); }

        .btn-secondary {
            background-color: #F0F0F2;
            color: var(--c-text-primary);
        }

        .btn-secondary:hover { background-color: #E5E5EA; }

        .btn-icon-only {
            padding: var(--s-1);
            background: transparent;
            color: var(--c-text-secondary);
            border-radius: 50%;
        }

        .btn-icon-only:hover {
            background-color: rgba(255, 59, 48, 0.1);
            color: var(--c-danger);
        }

        /* ==========================================================================
           6. Preview Section (Right Pane)
           ========================================================================== */
        .preview-pane {
            background-color: var(--c-surface);
            border-radius: var(--radius-lg);
            padding: var(--s-6) var(--s-4);
            box-shadow: var(--shadow-md);
            overflow-y: auto;
            position: relative;
        }

        @media (min-width: 992px) {
            .preview-pane { padding: var(--s-6) 10%; } /* Proper margins for desktop reading */
        }

        .document {
            max-width: 800px;
            margin: 0 auto;
        }

        .doc-title {
            font: var(--text-h1);
            margin-bottom: var(--s-2);
            letter-spacing: -0.03em;
        }

        .doc-desc {
            font: var(--text-body);
            color: var(--c-text-secondary);
            margin-bottom: var(--s-6);
        }

        .doc-steps {
            display: flex;
            flex-direction: column;
            gap: var(--s-4);
            counter-reset: step-counter;
        }

        .doc-step {
            position: relative;
            padding-left: var(--s-6);
        }

        .doc-step::before {
            counter-increment: step-counter;
            content: counter(step-counter);
            position: absolute;
            left: 0;
            top: 0;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: var(--c-accent);
            color: #FFF;
            display: flex;
            align-items: center;
            justify-content: center;
            font: var(--text-caption);
            font-weight: 600;
        }

        .doc-step-title {
            font: var(--text-h2);
            font-size: 18px;
            margin-bottom: var(--s-1);
            padding-top: 4px; /* Align visually with circular badge */
        }

        .doc-step-desc {
            font: var(--text-body);
            line-height: 1.6;
            color: var(--c-text-primary);
            white-space: pre-wrap; /* Respect line breaks from textarea */
        }

        .empty-state {
            text-align: center;
            color: var(--c-text-tertiary);
            margin-top: 20%;
            font: var(--text-body);
        }

        /* ==========================================================================
           7. Print/Export Styles
           ========================================================================== */
        @media print {
            body { background-color: #FFF; }
            .app-header, .editor-pane { display: none !important; }
            .main-container { display: block; padding: 0; }
            .preview-pane {
                box-shadow: none;
                padding: 0;
                border-radius: 0;
                overflow: visible;
            }
            .document { max-width: 100%; }
            .doc-step { page-break-inside: avoid; }
        }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="app-title">ManualCrafter</div>
        <button class="btn-primary" onclick="window.print()" aria-label="Export to PDF or Print">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 9V2h12v7"></path>
                <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                <path d="M6 14h12v8H6z"></path>
            </svg>
            Export
        </button>
    </header>

    <main class="main-container">
        <section class="editor-pane" aria-label="Manual Editor">
            <div class="input-group">
                <label for="docTitle">Manual Title</label>
                <input type="text" id="docTitle" placeholder="e.g., Onboarding Process" oninput="app.updatePreview()">
            </div>
            
            <div class="input-group">
                <label for="docDesc">Description</label>
                <textarea id="docDesc" placeholder="Briefly describe the purpose of this manual..." oninput="app.updatePreview()"></textarea>
            </div>

            <hr style="border: none; border-top: 1px solid var(--c-border); margin: var(--s-2) 0;">

            <div class="steps-container" id="stepsContainer">
                </div>

            <button class="btn-secondary" onclick="app.addStep()" aria-label="Add a new step">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Add Step
            </button>
        </section>

        <section class="preview-pane" aria-label="Live Preview">
            <div class="document" id="previewDocument">
                <div class="empty-state">Start typing on the left to generate your manual.</div>
            </div>
        </section>
    </main>

    <script>
        /**
         * ManualCrafter - Core Application Logic
         * Designed with robustness, immutability concepts, and clean DOM manipulation.
         */
        const app = (() => {
            // State
            let state = {
                title: '',
                description: '',
                steps: [
                    { id: generateId(), title: '', content: '' } // Initialize with one empty step
                ]
            };

            // DOM Elements
            const els = {
                docTitle: document.getElementById('docTitle'),
                docDesc: document.getElementById('docDesc'),
                stepsContainer: document.getElementById('stepsContainer'),
                previewDocument: document.getElementById('previewDocument')
            };

            // Utilities
            function generateId() {
                return 'step-' + Math.random().toString(36).substr(2, 9);
            }

            // Core Functions
            function renderEditorSteps() {
                els.stepsContainer.innerHTML = '';
                
                state.steps.forEach((step, index) => {
                    const stepEl = document.createElement('div');
                    stepEl.className = 'step-item';
                    
                    stepEl.innerHTML = `
                        <div class="step-header">
                            <span>Step ${index + 1}</span>
                            <button class="btn-icon-only" onclick="app.removeStep('${step.id}')" aria-label="Remove Step ${index + 1}" title="Delete Step">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                </svg>
                            </button>
                        </div>
                        <div class="input-group">
                            <input type="text" placeholder="Step title..." value="${escapeHTML(step.title)}" 
                                   oninput="app.updateStepData('${step.id}', 'title', this.value)">
                        </div>
                        <div class="input-group">
                            <textarea placeholder="Step instructions..." 
                                      oninput="app.updateStepData('${step.id}', 'content', this.value)">${escapeHTML(step.content)}</textarea>
                        </div>
                    `;
                    els.stepsContainer.appendChild(stepEl);
                });
            }

            function updatePreview() {
                // Update basic text state from DOM
                state.title = els.docTitle.value;
                state.description = els.docDesc.value;

                // Check for empty state
                const isCompletelyEmpty = !state.title && !state.description && state.steps.every(s => !s.title && !s.content);
                
                if (isCompletelyEmpty) {
                    els.previewDocument.innerHTML = `<div class="empty-state">Start typing on the left to generate your beautiful manual.</div>`;
                    return;
                }

                // Render document
                let html = '';
                if (state.title) html += `<h1 class="doc-title">${escapeHTML(state.title)}</h1>`;
                if (state.description) html += `<p class="doc-desc">${escapeHTML(state.description)}</p>`;

                const activeSteps = state.steps.filter(s => s.title.trim() || s.content.trim());
                
                if (activeSteps.length > 0) {
                    html += `<div class="doc-steps">`;
                    activeSteps.forEach(step => {
                        html += `
                            <div class="doc-step">
                                ${step.title ? `<h2 class="doc-step-title">${escapeHTML(step.title)}</h2>` : ''}
                                ${step.content ? `<div class="doc-step-desc">${escapeHTML(step.content)}</div>` : ''}
                            </div>
                        `;
                    });
                    html += `</div>`;
                }

                els.previewDocument.innerHTML = html;
            }

            // Security: Prevent XSS in preview
            function escapeHTML(str) {
                return str.replace(/[&<>'"]/g, 
                    tag => ({
                        '&': '&amp;',
                        '<': '&lt;',
                        '>': '&gt;',
                        "'": '&#39;',
                        '"': '&quot;'
                    }[tag])
                );
            }

            // Public API
            return {
                init: () => {
                    renderEditorSteps();
                    updatePreview();
                },
                addStep: () => {
                    state.steps.push({ id: generateId(), title: '', content: '' });
                    renderEditorSteps();
                    updatePreview();
                    
                    // Focus the newly added step's title input
                    setTimeout(() => {
                        const inputs = els.stepsContainer.querySelectorAll('.step-item:last-child input[type="text"]');
                        if(inputs.length > 0) inputs[0].focus();
                    }, 50);
                },
                removeStep: (id) => {
                    if (state.steps.length === 1) {
                        // Reset if it's the last one
                        state.steps = [{ id: generateId(), title: '', content: '' }];
                    } else {
                        state.steps = state.steps.filter(s => s.id !== id);
                    }
                    renderEditorSteps();
                    updatePreview();
                },
                updateStepData: (id, field, value) => {
                    const step = state.steps.find(s => s.id === id);
                    if (step) {
                        step[field] = value;
                        updatePreview();
                    }
                },
                updatePreview: updatePreview
            };
        })();

        // Bootstrap App
        document.addEventListener('DOMContentLoaded', app.init);
    </script>
</body>
</html>
