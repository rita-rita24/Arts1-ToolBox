<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DevToolBox — ハイパーアルティメットスーパーウルトラ便利devtool</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%234f46e5'/%3E%3Cpath d='M22 18l-8 14 8 14M42 18l8 14-8 14M36 14l-8 36' stroke='%23eef2ff' stroke-width='4' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,500,0,0&display=swap" rel="stylesheet">
  <style>
    @layer reset, base, component, utility;

    @layer reset {
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body,
      h1,
      h2,
      h3,
      p,
      pre,
      ul,
      li,
      figure,
      blockquote,
      textarea,
      button,
      input {
        margin: 0;
      }

      ul {
        padding: 0;
        list-style: none;
      }

      button,
      textarea,
      input,
      select {
        font: inherit;
        color: inherit;
      }

      button {
        background: transparent;
        border: 0;
        cursor: pointer;
      }

      a {
        color: inherit;
      }
    }

    @layer base {
      :root {
        --sidebar-w: 248px;
        --sidebar-w-collapsed: 64px;
        --topbar-h: 56px;
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 14px;
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-7: 32px;
        --space-8: 40px;
        --font-sans: "Inter", "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        --font-mono: "SFMono-Regular", "Monaco", "Menlo", "Consolas", "Liberation Mono", monospace;
        --transition-fast: 120ms ease;
        --transition: 180ms ease;
        --mode-switch-track: oklch(0.32 0.02 252);
        --mode-switch-track-active: oklch(0.46 0.07 233);
        --mode-switch-moon: oklch(0.95 0.01 245);
        --mode-switch-sun: oklch(0.86 0.12 90);
        --mode-switch-star: oklch(0.96 0.01 245);
        --mode-switch-cloud: oklch(0.99 0.003 245);
      }

      :root[data-theme="light"] {
        --bg: oklch(0.98 0.005 250);
        --bg-elevated: oklch(1 0 0);
        --surface: oklch(1 0 0);
        --surface-soft: oklch(0.965 0.005 250);
        --surface-strong: oklch(0.94 0.008 250);
        --border: oklch(0.88 0.01 250);
        --border-strong: oklch(0.78 0.015 250);
        --text: oklch(0.22 0.02 255);
        --text-muted: oklch(0.5 0.015 255);
        --text-subtle: oklch(0.65 0.01 255);
        --accent: oklch(0.58 0.18 258);
        --accent-strong: oklch(0.48 0.19 258);
        --accent-soft: oklch(0.92 0.05 258);
        --accent-fg: oklch(0.99 0.01 250);
        --success: oklch(0.66 0.16 150);
        --warning: oklch(0.75 0.15 70);
        --danger: oklch(0.62 0.2 25);
        --focus-ring: oklch(0.58 0.18 258 / 0.36);
        --shadow-sm: 0 1px 2px oklch(0.2 0.02 250 / 0.08);
        --shadow-md: 0 8px 24px oklch(0.2 0.02 250 / 0.12);
        --shadow-lg: 0 20px 48px oklch(0.2 0.02 250 / 0.18);
        --sql-keyword: oklch(0.53 0.2 260);
        --sql-string: oklch(0.6 0.18 56);
        --sql-number: oklch(0.55 0.16 152);
        --sql-comment: oklch(0.55 0.03 250);
        color-scheme: light;
      }

      :root[data-theme="dark"] {
        --bg: oklch(0.17 0.01 260);
        --bg-elevated: oklch(0.21 0.012 260);
        --surface: oklch(0.235 0.012 260);
        --surface-soft: oklch(0.27 0.013 260);
        --surface-strong: oklch(0.31 0.013 260);
        --border: oklch(0.34 0.012 260);
        --border-strong: oklch(0.42 0.015 260);
        --text: oklch(0.96 0.008 260);
        --text-muted: oklch(0.74 0.015 260);
        --text-subtle: oklch(0.6 0.012 260);
        --accent: oklch(0.74 0.16 258);
        --accent-strong: oklch(0.82 0.16 258);
        --accent-soft: oklch(0.32 0.08 258);
        --accent-fg: oklch(0.18 0.02 250);
        --success: oklch(0.78 0.17 150);
        --warning: oklch(0.82 0.16 80);
        --danger: oklch(0.74 0.18 25);
        --focus-ring: oklch(0.74 0.16 258 / 0.4);
        --shadow-sm: 0 1px 2px oklch(0.05 0.01 260 / 0.5);
        --shadow-md: 0 10px 30px oklch(0.05 0.01 260 / 0.55);
        --shadow-lg: 0 22px 56px oklch(0.05 0.01 260 / 0.6);
        --sql-keyword: oklch(0.78 0.16 261);
        --sql-string: oklch(0.82 0.15 62);
        --sql-number: oklch(0.8 0.15 152);
        --sql-comment: oklch(0.7 0.03 250);
        color-scheme: dark;
      }

      html,
      body {
        height: 100%;
      }

      body {
        font-family: var(--font-sans);
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        font-size: 14px;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        overflow: hidden;
      }

      .material-symbols-rounded {
        font-variation-settings: "FILL" 0, "wght" 500, "GRAD" 0, "opsz" 20;
        font-size: 20px;
        line-height: 1;
        user-select: none;
        flex-shrink: 0;
      }
    }

    @layer component {
      .app {
        display: grid;
        grid-template-columns: var(--sidebar-w) 1fr;
        height: 100dvh;
        background: var(--bg);

        &[data-sidebar-collapsed="true"] {
          grid-template-columns: var(--sidebar-w-collapsed) 1fr;
        }
      }

      .sidebar {
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--border);
        background: var(--bg-elevated);
        min-width: 0;
        overflow: hidden;
      }

      .sidebar__brand {
        display: flex;
        align-items: center;
        gap: var(--space-3);
        padding: var(--space-5) var(--space-4);
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.01em;
        color: var(--text);
        border-bottom: 1px solid var(--border);
      }

      .sidebar__brand-icon {
        color: var(--accent);
      }

      .sidebar__brand-name {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .sidebar__nav {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: var(--space-3) var(--space-2);
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: var(--space-3);
        width: 100%;
        padding: 10px var(--space-3);
        border-radius: var(--radius-md);
        color: var(--text-muted);
        text-align: left;
        transition: background-color var(--transition-fast), color var(--transition-fast);
        white-space: nowrap;
        overflow: hidden;

        &:hover {
          background: var(--surface-soft);
          color: var(--text);
        }

        &:focus-visible {
          outline: 2px solid var(--focus-ring);
          outline-offset: 2px;
        }

        &[aria-selected="true"] {
          background: var(--accent-soft);
          color: var(--accent-strong);

          & .nav-item__icon {
            color: var(--accent);
          }
        }
      }

      .nav-item__icon {
        color: var(--text-subtle);
        flex-shrink: 0;
      }

      .nav-item__label {
        display: flex;
        flex-direction: column;
        min-width: 0;
        flex: 1;
      }

      .nav-item__name {
        font-size: 14px;
        font-weight: 600;
        line-height: 1.3;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .nav-item__desc {
        font-size: 11px;
        color: var(--text-subtle);
        line-height: 1.3;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .sidebar__toggle {
        display: flex;
        align-items: center;
        gap: var(--space-3);
        padding: var(--space-3) var(--space-4);
        color: var(--text-muted);
        border-top: 1px solid var(--border);
        font-size: 12px;
        font-weight: 600;

        &:hover {
          background: var(--surface-soft);
          color: var(--text);
        }
      }

      .sidebar__toggle-label {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .app[data-sidebar-collapsed="true"] {
        & .sidebar__brand-name,
        & .nav-item__label,
        & .sidebar__toggle-label {
          display: none;
        }

        & .sidebar__brand,
        & .nav-item,
        & .sidebar__toggle {
          justify-content: center;
        }

        & .sidebar__toggle .material-symbols-rounded {
          transform: rotate(180deg);
        }
      }

      .sidebar-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: oklch(0 0 0 / 0.45);
        z-index: 30;
      }

      .workspace {
        display: grid;
        grid-template-rows: var(--topbar-h) 1fr;
        min-width: 0;
        background: var(--bg);
      }

      .topbar {
        display: flex;
        align-items: center;
        gap: var(--space-3);
        padding: 0 var(--space-5);
        border-bottom: 1px solid var(--border);
        background: var(--bg-elevated);
      }

      .topbar__menu {
        display: none;
      }

      .topbar__title-wrap {
        display: flex;
        flex-direction: column;
        min-width: 0;
        flex: 1;
      }

      .topbar__eyebrow {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-subtle);
      }

      .topbar__title {
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
        line-height: 1.2;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .topbar__actions {
        display: flex;
        align-items: center;
        gap: var(--space-3);
      }

      .pane-host {
        position: relative;
        min-height: 0;
        overflow: hidden;
      }

      .welcome,
      .tool-pane {
        display: none;
        height: 100%;
        min-height: 0;
        overflow: auto;
      }

      .app[data-active-tool="welcome"] .welcome,
      .app[data-active-tool="textchanger"] .tool-pane[data-tool-pane="textchanger"],
      .app[data-active-tool="bindsql"] .tool-pane[data-tool-pane="bindsql"],
      .app[data-active-tool="maskinger"] .tool-pane[data-tool-pane="maskinger"] {
        display: flex;
        flex-direction: column;
      }

      .welcome {
        padding: var(--space-7) var(--space-6);
        gap: var(--space-7);
      }

      .welcome__hero {
        display: flex;
        flex-direction: column;
        gap: var(--space-3);
        max-width: 720px;
      }

      .welcome__title {
        font-size: 28px;
        font-weight: 700;
        line-height: 1.2;
      }

      .welcome__subtitle {
        font-size: 15px;
        color: var(--text-muted);
        line-height: 1.6;
      }

      .welcome__grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: var(--space-4);
        max-width: 1100px;
      }

      .welcome__card {
        display: flex;
        gap: var(--space-3);
        padding: var(--space-5);
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        text-align: left;
        transition: border-color var(--transition-fast), transform var(--transition-fast), box-shadow var(--transition-fast);

        &:hover {
          border-color: var(--accent);
          box-shadow: var(--shadow-md);
          transform: translateY(-2px);
        }

        &:focus-visible {
          outline: 2px solid var(--focus-ring);
          outline-offset: 2px;
        }

        & .welcome__card-icon {
          color: var(--accent);
          font-size: 32px;
          font-variation-settings: "FILL" 0, "wght" 500, "GRAD" 0, "opsz" 32;
        }

        & .welcome__card-body {
          display: flex;
          flex-direction: column;
          gap: var(--space-1);
        }

        & .welcome__card-name {
          font-size: 16px;
          font-weight: 700;
          color: var(--text);
        }

        & .welcome__card-desc {
          font-size: 13px;
          color: var(--text-muted);
          line-height: 1.5;
        }
      }
    }

    @layer component {
      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        padding: 8px 14px;
        border-radius: var(--radius-md);
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-size: 13px;
        font-weight: 600;
        line-height: 1.2;
        transition: background-color var(--transition-fast), border-color var(--transition-fast), color var(--transition-fast), box-shadow var(--transition-fast), transform var(--transition-fast);
        white-space: nowrap;

        &:hover {
          background: var(--surface-soft);
          border-color: var(--border-strong);
        }

        &:active {
          transform: translateY(1px);
        }

        &:focus-visible {
          outline: 2px solid var(--focus-ring);
          outline-offset: 2px;
        }

        &.is-success {
          background: var(--success);
          border-color: var(--success);
          color: var(--accent-fg);
        }
      }

      .button--primary {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--accent-fg);

        &:hover {
          background: var(--accent-strong);
          border-color: var(--accent-strong);
        }
      }

      .button--ghost {
        background: transparent;
        border-color: var(--border);
        color: var(--text-muted);

        &:hover {
          background: var(--surface-soft);
          color: var(--text);
        }
      }

      .button__icon {
        font-family: "Material Symbols Rounded";
        font-weight: normal;
        font-style: normal;
        font-size: 18px;
        line-height: 1;
        font-variation-settings: "FILL" 0, "wght" 500, "GRAD" 0, "opsz" 20;
        user-select: none;
      }

      .icon-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border-radius: var(--radius-md);
        color: var(--text-muted);
        transition: background-color var(--transition-fast), color var(--transition-fast);

        &:hover {
          background: var(--surface-soft);
          color: var(--text);
        }

        &:focus-visible {
          outline: 2px solid var(--focus-ring);
          outline-offset: 2px;
        }
      }

      .card {
        display: flex;
        flex-direction: column;
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-sm);
        min-height: 0;
        min-width: 0;
      }

      .card__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-3);
        padding: var(--space-3) var(--space-4);
        border-bottom: 1px solid var(--border);
      }

      .card__title-wrap {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }

      .card__eyebrow {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-subtle);
      }

      .card__title {
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
        line-height: 1.3;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .card__actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        flex-shrink: 0;
      }

      .card__body {
        flex: 1;
        min-height: 0;
        padding: var(--space-3) var(--space-4) var(--space-4);
        display: flex;
        flex-direction: column;
        gap: var(--space-3);
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: var(--space-2);
        min-height: 0;
        flex: 1;
      }

      .field__label {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
      }

      .input,
      .textarea {
        width: 100%;
        padding: 10px 12px;
        background: var(--surface-soft);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 13px;
        line-height: 1.55;
        outline: none;
        transition: border-color var(--transition-fast), box-shadow var(--transition-fast);

        &::placeholder {
          color: var(--text-subtle);
        }

        &:focus-visible {
          border-color: var(--accent);
          box-shadow: 0 0 0 3px var(--focus-ring);
        }
      }

      .textarea {
        resize: none;
        flex: 1;
        min-height: 0;
      }

      .input--compact {
        padding: 6px 10px;
        font-size: 12px;
      }

      .flash {
        position: fixed;
        top: 16px;
        left: 50%;
        z-index: 60;
        max-width: min(92vw, 560px);
        padding: 10px 14px;
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        color: var(--text);
        font-size: 13px;
        font-weight: 600;
        text-align: center;
        box-shadow: var(--shadow-md);
        opacity: 0;
        transform: translate(-50%, -10px);
        pointer-events: none;
        transition: opacity var(--transition), transform var(--transition);

        &.is-visible {
          opacity: 1;
          transform: translate(-50%, 0);
        }

        &[data-type="error"] {
          border-color: var(--danger);
          color: var(--danger);
        }

        &[data-type="success"] {
          border-color: var(--success);
          color: var(--success);
        }
      }

      .modal {
        position: fixed;
        inset: 0;
        z-index: 70;
        display: none;
        align-items: center;
        justify-content: center;
        padding: var(--space-4);
        background: oklch(0 0 0 / 0.5);

        &[data-open="true"] {
          display: flex;
        }
      }

      .modal__dialog {
        width: 100%;
        max-width: 640px;
        max-height: 80vh;
        display: flex;
        flex-direction: column;
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
        overflow: hidden;
      }

      .modal__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-3);
        padding: var(--space-4) var(--space-5);
        border-bottom: 1px solid var(--border);
      }

      .modal__title {
        font-size: 15px;
        font-weight: 700;
      }

      .modal__body {
        padding: var(--space-4) var(--space-5);
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: var(--space-4);
        font-size: 13px;
        line-height: 1.7;
        color: var(--text);

        & p {
          color: var(--text-muted);
        }

        & h3 {
          font-size: 11px;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 0.06em;
          color: var(--text-subtle);
        }

        & ul {
          padding-left: var(--space-5);
          list-style: disc;
          color: var(--text-muted);
          display: flex;
          flex-direction: column;
          gap: 4px;
        }
      }
    }

    @layer component {
      .switch {
        position: relative;
        display: inline-block;
        width: 4em;
        height: 2.2em;
        border-radius: 30px;
        font-size: 13px;
        flex-shrink: 0;

        & input {
          opacity: 0;
          width: 0;
          height: 0;
        }
      }

      .slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background-color: var(--mode-switch-track);
        transition: background-color 0.4s;
        border-radius: 30px;
        overflow: hidden;

        &::before {
          position: absolute;
          content: "";
          height: 1.2em;
          width: 1.2em;
          border-radius: 20px;
          left: 0.5em;
          bottom: 0.5em;
          transition: transform 0.4s, box-shadow 0.4s;
          transition-timing-function: cubic-bezier(0.81, -0.04, 0.38, 1.5);
          box-shadow: inset 8px -4px 0 0 var(--mode-switch-moon);
        }
      }

      .switch input:checked + .slider {
        background-color: var(--mode-switch-track-active);

        &::before {
          transform: translateX(1.8em);
          box-shadow: inset 15px -4px 0 15px var(--mode-switch-sun);
        }
      }

      .star {
        background-color: var(--mode-switch-star);
        border-radius: 50%;
        position: absolute;
        width: 5px;
        height: 5px;
        transition: opacity 0.4s;
      }

      .star_1 { left: 2.5em; top: 0.5em; }
      .star_2 { left: 2.2em; top: 1.2em; }
      .star_3 { left: 3em; top: 0.9em; }

      .switch input:checked + .slider .star {
        opacity: 0;
      }

      .cloud {
        width: 3.5em;
        position: absolute;
        bottom: -1.4em;
        left: -1.1em;
        opacity: 0;
        transition: opacity 0.4s;

        & path {
          fill: var(--mode-switch-cloud);
        }
      }

      .switch input:checked + .slider .cloud {
        opacity: 1;
      }

      .switch input:focus-visible + .slider {
        outline: 2px solid var(--focus-ring);
        outline-offset: 2px;
      }
    }

    @layer utility {
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .is-hidden {
        display: none !important;
      }

      [hidden] {
        display: none !important;
      }
    }

    @media (max-width: 720px) {
      .app {
        grid-template-columns: 1fr;
      }

      .app[data-sidebar-collapsed="true"] {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        width: var(--sidebar-w);
        z-index: 40;
        transform: translateX(-100%);
        transition: transform var(--transition);
      }

      .app[data-sidebar-mobile="open"] .sidebar {
        transform: translateX(0);
      }

      .app[data-sidebar-mobile="open"] .sidebar-backdrop {
        display: block;
      }

      .sidebar__toggle {
        display: none;
      }

      .topbar__menu {
        display: inline-flex;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }


  </style>
</head>
<body>
  <div class="app" id="$app" data-active-tool="welcome" data-sidebar-collapsed="false">
    <aside class="sidebar" id="$sidebar" aria-label="ツール一覧">
      <div class="sidebar__brand">
        <span class="material-symbols-rounded sidebar__brand-icon" aria-hidden="true">construction</span>
        <span class="sidebar__brand-name">DevToolBox</span>
      </div>
      <nav class="sidebar__nav" id="$nav" role="tablist" aria-label="ツール選択"></nav>
      <button type="button" class="sidebar__toggle" id="$sidebarToggle" aria-label="サイドバー折りたたみ" aria-pressed="false">
        <span class="material-symbols-rounded" aria-hidden="true">chevron_left</span>
        <span class="sidebar__toggle-label">折りたたむ</span>
      </button>
    </aside>
    <button type="button" class="sidebar-backdrop" id="$sidebarBackdrop" aria-label="サイドバーを閉じる" tabindex="-1"></button>

    <main class="workspace">
      <header class="topbar">
        <button type="button" class="icon-btn topbar__menu" id="$menuToggle" aria-label="メニュー">
          <span class="material-symbols-rounded" aria-hidden="true">menu</span>
        </button>
        <div class="topbar__title-wrap">
          <p class="topbar__eyebrow" id="$topbarEyebrow">Welcome</p>
          <h1 class="topbar__title" id="$topbarTitle">DevToolBox</h1>
        </div>
        <div class="topbar__actions">
          <a class="icon-btn topbar__external" id="$openStandalone" href="#" target="_blank" rel="noopener" hidden aria-label="単体版を新しいタブで開く">
            <span class="material-symbols-rounded" aria-hidden="true">open_in_new</span>
          </a>
          <label class="switch" for="$themeToggle" title="テーマ切替">
            <input id="$themeToggle" type="checkbox" role="switch" aria-label="ライト/ダークモード切り替え">
            <span class="slider">
              <span class="star star_1"></span>
              <span class="star star_2"></span>
              <span class="star star_3"></span>
              <svg viewBox="0 0 16 16" class="cloud" aria-hidden="true">
                <path transform="matrix(.77976 0 0 .78395-299.99-418.63)" fill="#fff" d="m391.84 540.91c-.421-.329-.949-.524-1.523-.524-1.351 0-2.451 1.084-2.485 2.435-1.395.526-2.388 1.88-2.388 3.466 0 1.874 1.385 3.423 3.182 3.667v.034h12.73v-.006c1.775-.104 3.182-1.584 3.182-3.395 0-1.747-1.309-3.186-2.994-3.379.007-.106.011-.214.011-.322 0-2.707-2.271-4.901-5.072-4.901-2.073 0-3.856 1.202-4.643 2.925"></path>
              </svg>
            </span>
          </label>
        </div>
      </header>

      <div class="pane-host">
        <section class="welcome" data-tool-pane="welcome" aria-label="ようこそ">
          <div class="welcome__hero">
            <h2 class="welcome__title">DevToolBox へようこそ</h2>
            <p class="welcome__subtitle">開発まわりの小道具を、ひとつの場所に。サイドバーからツールを選ぶか、下のカードから始めてください。</p>
          </div>
          <ul class="welcome__grid" id="$welcomeGrid" role="list"></ul>
        </section>

        <!-- @insert: pane-textchanger -->

        <!-- @insert: pane-bindsql -->

        <!-- @insert: pane-maskinger -->
      </div>
    </main>
  </div>

  <p class="flash" id="$flash" data-role="flash" aria-live="assertive" role="status"></p>

  <!-- @insert: modal-maskinger-help -->

  <script>
    "use strict";
    const qs = (sel, root = document) => root.querySelector(sel);
    const qsa = (sel, root = document) => [...root.querySelectorAll(sel)];

    const TOOLS = [
      {
        id: "textchanger",
        name: "TextChanger",
        description: "行ベーステキストを5形式に同時変換",
        icon: "swap_horiz",
        eyebrow: "Text Conversion",
        standalone: "../TextChanger/TextChanger.html",
      },
      {
        id: "bindsql",
        name: "BindSQL",
        description: "SQLとバインド変数を実行可能形式に統合",
        icon: "database",
        eyebrow: "SQL Builder",
        standalone: "../BindSQLforSQLBuilder/BindSQLforSQLBuilder.html",
      },
      {
        id: "maskinger",
        name: "Maskinger",
        description: "機密情報を自動マスキング",
        icon: "visibility_off",
        eyebrow: "Privacy",
        standalone: "../Maskinger/Maskinger.html",
      },
    ];

    const STORAGE = Object.freeze({
      ACTIVE: "devtoolbox_active_tool",
      THEME: "devtoolbox_theme",
      SIDEBAR: "devtoolbox_sidebar_collapsed",
    });

    const THEME_LIGHT = "light";
    const THEME_DARK = "dark";
    const DEFAULT_THEME = THEME_DARK;

    const _tools = {};
    const _initialized = new Set();

    const _state = {
      _activeId: "welcome",
      _theme: DEFAULT_THEME,
      _collapsed: false,
      _mobileOpen: false,
    };

    const $app = qs("#$app");
    const $sidebar = qs("#$sidebar");
    const $sidebarBackdrop = qs("#$sidebarBackdrop");
    const $sidebarToggle = qs("#$sidebarToggle");
    const $menuToggle = qs("#$menuToggle");
    const $nav = qs("#$nav");
    const $themeToggle = qs("#$themeToggle");
    const $topbarTitle = qs("#$topbarTitle");
    const $topbarEyebrow = qs("#$topbarEyebrow");
    const $openStandalone = qs("#$openStandalone");
    const $welcomeGrid = qs("#$welcomeGrid");
    const $flash = qs("#$flash");

    let _flashTimer = 0;

    const _saveKey = (_key, _value) => {
      try {
        localStorage.setItem(_key, _value);
      } catch (_error) {
        // localStorage unavailable; ignore.
      }
    };

    const _loadKey = (_key) => {
      try {
        return localStorage.getItem(_key);
      } catch (_error) {
        return null;
      }
    };

    const _showFlash = (_message, _type = "info", _durationMs = 1600) => {
      $flash.textContent = _message;
      $flash.dataset.type = _type;
      $flash.classList.add("is-visible");
      window.clearTimeout(_flashTimer);
      _flashTimer = window.setTimeout(() => {
        $flash.classList.remove("is-visible");
      }, _durationMs);
    };

    const _copyToClipboard = async (_text) => {
      if (!_text) return false;
      try {
        await navigator.clipboard.writeText(_text);
        return true;
      } catch (_error) {
        const $temporary = document.createElement("textarea");
        $temporary.value = _text;
        $temporary.setAttribute("readonly", "true");
        $temporary.style.position = "fixed";
        $temporary.style.opacity = "0";
        document.body.append($temporary);
        $temporary.select();
        let _copied = false;
        try {
          _copied = document.execCommand("copy");
        } catch (_fallbackError) {
          _copied = false;
        }
        $temporary.remove();
        return _copied;
      }
    };

    const _applyTheme = (_theme) => {
      const _next = _theme === THEME_LIGHT ? THEME_LIGHT : THEME_DARK;
      _state._theme = _next;
      document.documentElement.setAttribute("data-theme", _next);
      document.documentElement.style.colorScheme = _next;
      $themeToggle.checked = _next === THEME_LIGHT;
    };

    const _setTheme = (_theme) => {
      _applyTheme(_theme);
      _saveKey(STORAGE.THEME, _state._theme);
    };

    const _applyCollapsed = (_collapsed) => {
      _state._collapsed = Boolean(_collapsed);
      $app.dataset.sidebarCollapsed = _state._collapsed ? "true" : "false";
      $sidebarToggle.setAttribute("aria-pressed", _state._collapsed ? "true" : "false");
    };

    const _setCollapsed = (_collapsed) => {
      _applyCollapsed(_collapsed);
      _saveKey(STORAGE.SIDEBAR, _state._collapsed ? "true" : "false");
    };

    const _setMobileOpen = (_open) => {
      _state._mobileOpen = Boolean(_open);
      if (_state._mobileOpen) {
        $app.dataset.sidebarMobile = "open";
      } else {
        delete $app.dataset.sidebarMobile;
      }
    };

    const _findTool = (_id) => TOOLS.find((_tool) => _tool.id === _id) || null;

    const _ensureToolInitialized = (_id) => {
      if (_initialized.has(_id)) return;
      const _module = _tools[_id];
      if (!_module || typeof _module.init !== "function") return;
      const $pane = qs(`[data-tool-pane="${_id}"]`);
      if (!$pane) return;
      _module.init($pane);
      _initialized.add(_id);
    };

    const _activateTool = (_id) => {
      const _tool = _findTool(_id);
      const _activeId = _tool ? _tool.id : "welcome";
      _state._activeId = _activeId;
      $app.dataset.activeTool = _activeId;

      qsa("[data-tool-id]", $nav).forEach(($button) => {
        $button.setAttribute("aria-selected", $button.dataset.toolId === _activeId ? "true" : "false");
      });

      if (_tool) {
        $topbarEyebrow.textContent = _tool.eyebrow || "Tool";
        $topbarTitle.textContent = _tool.name;
        if (_tool.standalone) {
          $openStandalone.href = _tool.standalone;
          $openStandalone.hidden = false;
        } else {
          $openStandalone.hidden = true;
        }
        _ensureToolInitialized(_tool.id);
      } else {
        $topbarEyebrow.textContent = "Welcome";
        $topbarTitle.textContent = "DevToolBox";
        $openStandalone.hidden = true;
      }

      _saveKey(STORAGE.ACTIVE, _activeId);

      if (window.matchMedia("(max-width: 720px)").matches) {
        _setMobileOpen(false);
      }
    };

    const _renderNav = () => {
      $nav.textContent = "";
      for (const _tool of TOOLS) {
        const $button = document.createElement("button");
        $button.type = "button";
        $button.className = "nav-item";
        $button.dataset.toolId = _tool.id;
        $button.setAttribute("role", "tab");
        $button.setAttribute("aria-selected", "false");
        $button.title = _tool.name;

        const $icon = document.createElement("span");
        $icon.className = "material-symbols-rounded nav-item__icon";
        $icon.setAttribute("aria-hidden", "true");
        $icon.textContent = _tool.icon;

        const $label = document.createElement("span");
        $label.className = "nav-item__label";
        const $name = document.createElement("span");
        $name.className = "nav-item__name";
        $name.textContent = _tool.name;
        const $desc = document.createElement("span");
        $desc.className = "nav-item__desc";
        $desc.textContent = _tool.description;
        $label.append($name, $desc);

        $button.append($icon, $label);
        $nav.append($button);
      }
    };

    const _renderWelcomeGrid = () => {
      $welcomeGrid.textContent = "";
      for (const _tool of TOOLS) {
        const $li = document.createElement("li");
        const $button = document.createElement("button");
        $button.type = "button";
        $button.className = "welcome__card";
        $button.dataset.toolId = _tool.id;

        const $icon = document.createElement("span");
        $icon.className = "material-symbols-rounded welcome__card-icon";
        $icon.setAttribute("aria-hidden", "true");
        $icon.textContent = _tool.icon;

        const $body = document.createElement("span");
        $body.className = "welcome__card-body";
        const $name = document.createElement("span");
        $name.className = "welcome__card-name";
        $name.textContent = _tool.name;
        const $desc = document.createElement("span");
        $desc.className = "welcome__card-desc";
        $desc.textContent = _tool.description;
        $body.append($name, $desc);

        $button.append($icon, $body);
        $li.append($button);
        $welcomeGrid.append($li);
      }
    };

    const _handleNavClick = (event) => {
      const $button = event.target.closest("[data-tool-id]");
      if (!$button) return;
      _activateTool($button.dataset.toolId);
    };

    const _handleThemeToggleChange = () => {
      _setTheme($themeToggle.checked ? THEME_LIGHT : THEME_DARK);
    };

    const _handleSidebarToggleClick = () => {
      _setCollapsed(!_state._collapsed);
    };

    const _handleMenuToggleClick = () => {
      _setMobileOpen(!_state._mobileOpen);
    };

    const _handleBackdropClick = () => {
      _setMobileOpen(false);
    };

    const _handleHashChange = () => {
      const _hash = window.location.hash.replace(/^#\/?/, "");
      if (_hash && _findTool(_hash)) {
        _activateTool(_hash);
      }
    };

    /* @insert: tool-textchanger */
    /* @insert: tool-bindsql */
    /* @insert: tool-maskinger */
    /* @insert: shell-init */
  </script>
</body>
</html>
