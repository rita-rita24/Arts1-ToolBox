<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[demo]manural - マニュアル作成ツール</title>
  <style>
    :root {
      --primary: #0ea5e9;
      --primary-rgb: 14, 165, 233;
      --primary-light: #e0f2fe;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-300: #cbd5e1;
      --gray-400: #94a3b8;
      --gray-500: #64748b;
      --gray-600: #475569;
      --gray-900: #0f172a;
      --white: #fff;
      --radius: 8px;
      --radius-lg: 12px;
      --danger: #dc2626;
      --success: #16a34a
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 14px
    }

    @media (pointer:fine) {
      ::-webkit-scrollbar {
        width: 5px
      }

      ::-webkit-scrollbar-track {
        background: var(--gray-100)
      }

      ::-webkit-scrollbar-thumb {
        background: var(--gray-300);
        border-radius: 3px
      }

      ::-webkit-scrollbar-thumb:hover {
        background: var(--gray-400)
      }
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      flex-shrink: 0;
      gap: 12px;
      position: relative;
      z-index: 100
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .header-brand .logo {
      font-size: 20px;
      line-height: 1
    }

    .header-brand h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -.01em
    }

    .header-center {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      justify-content: center
    }

    .platform-label {
      font-size: 11px;
      color: var(--gray-400);
      font-weight: 600
    }

    .platform-select {
      padding: 5px 10px;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      font-size: 13px;
      font-family: inherit;
      color: var(--gray-900);
      background: var(--white);
      cursor: pointer;
      outline: none;
      transition: border-color .15s
    }

    .platform-select:focus {
      border-color: var(--primary)
    }

    .header-actions {
      display: flex;
      gap: 6px;
      align-items: center
    }

    .divider {
      width: 1px;
      height: 22px;
      background: var(--gray-200)
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border: none;
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
      font-family: inherit;
      line-height: 1
    }

    .btn-ghost {
      background: transparent;
      color: var(--gray-600);
      border: 1px solid var(--gray-200)
    }

    .btn-ghost:hover {
      background: var(--gray-100)
    }

    .btn-primary {
      background: var(--primary);
      color: #fff
    }

    .btn-primary:hover {
      opacity: .88;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(var(--primary-rgb), .3)
    }

    .btn-primary:active {
      transform: translateY(0)
    }

    .btn-danger-ghost {
      background: transparent;
      color: var(--danger);
      border: 1px solid #fecaca
    }

    .btn-danger-ghost:hover {
      background: #fef2f2
    }

    .app-body {
      display: flex;
      flex: 1;
      overflow: hidden
    }

    .sidebar {
      width: 370px;
      flex-shrink: 0;
      background: var(--white);
      border-right: 1px solid var(--gray-200);
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    .sidebar-tabs {
      display: flex;
      border-bottom: 1px solid var(--gray-200);
      flex-shrink: 0
    }

    .sidebar-tab {
      flex: 1;
      padding: 11px 0;
      border: none;
      background: transparent;
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-400);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all .15s;
      font-family: inherit
    }

    .sidebar-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary)
    }

    .sidebar-tab:hover:not(.active) {
      color: var(--gray-600)
    }

    .sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px
    }

    .form-section {
      margin-bottom: 20px
    }

    .form-section-title {
      font-size: 10px;
      font-weight: 700;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 10px
    }

    .form-field {
      margin-bottom: 9px
    }

    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--gray-600);
      margin-bottom: 3px
    }

    .form-input,
    .form-textarea {
      width: 100%;
      padding: 7px 9px;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      color: var(--gray-900);
      background: var(--white);
      transition: border-color .15s, box-shadow .15s
    }

    .form-input:focus,
    .form-textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(var(--primary-rgb), .08)
    }

    .form-textarea {
      resize: vertical;
      min-height: 72px;
      line-height: 1.55
    }

    .mod-card:hover:not(.sel) {
      border-color: var(--gray-300)
    }

    .preview-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0
    }

    .preview-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      flex-shrink: 0;
      gap: 12px
    }

    .preview-toolbar-left {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .preview-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: .06em
    }

    .selected-count {
      font-size: 12px;
      color: var(--gray-600)
    }

    .selected-count strong {
      color: var(--primary)
    }

    .preview-toolbar-right {
      display: flex;
      align-items: center;
      gap: 6px
    }

    .view-toggle {
      display: flex;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      overflow: hidden
    }

    .view-btn {
      padding: 4px 10px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 11px;
      color: var(--gray-500);
      font-family: inherit
    }

    .view-btn.active {
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 600
    }

    .preview-bg {
      flex: 1;
      overflow: auto;
      background: var(--primary-light);
      background-image: radial-gradient(circle at 20px 20px, rgba(var(--primary-rgb), .07) 2px, transparent 0);
      background-size: 40px 40px;
      display: flex;
      flex-direction: column;
      padding: 0
    }

    #preview {
      border: none;
      background: #fff;
      width: 100%;
      height: 100%;
      display: block
    }

    .color-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 4px
    }

    .color-chip {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      cursor: pointer;
      transition: all .15s;
      border: 2px solid transparent;
      outline: 2px solid transparent;
      outline-offset: 2px
    }

    .color-chip:hover {
      transform: scale(1.15)
    }

    .color-chip.active {
      outline-color: var(--gray-900)
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--gray-900);
      color: #fff;
      padding: 9px 18px;
      border-radius: 20px;
      font-size: 13px;
      z-index: 500;
      opacity: 0;
      transition: opacity .2s;
      pointer-events: none;
      white-space: nowrap
    }

    .header-actions-full {
      display: flex;
      gap: 6px;
      align-items: center
    }

    .header-actions-compact {
      display: none;
      gap: 6px;
      align-items: center
    }

    @media (max-width:1180px) {
      .header-actions-full {
        display: none
      }

      .header-actions-compact {
        display: flex
      }

      .platform-label {
        display: none
      }
    }

    @media (max-width:860px) {
      .header-center {
        display: none
      }
    }

    .dropdown-wrap {
      position: relative
    }

    .dropdown-menu {
      position: absolute;
      top: calc(100% + 7px);
      right: 0;
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      box-shadow: 0 8px 28px rgba(0, 0, 0, .14);
      min-width: 200px;
      padding: 5px;
      z-index: 200;
      display: none;
      animation: ddIn .12s ease
    }

    @keyframes ddIn {
      from {
        opacity: 0;
        transform: translateY(-6px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 12px;
      color: var(--gray-700);
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
      font-family: inherit;
      transition: background .1s;
      white-space: nowrap
    }

    .dropdown-item:hover {
      background: var(--gray-100)
    }

    .dropdown-sep {
      height: 1px;
      background: var(--gray-200);
      margin: 4px 0
    }

    .edit-drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .28);
      z-index: 400;
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s
    }

    .edit-drawer {
      position: fixed;
      top: 0;
      right: 0;
      height: 100vh;
      width: 50vw;
      max-width: 100vw;
      background: var(--white);
      box-shadow: -6px 0 40px rgba(0, 0, 0, .18);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform .26s cubic-bezier(.32, .72, 0, 1);
      z-index: 401
    }

    @media (max-width:768px) {
      .edit-drawer {
        width: 90vw
      }
    }

    .edit-drawer-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 16px;
      border-bottom: 1px solid var(--gray-200);
      flex-shrink: 0;
      background: var(--gray-50)
    }

    .edit-drawer-meta {
      flex: 1;
      min-width: 0
    }

    .edit-drawer-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--gray-900);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .edit-drawer-cat {
      font-size: 11px;
      color: var(--gray-400);
      margin-top: 1px
    }

    .edit-drawer-close {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: none;
      background: var(--gray-200);
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gray-600);
      flex-shrink: 0;
      transition: background .1s
    }

    .edit-drawer-close:hover {
      background: var(--gray-300);
      color: var(--gray-900)
    }

    .edit-drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px
    }

    #tab-btn-preview {
      display: none
    }

    @media (max-width:768px) {
      .app-body {
        flex-direction: column;
        overflow: hidden
      }

      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--gray-200);
        flex: 1;
        min-height: 0
      }

      #tab-btn-preview {
        display: block
      }

      .preview-pane {
        display: none
      }

      .sidebar-body {
        flex: 1;
        overflow-y: auto;
        min-height: 0
      }
    }

    @media (max-width:568px) {
      .app-header {
        height: auto;
        flex-direction: column;
        align-items: stretch;
        padding: 8px 12px;
        gap: 8px
      }

      .header-brand {
        flex-shrink: 0
      }

      .header-center {
        display: none !important
      }

      .header-actions {
        width: 100%
      }

      .header-actions-compact {
        width: 100%;
        gap: 8px
      }

      .header-actions-compact>.dropdown-wrap {
        flex: 1
      }

      .header-actions-compact .btn {
        width: 100%;
        justify-content: center;
        font-size: 11px;
        padding: 6px 8px
      }

      .header-actions-compact>.dropdown-wrap:first-child .dropdown-menu {
        left: 0;
        right: auto
      }
    }

    @media (max-width:400px) {
      .sidebar {
        min-width: 0
      }

      .sidebar-body {
        padding: 10px 8px
      }

      .sidebar-tab {
        font-size: 10px;
        padding: 9px 3px;
        min-width: 0
      }
    }

    .toggle-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      padding: 4px 0
    }

    .toggle-label .form-label {
      margin: 0;
      cursor: pointer
    }

    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
      flex-shrink: 0
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--gray-300);
      border-radius: 10px;
      transition: background .2s;
      cursor: pointer
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .25)
    }

    .toggle-switch input:checked+.toggle-slider {
      background: var(--primary)
    }

    .toggle-switch input:checked+.toggle-slider::before {
      transform: translateX(16px)
    }
  </style>

<body>
  <!-- HEADER -->
  <div class="app-header">
    <div class="header-brand">
      <span class="logo">📖</span>
      <h1>manural</h1>
    </div>
    <div class="header-center">
      <span class="platform-label">対応プラットフォーム:</span>
      <select class="platform-select" id="platform-select"></select>
    </div>
    <div class="header-actions">
      <!-- 通常幅：全ボタン表示 -->
      <div class="header-actions-full">
        <button class="btn btn-ghost" id="btn-load-project">📂 プロジェクトの読込</button>
        <button class="btn btn-ghost" id="btn-save-project">💾 プロジェクトの保存</button>
        <div class="divider"></div>
        <button class="btn btn-ghost" id="btn-copy-md">📋 マークダウンで出力</button>
        <button class="btn btn-ghost" id="btn-print-pdf">🖨️ PDF出力</button>
        <button class="btn btn-primary" id="btn-export-html">▶ HTML出力</button>
      </div>
      <!-- 狭い幅（≤1180px）：折りたたみドロップダウン -->
      <div class="header-actions-compact">
        <div class="dropdown-wrap">
          <button class="btn btn-ghost" id="dd-btn-project" data-dd="dd-project">
            📁 プロジェクト <span style="font-size:9px;opacity:.7">▾</span>
          </button>
          <div class="dropdown-menu" id="dd-project">
            <button class="dropdown-item" id="dd-load-project">📂 プロジェクトの読込</button>
            <button class="dropdown-item" id="dd-save-project">💾 プロジェクトの保存</button>
          </div>
        </div>
        <div class="dropdown-wrap">
          <button class="btn btn-primary" id="dd-btn-export" data-dd="dd-export">
            ▶ マニュアル出力 <span style="font-size:9px;opacity:.7">▾</span>
          </button>
          <div class="dropdown-menu" id="dd-export">
            <button class="dropdown-item" id="dd-copy-md">📋 マークダウンで出力</button>
            <button class="dropdown-item" id="dd-print-pdf">🖨️ PDF出力</button>
            <div class="dropdown-sep"></div>
            <button class="dropdown-item" style="color:var(--primary);font-weight:600" id="dd-export-html">▶
              HTML出力</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- APP BODY -->
  <div class="app-body">
    <!-- LEFT: SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-tabs">
        <button class="sidebar-tab" id="tab-btn-modules" data-tab="modules">☑ 項目</button>
        <button class="sidebar-tab" id="tab-btn-settings" data-tab="settings">⚙ 設定</button>
        <button class="sidebar-tab" id="tab-btn-preview" data-tab="preview">👁 プレビュー</button>
      </div>
      <div class="sidebar-body" id="sidebar-body"></div>
    </div>
    <!-- RIGHT: PREVIEW -->
    <div class="preview-pane">
      <div class="preview-toolbar">
        <div class="preview-toolbar-left">
          <span class="preview-label">ライブプレビュー</span>
          <span class="selected-count" id="selected-count"><strong>0</strong>項目選択中</span>
        </div>
        <div class="preview-toolbar-right">
          <div class="view-toggle">
            <button class="view-btn active" id="vbtn-pc" data-view="pc">💻 PC</button>
            <button class="view-btn" id="vbtn-mobile" data-view="mobile">📱 Mobile</button>
          </div>
        </div>
      </div>
      <div class="preview-bg" id="preview-bg">
        <iframe id="preview" frameborder="0" title="マニュアルプレビュー"></iframe>
      </div>
    </div>
  </div>
  <!-- Edit Drawer (slide-in from right) -->
  <div class="edit-drawer-overlay" id="edit-drawer-overlay"></div>
  <div class="edit-drawer" id="edit-drawer">
    <div class="edit-drawer-head">
      <div class="edit-drawer-meta">
        <div class="edit-drawer-name" id="edit-drawer-name">項目を編集</div>
        <div class="edit-drawer-cat" id="edit-drawer-cat"></div>
      </div>
      <button class="edit-drawer-close" id="btn-close-drawer" title="閉じる">✕</button>
    </div>
    <div class="edit-drawer-body" id="edit-drawer-body"></div>
  </div>
  <!-- Hidden file inputs -->
  <input type="file" id="file-ss" accept="image/*" style="display:none">
  <input type="file" id="file-project" accept=".json" style="display:none">
  <!-- Toast -->
  <div class="toast" id="toast"></div>
  <!-- Sortable.js for drag-and-drop composition reordering -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.3/Sortable.min.js"></script>
  <!-- Platform data (add new platform .js files here) -->
  <script src="data/wordpress.js" onerror="console.warn('data/wordpress.js not found')"></script>
  <script src="data/studio.js" onerror="console.warn('data/studio.js not found')"></script>
  <script src="data/troubleshooting.js" onerror="console.warn('data/troubleshooting.js not found')"></script>
  <script src="data/analytics.js" onerror="console.warn('data/analytics.js not found')"></script>
  <script src="data/line.js" onerror="console.warn('data/line.js not found')"></script>
  <script>
    // ================================================================
    // App Namespace
    // ================================================================
    const App = {
      // --- Constants ---
      Constants: {
        LS_KEY: 'mb-pro-v1',
        ACCENT_COLORS: ['#0EA5E9', '#4F46E5', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6', '#EC4899', '#64748B']
      },

      // --- State ---
      State: {
        platformId: null,
        activeTab: 'settings',
        activeModuleId: null,
        viewMode: 'pc',
        settings: {
          siteName: '', siteUrl: 'https://example.com',
          company: '', contact: '',
          date: new Date().toISOString().slice(0, 10),
          intro: '', accentColor: '#0EA5E9',
          showCover: true, version: ''
        },
        modules: {},      // moduleId: { selected, note, editedContent, screenshots:[{data?,url?,label}] }
        catOpen: {},      // catGroupId: bool
        customModules: [], // [{id, title, content, _custom:true}]
        composition: []   // [{type:'module'|'custom'|'heading', id, title?}] — authoritative order
      },

      // --- Internal Variables ---
      _pendingScroll: null,
      _prevTimer: null,
      _sortable: null,
      _savedRange: null,
      _ssMid: null,
      _ssIdx: null,

      // --- Helpers ---
      S() { return this.State; },
      set(fn) { fn(); this.Storage.save(); this.Service.schedPrev(); },

      e(str) { if (!str) return ''; return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); },

      showToast(msg) {
        const t = document.getElementById('toast'); if (!t) return;
        t.textContent = msg; t.classList.add('show');
        clearTimeout(t._tid); t._tid = setTimeout(() => t.classList.remove('show'), 2600);
      }
    };

    // ================================================================
    // EVENT MANAGER
    // ================================================================
    const AppEventManager = {
      init() {
        document.addEventListener('click', this.handleClick.bind(this));
        document.addEventListener('change', this.handleChange.bind(this));
        document.addEventListener('input', this.handleInput.bind(this));
        document.addEventListener('keydown', this.handleKeydown.bind(this));
        document.addEventListener('dragover', this.handleDragOver.bind(this));
        document.addEventListener('dragleave', this.handleDragLeave.bind(this));
        document.addEventListener('drop', this.handleDrop.bind(this));
      },

      handleClick(e) {
        if (!e.target.closest('.dropdown-wrap')) App.UI.closeDropdowns();

        const actionEl = e.target.closest('[data-action]');
        if (!actionEl) return;

        const action = actionEl.dataset.action;
        const id = actionEl.dataset.id;
        const val = actionEl.dataset.val;
        const type = actionEl.dataset.type;
        const mid = actionEl.dataset.mid;
        const idx = actionEl.dataset.idx;
        const cmd = actionEl.dataset.cmd;
        const tag = actionEl.dataset.tag;

        switch (action) {
          case 'load-project': App.Export.loadProject(); break;
          case 'save-project': App.Export.saveProject(); break;
          case 'export-html': App.Export.html(); break;
          case 'copy-markdown': App.Export.md(); break;
          case 'toggle-dropdown':
            e.stopPropagation();
            App.UI.toggleDropdown(id);
            break;
          case 'switch-tab': App.UI.switchTab(id); break;
          case 'set-view-mode': App.UI.setViewMode(val); break;
          case 'toggle-cat': App.UI.toggleCat(id); break;
          case 'toggle-mod': App.UI.toggleMod(id); break;
          case 'open-edit-mod': e.stopPropagation(); App.UI.openEditMod(id); break;
          case 'add-heading': App.UI.addHeading(); break;
          case 'show-custom-modal': App.UI.showAddCustomModal(); break;
          case 'sel-all': App.UI.selAll(val === 'true'); break;
          case 'del-all-custom': App.UI.deleteAllCustomItems(); break;
          case 'close-custom-modal': App.UI.closeCustomModal(); break;
          case 'add-custom-mod': App.UI.addCustomMod(); break;
          case 'delete-comp-item': App.UI.deleteCompItem(id); break;
          case 'stop-propagation': e.stopPropagation(); break;
          case 'clear-all-items': App.UI.clearAllItems(); break;
          case 'close-edit-drawer': App.UI.closeEditDrawer(); break;
          case 'reset-content': App.UI.resetContent(mid); break;
          case 'rte-cmd': App.UI.rteCmd(e, cmd); break;
          case 'rte-block': App.UI.rteBlock(e, tag); break;
          case 'rte-link': App.UI.rteLink(e); break;
          case 'rte-color-reset': App.UI.rteColor(e, '#0F172A'); break;
          case 'rte-insert': App.UI.rteInsert(e, type); break;
          case 'tbl-ctrl': App.UI.tblCtrl(e, cmd); break;
          case 'tbl-equal': App.UI.tblToggleEqual(e); break;
          case 'ss-box-del': App.UI.removeSSBox(actionEl); break;
          case 'ss-upload': App.Service.SS.triggerUpload(mid, idx); break;
          case 'ss-clear': App.Service.SS.clear(mid, idx); break;
          case 'toc-nav':
            e.preventDefault();
            const attrHref = actionEl.getAttribute('href');
            if (attrHref) {
              const targetId = attrHref.slice(1);
              const el = document.getElementById(targetId);
              if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
            break;
          case 'notify-edit':
            window.parent.postMessage({ type: 'openEdit', id: id }, '*');
            break;
        }
      },

      handleChange(e) {
        const actionEl = e.target.closest('[data-action]');
        if (actionEl) {
          const action = actionEl.dataset.action;
          const id = actionEl.dataset.id;
          const val = actionEl.value;
          const type = actionEl.dataset.type;
          const mid = actionEl.dataset.mid;
          const idx = actionEl.dataset.idx;

          switch (action) {
            case 'update-heading-title':
              if (type === 'heading') App.UI.updateHeadingTitle(id, val);
              else App.UI.updateCustomTitle(id, val);
              break;
            case 'ss-size': App.UI.onSSSize(mid, idx, val + '%'); break;
          }
        }

        if (e.target.id === 'file-project') {
          App.Export.handleFile(e.target);
        }
      },

      handleInput(e) {
        const actionEl = e.target.closest('[data-action]');
        if (actionEl) {
          const action = actionEl.dataset.action;
          const val = actionEl.value;
          const mid = actionEl.dataset.mid;
          const idx = actionEl.dataset.idx;

          switch (action) {
            case 'ss-label': App.UI.onSSLabelEdit(mid, idx, val); break;
            case 'ss-size': App.UI.onSSSize(mid, idx, val + '%'); break;
            case 'note-edit': App.UI.onNoteEdit(mid, val); break;
          }
        }

        if (e.target.id === 'rte-body') {
          const mid = e.target.dataset.mid;
          App.UI.onContentEdit(mid, e.target.innerHTML);
        }

        if (e.target.id === 'module-search-input') {
          App.UI.filterMods(e.target.value);
        }

        if (e.target.id === 'search') {
          const q = e.target.value.toLowerCase().trim();
          const ss = document.querySelectorAll('.section');
          let found = 0;
          ss.forEach(function (s) {
            const show = !q || s.textContent.toLowerCase().indexOf(q) !== -1;
            s.style.display = show ? '' : 'none';
            if (show) found++;
          });
          const nr = document.getElementById('no-result');
          if (nr) nr.style.display = (q && found === 0) ? 'block' : 'none';
        }
      },

      handleKeydown(e) {
        const actionEl = e.target.closest('[data-action]');
        if (actionEl) {
          const action = actionEl.dataset.action;
          if (action === 'update-heading-title' && e.key === 'Enter') e.target.blur();
        }

        if (e.target.id === 'rte-body') {
          App.UI.rteKeydownHandler(e);
        }
      },

      handleDragOver(e) {
        const actionEl = e.target.closest('[data-dropzone]');
        if (actionEl) {
          e.preventDefault();
          actionEl.classList.add('dragover');
        }
      },

      handleDragLeave(e) {
        const actionEl = e.target.closest('[data-dropzone]');
        if (actionEl) {
          actionEl.classList.remove('dragover');
        }
      },

      handleDrop(e) {
        const actionEl = e.target.closest('[data-dropzone]');
        if (actionEl) {
          e.preventDefault();
          actionEl.classList.remove('dragover');
          const mid = actionEl.dataset.mid;
          const idx = actionEl.dataset.idx;
          App.Service.SS.handleDrop(e, mid, idx);
        }
      }
    };
    // --- Internal Variables ---

    // Aliases
    function e(s) { return App.e(s); }
    function showToast(m) { App.showToast(m); }

    // FREE PLATFORM — カテゴリなしの自由構成モード
    window.MB_PLATFORMS = window.MB_PLATFORMS || {};
    window.MB_PLATFORMS.free = {
      id: 'free',
      name: 'フリー（自由構成）',
      icon: '✨',
      categories: []
    };

    // ================================================================
    // STATE ACCESSORS
    // ================================================================
    // --- Global Aliases (for backward compatibility during refactoring) ---
    const S = App.State;
    const mutate = App.set.bind(App);

    App.Service = {
      plat(id) {
        return (window.MB_PLATFORMS || {})[id || S.platformId] || null;
      },

      allPlats() {
        return Object.values(window.MB_PLATFORMS || {});
      },

      findMod(moduleId) {
        for (const p of this.allPlats()) {
          for (const c of p.categories) {
            const m = c.modules.find(m => m.id === moduleId);
            if (m) return { m, c };
          }
        }
        const cm = S.customModules.find(m => m.id === moduleId);
        return cm ? { m: cm, c: { name: 'カスタム項目', icon: '📄' } } : null;
      },

      ms(moduleId) {
        if (!S.modules[moduleId]) {
          S.modules[moduleId] = { selected: false, note: '', editedContent: null, screenshots: [] };
        }
        return S.modules[moduleId];
      },

      getContent(moduleId) {
        const st = this.ms(moduleId);
        if (st.editedContent !== null) return st.editedContent;
        const r = this.findMod(moduleId);
        return r ? r.m.content : '';
      },

      compositionItems() {
        return S.composition.map(item => {
          if (item.type === 'heading') return { _type: 'heading', id: item.id, title: item.title };
          if (item.type === 'custom') {
            const m = S.customModules.find(m => m.id === item.id);
            return m ? { ...m, _type: 'module', catName: 'カスタム項目' } : null;
          }
          const r = this.findMod(item.id);
          return r ? { ...r.m, _type: 'module', catName: r.c.name } : null;
        }).filter(Boolean);
      },

      selectedMods() {
        return this.compositionItems().filter(item => item._type === 'module');
      },

      schedPrev() {
        clearTimeout(App._prevTimer);
        App._prevTimer = setTimeout(doPreview, 300);
      }
    };

    App.Storage = {
      save() {
        try {
          localStorage.setItem(App.Constants.LS_KEY, JSON.stringify(S));
        } catch (er) {
          showToast('⚠️ 容量上限のため保存できませんでした。画像を減らしてください。');
        }
      },

      load() {
        try {
          const raw = localStorage.getItem(App.Constants.LS_KEY);
          if (!raw) return;
          const saved = JSON.parse(raw);
          App.State = {
            ...App.State, ...saved,
            settings: { ...App.State.settings, ...(saved.settings || {}) },
            modules: { ...App.State.modules, ...(saved.modules || {}) },
            catOpen: { ...App.State.catOpen, ...(saved.catOpen || {}) },
            customModules: saved.customModules || [],
            composition: saved.composition || []
          };
          if (!saved.composition) App.State._needsMigration = true;
        } catch (er) { }
      }
    };

    // Aliases
    function saveLS() { App.Storage.save(); }
    function loadLS() { App.Storage.load(); }

    App.UI = {
      toggleMod(id) {
        const adding = !ms(id).selected;
        mutate(() => {
          ms(id).selected = adding;
          if (adding) {
            if (!S.composition.find(c => c.id === id)) S.composition.push({ type: 'module', id });
          } else {
            S.composition = S.composition.filter(c => c.id !== id);
          }
        });
        const card = document.getElementById('mc-' + id);
        const cb = document.getElementById('cb-' + id);
        if (card) card.classList.toggle('sel', adding);
        if (cb) cb.checked = adding;
        this.refreshCatCounts();
        this.updateSelCount();
        renderComposition();
        if (adding) App._pendingScroll = 's-' + id;
      },

      refreshCatCounts() {
        const p = plat();
        if (!p) return;
        p.categories.forEach((c, i) => {
          const el = document.getElementById('catcnt-' + i);
          if (!el) return;
          el.textContent = c.modules.filter(m => ms(m.id).selected).length;
        });
        const cel = document.getElementById('catcnt-custom');
        if (!cel) return;
        cel.textContent = S.customModules.filter(m => ms(m.id).selected).length;
      },

      updateSelCount() {
        const el = document.getElementById('selected-count');
        if (!el) return;
        const n = selectedMods().length;
        el.innerHTML = `<strong>${n}</strong>項目選択中`;
      },

      onPlatformChange(pid) {
        mutate(() => { S.platformId = pid; });
        renderTab('modules');
        if (S.activeTab === 'edit') renderTab('edit');
      }
    };

    // Aliases
    function toggleMod(id) { App.UI.toggleMod(id); }
    function refreshCatCounts() { App.UI.refreshCatCounts(); }
    function updateSelCount() { App.UI.updateSelCount(); }
    function onPlatformChange(pid) { App.UI.onPlatformChange(pid); }

    // ================================================================
    // TAB MANAGEMENT
    // ================================================================
    Object.assign(App.UI, {
      switchTab(tab) {
        if (tab === 'edit') { openEditDrawer(); return; }
        const appBody = document.querySelector('.app-body');
        if (tab === 'preview') {
          if (appBody) appBody.classList.add('preview-active');
          ['modules', 'settings', 'preview'].forEach(t => {
            document.getElementById('tab-btn-' + t)?.classList.toggle('active', t === 'preview');
          });
          S.activeTab = 'preview';
          App.Storage.save();
          return;
        }
        if (appBody) appBody.classList.remove('preview-active');
        S.activeTab = tab;
        ['modules', 'settings', 'preview'].forEach(t => {
          document.getElementById('tab-btn-' + t)?.classList.toggle('active', t === tab);
        });
        this.renderTab(tab);
        App.Storage.save();
      },

      openEditMod(moduleId) {
        S.activeModuleId = moduleId;
        App._pendingScroll = 's-' + moduleId;
        App.Storage.save();
        openEditDrawer();
      },

      renderTab(tab) {
        if (tab === 'edit') { renderEditDrawer(); return; }
        const body = document.getElementById('sidebar-body');
        switch (tab) {
          case 'settings':
            body.innerHTML = this.tmplSettings();
            this.bindSettings();
            break;
          case 'modules':
            body.innerHTML = this.tmplModules();
            this.initSortable();
            break;
        }
      }
    });

    // Aliases
    function switchTab(tab) { App.UI.switchTab(tab); }
    function openEditMod(id) { App.UI.openEditMod(id); }
    function renderTab(tab) { App.UI.renderTab(tab); }

    // ---- SETTINGS ----
    Object.assign(App.UI, {
      tmplSettings() {
        const s = S.settings;
        return `
  <div class="form-section">

      <input class="form-input" id="si-name" value="${App.e(s.siteName)}" placeholder="例: 株式会社〇〇 公式サイト"></div>

    <button class="btn btn-danger-ghost" style="width:100%;justify-content:center" id="btn-reset-all">🔄 すべてをリセット</button>
  </div>`;
      },
      bindSettings() {

          ['si-name', 'siteName'], ['si-url', 'siteUrl'], ['si-company', 'company'],
          ['si-contact', 'contact'], ['si-date', 'date'], ['si-intro', 'intro'], ['si-version', 'version']
        ];

      },

      _applyAccentVars(color) {
        const r = parseInt(color.slice(1, 3), 16);
        const g = parseInt(color.slice(3, 5), 16);
        const b = parseInt(color.slice(5, 7), 16);
        document.documentElement.style.setProperty('--primary', color);
        document.documentElement.style.setProperty('--primary-rgb', `${r},${g},${b}`);
        const lr = Math.round(r * .15 + 255 * .85);
        const lg = Math.round(g * .15 + 255 * .85);
        const lb = Math.round(b * .15 + 255 * .85);
        document.documentElement.style.setProperty('--primary-light',

    Object.assign(App.UI, {

      renderComposition() {
        const area = document.getElementById('comp-area');
        if (!area) return;
        area.innerHTML = this.tmplCompInner();
        this.initSortable();
        this.updateSelCount();

      initSortable() {
        const list = document.getElementById('comp-list');
        if (!list || !window.Sortable) return;
        if (App._sortable) {
          try { App._sortable.destroy(); } catch (_) { }
          App._sortable = null;
        }
        App._sortable = Sortable.create(list, {
          handle: '.comp-drag-handle',
          animation: 150,
          ghostClass: 'sortable-ghost',
          chosenClass: 'sortable-chosen',
          onEnd() {
            const newIds = Array.from(list.querySelectorAll('.comp-item')).map(el => el.dataset.id);
            mutate(() => {
              S.composition = newIds.map(id => S.composition.find(c => c.id === id)).filter(Boolean);
            });
          }
        });
      },

      addHeading() {
        const id = 'h-' + Date.now();
        mutate(() => { S.composition.push({ type: 'heading', id, title: '見出し' }); });
        App._pendingScroll = 's-' + id;
        this.renderComposition();
        requestAnimationFrame(() => {
          const el = document.querySelector(`#comp-area .comp-item[data-id="${id}"]`);
          if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
          const inp = el?.querySelector('.comp-heading-input');
          if (inp) setTimeout(() => { inp.select(); inp.focus(); }, 80);
        });
      },

      updateHeadingTitle(id, title) {
        const item = S.composition.find(c => c.id === id);
        if (item && item.title !== title) {
          mutate(() => { item.title = title; });
        }
      },

      updateCustomTitle(id, title) {
        const m = S.customModules.find(m => m.id === id);
        if (m && m.title !== title) {
          mutate(() => { m.title = title; });
        }
      },

      deleteCompItem(id) {
        const item = S.composition.find(c => c.id === id);
        if (!item) return;
        if (item.type === 'custom' && !confirm('この独自項目を削除しますか？')) return;
        mutate(() => {
          S.composition = S.composition.filter(c => c.id !== id);
          if (item.type === 'module') {
            const mst = S.modules[id];
            if (mst) mst.selected = false;
          } else if (item.type === 'custom') {
            S.customModules = S.customModules.filter(m => m.id !== id);
            delete S.modules[id];
          }
        });
        if (item.type === 'module') {
          const card = document.getElementById('mc-' + id);
          const cb = document.getElementById('cb-' + id);
          if (card) card.classList.remove('sel');
          if (cb) cb.checked = false;
          this.refreshCatCounts();
        }
        this.renderComposition();
        this.updateSelCount();
      },

      filterMods(q) {
        const lq = q.toLowerCase();
        const p = plat();
        if (!p) return;
        p.categories.forEach(c => c.modules.forEach(m => {
          const card = document.getElementById('mc-' + m.id);
          if (card) card.style.display = (!lq || m.title.toLowerCase().includes(lq)) ? '' : 'none';
        }));
      },

      selAll(checked) {
        const p = plat();
        if (!p) return;
        mutate(() => {
          if (checked) {
            p.categories.forEach(c => c.modules.forEach(m => {
              ms(m.id).selected = true;
              if (!S.composition.find(comp => comp.id === m.id)) {
                S.composition.push({ type: 'module', id: m.id });
              }
            }));
          } else {
            const platIds = new Set(p.categories.flatMap(c => c.modules.map(m => m.id)));
            p.categories.forEach(c => c.modules.forEach(m => { ms(m.id).selected = false; }));
            S.composition = S.composition.filter(c => !(c.type === 'module' && platIds.has(c.id)));
          }
          p.categories.forEach(c => { S.catOpen[c.id] = true; });
        });
        this.renderTab('modules');
      }
    });

    function bindEdit() {
      const mid = S.activeModuleId;
      const body = document.getElementById('rte-body');
      if (!body || !mid) return;

      // 1. 初期コンテンツを注入（HTML文字列をそのまま）
      body.innerHTML = getContent(mid);

      // 2. ss-box にサムネイルを表示
      updateRTESSPreviews(mid);

      // 3. Enter キー脱出ロジックを登録
      body.addEventListener('keydown', rteKeydownHandler);
      body.addEventListener('mouseup', updateTblCtrl);
      body.addEventListener('keyup', updateTblCtrl);

      // 3. フォーカスを先頭に当てる（ドロワーが開いた直後に入力できる状態に）
      requestAnimationFrame(() => {
        body.focus();
        // カーソルをコンテンツ末尾へ
        const range = document.createRange();
        const sel = window.getSelection();
        range.selectNodeContents(body);
        range.collapse(false);
        sel.removeAllRanges();
        sel.addRange(range);
        updateTblCtrl();
      });
    }

    // ================================================================
    // RTE KEYDOWN: Enter キーでのスタイル枠脱出
    // ================================================================

    // bindEdit ごとに新しい rte-body が生成されるため、
    // addEventListener は毎回クリーンな要素に対して呼ばれる（重複なし）
    App.RTE = {
      _savedRange: null,

      handleKeydown(ev) {
        const body = document.getElementById('rte-body');
        if (!body) return;
        const sel = window.getSelection();
        if (!sel || !sel.rangeCount) return;
        const range = sel.getRangeAt(0);

        // Tab キーでのセル移動
        if (ev.key === 'Tab') {
          let cellEl = range.startContainer;
          if (cellEl.nodeType === Node.TEXT_NODE) cellEl = cellEl.parentElement;
          while (cellEl && cellEl !== body) {
            if (cellEl.tagName === 'TD' || cellEl.tagName === 'TH') break;
            cellEl = cellEl.parentElement;
          }
          if (cellEl && cellEl !== body && (cellEl.tagName === 'TD' || cellEl.tagName === 'TH')) {
            ev.preventDefault();
            const allCells = [...body.querySelectorAll('th,td')];
            const idx = allCells.indexOf(cellEl);
            if (!ev.shiftKey && idx === allCells.length - 1) {
              const tbody = cellEl.closest('tbody');
              if (tbody) {
                const colCount = cellEl.closest('tr').cells.length;
                const newRow = tbody.insertRow();
                for (let i = 0; i < colCount; i++) newRow.insertCell().innerHTML = '<br>';
                const newRange = document.createRange();
                newRange.selectNodeContents(newRow.cells[0]);
                newRange.collapse(false);
                sel.removeAllRanges();
                sel.addRange(newRange);
                body.dispatchEvent(new Event('input', { bubbles: true }));
              }
            } else {
              const nextCell = allCells[ev.shiftKey ? idx - 1 : idx + 1];
              if (nextCell) {
                const newRange = document.createRange();
                newRange.selectNodeContents(nextCell);
                newRange.collapse(false);
                sel.removeAllRanges();
                sel.addRange(newRange);
              }
            }
            requestAnimationFrame(updateTblCtrl);
            return;
          }
        }

        // Enter キーでのスタイル枠脱出
        if (ev.key !== 'Enter' || ev.shiftKey) return;
        let styledBlock = null;
        let el = range.startContainer;
        if (el.nodeType === Node.TEXT_NODE) el = el.parentElement;
        while (el && el !== body) {
          if (el.classList && (el.classList.contains('tip') || el.classList.contains('ss-box'))) {
            styledBlock = el; break;
          }
          if (el.tagName === 'BLOCKQUOTE') { styledBlock = el; break; }
          el = el.parentElement;
        }
        if (!styledBlock) return;
        const afterRange = document.createRange();
        try {
          afterRange.setStart(range.endContainer, range.endOffset);
          afterRange.setEnd(styledBlock, styledBlock.childNodes.length);
        } catch (_) { return; }
        if (afterRange.toString().trim() !== '') return;
        ev.preventDefault();
        const lastChild = styledBlock.lastChild;
        if (lastChild) {
          if (lastChild.nodeName === 'BR') {
            styledBlock.removeChild(lastChild);
          } else if (
            lastChild.nodeType === Node.ELEMENT_NODE &&
            !lastChild.textContent.trim() &&
            (lastChild.nodeName === 'DIV' || lastChild.nodeName === 'P')
          ) {
            styledBlock.removeChild(lastChild);
          }
        }
        const newP = document.createElement('p');
        newP.appendChild(document.createElement('br'));
        styledBlock.insertAdjacentElement('afterend', newP);
        const newRange = document.createRange();
        newRange.setStartBefore(newP.firstChild);
        newRange.collapse(true);
        sel.removeAllRanges();
        sel.addRange(newRange);
        body.dispatchEvent(new Event('input', { bubbles: true }));
      },

      saveSelection() {
        const sel = window.getSelection();
        if (!sel || !sel.rangeCount) return;
        const body = document.getElementById('rte-body');
        if (body && body.contains(sel.getRangeAt(0).commonAncestorContainer)) {
          this._savedRange = sel.getRangeAt(0).cloneRange();
        }
      },

      restoreSelection() {
        if (!this._savedRange) return false;
        const body = document.getElementById('rte-body');
        if (!body) return false;
        body.focus();
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(this._savedRange);
        return true;
      },

      cmd(ev, cmd) {
        ev.preventDefault();
        document.execCommand(cmd, false, null);
      },

      block(ev, tag) {
        ev.preventDefault();
        document.execCommand('formatBlock', false, tag);
      },

      link(ev) {
        ev.preventDefault();
        const url = prompt('リンクURLを入力してください:', 'https://');
        if (!url) return;
        document.execCommand('createLink', false, url);
        document.getElementById('rte-body')?.querySelectorAll('a:not([target])')
          .forEach(a => a.setAttribute('target', '_blank'));
      },

      insert(ev, type) {
        ev.preventDefault();
        const templates = {
          ss: '<div class="ss-box">📸 画像（未設定）</div><p><br></p>',
          tip: '<div class="tip">💡 ヒント：補足情報をここに記入してください。</div>',
          warn: '<div class="tip warn">⚠️ 注意：注意事項をここに記入してください。</div>',
          bq: '<blockquote>引用テキストをここに入力してください。</blockquote><p><br></p>',
          tbl: '<div class="tbl-wrap"><table><thead><tr><th>項目</th><th>内容</th></tr></thead><tbody><tr><td></td><td></td></tr><tr><td></td><td></td></tr><tr><td></td><td></td></tr></tbody></table></div><p><br></p>'
        };
        const body = document.getElementById('rte-body');
        if (body) {
          body.focus();
          document.execCommand('insertHTML', false, templates[type] || '');
        }
      },

      applyFontSize(px) {
        const n = parseInt(px);
        if (!n || n < 8 || n > 72) return;
        if (!this.restoreSelection()) return;
        const body = document.getElementById('rte-body');
        if (!body) return;
        document.execCommand('styleWithCSS', false, false);
        document.execCommand('fontSize', false, '7');
        body.querySelectorAll('font[size="7"]').forEach(el => {
          const span = document.createElement('span');
          span.style.fontSize = n + 'px';
          span.innerHTML = el.innerHTML;
          el.parentNode.replaceChild(span, el);
        });
        body.dispatchEvent(new Event('input', { bubbles: true }));
        this._savedRange = null;
      },

      applyColor(color) {
        if (!this.restoreSelection()) return;
        document.execCommand('styleWithCSS', false, true);
        document.execCommand('foreColor', false, color);
        document.getElementById('rte-body')?.dispatchEvent(new Event('input', { bubbles: true }));
        this._savedRange = null;
      },

      applyHexColor(hex) {
        hex = hex.trim();
        if (!hex.startsWith('#')) hex = '#' + hex;
        if (!/^#[0-9A-Fa-f]{6}$/.test(hex)) return;
        const picker = document.getElementById('rte-color-picker');
        if (picker) picker.value = hex;
        this.applyColor(hex);
      },

      syncColorSwatch(hex) {
        hex = hex.trim();
        if (!hex.startsWith('#')) hex = '#' + hex;
        if (!/^#[0-9A-Fa-f]{6}$/.test(hex)) return;
        const picker = document.getElementById('rte-color-picker');
        if (picker) picker.value = hex;
      },

      color(ev, color) {
        ev.preventDefault();
        document.execCommand('styleWithCSS', false, true);
        document.execCommand('foreColor', false, color);
      }
    };

    App.UI.getSSSlots = function (content) {
      const d = document.createElement('div');
      d.innerHTML = content;
      return Array.from(d.querySelectorAll('.ss-box')).map((box, i) => ({

      }));

    App.Table = {
      _ctx() {
        const body = document.getElementById('rte-body');
        if (!body) return null;
        const sel = window.getSelection();
        if (!sel || !sel.rangeCount) return null;
        let el = sel.getRangeAt(0).startContainer;
        if (el.nodeType === Node.TEXT_NODE) el = el.parentElement;
        let cell = null, table = null, cur = el;
        while (cur && cur !== body) {
          if (!cell && (cur.tagName === 'TD' || cur.tagName === 'TH')) cell = cur;
          if (cur.tagName === 'TABLE') { table = cur; break; }
          cur = cur.parentElement;
        }
        if (!table) return null;
        return {
          body, sel, table, cell,
          cellIndex: cell ? cell.cellIndex : 0,
          rowIndex: cell ? cell.closest('tr').rowIndex : table.rows.length - 1
        };
      },

      updateCtrl() {
        const ctrl = document.getElementById('tbl-ctrl');
        if (!ctrl) return;
        const ctx = this._ctx();
        ctrl.style.display = ctx ? '' : 'none';
        if (ctx) {
          const btn = document.getElementById('tbl-equal-btn');
          if (btn) btn.classList.toggle('active', ctx.table.classList.contains('tbl-equal'));
        }
      },

      toggleEqual(ev) {
        ev.preventDefault();
        const ctx = this._ctx();
        if (!ctx) return;
        ctx.table.classList.toggle('tbl-equal');
        ctx.body.dispatchEvent(new Event('input', { bubbles: true }));
        requestAnimationFrame(() => this.updateCtrl());
      },

      _moveCursor(sel, cell) {
        if (!cell || !sel) return;
        const r = document.createRange();
        r.selectNodeContents(cell);
        r.collapse(false);
        sel.removeAllRanges();
        sel.addRange(r);
      },

      ctrl(ev, action) {
        ev.preventDefault();
        const ctx = this._ctx();
        if (!ctx) return;
        const { body, sel, table, cellIndex, rowIndex } = ctx;
        switch (action) {
          case 'addRow': {
            const cols = table.rows[0].cells.length;
            const nr = table.insertRow(rowIndex + 1);
            for (let i = 0; i < cols; i++) nr.insertCell().innerHTML = '<br>';
            this._moveCursor(sel, nr.cells[Math.min(cellIndex, nr.cells.length - 1)]);
            break;
          }
          case 'delRow': {
            if (table.rows.length <= 1) return;
            table.deleteRow(rowIndex);
            const tr = table.rows[Math.min(rowIndex, table.rows.length - 1)];
            if (tr) this._moveCursor(sel, tr.cells[Math.min(cellIndex, tr.cells.length - 1)]);
            break;
          }
          case 'addCol': {
            const ins = cellIndex + 1;
            Array.from(table.rows).forEach(row => {
              if (row.cells[0] && row.cells[0].tagName === 'TH') {
                const th = document.createElement('th');
                th.innerHTML = '<br>';
                row.cells[ins] ? row.insertBefore(th, row.cells[ins]) : row.appendChild(th);
              } else {
                row.insertCell(ins).innerHTML = '<br>';
              }
            });
            const tr2 = table.rows[rowIndex];
            if (tr2) this._moveCursor(sel, tr2.cells[Math.min(ins, tr2.cells.length - 1)]);
            break;
          }
          case 'delCol': {
            if (table.rows[0].cells.length <= 1) return;
            Array.from(table.rows).forEach(row => {
              if (row.cells[cellIndex]) row.cells[cellIndex].remove();
            });
            const tr3 = table.rows[rowIndex];
            if (tr3) this._moveCursor(sel, tr3.cells[Math.min(cellIndex, tr3.cells.length - 1)]);
            break;
          }
        }
        body.dispatchEvent(new Event('input', { bubbles: true }));
        requestAnimationFrame(() => this.updateCtrl());
      }
    };

      triggerUpload(mid, idx) {

      },

      handleFile(input) {
        const file = input.files[0];
        if (!file) return;
        this.loadImage(file, this._mid, this._idx);
        input.value = '';
      },

      loadImage(file, mid, idx) {
        if (!file || !file.type.startsWith('image/')) {
          showToast('⚠️ 画像ファイルを指定してください');
          return;
        }
        const MAX_W = 1280;
        const img = new Image();
        const objectUrl = URL.createObjectURL(file);
        img.onload = () => {
          URL.revokeObjectURL(objectUrl);
          const scale = img.width > MAX_W ? MAX_W / img.width : 1;
          const canvas = document.createElement('canvas');
          canvas.width = Math.round(img.width * scale);
          canvas.height = Math.round(img.height * scale);
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          const data = canvas.toDataURL('image/jpeg', 0.8);
          const existingLabel = ms(mid).screenshots && ms(mid).screenshots[idx] && ms(mid).screenshots[idx].label;
          const label = existingLabel || ('画像' + (idx + 1));
          mutate(() => {
            const m = ms(mid);
            if (!m.screenshots) m.screenshots = [];
            m.screenshots[idx] = { data, label };
          });
          if (S.activeModuleId === mid) App.UI.renderEditDrawer();
          showToast('✅ 画像を追加しました');
        };
        img.onerror = () => {
          URL.revokeObjectURL(objectUrl);
          showToast('⚠️ 画像の読み込みに失敗しました');
        };
        img.src = objectUrl;
      },

      handleDrop(ev, mid, idx) {
        ev.preventDefault();
        ev.currentTarget.classList.remove('dragover');
        this.loadImage(ev.dataTransfer.files[0], mid, idx);

    <style>
      :root {
        --primary: #0ea5e9;
        --primary-rgb: 14, 165, 233;
        --primary-light: #e0f2fe;
        --gray-50: #f8fafc;
        --gray-100: #f1f5f9;
        --gray-200: #e2e8f0;
        --gray-300: #cbd5e1;
        --gray-400: #94a3b8;
        --gray-500: #64748b;
        --gray-600: #475569;
        --gray-900: #0f172a;
        --white: #fff;
        --radius: 8px;
        --radius-lg: 12px;
        --danger: #dc2626;
        --success: #16a34a
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
        background: var(--gray-50);
        color: var(--gray-900);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        font-size: 14px
      }

      @media (pointer:fine) {
        ::-webkit-scrollbar {
          width: 5px
        }

        ::-webkit-scrollbar-track {
          background: var(--gray-100)
        }

        ::-webkit-scrollbar-thumb {
          background: var(--gray-300);
          border-radius: 3px
        }

        ::-webkit-scrollbar-thumb:hover {
          background: var(--gray-400)
        }
      }

      .app-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        height: 52px;
        background: var(--white);
        border-bottom: 1px solid var(--gray-200);
        flex-shrink: 0;
        gap: 12px;
        position: relative;
        z-index: 100
      }

      .header-brand {
        display: flex;
        align-items: center;
        gap: 8px
      }

      .header-brand .logo {
        font-size: 20px;
        line-height: 1
      }

      .header-brand h1 {
        font-size: 15px;
        font-weight: 700;
        letter-spacing: -.01em
      }

      .badge {
        font-size: 10px;
        font-weight: 700;
        padding: 2px 8px;
        background: var(--primary-light);
        color: var(--primary);
        border-radius: 999px;
        letter-spacing: .03em
      }

      .header-center {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 1;
        justify-content: center
      }

      .platform-label {
        font-size: 11px;
        color: var(--gray-400);
        font-weight: 600
      }

      .platform-select {
        padding: 5px 10px;
        border: 1px solid var(--gray-200);
        border-radius: var(--radius);
        font-size: 13px;
        font-family: inherit;
        color: var(--gray-900);
        background: var(--white);
        cursor: pointer;
        outline: none;
        transition: border-color .15s
      }

      .platform-select:focus {
        border-color: var(--primary)
      }

      .header-actions {
        display: flex;
        gap: 6px;
        align-items: center
      }

      .divider {
        width: 1px;
        height: 22px;
        background: var(--gray-200)
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 6px 12px;
        border: none;
        border-radius: var(--radius);
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: all .15s;
        white-space: nowrap;
        font-family: inherit;
        line-height: 1
      }

      .btn-ghost {
        background: transparent;
        color: var(--gray-600);
        border: 1px solid var(--gray-200)
      }

      .btn-ghost:hover {
        background: var(--gray-100)
      }

      .btn-primary {
        background: var(--primary);
        color: #fff
      }

      .btn-primary:hover {
        opacity: .88;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(var(--primary-rgb), .3)
      }

      .btn-primary:active {
        transform: translateY(0)
      }

      .btn-sm {
        font-size: 11px;
        padding: 4px 9px
      }

      .btn-danger-ghost {
        background: transparent;
        color: var(--danger);
        border: 1px solid #fecaca
      }

      .btn-danger-ghost:hover {
        background: #fef2f2
      }

      .app-body {
        display: flex;
        flex: 1;
        overflow: hidden
      }

      .sidebar {
        width: 370px;
        flex-shrink: 0;
        background: var(--white);
        border-right: 1px solid var(--gray-200);
        display: flex;
        flex-direction: column;
        overflow: hidden
      }

      .sidebar-tabs {
        display: flex;
        border-bottom: 1px solid var(--gray-200);
        flex-shrink: 0
      }

      .sidebar-tab {
        flex: 1;
        padding: 11px 0;
        border: none;
        background: transparent;
        font-size: 12px;
        font-weight: 600;
        color: var(--gray-400);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all .15s;
        font-family: inherit
      }

      .sidebar-tab.active {
        color: var(--primary);
        border-bottom-color: var(--primary)
      }

      .sidebar-tab:hover:not(.active) {
        color: var(--gray-600)
      }

      .sidebar-body {
        flex: 1;
        overflow-y: auto;
        padding: 16px
      }

      .form-section {
        margin-bottom: 20px
      }

      .form-section-title {
        font-size: 10px;
        font-weight: 700;
        color: var(--gray-400);
        text-transform: uppercase;
        letter-spacing: .08em;
        margin-bottom: 10px
      }

      .form-field {
        margin-bottom: 9px
      }

      .form-label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        color: var(--gray-600);
        margin-bottom: 3px
      }

      .form-input,
      .form-textarea {
        width: 100%;
        padding: 7px 9px;
        border: 1px solid var(--gray-200);
        border-radius: var(--radius);
        font-size: 13px;
        font-family: inherit;
        outline: none;
        color: var(--gray-900);
        background: var(--white);
        transition: border-color .15s, box-shadow .15s
      }

      .form-input:focus,
      .form-textarea:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(var(--primary-rgb), .08)
      }

      .form-textarea {
        resize: vertical;
        min-height: 72px;
        line-height: 1.55
      }

      .module-topbar {
        display: flex;
        justify-content: flex-end;
        gap: 6px;
        margin-bottom: 12px
      }

      .module-search {
        position: relative;
        margin-bottom: 12px
      }

      .module-search input {
        padding-left: 28px
      }

      .module-search-icon {
        position: absolute;
        left: 9px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--gray-400);
        font-size: 13px;
        pointer-events: none
      }

      .cat-group {
        margin-bottom: 14px
      }

      .cat-header {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 9px 12px;
        background: var(--primary-light);
        border: 1px solid rgba(var(--primary-rgb), .25);
        border-left: 4px solid var(--primary);
        border-radius: var(--radius);
        cursor: pointer;
        user-select: none;
        margin-bottom: 6px;
        transition: background .15s, box-shadow .15s
      }

      .cat-header:hover {
        background: rgba(var(--primary-rgb), .15);
        box-shadow: 0 2px 8px rgba(var(--primary-rgb), .12)
      }

      .cat-icon {
        font-size: 14px
      }

      .cat-name {
        font-size: 12px;
        font-weight: 700;
        flex: 1;
        color: var(--primary)
      }

      .cat-cnt {
        background: var(--primary);
        color: #fff;
        border-radius: 10px;
        padding: 1px 6px;
        font-size: 10px;
        font-weight: 700;
        min-width: 18px;
        text-align: center
      }

      .cat-arrow {
        font-size: 10px;
        color: var(--primary);
        opacity: .7;
        transition: transform .2s
      }

      .cat-arrow.open {
        transform: rotate(90deg)
      }

      .cat-items {
        display: flex;
        flex-direction: column;
        gap: 4px
      }

      .mod-card {
        border: 1px solid var(--gray-200);
        border-radius: var(--radius);
        background: var(--white);
        overflow: hidden;
        transition: border-color .15s, box-shadow .15s, background .15s
      }

      .mod-card:hover:not(.sel) {
        border-color: var(--gray-300)
      }

      .mod-card.sel {
        border-color: var(--primary);
        border-left: 3px solid var(--primary);
        background: var(--primary-light);
        box-shadow: 0 2px 10px rgba(var(--primary-rgb), .18)
      }

      .mod-card-head {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        cursor: pointer
      }

      .mod-card-head:hover {
        background: rgba(0, 0, 0, .02)
      }

      .mod-card.sel .mod-card-head:hover {
        background: rgba(var(--primary-rgb), .06)
      }

      .mod-check {
        width: 15px;
        height: 15px;
        cursor: pointer;
        accent-color: var(--primary);
        flex-shrink: 0
      }

      .mod-name {
        font-size: 12px;
        font-weight: 500;
        flex: 1;
        color: #334155
      }

      .mod-card.sel .mod-name {
        color: var(--primary);
        font-weight: 700
      }

      .mod-edited-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--primary);
        flex-shrink: 0
      }

      .mod-edit-btn {
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 4px;
        border: 1px solid var(--gray-200);
        background: var(--white);
        cursor: pointer;
        color: var(--gray-500);
        white-space: nowrap;
        font-family: inherit
      }

      .mod-edit-btn:hover {
        border-color: var(--primary);
        color: var(--primary);
        background: var(--primary-light)
      }

      .edit-empty {
        padding: 48px 20px;
        text-align: center;
        color: var(--gray-400)
      }

      .edit-empty-icon {
        font-size: 36px;
        margin-bottom: 10px
      }

      .edit-empty-text {
        font-size: 12px;
        line-height: 1.7
      }

      .edit-header {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding-bottom: 13px;
        margin-bottom: 14px;
        border-bottom: 1px solid var(--gray-200)
      }

      .edit-back {
        padding: 5px 9px;
        font-size: 11px;
        color: var(--gray-500);
        background: var(--gray-100);
        border: none;
        border-radius: var(--radius);
        cursor: pointer;
        font-family: inherit;
        white-space: nowrap;
        flex-shrink: 0
      }

      .edit-back:hover {
        background: var(--gray-200)
      }

      .edit-mod-info {
        flex: 1;
        min-width: 0
      }

      .edit-mod-title {
        font-size: 13px;
        font-weight: 700;
        color: var(--gray-900)
      }

      .edit-mod-cat {
        font-size: 11px;
        color: var(--gray-400);
        margin-top: 2px
      }

      .edit-section {
        margin-bottom: 16px
      }

      .edit-section-label {
        font-size: 10px;
        font-weight: 700;
        color: var(--gray-400);
        text-transform: uppercase;
        letter-spacing: .08em;
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        justify-content: space-between
      }

      .reset-link {
        font-size: 10px;
        color: var(--gray-400);
        cursor: pointer;
        text-decoration: underline;
        font-weight: 400
      }

      .reset-link:hover {
        color: var(--primary)
      }

      .content-editor {
        width: 100%;
        min-height: 210px;
        padding: 8px;
        border: 1px solid var(--gray-200);
        border-radius: var(--radius);
        font-size: 11px;
        font-family: 'Menlo', 'Monaco', 'Consolas', monospace;
        line-height: 1.55;
        resize: vertical;
        outline: none;
        color: var(--gray-900)
      }

      .content-editor:focus {
        border-color: var(--primary)
      }

      .ss-slot {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 10px;
        border: 1px dashed var(--gray-300);
        border-radius: var(--radius);
        margin-bottom: 5px;
        background: var(--gray-50)
      }

      .ss-slot-num {
        width: 20px;
        height: 20px;
        background: var(--gray-200);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 700;
        color: var(--gray-600);
        flex-shrink: 0
      }

      .ss-slot-num.has {
        background: var(--primary);
        color: #fff
      }

      .ss-slot-label {
        font-size: 11px;
        color: var(--gray-500);
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap
      }

      .ss-label-input {
        flex: 1;
        min-width: 0;
        padding: 3px 7px;
        border: 1px solid var(--gray-200);
        border-radius: 4px;
        font-size: 11px;
        font-family: inherit;
        color: var(--gray-900);
        background: var(--white);
        outline: none
      }

      .ss-label-input:focus {
        border-color: var(--primary)
      }

      .ss-thumb {
        width: 42px;
        height: 30px;
        border-radius: 4px;
        object-fit: cover;
        border: 1px solid var(--gray-200);
        flex-shrink: 0
      }

      .ss-upload-btn {
        font-size: 10px;
        padding: 3px 8px;
        border-radius: 4px;
        border: 1px solid var(--gray-200);
        background: var(--white);
        cursor: pointer;
        color: var(--gray-500);
        font-family: inherit;
        white-space: nowrap;
        flex-shrink: 0
      }

      .ss-upload-btn:hover {
        border-color: var(--primary);
        color: var(--primary)
      }

      .ss-clear-btn {
        font-size: 10px;
        padding: 3px 6px;
        border-radius: 4px;
        border: none;
        background: transparent;
        cursor: pointer;
        color: var(--gray-400);
        flex-shrink: 0
      }

      .ss-clear-btn:hover {
        color: var(--danger)
      }

      .ss-size-wrap {
        display: flex;
        align-items: center;
        gap: 2px;
        flex-shrink: 0
      }

      .ss-size-input {
        width: 42px;
        font-size: 10px;
        padding: 2px 4px;
        border: 1px solid var(--gray-200);
        border-radius: 4px;
        background: var(--white);
        font-family: inherit;
        color: var(--gray-600);
        text-align: right;
        outline: none
      }

      .ss-size-input:focus {
        border-color: var(--primary)
      }

      .ss-size-unit {
        font-size: 10px;
        color: var(--gray-500)
      }

      .note-editor {
        width: 100%;
        min-height: 65px;
        padding: 7px 9px;
        border: 1px solid var(--gray-200);
        border-radius: var(--radius);
        font-size: 12px;
        font-family: inherit;
        resize: vertical;
        outline: none;
        line-height: 1.55
      }

      .note-editor:focus {
        border-color: var(--primary)
      }

      .rte-wrap {
        border: 1px solid var(--gray-200);
        border-radius: var(--radius);
        overflow: hidden;
        background: var(--white)
      }

      .rte-wrap:focus-within {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(var(--primary-rgb), .08)
      }

      .rte-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 1px;
        padding: 4px 6px;
        background: var(--gray-50);
        border-bottom: 1px solid var(--gray-200)
      }

      .rte-btn {
        display: inline-flex;
        align-items: center;
        padding: 3px 7px;
        border: 1px solid transparent;
        border-radius: 4px;
        background: transparent;
        cursor: pointer;
        font-size: 11px;
        font-weight: 500;
        color: var(--gray-600);
        font-family: inherit;
        line-height: 1.4;
        transition: all .1s;
        white-space: nowrap
      }

      .rte-btn:hover {
        background: var(--white);
        border-color: var(--gray-200);
        color: var(--gray-900)
      }

      .rte-sep {
        width: 1px;
        height: 16px;
        background: var(--gray-200);
        margin: 0 3px;
        flex-shrink: 0;
        align-self: center
      }

      .rte-body {
        min-height: 500px;
        max-height: calc(100vh - 360px);
        overflow-y: auto;
        padding: 10px 12px;
        font-size: 13px;
        font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
        line-height: 1.75;
        color: var(--gray-900);
        outline: none
      }

      .rte-body:empty::before {
        content: attr(data-placeholder);
        color: var(--gray-400);
        pointer-events: none
      }

      .rte-body h3 {
        font-size: 13px;
        font-weight: 700;
        color: var(--gray-900);
        margin: 14px 0 7px;
        padding-left: 9px;
        border-left: 3px solid var(--primary)
      }

      .rte-body h3:first-child {
        margin-top: 0
      }

      .rte-body p {
        margin-bottom: 10px;
        font-size: 13px;
        font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
        font-weight: 400;
        color: var(--gray-900);
        line-height: 1.75
      }

      .rte-body ol,
      .rte-body ul {

        align-items: center;
        gap: 8px;
        margin: 16px 0 10px;
        font-size: 10px;
        font-weight: 700;
        color: var(--gray-400);
        text-transform: uppercase;
        letter-spacing: .08em
      }

      .comp-module-divider::before,
      .comp-module-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--gray-200)
      }

      .mod-action-bar {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr;
        gap: 4px;
        margin-bottom: 10px
      }

      .mod-action-bar .btn {
        justify-content: center;
        padding: 5px 4px;
        font-size: 11px;
        min-width: 0
      }

      .mod-action-bar-bottom {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid var(--gray-200)
      }

      .free-mode-hint {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 28px 16px;
        border: 2px dashed var(--gray-200);
        border-radius: var(--radius);
        background: linear-gradient(135deg, #fafbff 0%, #f5f3ff 100%);
        margin: 4px 0
      }

      .free-mode-icon {
        font-size: 32px;
        margin-bottom: 10px;
        line-height: 1
      }

      .free-mode-text {
        font-size: 12px;
        color: var(--gray-500);
        line-height: 1.8;
        margin: 0
      }

      .free-mode-text strong {
        color: var(--primary)
      }

      .toggle-label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        user-select: none;
        padding: 4px 0
      }

      .toggle-label .form-label {
        margin: 0;
        cursor: pointer
      }

      .toggle-switch {
        position: relative;
        display: inline-block;
        width: 36px;
        height: 20px;
        flex-shrink: 0
      }

      .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
        position: absolute
      }

      .toggle-slider {
        position: absolute;
        inset: 0;
        background: var(--gray-300);
        border-radius: 10px;
        transition: background .2s;
        cursor: pointer
      }

      .toggle-slider::before {
        content: '';
        position: absolute;
        width: 14px;
        height: 14px;
        left: 3px;
        top: 3px;
        background: #fff;
        border-radius: 50%;
        transition: transform .2s;
        box-shadow: 0 1px 3px rgba(0, 0, 0, .25)
      }

      .toggle-switch input:checked+.toggle-slider {
        background: var(--primary)
      }

      .toggle-switch input:checked+.toggle-slider::before {
        transform: translateX(16px)
      }
    </style>
