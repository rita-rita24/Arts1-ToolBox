  <style>
    /* =====================================================
       LAYER ARCHITECTURE
       ===================================================== */
    @layer reset, tokens, base, component, utility;

    /* =====================================================
       RESET
       ===================================================== */
    @layer reset {
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { min-block-size: 100dvh; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
      button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
      textarea { font: inherit; color: inherit; border: none; outline: none; resize: none; }
      img, svg { display: block; max-inline-size: 100%; }
      dialog { border: none; padding: 0; }
    }

    /* =====================================================
       DESIGN TOKENS
       ===================================================== */
    @layer tokens {
      :root {
        --space-2xs: 0.25rem;
        --space-xs: 0.5rem;
        --space-sm: 0.75rem;
        --space-md: 1rem;
        --space-lg: 1.5rem;
        --space-xl: 2rem;
        --space-2xl: 3rem;
        --space-3xl: 4rem;

        --radius-xs: 0.25rem;
        --radius-sm: 0.5rem;
        --radius-md: 0.75rem;
        --radius-lg: 1rem;
        --radius-xl: 1.25rem;
        --radius-full: 9999px;

        --font-display: 'DotGothic16', monospace;
        --font-body: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
        --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;

        --text-2xs: 0.625rem;
        --text-xs: 0.6875rem;
        --text-sm: 0.75rem;
        --text-base: 0.875rem;
        --text-md: 1rem;
        --text-lg: 1.125rem;
        --text-xl: 1.5rem;
        --text-2xl: 2rem;
        --text-3xl: 2.5rem;
        --text-hero: clamp(2.5rem, 6vw, 4rem);

        --leading-tight: 1.15;
        --leading-normal: 1.6;
        --leading-relaxed: 1.8;

        --container-max: 44rem;

        --ease-spring: linear(0, 0.006, 0.025 2.8%, 0.101 6.1%, 0.539 18.9%, 0.721 25.3%, 0.849 31.5%, 0.937 38.1%, 0.968 41.8%, 0.991 45.7%, 1.006 50.1%, 1.015 55%, 1.017 63.9%, 1.001 85.6%, 1);
        --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        --ease-bounce: linear(0, 0.004, 0.016, 0.035, 0.063, 0.098, 0.141, 0.191, 0.25, 0.316, 0.391 36.8%, 0.563, 0.766, 1 58.8%, 0.946, 0.908 69.1%, 0.895, 0.89, 0.892 74.2%, 0.979, 1.035, 1.063 83%, 1.067, 1.064, 1.053, 1.037, 1.019, 1 95.2%, 0.994, 0.991, 0.99, 0.992, 0.995, 1);
        --dur-fast: 150ms;
        --dur-normal: 250ms;
        --dur-slow: 400ms;

        --accent-green: oklch(80% 0.2 155);
        --accent-pink: oklch(75% 0.2 350);
        --accent-amber: oklch(82% 0.18 85);
        --accent-cyan: oklch(78% 0.15 200);

        --z-sticky: 100;
        --z-modal: 500;
        --z-toast: 600;

        color-scheme: dark;
      }

      /* --- DARK (default) --- */
      [data-theme="dark"] {
        --bg-root: oklch(10% 0.008 270);
        --bg-surface: oklch(14.5% 0.01 270);
        --bg-raised: oklch(17% 0.012 270);
        --bg-overlay: oklch(18% 0.015 270 / 0.88);
        --bg-input: oklch(11% 0.006 270);
        --bg-sticky: oklch(12% 0.01 270 / 0.82);

        --border-subtle: oklch(50% 0 0 / 0.08);
        --border-default: oklch(50% 0 0 / 0.13);
        --border-strong: oklch(60% 0 0 / 0.2);
        --border-accent: oklch(80% 0.2 155 / 0.25);

        --text-primary: oklch(92% 0.005 270);
        --text-secondary: oklch(70% 0.01 270);
        --text-muted: oklch(52% 0.01 270);
        --text-faint: oklch(38% 0.008 270);

        --glow-green: oklch(80% 0.2 155 / 0.12);
        --glow-pink: oklch(75% 0.2 350 / 0.08);

        --hero-number: oklch(85% 0.18 155);

        --inset-top: inset 0 1px 0 oklch(100% 0 0 / 0.04);
        --shadow-card: 0 1px 3px oklch(0% 0 0 / 0.3), 0 0 0 1px oklch(50% 0 0 / 0.07);

        --skeleton-base: oklch(16% 0.01 270);
        --skeleton-shine: oklch(22% 0.01 270);

        --danger: oklch(68% 0.2 25);
        --danger-bg: oklch(68% 0.2 25 / 0.1);

        --toast-success: oklch(22% 0.05 155 / 0.92);
        --toast-info: oklch(20% 0.02 270 / 0.92);
        --toast-error: oklch(22% 0.06 25 / 0.92);

        --scanline-alpha: 0.025;
      }

      /* --- LIGHT --- */
      [data-theme="light"] {
        --bg-root: oklch(96.5% 0.004 75);
        --bg-surface: oklch(99% 0.003 75);
        --bg-raised: oklch(100% 0 0);
        --bg-overlay: oklch(99% 0.003 75 / 0.9);
        --bg-input: oklch(97.5% 0.003 75);
        --bg-sticky: oklch(97% 0.004 75 / 0.84);

        --border-subtle: oklch(50% 0 0 / 0.07);
        --border-default: oklch(50% 0 0 / 0.11);
        --border-strong: oklch(40% 0 0 / 0.16);
        --border-accent: oklch(60% 0.15 155 / 0.3);

        --text-primary: oklch(18% 0.01 270);
        --text-secondary: oklch(38% 0.01 270);
        --text-muted: oklch(55% 0.01 270);
        --text-faint: oklch(72% 0.008 270);

        --glow-green: oklch(80% 0.2 155 / 0.06);
        --glow-pink: oklch(75% 0.2 350 / 0.04);

        --hero-number: oklch(45% 0.18 155);

        --inset-top: inset 0 1px 0 oklch(100% 0 0 / 0.5);
        --shadow-card: 0 1px 3px oklch(0% 0 0 / 0.05), 0 0 0 1px oklch(50% 0 0 / 0.05);

        --skeleton-base: oklch(93% 0.004 75);
        --skeleton-shine: oklch(97% 0.002 75);

        --danger: oklch(55% 0.22 25);
        --danger-bg: oklch(55% 0.22 25 / 0.07);

        --toast-success: oklch(38% 0.1 155 / 0.94);
        --toast-info: oklch(28% 0.03 270 / 0.94);
        --toast-error: oklch(38% 0.1 25 / 0.94);

        --scanline-alpha: 0;
        color-scheme: light;
      }
    }

    /* =====================================================
       BASE
       ===================================================== */
    @layer base {
      body {
        font-family: var(--font-body);
        font-size: var(--text-base);
        line-height: var(--leading-normal);
        color: var(--text-primary);
        background: var(--bg-root);
        transition: background var(--dur-slow) var(--ease-out), color var(--dur-slow) var(--ease-out);
      }

      /* CRT scanline overlay */
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
        background: repeating-linear-gradient(0deg, transparent, transparent 2px, oklch(0% 0 0 / var(--scanline-alpha)) 2px, oklch(0% 0 0 / var(--scanline-alpha)) 4px);
      }

      ::selection {
        background: oklch(80% 0.2 155 / 0.3);
      }

      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: oklch(50% 0 0 / 0.2); border-radius: var(--radius-full); }

      h1, h2, h3 { text-wrap: balance; }
      p { text-wrap: pretty; }
    }

    /* =====================================================
       COMPONENTS
       ===================================================== */
    @layer component {

      /* ---- Container ---- */
      .app-wrap {
        max-inline-size: var(--container-max);
        margin-inline: auto;
        padding-inline: var(--space-md);
        padding-block: var(--space-lg) var(--space-3xl);
      }

      /* ---- Header ---- */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-block-end: var(--space-lg);
      }

      .header__brand {
        display: flex;
        align-items: center;
        gap: var(--space-sm);
      }

      .header__icon {
        inline-size: 2.5rem;
        block-size: 2.5rem;
        border-radius: var(--radius-md);
        background: var(--bg-surface);
        border: 1px solid var(--border-default);
        display: grid;
        place-items: center;
        flex-shrink: 0;
        position: relative;
      }

      .header__icon svg { inline-size: 1.4rem; block-size: 1.4rem; }

      .header__title {
        font-family: var(--font-display);
        font-size: var(--text-lg);
        font-weight: 400;
        letter-spacing: 0.02em;
      }

      .header__sub {
        font-size: var(--text-xs);
        color: var(--text-muted);
        margin-block-start: 0.125rem;
      }

      .header__right {
        display: flex;
        align-items: center;
        gap: var(--space-xs);
      }

      .save-badge {
        font-size: var(--text-xs);
        color: var(--accent-green);
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 0.2rem;
        opacity: 0;
        transition: opacity var(--dur-fast);
      }

      .save-badge.show {
        animation: save-flash 1.4s var(--ease-out) forwards;
      }

      @keyframes save-flash {
        0% { opacity: 1; }
        65% { opacity: 1; }
        100% { opacity: 0; }
      }

      .save-badge .material-symbols-outlined { font-size: 14px; }

      /* ---- Theme toggle ---- */
      .theme-btn {
        inline-size: 2.25rem;
        block-size: 2.25rem;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border-subtle);
        background: var(--bg-surface);
        color: var(--text-secondary);
        display: grid;
        place-items: center;
        transition: all var(--dur-fast) var(--ease-spring);
      }

      .theme-btn:hover {
        color: var(--accent-amber);
        border-color: var(--border-strong);
        transform: translateY(-1px);
      }

      .theme-btn:active {
        transform: translateY(0) scale(0.94);
      }

      .theme-btn .material-symbols-outlined {
        font-size: 20px;
        transition: transform var(--dur-normal) var(--ease-spring);
      }

      .theme-btn:hover .material-symbols-outlined { transform: rotate(20deg); }

      /* ---- Sticky stats bar ---- */
      .sticky-bar {
        position: sticky;
        inset-block-start: 0;
        z-index: var(--z-sticky);
        margin-inline: calc(var(--space-md) * -1);
        padding-inline: var(--space-md);
        padding-block: var(--space-xs);
        background: var(--bg-sticky);
        backdrop-filter: blur(14px) saturate(1.3);
        -webkit-backdrop-filter: blur(14px) saturate(1.3);
        border-block-end: 1px solid var(--border-subtle);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-xs);
        transition: box-shadow var(--dur-fast) var(--ease-out);
      }

      .sticky-bar.scrolled {
        box-shadow: 0 4px 24px oklch(0% 0 0 / 0.15);
      }

      .sticky-bar__main {
        display: flex;
        align-items: baseline;
        gap: var(--space-xs);
        min-inline-size: 0;
      }

      .sticky-bar__label {
        font-size: var(--text-xs);
        color: var(--text-muted);
        font-weight: 500;
        flex-shrink: 0;
      }

      .sticky-bar__count {
        font-family: var(--font-display);
        font-size: var(--text-xl);
        color: var(--hero-number);
        font-variant-numeric: tabular-nums;
        line-height: 1;
        text-shadow: 0 0 20px var(--glow-green);
        transition: transform var(--dur-fast) var(--ease-spring);
      }

      .sticky-bar__count.bump { transform: scale(1.08); }

      .sticky-bar__subs {
        display: flex;
        align-items: center;
        gap: var(--space-sm);
        flex-shrink: 0;
      }

      .sticky-sub {
        display: flex;
        align-items: baseline;
        gap: 0.3rem;
      }

      .sticky-sub__label {
        font-size: var(--text-2xs);
        color: var(--text-faint);
        white-space: nowrap;
      }

      .sticky-sub__val {
        font-family: var(--font-display);
        font-size: var(--text-sm);
        color: var(--text-secondary);
        font-variant-numeric: tabular-nums;
        transition: transform var(--dur-fast) var(--ease-spring);
      }

      .sticky-sub__val.bump { transform: scale(1.08); }

      /* Hide less critical subs on narrow screens */
      @media (max-width: 480px) {
        .sticky-sub.hide-narrow { display: none; }
      }

      /* ---- Editor card ---- */
      .editor {
        background: var(--bg-surface);
        border-radius: var(--radius-xl);
        border: 1px solid var(--border-subtle);
        box-shadow: var(--shadow-card);
        overflow: hidden;
        margin-block-start: var(--space-md);
      }

      .editor__toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-inline: var(--space-md);
        padding-block: var(--space-xs);
        border-block-end: 1px solid var(--border-subtle);
        background: var(--bg-raised);
      }

      .editor__toolbar-title {
        font-size: var(--text-sm);
        font-weight: 600;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        gap: var(--space-2xs);
      }

      .editor__toolbar-title .material-symbols-outlined {
        font-size: 16px;
        color: var(--accent-green);
      }

      .editor__toolbar-actions { display: flex; gap: var(--space-2xs); }

      /* Textarea */
      .editor__textarea {
        display: block;
        inline-size: 100%;
        min-block-size: 14rem;
        padding: var(--space-md);
        background: var(--bg-input);
        color: var(--text-primary);
        font-size: 15px;
        line-height: var(--leading-relaxed);
        transition: background var(--dur-fast);
      }

      .editor__textarea::placeholder { color: var(--text-faint); }
      .editor__textarea:focus { background: var(--bg-surface); }

      /* Format bar */
      .editor__formats {
        padding: var(--space-sm) var(--space-md);
        border-block-start: 1px solid var(--border-subtle);
        background: var(--bg-raised);
      }

      .editor__formats-label {
        display: flex;
        align-items: center;
        gap: var(--space-2xs);
        font-size: var(--text-xs);
        font-weight: 600;
        color: var(--accent-cyan);
        margin-block-end: var(--space-xs);
        letter-spacing: 0.04em;
      }

      .editor__formats-label .material-symbols-outlined { font-size: 14px; }

      .editor__formats-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: var(--space-xs);
      }

      /* ---- Detail stats (progressive reveal) ---- */
      .details {
        margin-block-start: var(--space-lg);
        display: grid;
        gap: var(--space-xs);
        opacity: 0;
        transform: translateY(8px);
        transition: opacity var(--dur-slow) var(--ease-out), transform var(--dur-slow) var(--ease-out);
        pointer-events: none;
        max-block-size: 0;
        overflow: hidden;
      }

      .details.visible {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
        max-block-size: 600px;
      }

      .details__title {
        font-size: var(--text-xs);
        font-weight: 600;
        color: var(--text-muted);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: var(--space-xs);
        margin-block-end: var(--space-2xs);
      }

      .details__title::after {
        content: '';
        flex: 1;
        block-size: 1px;
        background: var(--border-subtle);
      }

      .details__grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: var(--space-xs);
      }

      @media (min-width: 540px) {
        .details__grid { grid-template-columns: repeat(3, 1fr); }
      }

      .detail-card {
        background: var(--bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: var(--space-sm) var(--space-md);
        box-shadow: var(--inset-top);
        transition: transform var(--dur-fast) var(--ease-spring), border-color var(--dur-fast);
      }

      .detail-card:hover {
        transform: translateY(-1px);
        border-color: var(--border-default);
      }

      .detail-card__label {
        font-size: var(--text-xs);
        color: var(--text-muted);
        font-weight: 500;
      }

      .detail-card__val {
        font-family: var(--font-display);
        font-size: var(--text-xl);
        color: var(--text-primary);
        margin-block-start: 0.125rem;
        font-variant-numeric: tabular-nums;
        transition: transform var(--dur-fast) var(--ease-spring);
      }

      .detail-card__val.bump { transform: scale(1.06); }

      .detail-card__dual {
        display: flex;
        align-items: baseline;
        gap: var(--space-2xs);
      }

      .detail-card__sep {
        color: var(--text-faint);
        font-size: var(--text-base);
      }

      /* ---- Empty state ---- */
      .empty-state {
        margin-block-start: var(--space-xl);
        text-align: center;
        opacity: 0;
        transform: translateY(6px);
        transition: opacity var(--dur-slow) var(--ease-out), transform var(--dur-slow) var(--ease-out);
        pointer-events: none;
        max-block-size: 0;
        overflow: hidden;
      }

      .empty-state.visible {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
        max-block-size: 400px;
      }

      .empty-state__icon {
        margin-inline: auto;
        margin-block-end: var(--space-md);
      }

      .empty-state__msg {
        font-family: var(--font-display);
        font-size: var(--text-base);
        color: var(--text-muted);
        margin-block-end: var(--space-md);
        line-height: var(--leading-normal);
      }

      /* ---- Buttons ---- */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2xs);
        padding-inline: var(--space-md);
        padding-block: var(--space-xs);
        border-radius: var(--radius-sm);
        font-size: var(--text-sm);
        font-weight: 600;
        white-space: nowrap;
        transition: all var(--dur-fast) var(--ease-spring);
        position: relative;
      }

      .btn .material-symbols-outlined { font-size: 16px; }

      .btn--primary {
        background: linear-gradient(135deg, var(--accent-green), oklch(68% 0.17 178));
        color: oklch(12% 0.02 155);
        border: 1px solid oklch(80% 0.2 155 / 0.25);
      }
      .btn--primary:hover { transform: translateY(-1px); box-shadow: 0 4px 18px var(--glow-green); }
      .btn--primary:active { transform: translateY(0) scale(0.97); box-shadow: none; }

      .btn--secondary {
        background: transparent;
        color: var(--text-secondary);
        border: 1px solid var(--border-default);
      }
      .btn--secondary:hover { background: var(--bg-raised); border-color: var(--border-strong); color: var(--text-primary); }
      .btn--secondary:active { transform: scale(0.97); }

      .btn--ghost {
        background: transparent;
        color: var(--text-muted);
        border: 1px solid transparent;
      }
      .btn--ghost:hover { color: var(--text-secondary); border-color: var(--border-subtle); background: var(--bg-surface); }
      .btn--ghost:active { transform: scale(0.96); }

      .btn--danger {
        background: transparent;
        color: var(--danger);
        border: 1px solid transparent;
      }
      .btn--danger:hover { background: var(--danger-bg); border-color: var(--danger); }
      .btn--danger:active { transform: scale(0.96); }

      .btn--format {
        background: var(--bg-surface);
        color: var(--text-secondary);
        border: 1px solid var(--border-subtle);
        padding-block: var(--space-xs);
        font-size: var(--text-xs);
        font-weight: 500;
      }
      .btn--format .material-symbols-outlined { font-size: 14px; }
      .btn--format:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); background: oklch(78% 0.15 200 / 0.05); }
      .btn--format:active { transform: scale(0.96); }

      /* Copy feedback */
      .btn--copy-done .material-symbols-outlined {
        animation: check-pop var(--dur-normal) var(--ease-spring);
      }
      @keyframes check-pop {
        0% { transform: scale(0) rotate(-45deg); }
        60% { transform: scale(1.2) rotate(5deg); }
        100% { transform: scale(1) rotate(0); }
      }

      /* ---- Toast ---- */
      .toast-wrap {
        position: fixed;
        inset-block-end: var(--space-lg);
        inset-inline: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: var(--space-xs);
        pointer-events: none;
        z-index: var(--z-toast);
      }

      .toast {
        display: inline-flex;
        align-items: center;
        gap: var(--space-xs);
        padding-inline: var(--space-md);
        padding-block: var(--space-xs);
        border-radius: var(--radius-full);
        font-size: var(--text-sm);
        font-weight: 500;
        color: oklch(95% 0 0);
        backdrop-filter: blur(12px) saturate(1.2);
        -webkit-backdrop-filter: blur(12px) saturate(1.2);
        pointer-events: auto;
        animation: toast-in var(--dur-normal) var(--ease-bounce), toast-out var(--dur-normal) var(--ease-out) 1.5s forwards;
      }

      .toast--success { background: var(--toast-success); }
      .toast--info { background: var(--toast-info); }
      .toast--error { background: var(--toast-error); }
      .toast .material-symbols-outlined { font-size: 16px; }

      @keyframes toast-in {
        0% { opacity: 0; transform: translateY(16px) scale(0.9); }
        60% { opacity: 1; transform: translateY(-4px) scale(1.02); }
        100% { transform: translateY(0) scale(1); }
      }
      @keyframes toast-out {
        to { opacity: 0; transform: translateY(-8px) scale(0.95); }
      }

      /* ---- Modal ---- */
      dialog.modal {
        position: fixed;
        inset: 0;
        margin: auto;
        max-inline-size: 22rem;
        inline-size: calc(100% - var(--space-xl) * 2);
        padding: var(--space-lg);
        border-radius: var(--radius-lg);
        background: var(--bg-overlay);
        color: var(--text-primary);
        backdrop-filter: blur(16px) saturate(1.3);
        -webkit-backdrop-filter: blur(16px) saturate(1.3);
        border: 1px solid var(--border-default);
        box-shadow: 0 24px 48px oklch(0% 0 0 / 0.35);
        z-index: var(--z-modal);
      }
      dialog.modal::backdrop {
        background: oklch(0% 0 0 / 0.5);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        animation: fade-in var(--dur-normal) var(--ease-out);
      }
      dialog.modal[open] {
        animation: modal-pop var(--dur-normal) var(--ease-spring);
      }
      @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
      @keyframes modal-pop {
        from { opacity: 0; transform: scale(0.92) translateY(10px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }

      .modal__title { font-family: var(--font-display); font-size: var(--text-lg); margin-block-end: var(--space-xs); }
      .modal__body { font-size: var(--text-base); color: var(--text-secondary); margin-block-end: var(--space-lg); }
      .modal__actions { display: flex; gap: var(--space-xs); justify-content: flex-end; }

      /* ---- Skeleton ---- */
      .skeleton {
        background: var(--skeleton-base);
        border-radius: var(--radius-sm);
        position: relative;
        overflow: hidden;
      }
      .skeleton::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent, var(--skeleton-shine), transparent);
        animation: shimmer 1.5s infinite;
      }
      @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

      /* ---- Privacy & footer ---- */
      .privacy {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2xs);
        margin-block-start: var(--space-lg);
        font-size: var(--text-xs);
        color: var(--text-muted);
      }
      .privacy .material-symbols-outlined { font-size: 14px; color: var(--accent-green); }

      .footer {
        margin-block-start: var(--space-xl);
        padding-block: var(--space-md);
        text-align: center;
        border-block-start: 1px solid var(--border-subtle);
      }
      .footer__copy { font-size: var(--text-xs); color: var(--text-faint); }

      /* ---- Pixel decoration dots ---- */
      .pixel-row {
        display: flex;
        gap: 3px;
        margin-block-start: var(--space-xs);
        justify-content: center;
      }
      .pixel-row span {
        inline-size: 4px;
        block-size: 4px;
        display: block;
      }

      /* ---- Scroll reveal ---- */
      .reveal {
        animation: reveal-up both;
        animation-timeline: view();
        animation-range: entry 0% entry 20%;
      }
      @keyframes reveal-up {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* ---- Input shake ---- */
      .shake { animation: shake-x var(--dur-normal) var(--ease-spring); }
      @keyframes shake-x {
        0%, 100% { transform: translateX(0); }
        20% { transform: translateX(-4px); }
        40% { transform: translateX(4px); }
        60% { transform: translateX(-2px); }
        80% { transform: translateX(2px); }
      }
    }

    /* =====================================================
       UTILITIES
       ===================================================== */
    @layer utility {
      .sr-only {
        position: absolute; inline-size: 1px; block-size: 1px;
        padding: 0; margin: -1px; overflow: hidden;
        clip: rect(0 0 0 0); clip-path: inset(50%); white-space: nowrap; border: 0;
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
        body::after { display: none; }
      }
    }
  </style>
</head>

<body>
  <div class="app-wrap">
    <!-- ===== Header ===== -->
    <header class="header">
      <div class="header__brand">
        <div class="header__icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="3" width="3" height="3" rx=".5" fill="oklch(80% 0.2 155)" opacity=".8"/>
            <rect x="18" y="3" width="3" height="3" rx=".5" fill="oklch(75% 0.2 350)" opacity=".7"/>
            <rect x="3" y="18" width="3" height="3" rx=".5" fill="oklch(82% 0.18 85)" opacity=".6"/>
            <text x="12" y="15.5" font-size="10" font-weight="bold" fill="oklch(80% 0.2 155)" text-anchor="middle" font-family="monospace">文</text>
          </svg>
        </div>
        <div>
          <h1 class="header__title">スマート文字数カウント</h1>
          <p class="header__sub">入力するだけで即座にカウント</p>
        </div>
      </div>
      <div class="header__right">
        <span id="js-save" class="save-badge">
          <span class="material-symbols-outlined">check_circle</span>保存済み
        </span>
        <button id="js-theme" class="theme-btn" aria-label="テーマ切替">
          <span class="material-symbols-outlined">dark_mode</span>
        </button>
      </div>
    </header>

    <!-- ===== Sticky stats bar ===== -->
    <div id="js-sticky" class="sticky-bar">
      <div class="sticky-bar__main">
        <span class="sticky-bar__label">文字数</span>
        <span id="js-s-total" class="sticky-bar__count">0</span>
      </div>
      <div class="sticky-bar__subs">
        <div class="sticky-sub">
          <span class="sticky-sub__label">空白抜</span>
          <span id="js-s-nospace" class="sticky-sub__val">0</span>
        </div>
        <div class="sticky-sub hide-narrow">
          <span class="sticky-sub__label">純文字</span>
          <span id="js-s-pure" class="sticky-sub__val">0</span>
        </div>
        <div class="sticky-sub">
          <span class="sticky-sub__label">行</span>
          <span id="js-s-lines" class="sticky-sub__val">0</span>
        </div>
        <div class="sticky-sub hide-narrow">
          <span class="sticky-sub__label">半角換算</span>
          <span id="js-s-half" class="sticky-sub__val">0</span>
        </div>
      </div>
    </div>

    <!-- ===== Editor ===== -->
    <div class="editor">
      <div class="editor__toolbar">
        <span class="editor__toolbar-title">
          <span class="material-symbols-outlined">edit_note</span>
          テキスト入力
        </span>
        <div class="editor__toolbar-actions">
          <button id="js-copy" class="btn btn--ghost">
            <span class="material-symbols-outlined">content_copy</span>コピー
          </button>
          <button id="js-clear" class="btn btn--danger">
            <span class="material-symbols-outlined">delete_outline</span>クリア
          </button>
        </div>
      </div>

      <textarea id="js-ta" class="editor__textarea" rows="10" placeholder="ここにテキストを入力またはペースト..." autofocus></textarea>

      <div class="editor__formats">
        <div class="editor__formats-label">
          <span class="material-symbols-outlined">auto_fix_high</span>テキスト整形
        </div>
        <div class="editor__formats-grid">
          <button id="js-fmt-join" class="btn btn--format">
            <span class="material-symbols-outlined">wrap_text</span>改行を連結
          </button>
          <button id="js-fmt-trim" class="btn btn--format">
            <span class="material-symbols-outlined">format_align_left</span>空白を整理
          </button>
          <button id="js-fmt-empty" class="btn btn--format">
            <span class="material-symbols-outlined">density_small</span>空行を削除
          </button>
        </div>
      </div>
    </div>

    <!-- ===== Detail stats (shown only when text exists) ===== -->
    <section id="js-details" class="details">
      <div class="details__title">詳細統計</div>
      <div class="details__grid">
        <div class="detail-card">
          <p class="detail-card__label">空白数</p>
          <p id="js-d-spaces" class="detail-card__val">0</p>
        </div>
        <div class="detail-card">
          <p class="detail-card__label">行数</p>
          <p id="js-d-lines" class="detail-card__val">0</p>
        </div>
        <div class="detail-card">
          <p class="detail-card__label">段落数</p>
          <p id="js-d-paras" class="detail-card__val">0</p>
        </div>
        <div class="detail-card">
          <p class="detail-card__label">全角</p>
          <p id="js-d-fw" class="detail-card__val">0</p>
        </div>
        <div class="detail-card">
          <p class="detail-card__label">半角</p>
          <p id="js-d-hw" class="detail-card__val">0</p>
        </div>
        <div class="detail-card">
          <p class="detail-card__label">半角0.5換算</p>
          <p id="js-d-half" class="detail-card__val">0</p>
        </div>
      </div>
    </section>

    <!-- ===== Empty state (shown when no text) ===== -->
    <div id="js-empty" class="empty-state visible">
      <svg class="empty-state__icon" width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="8" y="8" width="8" height="8" fill="oklch(80% 0.2 155)" opacity=".15"/>
        <rect x="56" y="8" width="8" height="8" fill="oklch(75% 0.2 350)" opacity=".12"/>
        <rect x="8" y="56" width="8" height="8" fill="oklch(82% 0.18 85)" opacity=".12"/>
        <rect x="56" y="56" width="8" height="8" fill="oklch(78% 0.15 200)" opacity=".1"/>
        <rect x="20" y="24" width="32" height="3" rx="1.5" fill="oklch(50% 0 0 / 0.12)"/>
        <rect x="20" y="31" width="24" height="3" rx="1.5" fill="oklch(50% 0 0 / 0.08)"/>
        <rect x="20" y="38" width="28" height="3" rx="1.5" fill="oklch(50% 0 0 / 0.06)"/>
        <rect x="20" y="45" width="18" height="3" rx="1.5" fill="oklch(50% 0 0 / 0.04)"/>
        <text x="36" y="18" font-size="10" font-family="monospace" fill="oklch(80% 0.2 155)" text-anchor="middle" opacity=".4">_</text>
      </svg>
      <p class="empty-state__msg">テキストを入力すると<br>詳細な統計が表示されます</p>
      <button id="js-focus-btn" class="btn btn--primary">
        <span class="material-symbols-outlined">edit</span>入力を始める
      </button>
      <div class="pixel-row">
        <span style="background:oklch(80% 0.2 155 / 0.3)"></span>
        <span style="background:oklch(75% 0.2 350 / 0.25)"></span>
        <span style="background:oklch(82% 0.18 85 / 0.2)"></span>
        <span style="background:oklch(78% 0.15 200 / 0.15)"></span>
        <span style="background:oklch(80% 0.2 155 / 0.1)"></span>
      </div>
    </div>

    <!-- Privacy & footer -->
    <div class="privacy reveal">
      <span class="material-symbols-outlined">shield</span>
      テキストはブラウザ内のみで処理されます
    </div>
    <footer class="footer reveal">
      <p class="footer__copy">&copy; スマート文字数カウント</p>
    </footer>
  </div>

  <!-- Confirm dialog -->
  <dialog id="js-dialog" class="modal">
    <h2 id="js-dlg-title" class="modal__title">テキストを消去しますか？</h2>
    <p id="js-dlg-body" class="modal__body">入力したテキストがすべて削除されます。この操作は元に戻せません。</p>
    <div class="modal__actions">
      <button id="js-dlg-cancel" class="btn btn--secondary">キャンセル</button>
      <button id="js-dlg-ok" class="btn btn--primary" style="background:var(--danger);border-color:oklch(68% 0.2 25 / 0.3)">消去する</button>
    </div>
  </dialog>

  <!-- Toasts -->
  <div id="js-toasts" class="toast-wrap"></div>

  <script>
    /* =======================================================
       Helpers
       ======================================================= */
    const qs  = (s, r = document) => r.querySelector(s);
    const qsa = (s, r = document) => [...r.querySelectorAll(s)];

    /* =======================================================
       DOM ($-prefix)
       ======================================================= */
    const $ta          = qs('#js-ta');
    const $copy        = qs('#js-copy');
    const $clear       = qs('#js-clear');
    const $fmtJoin     = qs('#js-fmt-join');
    const $fmtTrim     = qs('#js-fmt-trim');
    const $fmtEmpty    = qs('#js-fmt-empty');
    const $themeBtn    = qs('#js-theme');
    const $save        = qs('#js-save');
    const $toasts      = qs('#js-toasts');
    const $dialog      = qs('#js-dialog');
    const $dlgCancel   = qs('#js-dlg-cancel');
    const $dlgOk       = qs('#js-dlg-ok');
    const $sticky      = qs('#js-sticky');
    const $details     = qs('#js-details');
    const $emptyState  = qs('#js-empty');
    const $focusBtn    = qs('#js-focus-btn');

    /* sticky bar counts */
    const $sTotal   = qs('#js-s-total');
    const $sNospace = qs('#js-s-nospace');
    const $sPure    = qs('#js-s-pure');
    const $sLines   = qs('#js-s-lines');
    const $sHalf    = qs('#js-s-half');

    /* detail cards */
    const $dSpaces = qs('#js-d-spaces');
    const $dLines  = qs('#js-d-lines');
    const $dParas  = qs('#js-d-paras');
    const $dFw     = qs('#js-d-fw');
    const $dHw     = qs('#js-d-hw');
    const $dHalf   = qs('#js-d-half');

    const STORE_TEXT  = 'charCountToolText';
    const STORE_THEME = 'charCountTheme';

    /* =======================================================
       Theme
       ======================================================= */
    const applyTheme = (t) => {
      document.documentElement.setAttribute('data-theme', t);
      document.documentElement.style.colorScheme = t;
      qs('.material-symbols-outlined', $themeBtn).textContent = t === 'dark' ? 'light_mode' : 'dark_mode';
      try { localStorage.setItem(STORE_THEME, t); } catch {}
    };

    applyTheme((() => { try { return localStorage.getItem(STORE_THEME); } catch { return null; } })() ?? 'dark');
    $themeBtn.addEventListener('click', () => {
      const cur = document.documentElement.getAttribute('data-theme') ?? 'dark';
      applyTheme(cur === 'dark' ? 'light' : 'dark');
    });

    /* =======================================================
       Sticky bar scroll shadow
       ======================================================= */
    const io = new IntersectionObserver(([e]) => {
      $sticky.classList.toggle('scrolled', !e.isIntersecting);
    }, { threshold: 0 });
    io.observe(qs('.header'));

    /* =======================================================
       Analysis engine
       ======================================================= */
    const isHalf = (ch) => {
      const c = ch.codePointAt(0);
      return (c >= 0x0020 && c <= 0x007E) || (c >= 0xFF61 && c <= 0xFF9F);
    };

    const analyze = (text) => {
      const chars = [...text];
      const total = chars.length;
      const noSpace = [...text.replace(/[ \t\u3000]/g, '')].length;
      const pure = [...text.replace(/[\s\u3000]/g, '')].length;

      let half = 0;
      for (const c of chars) { if (!/[\r\n]/.test(c)) half += isHalf(c) ? 0.5 : 1; }

      const spaces = (text.match(/[ \u3000]/g) ?? []).length;
      const lines = text === '' ? 0 : text.split('\n').length;

      let paras = 0;
      if (text.trim()) paras = text.trim().split(/\n{2,}/).filter(p => p.trim()).length;

      let fw = 0, hw = 0;
      for (const c of chars) {
        if (/[\s\u3000]/.test(c)) continue;
        isHalf(c) ? hw++ : fw++;
      }

      return { total, noSpace, pure, half, spaces, lines, paras, fw, hw };
    };

    /* =======================================================
       DOM updater
       ======================================================= */
    const bump = ($el) => {
      $el.classList.remove('bump');
      void $el.offsetWidth;
      $el.classList.add('bump');
      setTimeout(() => $el.classList.remove('bump'), 200);
    };

    const set = ($el, v) => {
      const f = typeof v === 'number' && v % 1 !== 0
        ? v.toLocaleString(undefined, { minimumFractionDigits: 1, maximumFractionDigits: 1 })
        : Number(v).toLocaleString();
      if ($el.textContent !== f) { $el.textContent = f; bump($el); }
    };

    const updateStats = () => {
      const s = analyze($ta.value);
      const hasText = s.total > 0;

      /* sticky bar */
      set($sTotal,   s.total);
      set($sNospace, s.noSpace);
      set($sPure,    s.pure);
      set($sLines,   s.lines);
      set($sHalf,    s.half);

      /* detail cards */
      set($dSpaces, s.spaces);
      set($dLines,  s.lines);
      set($dParas,  s.paras);
      set($dFw,     s.fw);
      set($dHw,     s.hw);
      set($dHalf,   s.half);

      /* progressive reveal */
      $details.classList.toggle('visible', hasText);
      $emptyState.classList.toggle('visible', !hasText);
    };

    /* =======================================================
       Storage
       ======================================================= */
    const saveText = () => {
      try { localStorage.setItem(STORE_TEXT, $ta.value); showSave(); } catch {}
    };

    const loadText = () => {
      try { const t = localStorage.getItem(STORE_TEXT); if (t !== null) $ta.value = t; } catch {}
    };

    const showSave = () => {
      $save.classList.remove('show');
      void $save.offsetWidth;
      $save.classList.add('show');
    };

    /* =======================================================
       Toast
       ======================================================= */
    const toast = (msg, type = 'success') => {
      const icons = { success: 'check_circle', info: 'info', error: 'error' };
      const $t = document.createElement('div');
      $t.className = `toast toast--${type}`;
      $t.innerHTML = `<span class="material-symbols-outlined">${icons[type] ?? 'info'}</span>${msg}`;
      $toasts.appendChild($t);
      setTimeout(() => $t.remove(), 2000);
    };

    /* =======================================================
       Confirm dialog
       ======================================================= */
    let _resolve = null;

    const confirm = ({ title, body }) => {
      qs('#js-dlg-title').textContent = title;
      qs('#js-dlg-body').textContent = body;
      $dialog.showModal();
      return new Promise(r => { _resolve = r; });
    };

    $dlgCancel.addEventListener('click', () => { $dialog.close(); _resolve?.(false); });
    $dlgOk.addEventListener('click',     () => { $dialog.close(); _resolve?.(true); });
    $dialog.addEventListener('click', (e) => { if (e.target === $dialog) { $dialog.close(); _resolve?.(false); } });
    $dialog.addEventListener('close', () => { _resolve?.(false); _resolve = null; });

    /* =======================================================
       Text formatting
       ======================================================= */
    const joinLines = (t) => {
      const PH = '\x00P\x00';
      let r = t.replace(/\n{2,}/g, PH);
      r = r.replace(/([^\x00-\x7F])\n(?=[^\x00-\x7F])/g, '$1');
      r = r.replace(/\n/g, ' ');
      return r.replaceAll(PH, '\n\n');
    };

    const trimSpaces = (t) => {
      let r = t.split('\n').map(l => {
        l = l.replace(/^[\s\u3000]+|[\s\u3000]+$/g, '');
        return l.replace(/[ \u3000]{2,}/g, ' ');
      }).join('\n');
      r = r.replace(/([\u3000-\u9FFF\uF900-\uFAFF\uFF01-\uFF60]) ([\u3000-\u9FFF\uF900-\uFAFF\uFF01-\uFF60])/g, '$1$2');
      return r.replace(/([\u3000-\u9FFF\uF900-\uFAFF\uFF01-\uFF60]) ([\u3000-\u9FFF\uF900-\uFAFF\uFF01-\uFF60])/g, '$1$2');
    };

    const removeEmpty = (t) => t.split('\n').filter(l => l.trim()).join('\n');

    const applyFmt = (newText, msg) => {
      if ($ta.value === newText) { toast('変更箇所がありません', 'info'); return; }
      $ta.value = newText;
      updateStats();
      saveText();
      toast(msg);
    };

    /* =======================================================
       Copy with icon morph
       ======================================================= */
    const handleCopy = async () => {
      if (!$ta.value) { toast('テキストがありません', 'info'); return; }
      try { await navigator.clipboard.writeText($ta.value); } catch { $ta.select(); document.execCommand('copy'); }

      const $icon = qs('.material-symbols-outlined', $copy);
      const orig = $icon.textContent;
      $icon.textContent = 'check';
      $copy.classList.add('btn--copy-done');
      toast('コピーしました');
      setTimeout(() => { $icon.textContent = orig; $copy.classList.remove('btn--copy-done'); }, 1200);
    };

    /* =======================================================
       Events
       ======================================================= */
    $ta.addEventListener('input', () => { updateStats(); saveText(); });

    $copy.addEventListener('click', handleCopy);

    $clear.addEventListener('click', async () => {
      if (!$ta.value) return;
      const ok = await confirm({
        title: 'テキストを消去しますか？',
        body: '入力したテキストがすべて削除されます。この操作は元に戻せません。'
      });
      if (ok) {
        $ta.value = '';
        try { localStorage.removeItem(STORE_TEXT); } catch {}
        updateStats();
        toast('消去しました', 'info');
      }
    });

    $fmtJoin.addEventListener('click',  () => { if (!$ta.value) { toast('テキストがありません', 'info'); return; } applyFmt(joinLines($ta.value), '改行を連結しました'); });
    $fmtTrim.addEventListener('click',  () => { if (!$ta.value) { toast('テキストがありません', 'info'); return; } applyFmt(trimSpaces($ta.value), '空白を整理しました'); });
    $fmtEmpty.addEventListener('click', () => { if (!$ta.value) { toast('テキストがありません', 'info'); return; } applyFmt(removeEmpty($ta.value), '空行を削除しました'); });

    $focusBtn.addEventListener('click', () => { $ta.focus(); });

    /* =======================================================
       Init
       ======================================================= */
    loadText();
    updateStats();
  </script>
</body>
</html>
