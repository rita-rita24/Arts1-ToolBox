<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KAIK エディタ</title>

  <!-- ファビコン -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%232563eb' d='M10 10.02h5V21h-5zM17 21h3c1.1 0 2-.9 2-2v-9h-5v11zm3-18H5c-1.1 0-2 .9-2 2v3h19V5c0-1.1-.9-2-2-2zM3 19c0 1.1.9 2 2 2h3V10.02H3V19z'/></svg>">

  <!-- Material Symbols アイコンフォント -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <!--
  ============================================================
  CSS スタイル定義
  ============================================================
  -->
  <style>
    /* ========================================
       カラーテーマ設定
       ======================================== */
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #dc2626;
      --danger-hover: #b91c1c;
      --success: #16a34a;
      --warning: #f59e0b;
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-muted: #64748b;
      --header-bg: #f1f5f9;
      --highlight: #fef08a;
    }

    [data-theme="dark"] {
      --primary: #3b82f6;
      --primary-hover: #60a5fa;
      --danger: #ef4444;
      --danger-hover: #f87171;
      --success: #22c55e;
      --warning: #fbbf24;
      --bg: #000000;
      --surface: #121212;
      --border: #404040;
      --text: #ffffff;
      --text-muted: #a3a3a3;
      --header-bg: #262626;
      --highlight: #854d0e;
    }

    /* ========================================
       ベーススタイル
       ======================================== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ========================================
       Material Symbols アイコンスタイル
       ======================================== */
    .material-symbols-outlined {
      font-variation-settings:
        'FILL' 0,
        'wght' 400,
        'GRAD' 0,
        'opsz' 24;
      font-size: 1.25em;
      line-height: 1;
      display: inline-block;
      vertical-align: middle;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .header h1 .material-symbols-outlined {
      font-size: 2rem;
      color: var(--primary);
    }

    .btn .material-symbols-outlined {
      font-size: 1.15rem;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ヘッダー */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .stats {
      display: flex;
      gap: 16px;
      font-size: 0.9rem;
      color: var(--text-muted);
      background: var(--surface);
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .stats span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .stats .value {
      font-weight: 600;
      color: var(--text);
    }

    /* ダークモードトグル */
    .theme-toggle {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .theme-toggle:hover {
      background: var(--header-bg);
    }

    /* ========================================
       モード切り替えスイッチャー
       ======================================== */
    .mode-switcher {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .mode-btn {
      padding: 6px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      border: none;
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s ease;
      min-height: 36px;
      letter-spacing: 0.02em;
    }

    .mode-btn:first-child {
      border-right: 1px solid var(--border);
    }

    .mode-btn.active {
      background: var(--primary);
      color: white;
    }

    .mode-btn:not(.active):hover {
      background: var(--header-bg);
      color: var(--text);
    }

    /* ツールバー */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
      padding: 8px 12px;
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      align-items: center;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 4px;
      position: relative;
    }

    .toolbar-group:not(:last-child)::after {
      content: '';
      display: block;
      width: 1px;
      height: 20px;
      background: var(--border);
      margin-left: 2px;
    }

    .ml-auto {
      margin-left: auto;
    }

    .ml-auto::after {
      display: none !important;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      font-size: 0.85rem;
      font-weight: 500;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
      min-height: 36px;
      background: var(--header-bg);
      color: var(--text);
    }

    .btn:hover {
      background: var(--border);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: var(--danger-hover);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* 検索バー */
    .search-bar {
      display: none;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 16px;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-bar.show {
      display: flex;
    }

    .search-bar input {
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.9rem;
      background: var(--bg);
      color: var(--text);
      min-width: 200px;
      height: 36px;
    }

    .search-bar input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .search-info {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .search-nav {
      display: flex;
      gap: 4px;
    }

    .search-nav button {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      background: var(--bg);
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .search-nav button:hover {
      background: var(--header-bg);
    }

    .search-close {
      margin-left: auto;
    }

    /* ペーストエリア */
    .paste-area {
      position: relative;
      margin-bottom: 20px;
    }

    .paste-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      background: var(--surface);
      transition: all 0.2s;
      cursor: pointer;
    }

    .paste-zone:hover {
      border-color: var(--primary);
      background: var(--header-bg);
    }

    .paste-zone h2 {
      font-size: 1.2rem;
      margin-bottom: 8px;
      color: var(--text);
    }

    .paste-zone p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .paste-zone.has-data {
      display: none;
    }

    /* テーブルコンテナ */
    .table-container {
      display: none;
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .table-container.show {
      display: block;
    }

    .table-scroll {
      overflow: auto;
      max-height: 70vh;
    }

    /* テーブル */
    table {
      width: max-content;
      border-collapse: collapse;
      font-size: 0.9rem;
      table-layout: fixed;
    }

    th,
    td {
      padding: 10px 12px;
      border: 1px solid var(--border);
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    th {
      padding: 0;
      background: var(--header-bg);
      font-weight: 600;
      position: sticky;
      top: -1px;
      z-index: 10;
      user-select: none;
    }

    td {
      padding: 10px 12px;
    }

    th:hover {
      background: var(--border);
    }

    /* 列リサイズハンドル */
    .resize-handle {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 6px;
      cursor: col-resize;
      background: transparent;
      z-index: 100;
    }

    .resize-handle:hover,
    .resize-handle.resizing {
      background: var(--primary);
    }

    .th-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
    }

    .th-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      flex: 1;
      width: 100%;
      cursor: default;
    }

    .th-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.82rem;
    }

    .row-num {
      background: var(--header-bg);
      color: var(--text-muted);
      font-size: 0.8rem;
      text-align: center;
      width: 70px !important;
      min-width: 70px !important;
      max-width: 70px !important;
      font-weight: normal;
      padding: 0 !important;
      position: sticky;
      left: -1px;
      z-index: 20;
      border-right: 1px solid var(--border);
    }

    .row-num-wrapper {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      height: 100%;
      padding: 0 4px;
      position: relative;
    }

    .row-num-text {
      flex: 1;
      text-align: center;
    }

    .row-menu-btn {
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.5;
      transition: all 0.15s;
    }

    .row-num:hover .row-menu-btn,
    .row-menu-btn:focus-visible {
      opacity: 1;
    }

    .row-menu-btn:hover {
      background: var(--border);
      color: var(--text);
    }

    th.row-num {
      z-index: 30;
      padding: 10px 0 !important;
    }

    td {
      background: var(--surface);
    }

    tr:hover td:not(.row-num) {
      background: var(--header-bg);
    }

    td[contenteditable] {
      outline: none;
    }

    td[contenteditable]:focus,
    td.selected {
      background: var(--header-bg);
      box-shadow: inset 0 0 0 2px var(--primary);
    }

    td.highlight {
      background: var(--highlight) !important;
    }

    td.current-match {
      background: var(--warning) !important;
    }

    /* 行メニュー */
    .column-menu {
      display: none;
      position: absolute;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      z-index: 1000;
      min-width: 200px;
      overflow: hidden;
    }

    .column-menu.show {
      display: block;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.1s;
    }

    .menu-item:hover {
      background: var(--header-bg);
    }

    .menu-item.danger {
      color: var(--danger);
    }

    .menu-item.danger:hover {
      background: #fee2e2;
    }

    [data-theme="dark"] .menu-item.danger:hover {
      background: #262626;
    }

    .menu-divider {
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }

    /* トースト */
    .toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      padding: 14px 24px;
      background: var(--text);
      color: var(--bg);
      border-radius: 10px;
      font-size: 0.9rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      animation: toastIn 0.3s ease, toastOut 0.3s ease 1.2s forwards;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toast.success {
      background: var(--success);
      color: white;
    }

    .toast.error {
      background: var(--danger);
      color: white;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes toastOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    /* モーダル */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 3000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border-radius: 16px;
      max-width: 400px;
      width: 100%;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .modal h3 {
      font-size: 1.1rem;
      margin-bottom: 12px;
    }

    .modal p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 20px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    /* ショートカットヒント */
    .shortcut-hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-left: 4px;
    }

    /* レスポンシブ */
    @media (max-width: 768px) {
      .container { padding: 12px; }
      .header { flex-direction: column; align-items: stretch; }
      .stats { justify-content: center; flex-wrap: wrap; }
      .toolbar { padding: 12px; }
      .btn { padding: 6px 12px; font-size: 0.8rem; }
      .paste-zone { padding: 24px; }
      th, td { padding: 8px; }
      .shortcut-hint { display: none; }
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- ヘッダー -->
    <header class="header">
      <h1><span class="material-symbols-outlined">edit_document</span> KAIK エディタ</h1>
      <div class="header-right">
        <!-- モード切り替え -->
        <div class="mode-switcher">
          <button class="mode-btn active" id="csvModeBtn" onclick="switchMode('csv')">CSV形式</button>
          <button class="mode-btn" id="txtModeBtn" onclick="switchMode('txt')">TXT形式（固定長）</button>
        </div>
        <div class="stats" id="stats">
          <span>行: <span class="value" id="rowCount">0</span></span>
          <span>列: <span class="value" id="colCount">0</span></span>
          <span>サイズ: <span class="value" id="dataSize">0 KB</span></span>
          <span>形式: <span class="value" id="dataFormat">CSV</span></span>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" title="ダークモード切替">
          <span class="material-symbols-outlined" id="themeIcon">dark_mode</span>
        </button>
      </div>
    </header>

    <!-- 検索バー -->
    <div class="search-bar" id="searchBar">
      <input type="text" id="searchInput" placeholder="検索..." oninput="performSearch()">
      <input type="text" id="replaceInput" placeholder="置換...">
      <button class="btn" onclick="replaceNext()">置換</button>
      <button class="btn" onclick="replaceAll()">すべて置換</button>
      <div class="search-nav">
        <button onclick="navigateMatch(-1)" title="前へ"><span class="material-symbols-outlined">expand_less</span></button>
        <button onclick="navigateMatch(1)" title="次へ"><span class="material-symbols-outlined">expand_more</span></button>
      </div>
      <span class="search-info" id="searchInfo"></span>
      <button class="btn search-close" onclick="closeSearch()"><span class="material-symbols-outlined">close</span></button>
    </div>

    <!-- ツールバー -->
    <div class="toolbar">
      <!-- 履歴グループ -->
      <div class="toolbar-group">
        <button class="btn" id="undoBtn" onclick="undo()" disabled title="元に戻す">
          <span class="material-symbols-outlined">undo</span>
        </button>
        <button class="btn" id="redoBtn" onclick="redo()" disabled title="やり直し">
          <span class="material-symbols-outlined">redo</span>
        </button>
      </div>

      <!-- 編集グループ -->
      <div class="toolbar-group">
        <button class="btn" onclick="triggerPaste()" title="クリップボードから貼り付け">
          <span class="material-symbols-outlined">content_paste</span> 貼り付け
        </button>
        <button class="btn" onclick="addRow()" title="行を追加">
          <span class="material-symbols-outlined">add_box</span> 行追加
        </button>
      </div>

      <!-- 表示・検索グループ -->
      <div class="toolbar-group">
        <button class="btn" onclick="openSearch()" title="検索・置換">
          <span class="material-symbols-outlined">search</span> 検索 <span class="shortcut-hint">Ctrl+F</span>
        </button>
      </div>

      <!-- エクスポートグループ -->
      <div class="toolbar-group">
        <button class="btn" onclick="copyData()" title="クリップボードにコピー">
          <span class="material-symbols-outlined">content_copy</span> コピー
        </button>
        <button class="btn" onclick="downloadData()" title="ファイルとして保存">
          <span class="material-symbols-outlined">save</span> 保存
        </button>
      </div>

      <!-- 削除グループ -->
      <div class="toolbar-group ml-auto">
        <button class="btn btn-danger" onclick="confirmClearAll()" title="すべてクリア">
          <span class="material-symbols-outlined">delete</span> クリア
        </button>
      </div>
    </div>

    <!-- ペーストエリア -->
    <div class="paste-area">
      <div class="paste-zone" id="pasteZone" tabindex="0" onclick="triggerPaste()">
        <span class="material-symbols-outlined"
          style="font-size: 48px; color: var(--text-muted); margin-bottom: 16px;">content_paste</span>
        <h2 id="pasteZoneTitle">クリックしてCSVデータを貼り付け</h2>
        <p>Ctrl+V でもペーストできます</p>
        <p style="margin-top: 8px; font-size: 0.8rem;" id="pasteZoneHint">カンマ区切り(CSV)形式</p>
      </div>
    </div>

    <!-- テーブル -->
    <div class="table-container" id="tableContainer">
      <div class="table-scroll" id="tableScroll">
        <table id="dataTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 行メニュー -->
  <div class="column-menu" id="rowMenu">
    <div class="menu-item" onclick="copyRow()">
      <span class="material-symbols-outlined">content_copy</span>
      行をコピー
    </div>
    <div class="menu-item" onclick="duplicateRow()">
      <span class="material-symbols-outlined">content_copy</span>
      行を複製
    </div>
    <div class="menu-divider"></div>
    <div class="menu-item danger" onclick="confirmDeleteRowFromMenu()">
      <span class="material-symbols-outlined">delete</span>
      行を削除
    </div>
  </div>

  <!-- トースト -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- 確認モーダル -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle">確認</h3>
      <p id="modalMessage"></p>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">キャンセル</button>
        <button class="btn btn-danger" id="modalConfirmBtn">削除</button>
      </div>
    </div>
  </div>

  <!--
  ============================================================
  JavaScript プログラム
  ============================================================
  -->
  <script>
    // ========================================
    // 定数定義：固定ヘッダー
    // ========================================

    const CSV_HEADERS = [
      '従業員コード',
      '伝票年月日',
      'G大伝票種別',
      '組番号',
      '支払方法',
      '振込区分',
      '出納年月日',
      '原価センタコード',
      '勘定科目コード',
      '取引タイプ',
      '計上区分',
      '機能領域',
      '別記科目',
      '建仮件名・款コード',
      '受注用工事件名コード',
      '取引先コード',
      '貸借区分',
      '税抜金額',

    ];

    const TXT_HEADERS = [
      '従業員コード',
      '伝票年月日',
      '伝票発番グループコード',

      '予備',
      '摘要'
    ];

    // ========================================
    // グローバル変数定義
    // ========================================

    let state = {
      data: [],           // データ行（ヘッダーを含まない純粋なデータ）
      editMode: 'csv',    // 'csv' または 'txt'
      columnWidths: {}    // 各列の幅設定
    };

    let undoStack = [];
    let redoStack = [];
    const MAX_HISTORY = 20;

    let searchMatches = [];
    let currentMatchIndex = -1;

    let isResizing = false;
    let resizeColumnIndex = -1;
    let resizeStartX = 0;
    let resizeStartWidth = 0;

    let activeRowIndex = -1;

    // ========================================
    // 初期化処理
    // ========================================

    document.addEventListener('DOMContentLoaded', () => {
      initEventListeners();
      initTheme();
      loadFromStorage();
    });

    function initEventListeners() {
      document.addEventListener('keydown', handleKeyDown);
      document.addEventListener('paste', handlePaste);
      document.addEventListener('mousemove', handleResizeMove);
      document.addEventListener('mouseup', handleResizeEnd);
      document.addEventListener('click', () => {
        closeRowMenu();
      });
    }

    // ========================================
    // モード切り替え
    // ========================================

    /**
     * CSV / TXT モードを切り替える
     * @param {string} mode - 'csv' または 'txt'
     */
    function switchMode(mode) {
      if (state.editMode === mode) return;

      if (state.data.length > 0) {
        openModal(
          'モード切り替え',
          `${mode === 'csv' ? 'CSV形式' : 'TXT形式（固定長）'}に切り替えます。現在のデータはクリアされます。よろしいですか？`,
          () => {
            _applyModeSwitch(mode);
            closeModal();
          }
        );
      } else {
        _applyModeSwitch(mode);
      }
    }

    function _applyModeSwitch(mode) {
      state.editMode = mode;
      state.data = [];
      state.columnWidths = {};
      undoStack = [];
      redoStack = [];
      updateHistoryButtons();
      _updateModeUI();
      renderTable();
      updateStats();
      saveToStorage();
      showToast(`${mode === 'csv' ? 'CSV形式' : 'TXT形式（固定長）'}に切り替えました`, 'success');
    }

    function _updateModeUI() {
      const isCsv = state.editMode === 'csv';
      document.getElementById('csvModeBtn').classList.toggle('active', isCsv);
      document.getElementById('txtModeBtn').classList.toggle('active', !isCsv);

      const title = isCsv ? 'クリックしてCSVデータを貼り付け' : 'クリックしてTXT（固定長）データを貼り付け';
      const hint = isCsv ? 'カンマ区切り(CSV)形式' : 'タブ区切りまたはカンマ区切りを自動判定';
      document.getElementById('pasteZoneTitle').textContent = title;
      document.getElementById('pasteZoneHint').textContent = hint;
    }

    function _getCurrentHeaders() {
      return state.editMode === 'csv' ? CSV_HEADERS : TXT_HEADERS;
    }

    // ========================================
    // キーボード操作処理
    // ========================================

    function handleKeyDown(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
        e.preventDefault();
        undo();
        return;
      }
      if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) {
        e.preventDefault();
        redo();
        return;
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
        e.preventDefault();
        openSearch();
        return;
      }
      if (e.key === 'Escape') {
        closeSearch();
        return;
      }

      const activeElement = document.activeElement;
      if (activeElement.tagName === 'TD' && activeElement.isContentEditable) {
        handleCellNavigation(e, activeElement);
      }
    }

    function handleCellNavigation(e, cell) {
      const row = parseInt(cell.dataset.row);
      const col = parseInt(cell.dataset.col);
      const headers = _getCurrentHeaders();
      let newRow = row;
      let newCol = col;
      let shouldMove = false;

      switch (e.key) {
        case 'Tab':
          e.preventDefault();
          if (e.shiftKey) {
            newCol = col - 1;
            if (newCol < 0) {
              newCol = headers.length - 1;
              newRow = row - 1;
            }
          } else {
            newCol = col + 1;
            if (newCol >= headers.length) {
              newCol = 0;
              newRow = row + 1;
            }
          }
          shouldMove = true;
          break;
        case 'Enter':
          if (!e.shiftKey) {
            e.preventDefault();
            newRow = row + 1;
            shouldMove = true;
          }
          break;
        case 'ArrowUp':
          if (e.altKey) { e.preventDefault(); newRow = row - 1; shouldMove = true; }
          break;
        case 'ArrowDown':
          if (e.altKey) { e.preventDefault(); newRow = row + 1; shouldMove = true; }
          break;
        case 'ArrowLeft':
          if (e.altKey) { e.preventDefault(); newCol = col - 1; shouldMove = true; }
          break;
        case 'ArrowRight':
          if (e.altKey) { e.preventDefault(); newCol = col + 1; shouldMove = true; }
          break;
      }

      if (shouldMove && newRow >= 0 && newRow < state.data.length && newCol >= 0 && newCol < headers.length) {
        const newCell = document.querySelector(`td[data-row="${newRow}"][data-col="${newCol}"]`);
        if (newCell) newCell.focus();
      }
    }

    // ========================================
    // テーマ切り替え機能
    // ========================================

    function initTheme() {
      const saved = localStorage.getItem('kaikEditor_theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      setTheme(theme);
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      setTheme(next);
      localStorage.setItem('kaikEditor_theme', next);
    }

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('themeIcon').textContent = theme === 'dark' ? 'light_mode' : 'dark_mode';
    }

    // ========================================
    // データ入力処理
    // ========================================

    function handlePaste(e) {
      const pasteZone = document.getElementById('pasteZone');
      if (pasteZone.classList.contains('has-data')) return;

      const text = e.clipboardData?.getData('text');
      if (text) {
        e.preventDefault();
        processData(text);
      }
    }

    async function triggerPaste() {
      try {
        const text = await navigator.clipboard.readText();
        if (text) {
          processData(text);
        }
      } catch (err) {
        showToast('クリップボードにアクセスできません', 'error');
      }
    }

    // ========================================
    // データ解析処理
    // ========================================

    /**
     * データを解析してテーブルに読み込む
     * 1行目がヘッダーと一致する場合はスキップする
     * @param {string} text - ペーストされたテキストデータ
     */
    function processData(text) {
      if (!text.trim()) {
        showToast('データが空です', 'error');
        return;
      }

      const delimiter = detectDelimiter(text);
      const parsed = parseCSV(text, delimiter);

      if (parsed.length === 0) {
        showToast('データを解析できませんでした', 'error');
        return;
      }

      const headers = _getCurrentHeaders();

      // 1行目がヘッダー行かどうか判定（先頭セルが固定ヘッダーの最初の項目と一致）
      let dataRows = parsed;
      if (parsed.length > 0 && parsed[0][0] === headers[0]) {
        dataRows = parsed.slice(1);
      }

      // 列数を固定ヘッダーに合わせる
      state.data = dataRows.map(row => {
        const normalized = [...row];
        while (normalized.length < headers.length) normalized.push('');
        return normalized.slice(0, headers.length);
      });

      state.columnWidths = {};
      undoStack = [];
      redoStack = [];
      updateHistoryButtons();

      renderTable();
      updateStats();
      saveToStorage();

      showToast(`${state.data.length}行のデータを読み込みました`, 'success');
    }

    /**
     * 区切り文字を自動判定する（カンマ or タブ）
     */
    function detectDelimiter(text) {
      const firstLines = text.split('\n').slice(0, 5).join('\n');
      const commaCount = (firstLines.match(/,/g) || []).length;
      const tabCount = (firstLines.match(/\t/g) || []).length;
      return tabCount > commaCount ? '\t' : ',';
    }

    /**
     * CSVテキストを2次元配列にパースする
     */
    function parseCSV(text, delimiter) {
      const rows = [];
      let currentRow = [];
      let currentCell = '';
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (inQuotes) {
          if (char === '"') {
            if (nextChar === '"') {
              currentCell += '"';
              i++;
            } else {
              inQuotes = false;
            }
          } else {
            currentCell += char;
          }
        } else {
          if (char === '"') {
            inQuotes = true;
          } else if (char === delimiter) {
            currentRow.push(currentCell);
            currentCell = '';
          } else if (char === '\n' || (char === '\r' && nextChar === '\n')) {
            currentRow.push(currentCell);
            if (currentRow.some(cell => cell.trim())) {
              rows.push(currentRow);
            }
            currentRow = [];
            currentCell = '';
            if (char === '\r') i++;
          } else if (char !== '\r') {
            currentCell += char;
          }
        }
      }

      currentRow.push(currentCell);
      if (currentRow.some(cell => cell.trim())) {
        rows.push(currentRow);
      }

      const maxCols = Math.max(...rows.map(r => r.length));
      return rows.map(row => {
        while (row.length < maxCols) row.push('');
        return row;
      });
    }

    // ========================================
    // テーブル表示処理
    // ========================================

    function renderTable() {
      const tableHead = document.getElementById('tableHead');
      const tableBody = document.getElementById('tableBody');
      const container = document.getElementById('tableContainer');
      const pasteZone = document.getElementById('pasteZone');

      if (state.data.length === 0) {
        container.classList.remove('show');
        pasteZone.classList.remove('has-data');
        return;
      }

      container.classList.add('show');
      pasteZone.classList.add('has-data');

      const headers = _getCurrentHeaders();

      // ヘッダー行の描画（編集不可）
      let headHTML = '<tr><th class="row-num">#</th>';
      headers.forEach((header, i) => {
        const width = state.columnWidths[i] || 130;
        headHTML += `
          <th style="width: ${width}px; min-width: ${width}px;" data-col="${i}">
            <div class="th-wrapper">
              <div class="th-content">
                <span class="th-text" title="${escapeHTML(header)}">${escapeHTML(header)}</span>
              </div>
              <div class="resize-handle" onmousedown="startResize(event, ${i})"></div>
            </div>
          </th>
        `;
      });
      headHTML += '</tr>';
      tableHead.innerHTML = headHTML;

      // データ行の描画（編集可能）
      let bodyHTML = '';
      state.data.forEach((row, i) => {
        bodyHTML += `<tr data-row="${i}">
          <td class="row-num">
            <div class="row-num-wrapper">
              <span class="row-num-text">${i + 1}</span>
              <button class="row-menu-btn" onclick="openRowMenu(event, ${i})" title="行メニュー">
                <span class="material-symbols-outlined" style="font-size: 1.0rem;">more_vert</span>
              </button>
            </div>
          </td>`;
        headers.forEach((_, j) => {
          const width = state.columnWidths[j] || 130;
          const cellValue = row[j] !== undefined ? row[j] : '';
          bodyHTML += `<td contenteditable="true" data-row="${i}" data-col="${j}"
            style="width: ${width}px; min-width: ${width}px;"
            onblur="handleCellBlur(this)">${escapeHTML(cellValue)}</td>`;
        });
        bodyHTML += '</tr>';
      });
      tableBody.innerHTML = bodyHTML;

      if (document.getElementById('searchBar').classList.contains('show')) {
        performSearch();
      }
    }

    function escapeHTML(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ========================================
    // 列リサイズ機能
    // ========================================

    function startResize(e, colIndex) {
      e.stopPropagation();
      isResizing = true;
      resizeColumnIndex = colIndex;
      resizeStartX = e.clientX;
      const th = document.querySelector(`th[data-col="${colIndex}"]`);
      resizeStartWidth = th.offsetWidth;
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
    }

    function handleResizeMove(e) {
      if (!isResizing) return;
      const diff = e.clientX - resizeStartX;
      const newWidth = Math.max(60, resizeStartWidth + diff);
      state.columnWidths[resizeColumnIndex] = newWidth;

      document.querySelectorAll(`th[data-col="${resizeColumnIndex}"]`).forEach(th => {
        th.style.width = `${newWidth}px`;
        th.style.minWidth = `${newWidth}px`;
      });
      document.querySelectorAll(`td[data-col="${resizeColumnIndex}"]`).forEach(cell => {
        cell.style.width = `${newWidth}px`;
        cell.style.minWidth = `${newWidth}px`;
      });
    }

    function handleResizeEnd() {
      if (isResizing) {
        isResizing = false;
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        saveToStorage();
      }
    }

    // ========================================
    // セル編集機能
    // ========================================

    function handleCellBlur(cell) {
      const row = parseInt(cell.dataset.row);
      const col = parseInt(cell.dataset.col);
      const newValue = cell.textContent;

      if (state.data[row] && state.data[row][col] !== newValue) {
        saveToHistory();
        state.data[row][col] = newValue;
        updateStats();
        saveToStorage();
      }
    }

    // ========================================
    // 検索・置換機能
    // ========================================

    function openSearch() {
      document.getElementById('searchBar').classList.add('show');
      document.getElementById('searchInput').focus();
    }

    function closeSearch() {
      document.getElementById('searchBar').classList.remove('show');
      document.getElementById('searchInput').value = '';
      document.getElementById('replaceInput').value = '';
      clearHighlights();
      searchMatches = [];
      currentMatchIndex = -1;
      updateSearchInfo();
    }

    function performSearch() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      clearHighlights();
      searchMatches = [];
      currentMatchIndex = -1;

      if (!query) { updateSearchInfo(); return; }

      for (let i = 0; i < state.data.length; i++) {
        for (let j = 0; j < state.data[i].length; j++) {
          if (state.data[i][j].toLowerCase().includes(query)) {
            searchMatches.push({ row: i, col: j });
            const cell = document.querySelector(`td[data-row="${i}"][data-col="${j}"]`);
            if (cell) cell.classList.add('highlight');
          }
        }
      }

      if (searchMatches.length > 0) {
        currentMatchIndex = 0;
        highlightCurrentMatch();
      }
      updateSearchInfo();
    }

    function navigateMatch(direction) {
      if (searchMatches.length === 0) return;
      currentMatchIndex += direction;
      if (currentMatchIndex < 0) currentMatchIndex = searchMatches.length - 1;
      if (currentMatchIndex >= searchMatches.length) currentMatchIndex = 0;
      highlightCurrentMatch();
      updateSearchInfo();
    }

    function highlightCurrentMatch() {
      document.querySelectorAll('td.current-match').forEach(el => el.classList.remove('current-match'));
      if (currentMatchIndex >= 0 && currentMatchIndex < searchMatches.length) {
        const match = searchMatches[currentMatchIndex];
        const cell = document.querySelector(`td[data-row="${match.row}"][data-col="${match.col}"]`);
        if (cell) {
          cell.classList.add('current-match');
          cell.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }
    }

    function clearHighlights() {
      document.querySelectorAll('td.highlight, td.current-match').forEach(el => {
        el.classList.remove('highlight', 'current-match');
      });
    }

    function updateSearchInfo() {
      const info = document.getElementById('searchInfo');
      if (searchMatches.length === 0) {
        info.textContent = document.getElementById('searchInput').value ? '一致なし' : '';
      } else {
        info.textContent = `${currentMatchIndex + 1} / ${searchMatches.length}件`;
      }
    }

    function replaceNext() {
      if (currentMatchIndex < 0 || searchMatches.length === 0) return;
      const replaceValue = document.getElementById('replaceInput').value;
      const searchValue = document.getElementById('searchInput').value;
      const match = searchMatches[currentMatchIndex];

      saveToHistory();
      state.data[match.row][match.col] = state.data[match.row][match.col].replace(
        new RegExp(escapeRegExp(searchValue), 'i'),
        replaceValue
      );

      renderTable();
      saveToStorage();
      performSearch();
      showToast('1件置換しました', 'success');
    }

    function replaceAll() {
      const replaceValue = document.getElementById('replaceInput').value;
      const searchValue = document.getElementById('searchInput').value;
      if (!searchValue) return;

      saveToHistory();
      let count = 0;
      const regex = new RegExp(escapeRegExp(searchValue), 'gi');

      for (let i = 0; i < state.data.length; i++) {
        for (let j = 0; j < state.data[i].length; j++) {
          const original = state.data[i][j];
          const replaced = original.replace(regex, replaceValue);
          if (original !== replaced) { state.data[i][j] = replaced; count++; }
        }
      }

      renderTable();
      saveToStorage();
      performSearch();
      showToast(`${count}件置換しました`, 'success');
    }

    function escapeRegExp(string) {
      return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    // ========================================
    // 行操作機能
    // ========================================

    function openRowMenu(e, rowIndex) {
      e.stopPropagation();
      activeRowIndex = rowIndex;

      const menu = document.getElementById('rowMenu');
      const rect = e.target.getBoundingClientRect();
      menu.style.top = `${rect.bottom + window.scrollY + 4}px`;
      menu.style.left = `${Math.min(rect.left, window.innerWidth - 220)}px`;
      menu.classList.add('show');
    }

    function closeRowMenu() {
      document.getElementById('rowMenu').classList.remove('show');
    }

    function copyRow() {
      if (activeRowIndex < 0) return;

      const rowData = state.data[activeRowIndex];
      const delimiter = state.editMode === 'csv' ? ',' : '\t';
      const text = rowData.map(cell => {
        if (state.editMode === 'csv' && (cell.includes(',') || cell.includes('"') || cell.includes('\n'))) {
          return `"${cell.replace(/"/g, '""')}"`;
        }
        return cell;
      }).join(delimiter) + '\n';

      navigator.clipboard.writeText(text)
        .then(() => showToast(`${activeRowIndex + 1}行目をコピーしました`, 'success'))
        .catch(() => showToast('コピーに失敗しました', 'error'));

      closeRowMenu();
    }

    function duplicateRow() {
      if (activeRowIndex < 0) return;
      saveToHistory();
      const newRow = [...state.data[activeRowIndex]];
      state.data.splice(activeRowIndex + 1, 0, newRow);
      renderTable();
      updateStats();
      saveToStorage();
      closeRowMenu();
      showToast(`${activeRowIndex + 1}行目を複製しました`, 'success');
    }

    function confirmDeleteRowFromMenu() {
      closeRowMenu();
      if (activeRowIndex < 0) return;
      openModal(
        '行を削除',
        `${activeRowIndex + 1}行目を削除しますか？`,
        () => deleteRow(activeRowIndex)
      );
    }

    function addRow() {
      saveToHistory();
      const headers = _getCurrentHeaders();
      state.data.push(Array(headers.length).fill(''));
      renderTable();
      updateStats();
      saveToStorage();
      showToast('行を追加しました', 'success');
    }

    function deleteRow(rowIndex) {
      saveToHistory();
      state.data.splice(rowIndex, 1);

      if (state.data.length === 0) {
        state.columnWidths = {};
        renderTable();
        updateStats();
        localStorage.removeItem('kaikEditor_state');
        closeModal();
        showToast('すべての行が削除されました', 'success');
        return;
      }

      renderTable();
      updateStats();
      saveToStorage();
      closeModal();
      showToast('行を削除しました', 'success');
    }

    // ========================================
    // データコピー・保存機能
    // ========================================

    /**
     * 現在のモードに合わせてデータをクリップボードにコピーする
     * 最後の行の後に改行コードを付与する
     */
    function copyData() {
      if (state.data.length === 0) {
        showToast('コピーするデータがありません', 'error');
        return;
      }

      const text = generateOutput();

      navigator.clipboard.writeText(text)
        .then(() => {
          const format = state.editMode === 'csv' ? 'CSV' : 'TXT';
          showToast(`${format}としてコピーしました`, 'success');
        })
        .catch(() => showToast('コピーに失敗しました', 'error'));
    }

    /**
     * 現在のモードに合わせてファイルをダウンロードする
     * 最後の行の後に改行コードを付与する
     */
    function downloadData() {
      if (state.data.length === 0) {
        showToast('ダウンロードするデータがありません', 'error');
        return;
      }

      const text = generateOutput();
      const extension = state.editMode === 'csv' ? 'csv' : 'txt';
      const bom = '\uFEFF';
      const blob = new Blob([bom + text], { type: 'text/plain; charset=utf-8' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = `kaik_data_${new Date().toISOString().slice(0, 10)}.${extension}`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      showToast(`${extension.toUpperCase()}ファイルを保存しました`, 'success');
    }

    /**
     * 出力テキストを生成する
     * CSV形式: ヘッダー行を含め、カンマ区切りで出力
     * TXT形式: ヘッダー行なし、タブ区切りで出力
     * 末尾に必ず改行コードを付与する
     * @returns {string}
     */
    function generateOutput() {
      const headers = _getCurrentHeaders();
      const lines = [];

      if (state.editMode === 'csv') {
        // CSV: ヘッダー行を含める
        lines.push(headers.join(','));
        state.data.forEach(row => {
          lines.push(
            row.map(cell => {
              if (cell.includes(',') || cell.includes('"') || cell.includes('\n')) {
                return `"${cell.replace(/"/g, '""')}"`;
              }
              return cell;
            }).join(',')
          );
        });
      } else {
        // TXT固定長: ヘッダー行なし、タブ区切り
        state.data.forEach(row => {
          lines.push(row.join('\t'));
        });
      }

      // 最後の行の後に改行コードを付与
      return lines.join('\n') + '\n';
    }

    // ========================================
    // Undo / Redo 機能
    // ========================================

    function saveToHistory() {
      undoStack.push(structuredClone(state));
      if (undoStack.length > MAX_HISTORY) undoStack.shift();
      redoStack = [];
      updateHistoryButtons();
    }

    function undo() {
      if (undoStack.length === 0) return;
      redoStack.push(structuredClone(state));
      state = undoStack.pop();
      _updateModeUI();
      renderTable();
      updateStats();
      saveToStorage();
      updateHistoryButtons();
      showToast('元に戻しました');
    }

    function redo() {
      if (redoStack.length === 0) return;
      undoStack.push(structuredClone(state));
      state = redoStack.pop();
      _updateModeUI();
      renderTable();
      updateStats();
      saveToStorage();
      updateHistoryButtons();
      showToast('やり直しました');
    }

    function updateHistoryButtons() {
      document.getElementById('undoBtn').disabled = undoStack.length === 0;
      document.getElementById('redoBtn').disabled = redoStack.length === 0;
    }

    // ========================================
    // 統計情報表示
    // ========================================

    function updateStats() {
      const headers = _getCurrentHeaders();
      const rowCount = state.data.length;
      const colCount = headers.length;

      const delimiter = state.editMode === 'csv' ? ',' : '\t';
      const text = state.data.map(row => row.join(delimiter)).join('\n');
      const bytes = new Blob([text]).size;
      const sizeStr = bytes < 1024
        ? `${bytes} B`
        : bytes < 1024 * 1024
          ? `${(bytes / 1024).toFixed(1)} KB`
          : `${(bytes / (1024 * 1024)).toFixed(1)} MB`;

      document.getElementById('rowCount').textContent = rowCount.toLocaleString();
      document.getElementById('colCount').textContent = colCount;
      document.getElementById('dataSize').textContent = sizeStr;
      document.getElementById('dataFormat').textContent = state.editMode === 'csv' ? 'CSV' : 'TXT（固定長）';
    }

    // ========================================
    // ローカルストレージ機能
    // ========================================

    function saveToStorage() {
      try {
        localStorage.setItem('kaikEditor_state', JSON.stringify(state));
      } catch (e) {
        console.warn('LocalStorage save failed:', e);
      }
    }

    function loadFromStorage() {
      try {
        const saved = localStorage.getItem('kaikEditor_state');
        if (saved) {
          const parsed = JSON.parse(saved);
          state = { ...state, ...parsed };
        }
      } catch (e) {
        // 読み込み失敗時はデフォルト状態を使用
      }
      _updateModeUI();
      renderTable();
      updateStats();
    }

    // ========================================
    // データクリア機能
    // ========================================

    function confirmClearAll() {
      if (state.data.length === 0) return;
      openModal(
        'データをクリア',
        'すべてのデータを削除しますか？この操作は元に戻せます。',
        clearAll
      );
    }

    function clearAll() {
      saveToHistory();
      state.data = [];
      state.columnWidths = {};
      renderTable();
      updateStats();
      localStorage.removeItem('kaikEditor_state');
      closeModal();
      showToast('すべてのデータをクリアしました');
    }

    // ========================================
    // UI機能
    // ========================================

    function showToast(message, type = '') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 1500);
    }

    function openModal(title, message, onConfirm) {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalMessage').textContent = message;
      document.getElementById('modalConfirmBtn').onclick = onConfirm;
      document.getElementById('modalOverlay').classList.add('show');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('show');
    }
  </script>
</body>

</html>
