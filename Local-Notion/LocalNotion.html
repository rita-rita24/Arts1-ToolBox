// Duplicate a page and its descendant subtree. The root copy gets a "(コピー)"
// suffix, all blocks get fresh IDs, trash markers (deletedAt / prevParentId)
// are stripped, and createdAt/updatedAt are reset to now.
function duplicatePage(id) {
  const orig = state.pages[id]; if (!orig || orig.deletedAt) return null;
  const now = Date.now();
  const dupRecursive = (origId, newParentId) => {
    const src = state.pages[origId]; if (!src) return null;
    const c = JSON.parse(JSON.stringify(src));
    c.id = uid();
    c.parentId = newParentId;
    c.children = [];
    c.blocks = (c.blocks || []).map(b => regenBlockIds(b));
    c.createdAt = now;
    c.updatedAt = now;
    delete c.deletedAt;
    delete c.prevParentId;
    state.pages[c.id] = c;
    for (const childId of (src.children || [])) {
      const child = state.pages[childId];
      if (!child || child.deletedAt) continue;
      const dc = dupRecursive(childId, c.id);
      if (dc) c.children.push(dc.id);
    }
    return c;
  };
  const root = dupRecursive(id, orig.parentId || null);
  if (!root) return null;
  root.title = (orig.title || '無題') + ' (コピー)';
  if (root.parentId && state.pages[root.parentId]) state.pages[root.parentId].children.push(root.id);
  else { root.parentId = null; state.rootPages.push(root.id); }
  saveState(); renderSidebar();
  return root;
}
function regenBlockIds(b) {
  b.id = uid();
  if (b.children) b.children = b.children.map(c => regenBlockIds(c));
  return b;
}

/* ==================== Markdown <-> Blocks ==================== */
// Convert HTML inline markup (as stored in block.content) to Markdown.
// Supported: <b>/<strong>, <i>/<em>, <u>, <s>/<del>/<strike>, <code>, <a href>.
// Unknown tags are stripped, text content is preserved.
function htmlToMarkdownInline(html) {
  if (!html) return '';
  const root = document.createElement('div'); root.innerHTML = html;
  const walk = (node) => {
    if (node.nodeType === 3) return node.nodeValue;
    if (node.nodeType !== 1) return '';
    const inner = Array.from(node.childNodes).map(walk).join('');
    const tag = node.tagName.toLowerCase();
    switch (tag) {
      case 'br': return '\n';
      case 'b': case 'strong': return inner ? `**${inner}**` : '';
      case 'i': case 'em': return inner ? `*${inner}*` : '';
      case 'u': return inner ? `<u>${inner}</u>` : '';
      case 's': case 'del': case 'strike': return inner ? `~~${inner}~~` : '';
      case 'code': return inner ? `\`${inner}\`` : '';
      case 'a': {
        const href = node.getAttribute('href') || '';
        return href ? `[${inner}](${href})` : inner;
      }
      default: return inner;
    }
  };
  return Array.from(root.childNodes).map(walk).join('').replace(/ /g, ' ');
}

// Convert Markdown inline markup back to HTML for block.content.
// Order matters: code first (so its contents aren't reinterpreted),
// then images/links, then bold (**), italic (*), strikethrough (~~), <u>.
function markdownToHtmlInline(md) {
  if (!md) return '';
  const placeholders = [];
  const stash = (s) => { placeholders.push(s); return `␀${placeholders.length - 1}␀`; };
  let out = md;
  out = out.replace(/`([^`\n]+)`/g, (_, c) => stash(`<code>${escapeHTML(c)}</code>`));
  out = out.replace(/\[([^\]]+)\]\(([^)\s]+)(?:\s+"[^"]*")?\)/g, (_, t, h) =>
    stash(`<a href="${escapeHTML(h)}">${escapeHTML(t)}</a>`));
  out = escapeHTML(out);
  out = out.replace(/\*\*([^*\n]+)\*\*/g, '<b>$1</b>');
  out = out.replace(/(^|[^*])\*(?!\s)([^*\n]+?)\*(?!\*)/g, '$1<i>$2</i>');
  out = out.replace(/~~([^~\n]+)~~/g, '<s>$1</s>');
  out = out.replace(/&lt;u&gt;([\s\S]*?)&lt;\/u&gt;/g, '<u>$1</u>');
  out = out.replace(/␀(\d+)␀/g, (_, i) => placeholders[+i]);
  return out;
}

const stripHTMLToText = (html) => {
  const d = document.createElement('div'); d.innerHTML = html || '';
  return d.textContent || '';
};

// Serialize a single block (and any nested children) to Markdown lines.
// Numbered list ordinals are computed by the caller (blocksToMarkdown) since
// they depend on adjacent siblings.
function blockToMarkdown(b, ctx = {}) {
  const ind = ctx.indent || '';
  const inline = (s) => htmlToMarkdownInline(s);
  switch (b.type) {
    case 'h1': return `${ind}# ${inline(b.content)}`;
    case 'h2': return `${ind}## ${inline(b.content)}`;
    case 'h3': return `${ind}### ${inline(b.content)}`;
    case 'bullet': return `${ind}- ${inline(b.content)}`;
    case 'numbered': return `${ind}${ctx.ordinal || 1}. ${inline(b.content)}`;
    case 'todo': return `${ind}- [${b.checked ? 'x' : ' '}] ${inline(b.content)}`;
    case 'quote': return inline(b.content).split('\n').map(l => `${ind}> ${l}`).join('\n');
    case 'callout': {
      const head = `${ind}> [!NOTE]`;
      const body = inline(b.content).split('\n').map(l => `${ind}> ${l}`).join('\n');
      return body ? `${head}\n${body}` : head;
    }
    case 'code': {
      const lang = b.language || '';
      return `${ind}\`\`\`${lang}\n${b.content || ''}\n${ind}\`\`\``;
    }
    case 'divider': return `${ind}---`;
    case 'image': {
      const alt = stripHTMLToText(b.caption || '').replace(/\n+/g, ' ');
      const url = b.url || '';
      if (!url) return '';
      return `${ind}![${alt}](${url})`;
    }
    case 'table': return tableBlockToMarkdown(b, ind);
    case 'toggle':
    case 'toggle_h1':
    case 'toggle_h2':
    case 'toggle_h3': {
      const head = b.type === 'toggle' ? `${ind}- ${inline(b.content)}` :
        `${ind}${'#'.repeat(parseInt(b.type.slice(-1), 10))} ${inline(b.content)}`;
      const inner = blocksToMarkdown(b.children || [], { indent: ind + (b.type === 'toggle' ? '  ' : '') });
      return inner ? `${head}\n${inner}` : head;
    }
    case 'text':
    default: {
      const txt = inline(b.content);
      return txt ? `${ind}${txt}` : '';
    }
  }
}
function tableBlockToMarkdown(b, ind = '') {
  const cells = b.cells || [];
  if (!cells.length) return '';
  const cols = b.cols || (cells[0] || []).length;
  const fmtRow = (row) => `${ind}| ` + Array.from({length: cols}, (_, i) =>
    stripHTMLToText(row[i] || '').replace(/\|/g, '\\|').replace(/\n+/g, ' ')
  ).join(' | ') + ' |';
  const lines = [];
  if (b.hasHeaderRow) {
    lines.push(fmtRow(cells[0]));
    lines.push(`${ind}| ` + Array.from({length: cols}).fill('---').join(' | ') + ' |');
    for (let r = 1; r < cells.length; r++) lines.push(fmtRow(cells[r]));
  } else {
    lines.push(`${ind}| ` + Array.from({length: cols}).fill(' ').join(' | ') + ' |');
    lines.push(`${ind}| ` + Array.from({length: cols}).fill('---').join(' | ') + ' |');
    for (let r = 0; r < cells.length; r++) lines.push(fmtRow(cells[r]));
  }
  return lines.join('\n');
}
function blocksToMarkdown(blocks, ctx = {}) {
  const ind = ctx.indent || '';
  const out = [];
  let ordinal = 0;
  for (let i = 0; i < blocks.length; i++) {
    const b = blocks[i];
    if (b.type === 'numbered') ordinal++; else ordinal = 0;
    out.push(blockToMarkdown(b, { indent: ind, ordinal: ordinal || 1 }));
  }
  return out.filter(s => s !== undefined && s !== null).join('\n\n').replace(/\n{3,}/g, '\n\n');
}

// Markdown -> blocks (best effort).
// Block-level: heading / list / todo / numbered / blockquote / callout (GFM
// admonition) / code fence / hr / image / table / paragraph.
// Inline-level conversion is delegated to markdownToHtmlInline.
function parseMarkdownToBlocks(md) {
  const lines = md.replace(/\r\n?/g, '\n').split('\n');
  const blocks = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    const t = line.replace(/^\s+/, '');
    if (!t.length) { i++; continue; }
    // Code fence
    const fence = /^```(.*)$/.exec(t);
    if (fence) {
      const lang = fence[1].trim();
      const buf = []; i++;
      while (i < lines.length && !/^```/.test(lines[i].replace(/^\s+/, ''))) { buf.push(lines[i]); i++; }
      if (i < lines.length) i++;
      blocks.push(blk('code', buf.join('\n'), { language: lang || 'plaintext' }));
      continue;
    }
    // Heading
    const h = /^(#{1,3})\s+(.*)$/.exec(t);
    if (h) {
      blocks.push(blk(`h${h[1].length}`, markdownToHtmlInline(h[2].trim())));
      i++; continue;
    }
    // Horizontal rule
    if (/^(-{3,}|\*{3,}|_{3,})$/.test(t)) { blocks.push(blk('divider', '')); i++; continue; }
    // Image (standalone)
    const img = /^!\[([^\]]*)\]\(([^)\s]+)(?:\s+"[^"]*")?\)$/.exec(t);
    if (img) {
      blocks.push(blk('image', '', { url: img[2], caption: markdownToHtmlInline(img[1] || '') }));
      i++; continue;
    }
    // Table
    if (/^\|.*\|\s*$/.test(t) && i + 1 < lines.length &&
        /^\|\s*[:\-]+\s*(\|\s*[:\-]+\s*)+\|\s*$/.test(lines[i + 1].replace(/^\s+/, ''))) {
      const tableRows = [];
      const hdr = t.replace(/^\|/, '').replace(/\|\s*$/, '').split('|').map(c => markdownToHtmlInline(c.trim()));
      tableRows.push(hdr); i += 2;
      while (i < lines.length && /^\s*\|.*\|\s*$/.test(lines[i])) {
        const r = lines[i].replace(/^\s*\|/, '').replace(/\|\s*$/, '').split('|').map(c => markdownToHtmlInline(c.trim()));
        tableRows.push(r); i++;
      }
      const cols = Math.max(...tableRows.map(r => r.length));
      const cells = tableRows.map(r => { while (r.length < cols) r.push(''); return r; });
      blocks.push(blk('table', '', { rows: cells.length, cols, cells, hasHeaderRow: true, hasHeaderCol: false }));
      continue;
    }
    // Todo
    const todo = /^[-*+]\s+\[([ xX])\]\s+(.*)$/.exec(t);
    if (todo) {
      const b = blk('todo', markdownToHtmlInline(todo[2]));
      b.checked = todo[1].toLowerCase() === 'x';
      blocks.push(b); i++; continue;
    }
    // Bullet list
    const bullet = /^[-*+]\s+(.*)$/.exec(t);
    if (bullet) { blocks.push(blk('bullet', markdownToHtmlInline(bullet[1]))); i++; continue; }
    // Numbered list
    const num = /^\d+[.)]\s+(.*)$/.exec(t);
    if (num) { blocks.push(blk('numbered', markdownToHtmlInline(num[1]))); i++; continue; }
    // Callout (GFM admonition)
    const adm = /^>\s*\[!(\w+)\]\s*(.*)$/.exec(t);
    if (adm) {
      const buf = adm[2] ? [adm[2]] : [];
      i++;
      while (i < lines.length && /^>\s?/.test(lines[i].replace(/^\s+/, ''))) {
        buf.push(lines[i].replace(/^\s+/, '').replace(/^>\s?/, ''));
        i++;
      }
      const emojiMap = { NOTE: '💡', TIP: '💡', INFO: 'ℹ️', WARNING: '⚠️', CAUTION: '⚠️', IMPORTANT: '❗', DANGER: '🚨' };
      const e = emojiMap[adm[1].toUpperCase()] || '💡';
      blocks.push(blk('callout', markdownToHtmlInline(buf.join('\n').trim()), { emoji: e, hasIcon: true }));
      continue;
    }
    // Blockquote
    if (/^>\s?/.test(t)) {
      const buf = [];
      while (i < lines.length && /^\s*>\s?/.test(lines[i])) {
        buf.push(lines[i].replace(/^\s*>\s?/, ''));
        i++;
      }
      blocks.push(blk('quote', markdownToHtmlInline(buf.join('\n').trim())));
      continue;
    }
    // Paragraph (collect until blank line)
    const para = [t];
    i++;
    while (i < lines.length && lines[i].replace(/^\s+/, '').length &&
           !/^(#{1,3}\s|[-*+]\s|\d+[.)]\s|>\s|```|---|\|.*\|\s*$|!\[)/.test(lines[i].replace(/^\s+/, ''))) {
      para.push(lines[i].replace(/^\s+/, ''));
      i++;
    }
    blocks.push(blk('text', markdownToHtmlInline(para.join('\n'))));
  }
  return blocks;
}

function exportPageAsMarkdown(pageId) {
  const page = state.pages[pageId] || getCurrentPage(); if (!page) return;
  const title = page.title || '無題';
  const md = `# ${title}\n\n` + blocksToMarkdown(page.blocks || []);
  const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const safe = title.replace(/[\\/:*?"<>|]/g, '_').slice(0, 80) || 'page';
  a.href = url; a.download = safe + '.md';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 0);
}
function importMarkdownAsNewPage() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.md,.markdown,text/markdown,text/plain';
  input.onchange = async () => {
    const f = input.files && input.files[0]; if (!f) return;
    const text = await f.text();
    let title = (f.name || 'インポート').replace(/\.(md|markdown|txt)$/i, '');
    let body = text;
    const firstHeading = /^#\s+(.+)$/m.exec(text);
    if (firstHeading) {
      const idx = text.indexOf(firstHeading[0]);
      const before = text.slice(0, idx).trim();
      if (!before) {
        title = firstHeading[1].trim();
        body = text.slice(idx + firstHeading[0].length);
      }
    }
    const blocks = parseMarkdownToBlocks(body);
    if (!blocks.length) blocks.push(blk('text', ''));
    const p = createPage(null, { title });
    p.blocks = blocks;
    saveState(); switchPage(p.id);
  };
  input.click();
}

/* ==================== Context Menu ==================== */
function showContextMenu(anchor, items, options = {}) {
  const menu = $('#context-menu');
  const variant = options.variant || '';
  const isBlockPicker = variant === 'block-picker';
  menu.className = 'context-menu' + (variant ? ` ${variant}` : '');
  menu.innerHTML = '';
  const selectable = [];
  items.forEach(item => {
    if (item.divider) { menu.appendChild(Object.assign(document.createElement('div'), { className: 'ctx-divider' })); return; }
    if (item.header) {
      if (isBlockPicker) return;
      const h = document.createElement('div'); h.className = 'ctx-header'; h.textContent = item.header;
      menu.appendChild(h); return;
    }
    const el = document.createElement('div');
    el.className = 'ctx-item' + (item.danger ? ' danger' : '');
    if (item.block) {
      el.innerHTML = `<div class="ctx-block-icon">${item.icon || ''}</div><div class="ctx-block-meta"><div class="ctx-block-name">${escapeHTML(item.label)}</div>${isBlockPicker ? '' : `<div class="ctx-block-desc">${escapeHTML(item.desc || '')}</div>`}</div>`;
    } else {
      el.innerHTML = (item.icon || '') + '<span>' + escapeHTML(item.label) + '</span>';
    }
    el.onclick = () => { hideContextMenu(); if (item.fn) item.fn(); };
    el.onmouseenter = () => { menu.querySelectorAll('.ctx-item').forEach(s => s.classList.remove('selected')); el.classList.add('selected'); };
    menu.appendChild(el);
    selectable.push(el);
  });
  if (selectable[0]) selectable[0].classList.add('selected');

  const rect = anchor instanceof Element ? anchor.getBoundingClientRect() : anchor;
  menu.style.left = (rect.left || rect.x || 0) + 'px';
  menu.style.top = ((rect.bottom || rect.y || 0) + 4) + 'px';
  menu.hidden = false;
  adjustMenuPosition(menu);
  return selectable;
}

function hideContextMenu() {
  const menu = $('#context-menu');
  menu.hidden = true;
  menu.className = 'context-menu';
  ctxNavContext = null;
}
function hideIconPicker() { $('#icon-picker').hidden = true; iconPickerCtx = null; }

let ctxNavContext = null;

document.addEventListener('mousedown', (e) => {
  if (!e.target.closest('#context-menu')) hideContextMenu();
  if (!e.target.closest('#icon-picker') && !e.target.closest('.page-icon') && !e.target.closest('.callout-emoji') && !e.target.closest('#add-icon-btn')) hideIconPicker();
  if (!e.target.closest('#inline-toolbar') && !e.target.closest('.block-content') && !e.target.closest('.page-title')) $('#inline-toolbar').hidden = true;
});

function adjustMenuPosition(menu) {
  const r = menu.getBoundingClientRect();
  if (r.right > window.innerWidth) menu.style.left = Math.max(4, window.innerWidth - r.width - 8) + 'px';
  if (r.bottom > window.innerHeight) menu.style.top = Math.max(4, window.innerHeight - r.height - 8) + 'px';
}

/* ==================== Render Editor ==================== */
function renderEditor() {
  const page = getCurrentPage(); if (!page) return;
  const iconEl = $('#page-icon');
  const hasIcon = page.hasIcon !== false && page.icon;
  if (hasIcon) {
    iconEl.innerHTML = renderIconHTML(page.icon, page.iconType || 'emoji', 78);
    iconEl.style.display = 'inline-block';
  } else {
    iconEl.innerHTML = '';
    iconEl.style.display = 'none';
  }
  // Toggle add-icon button visibility
  const addBtn = $('#add-icon-btn');
  if (addBtn) addBtn.style.display = hasIcon ? 'none' : 'inline-flex';

  const ti = $('#page-title');
  if (document.activeElement !== ti) ti.textContent = page.title || '';
  renderBreadcrumb();
  const bl = $('#blocks'); bl.innerHTML = '';
  page.blocks.forEach(b => bl.appendChild(renderBlock(b, page.blocks)));
  updateNumberedList(bl);
}

function renderBreadcrumb() {
  const bc = $('#breadcrumb'); bc.innerHTML = '';
  const page = getCurrentPage(); if (!page) return;
  const chain = []; let cur = page;
  while (cur) { chain.unshift(cur); cur = cur.parentId ? state.pages[cur.parentId] : null; }
  chain.forEach((p, i) => {
    const item = document.createElement('div'); item.className = 'topbar-breadcrumb-item';
    const hasIcon = p.hasIcon !== false && p.icon;
    const iconHTML = hasIcon ? `<span style="line-height:1">${renderIconHTML(p.icon, p.iconType || 'emoji', 14)}</span>` : '';
    item.innerHTML = iconHTML + `<span>${escapeHTML(p.title || '無題')}</span>`;
    item.onclick = () => switchPage(p.id);
    bc.appendChild(item);
    if (i < chain.length - 1) {
      const sep = document.createElement('span'); sep.textContent = '/';
      sep.style.cssText = 'color:var(--text-tertiary);margin:0 2px';
      bc.appendChild(sep);
    }
  });
}

/* ==================== Render Block (dispatch) ==================== */
function renderBlock(block, parentList) {
  const el = document.createElement('div');
  el.className = 'block';
  el.dataset.type = block.type;
  el.dataset.id = block.id;
  if (block.checked) el.classList.add('checked');
  if (block.expanded) el.classList.add('expanded');

  // Per-type rendering
  switch (block.type) {
    case 'divider': return renderDivider(block, el, parentList);
    case 'code':    return renderCodeBlock(block, el, parentList);
    case 'table':   return renderTableBlock(block, el, parentList);
    case 'image':   return renderImageBlock(block, el, parentList);
    case 'toggle':
    case 'toggle_h1':
    case 'toggle_h2':
    case 'toggle_h3':
      return renderToggleBlock(block, el, parentList);
    default: return renderInlineBlock(block, el, parentList);
  }
}

/* ----- Gutter (draggable + add button) ----- */
function buildGutter(block, parentList) {
  const gutter = document.createElement('div'); gutter.className = 'block-gutter';
  const aBtn = document.createElement('button'); aBtn.className = 'block-gutter-btn'; aBtn.title = '下に追加（タイプを選択）';
  aBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>';
  aBtn.onclick = (e) => {
    e.stopPropagation();
    const items = getBlockPickerTypes().map((t) => ({
      block: true,
      icon: `<span class="material-icons-outlined" style="font-size:20px">${t.matIcon}</span>`,
      label: t.name,
      desc: t.desc,
      fn: () => {
        const nb = blk(t.type, '');
        insertBlockAfter(nb, block.id, parentList);
        renderEditor();
        setTimeout(() => focusBlock(nb.id), 0);
      }
    }));
    showContextMenu(aBtn, items, { variant: 'block-picker' });
  };
  const dBtn = document.createElement('button'); dBtn.className = 'block-gutter-btn block-drag'; dBtn.title = 'ドラッグ・クリックでメニュー';
  dBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.4"/><circle cx="9" cy="12" r="1.4"/><circle cx="9" cy="18" r="1.4"/><circle cx="15" cy="6" r="1.4"/><circle cx="15" cy="12" r="1.4"/><circle cx="15" cy="18" r="1.4"/></svg>';
  dBtn.draggable = true;
  dBtn.onclick = (e) => { e.stopPropagation(); showBlockContextMenu(e, block); };
  dBtn.addEventListener('dragstart', (ev) => { draggingBlockId = block.id; ev.dataTransfer.effectAllowed = 'move'; ev.dataTransfer.setData('text/plain', block.id); });
  dBtn.addEventListener('dragend', () => { draggingBlockId = null; $$('.block').forEach(b => b.classList.remove('drop-above', 'drop-below', 'dragging')); });
  gutter.appendChild(aBtn); gutter.appendChild(dBtn);
  return gutter;
}

function attachDropHandlers(el, block) {
  el.addEventListener('dragover', (ev) => {
    if (!draggingBlockId || draggingBlockId === block.id) return;
    ev.preventDefault();
    const r = el.getBoundingClientRect(); const mid = r.top + r.height / 2;
    el.classList.toggle('drop-above', ev.clientY < mid);
    el.classList.toggle('drop-below', ev.clientY >= mid);
  });
  el.addEventListener('dragleave', () => el.classList.remove('drop-above', 'drop-below'));
  el.addEventListener('drop', (ev) => {
    ev.preventDefault();
    if (!draggingBlockId || draggingBlockId === block.id) return;
    const r = el.getBoundingClientRect(); const mid = r.top + r.height / 2;
    moveBlock(draggingBlockId, block.id, ev.clientY < mid ? 'before' : 'after');
    renderEditor();
  });
}

/* ----- Divider ----- */
function renderDivider(block, el, parentList) {

}

  langSel.onmousedown = (e) => e.stopPropagation();

  const copyBtn = document.createElement('button'); copyBtn.className = 'code-action-btn code-copy-btn'; copyBtn.textContent = 'コピー';

  codeInner.addEventListener('input', () => {
    block.content = codeInner.textContent;
    saveState();
    scheduleHighlight();
  });
  codeInner.addEventListener('blur', applyHighlight);
  codeInner.addEventListener('keydown', (e) => {
    if (e.isComposing) return;
    if (e.key === 'Tab') { e.preventDefault(); document.execCommand('insertText', false, '  '); }
    if (e.key === 'Backspace' && codeInner.textContent === '') { e.preventDefault(); convertBlockType(block, 'text'); }
  });

  wrap.appendChild(langSel);
  wrap.appendChild(wrapBtn);
  wrap.appendChild(copyBtn);
  wrap.appendChild(codeC);
  el.appendChild(wrap);

  // Initial highlight (deferred so Prism is ready)
  setTimeout(applyHighlight, 0);

  attachDropHandlers(el, block);
  return el;
}

// Map friendly names → Prism language aliases
function mapLangToPrism(lang) {
  const map = {
    'plain text': 'none', 'plain': 'none',
    'c++': 'cpp', 'c#': 'csharp', 'f#': 'fsharp',
    'objective-c': 'objectivec',
    'vb.net': 'visual-basic', 'visual basic': 'visual-basic',
    'notion formula': 'none', 'mermaid': 'none',
    'webassembly': 'wasm',
    'gherkin': 'gherkin', 'shell': 'bash'
  };
  return map[lang] || lang;
}

// Caret helpers for code block
function getCaretTextOffset(el) {
  const sel = window.getSelection();
  if (!sel.rangeCount) return null;
  const range = sel.getRangeAt(0);
  if (!el.contains(range.endContainer)) return null;
  const pre = range.cloneRange();
  pre.selectNodeContents(el);
  pre.setEnd(range.endContainer, range.endOffset);
  return pre.toString().length;
}
function setCaretByTextOffset(el, offset) {
  const range = document.createRange();
  const sel = window.getSelection();
  const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
  let acc = 0, node;
  while ((node = walker.nextNode())) {
    const next = acc + node.length;
    if (offset <= next) {
      range.setStart(node, Math.max(0, offset - acc));
      range.collapse(true);
      sel.removeAllRanges(); sel.addRange(range);
      return;
    }
    acc = next;
  }
  // Fallback: place at end
  range.selectNodeContents(el);
  range.collapse(false);
  sel.removeAllRanges(); sel.addRange(range);
}

/* ----- Table ----- */
function renderTableBlock(block, el, parentList) {
  el.appendChild(buildGutter(block, parentList));
  const wrap = document.createElement('div'); wrap.className = 'table-wrapper';
  const table = document.createElement('table'); table.className = 'simple-table';
  for (let r = 0; r < block.rows; r++) {
    const tr = document.createElement('tr');
    for (let c = 0; c < block.cols; c++) {
      const isHeaderRow = (r === 0 && block.hasHeaderRow);
      const isHeaderCol = (c === 0 && block.hasHeaderCol);
      const isHeader = isHeaderRow || isHeaderCol;
      const cell = document.createElement(isHeader ? 'th' : 'td');
      cell.contentEditable = 'true';
      cell.innerHTML = (block.cells[r] && block.cells[r][c]) || '';
      cell.addEventListener('input', () => {
        if (!block.cells[r]) block.cells[r] = [];
        block.cells[r][c] = cell.innerHTML;
        saveState();
      });
      cell.addEventListener('keydown', (e) => handleTableCellKey(e, block, r, c));
      tr.appendChild(cell);
    }
    table.appendChild(tr);
  }
  wrap.appendChild(table);
  el.appendChild(wrap);

  const controls = document.createElement('div'); controls.className = 'table-controls';
  const btn = (text, onClick) => { const b = document.createElement('button'); b.className = 'table-ctl-btn'; b.textContent = text; b.onclick = onClick; return b; };
  controls.appendChild(btn('+ 行', () => { block.rows++; block.cells.push(Array.from({length: block.cols}, () => '')); saveState(); renderEditor(); }));
  controls.appendChild(btn('+ 列', () => { block.cols++; block.cells.forEach(row => row.push('')); saveState(); renderEditor(); }));
  controls.appendChild(btn('− 行', () => { if (block.rows > 1) { block.rows--; block.cells.pop(); saveState(); renderEditor(); } }));
  controls.appendChild(btn('− 列', () => { if (block.cols > 1) { block.cols--; block.cells.forEach(row => row.pop()); saveState(); renderEditor(); } }));
  controls.appendChild(btn(block.hasHeaderRow ? 'ヘッダー行: ON' : 'ヘッダー行: OFF', () => { block.hasHeaderRow = !block.hasHeaderRow; saveState(); renderEditor(); }));
  controls.appendChild(btn(block.hasHeaderCol ? 'ヘッダー列: ON' : 'ヘッダー列: OFF', () => { block.hasHeaderCol = !block.hasHeaderCol; saveState(); renderEditor(); }));
  el.appendChild(controls);

  attachDropHandlers(el, block);
  return el;
}

function handleTableCellKey(e, block, r, c) {
  if (e.isComposing) return;
  if (e.key === 'Tab') {
    e.preventDefault();
    let nr = r, nc = c + (e.shiftKey ? -1 : 1);
    if (nc >= block.cols) {
      nc = 0; nr++;
      if (nr >= block.rows) {
        block.rows++; block.cells.push(Array.from({length: block.cols}, () => ''));
        saveState(); renderEditor();
        setTimeout(() => {
          const tr = document.querySelectorAll(`.block[data-id="${block.id}"] .simple-table tr`)[nr];
          if (tr) tr.children[nc]?.focus();
        }, 0);
        return;
      }
    }
    if (nc < 0) { nc = block.cols - 1; nr--; if (nr < 0) return; }
    const tr = document.querySelectorAll(`.block[data-id="${block.id}"] .simple-table tr`)[nr];
    if (tr && tr.children[nc]) tr.children[nc].focus();
  }
}

/* ----- Image ----- */
function renderImageBlock(block, el, parentList) {
  el.appendChild(buildGutter(block, parentList));

  if (block.url) {

    const fileBtn = empty.querySelector('[data-act="file"]');
    const urlBtn = empty.querySelector('[data-act="url"]');

    const triggerFile = () => {
      const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
      input.onchange = () => {
        const f = input.files && input.files[0];
        if (f) loadImageFromFile(f, block);
      };
      input.click();
    };

    const triggerUrl = async () => {
      const u = await showPrompt('画像のURLを入力してください', { title: '画像URL', placeholder: 'https://...', okText: '追加' });
      if (u && u.trim()) { block.url = u.trim(); saveState(); renderEditor(); }

    empty.addEventListener('drop', (ev) => {
      ev.preventDefault(); empty.classList.remove('drag-active');

async function loadImageFromFile(file, block) {
  // Size guard — warn if over 4MB (base64 bloats JSON heavily)
  if (file.size > 8 * 1024 * 1024) {
    const ok = await showConfirm('画像サイズが8MBを超えています。保存データが大きくなります。続行しますか？', { title: '大きなファイル', okText: '続行', danger: true });
    if (!ok) return;
  }
  const reader = new FileReader();
  reader.onload = () => {
    block.url = reader.result; // data:URL
    block.caption = block.caption || '';
    saveState(); renderEditor();
  };
  reader.onerror = () => showAlert('ファイルの読み込みに失敗しました');
  reader.readAsDataURL(file);
}

      input.onchange = () => { const f = input.files && input.files[0]; if (f) loadImageFromFile(f, block); };

/* ----- Inline-style blocks (text / h1-3 / bullet / numbered / todo / quote / callout) ----- */

function getPlaceholder(t) {

    quote: '引用', bullet: '', numbered: '',
    todo: 'ToDo', toggle: 'トグル', callout: ''
  })[t] || '';
}

function updateNumberedList(container) {
  let c = 0;
  container.querySelectorAll(':scope > .block').forEach(el => {
    if (el.dataset.type === 'numbered') { c++; const p = el.querySelector('.block-prefix'); if (p) p.textContent = c + '.'; }
    else c = 0;

/* ==================== Block Operations ==================== */
function findBlockAndList(id, list = null) {
  const page = getCurrentPage();
  list = list || page.blocks;
  for (let i = 0; i < list.length; i++) {
    const b = list[i];
    if (b.id === id) return { block: b, list, index: i };
    if (b.children && b.children.length) { const r = findBlockAndList(id, b.children); if (r) return r; }
  }
  return null;
}

function insertBlockAfter(nb, afterId, pl) {
  // pl must be the actual list reference — if so, use it directly
  if (pl) {
    const idx = pl.findIndex(x => x.id === afterId);
    if (idx !== -1) { pl.splice(idx + 1, 0, nb); saveState(); return; }
  }
  const f = findBlockAndList(afterId, pl);
  if (!f) return;
  f.list.splice(f.index + 1, 0, nb); saveState();
}

function deleteBlock(id) {
  const f = findBlockAndList(id); if (!f) return null;
  const prev = f.index > 0 ? f.list[f.index - 1] : null;
  f.list.splice(f.index, 1);
  const page = getCurrentPage();
  if (!page.blocks.length) page.blocks.push(blk('text', ''));
  saveState(); return prev;
}

function moveBlock(sid, tid, pos) {
  const s = findBlockAndList(sid); if (!s) return;
  const movedBlock = s.block;
  s.list.splice(s.index, 1);
  const t = findBlockAndList(tid);
  if (!t) { s.list.splice(s.index, 0, movedBlock); return; }
  t.list.splice(t.index + (pos === 'before' ? 0 : 1), 0, movedBlock);
  saveState();
}

function convertBlockType(block, nt) {
  block.type = nt;
  if (nt === 'table' && !block.cells) {
    block.rows = 3; block.cols = 3;
    block.cells = Array.from({length: 3}, () => Array.from({length: 3}, () => ''));
    block.hasHeaderRow = true;
  }
  saveState(); renderEditor();
  setTimeout(() => focusBlock(block.id), 0);
}

function focusBlock(id, pos = 'end') { const el = document.querySelector(`[data-block-id="${id}"]`); if (!el) return; el.focus(); placeCaret(el, pos); }
function placeCaret(el, pos) { const r = document.createRange(), s = window.getSelection(); if (pos === 'start') r.setStart(el, 0); else { r.selectNodeContents(el); r.collapse(false); } s.removeAllRanges(); s.addRange(r); }
function isCaretAtStart(el) { const s = window.getSelection(); if (!s.rangeCount || !s.getRangeAt(0).collapsed) return false; const r = s.getRangeAt(0).cloneRange(); r.selectNodeContents(el); r.setEnd(s.getRangeAt(0).endContainer, s.getRangeAt(0).endOffset); return r.toString().length === 0; }
function isCaretAtEnd(el) { const s = window.getSelection(); if (!s.rangeCount || !s.getRangeAt(0).collapsed) return false; const r = s.getRangeAt(0).cloneRange(); r.selectNodeContents(el); r.setStart(s.getRangeAt(0).endContainer, s.getRangeAt(0).endOffset); return r.toString().length === 0; }

/* ==================== Slash Menu ==================== */
let slashOpen = false, slashBlock = null, slashContentEl = null, slashQuery = '';

function showSlashMenu(contentEl, block) {
  slashOpen = true; slashBlock = block; slashContentEl = contentEl;
  const filtered = getBlockPickerTypes(slashQuery);
  if (!filtered.length) { hideSlashMenu(); return; }
  const items = filtered.map((t) => ({
    block: true,
    icon: `<span class="material-icons-outlined" style="font-size:20px">${t.matIcon}</span>`,
    label: t.name, desc: t.desc,
    fn: () => {
      contentEl.textContent = contentEl.textContent.replace(/^\/[^\n]*/, '');
      block.content = contentEl.innerHTML;
      convertBlockType(block, t.type);
    }
  }));
  const sel = window.getSelection();
  let anchorRect;
  if (sel.rangeCount) {
    const r = sel.getRangeAt(0).getBoundingClientRect();
    anchorRect = { left: r.left, bottom: r.bottom };
  } else {
    const r = contentEl.getBoundingClientRect();
    anchorRect = { left: r.left, bottom: r.bottom };
  }
  const selectable = showContextMenu(anchorRect, items, { variant: 'block-picker' });
  ctxNavContext = { selectable };
}

function hideSlashMenu() { slashOpen = false; slashBlock = null; slashContentEl = null; slashQuery = ''; hideContextMenu(); }

/* ==================== Block Input ==================== */
function handleBlockInput(e, block, content) {
  // Skip processing during IME composition (Japanese/Chinese/Korean input).
  // Otherwise typing "#" mid-conversion would convert the block to a heading
  // before the user has confirmed the input.
  if (e && e.isComposing) {
    block.content = content.innerHTML; saveState();
    return;
  }
  block.content = content.innerHTML; saveState();
  const text = content.textContent || '';
  if (text.startsWith('/')) { slashQuery = text.slice(1); showSlashMenu(content, block); }
  else if (slashOpen && slashBlock && slashBlock.id === block.id) hideSlashMenu();

  if (block.type === 'text') {
    const sc = [
      // Headings
      { re: /^#\s/, t: 'h1' }, { re: /^##\s/, t: 'h2' }, { re: /^###\s/, t: 'h3' },
      // Lists
      { re: /^\*\s/, t: 'bullet' }, { re: /^-\s/, t: 'bullet' }, { re: /^\+\s/, t: 'bullet' },
      { re: /^\[\]\s/, t: 'todo' }, { re: /^\[ \]\s/, t: 'todo' },
      { re: /^1\.\s/, t: 'numbered' }, { re: /^1\)\s/, t: 'numbered' },
      // Toggle (Notion: > + space) and Quote (Notion: " + space)
      { re: /^>\s/, t: 'toggle' },
      { re: /^"\s/, t: 'quote' }, { re: /^"\s/, t: 'quote' },
      // Code
      { re: /^```/, t: 'code' },
      // Divider: --- → auto-convert
      { re: /^---$/, t: 'divider' }, { re: /^—-$/, t: 'divider' }
    ];
    for (const s of sc) {
      if (s.re.test(text)) {
        content.textContent = text.replace(s.re, '');
        block.content = content.innerHTML;
        convertBlockType(block, s.t);
        return;
      }
    }
  }
  updateNumberedList($('#blocks'));
}

function handleBlockKeydown(e, block, el, content, parentList) {
  if (slashOpen && slashBlock && slashBlock.id === block.id && ctxNavContext && !e.isComposing) {
    const items = ctxNavContext.selectable;
    if (e.key === 'ArrowDown') { e.preventDefault(); moveCtxSel(items, 1); return; }
    if (e.key === 'ArrowUp')   { e.preventDefault(); moveCtxSel(items, -1); return; }
    if (e.key === 'Enter')     { e.preventDefault(); const sel = items.find(i => i.classList.contains('selected')); if (sel) sel.click(); return; }
    if (e.key === 'Escape')    { e.preventDefault(); hideSlashMenu(); return; }
  }

  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    if (['bullet','numbered','todo'].includes(block.type) && !content.textContent.trim()) { convertBlockType(block, 'text'); return; }
    if (['h1','h2','h3','toggle_h1','toggle_h2','toggle_h3'].includes(block.type) && !content.textContent.trim()) { convertBlockType(block, 'text'); return; }
    const sel = window.getSelection();
    let afterHTML = '';
    if (sel.rangeCount) {
      const range = sel.getRangeAt(0), ar = document.createRange();
      ar.setStart(range.endContainer, range.endOffset);
      if (content.lastChild) ar.setEndAfter(content.lastChild); else ar.setEnd(content, content.childNodes.length);
      const frag = ar.extractContents(), tmp = document.createElement('div'); tmp.appendChild(frag);
      afterHTML = tmp.innerHTML; block.content = content.innerHTML;
    }

    // If block is a toggle and expanded, insert child as first kid;
    // otherwise insert after this block in parentList
    if ((block.type === 'toggle' || block.type.startsWith('toggle_h')) && block.expanded) {
      if (!block.children) block.children = [];
      const nb = blk('text', afterHTML);
      block.children.unshift(nb);
      saveState(); renderEditor();
      setTimeout(() => focusBlock(nb.id, 'start'), 0);
      return;
    }

    const nt = ['bullet','numbered','todo'].includes(block.type) ? block.type : 'text';
    const nb = blk(nt, afterHTML);
    insertBlockAfter(nb, block.id, parentList);
    renderEditor(); setTimeout(() => focusBlock(nb.id, 'start'), 0);
    return;
  }

  if (e.key === 'Backspace' && !e.isComposing && isCaretAtStart(content)) {
    if (block.type !== 'text') { e.preventDefault(); convertBlockType(block, 'text'); return; }
    if (!content.textContent.trim() && !content.innerHTML.trim()) {
      e.preventDefault(); const prev = deleteBlock(block.id); renderEditor();
      if (prev) setTimeout(() => focusBlock(prev.id, 'end'), 0);
      return;
    }
    e.preventDefault();
    const found = findBlockAndList(block.id, parentList);
    if (found && found.index > 0) {
      const prev = found.list[found.index - 1];
      if (!['divider','code','table','image','toggle','toggle_h1','toggle_h2','toggle_h3'].includes(prev.type)) {
        const prevLen = (prev.content || '').replace(/<[^>]*>/g, '').length;
        prev.content = (prev.content || '') + content.innerHTML;
        found.list.splice(found.index, 1); saveState(); renderEditor();
        setTimeout(() => {
          const pe = document.querySelector(`[data-block-id="${prev.id}"]`);
          if (pe) {
            pe.focus();
            const w = document.createTreeWalker(pe, NodeFilter.SHOW_TEXT);
            let acc = 0, node; const r = document.createRange(); let ok = false;
            while ((node = w.nextNode())) { if (acc + node.length >= prevLen) { r.setStart(node, prevLen - acc); r.collapse(true); ok = true; break; } acc += node.length; }
            if (!ok) placeCaret(pe, 'end');
            else { const s = window.getSelection(); s.removeAllRanges(); s.addRange(r); }
          }
        }, 0);
      }
    }
    return;
  }

  if (e.key === 'ArrowUp' && !e.isComposing && isCaretAtStart(content)) {
    const f = findBlockAndList(block.id, parentList);
    if (f && f.index > 0) { e.preventDefault(); focusBlock(f.list[f.index - 1].id, 'end'); }
    else { e.preventDefault(); const t = $('#page-title'); t.focus(); placeCaret(t, 'end'); }
    return;
  }
  if (e.key === 'ArrowDown' && !e.isComposing && isCaretAtEnd(content)) {
    const f = findBlockAndList(block.id, parentList);
    if (f && f.index < f.list.length - 1) { e.preventDefault(); focusBlock(f.list[f.index + 1].id, 'start'); }
    return;
  }

  if ((e.ctrlKey || e.metaKey) && !e.shiftKey) {
    if (e.key === 'b') { e.preventDefault(); document.execCommand('bold'); block.content = content.innerHTML; saveState(); }
    if (e.key === 'i') { e.preventDefault(); document.execCommand('italic'); block.content = content.innerHTML; saveState(); }
    if (e.key === 'u') { e.preventDefault(); document.execCommand('underline'); block.content = content.innerHTML; saveState(); }
  }
}

// Heuristic Markdown detector. Multi-line text with at least one block-level
// marker counts as Markdown; single lines are converted only when they start
// with an unambiguous block syntax (#, list, code fence, hr).
function looksLikeMarkdown(text) {
  if (!text || typeof text !== 'string') return false;
  const trimmed = text.trim();
  if (!trimmed) return false;
  const lines = trimmed.split('\n').map(l => l.replace(/^\s+/, ''));
  const hasBlockMarker = (l) =>
    /^#{1,3}\s+\S/.test(l) ||
    /^[-*+]\s+\[[ xX]\]\s/.test(l) ||
    /^[-*+]\s+\S/.test(l) ||
    /^\d+[.)]\s+\S/.test(l) ||
    /^>\s/.test(l) ||
    /^```/.test(l) ||
    /^-{3,}$/.test(l) ||
    /^\|.+\|\s*$/.test(l);
  if (lines.length === 1) return hasBlockMarker(lines[0]);
  // Multi-line: at least one block marker AND looks like the user copied
  // structured content (avoid converting normal multi-line prose).
  let markerCount = 0;
  for (const l of lines) if (hasBlockMarker(l)) markerCount++;
  if (markerCount >= 1) return true;
  // Detect bold/italic/link/inline-code on multiple lines (still treat as plain).
  return false;
}

function handleBlockPaste(e, block, content) {
  const cb = e.clipboardData || window.clipboardData;
  if (!cb) return;
  const text = cb.getData('text');
  if (!text) return;

  // Markdown auto-conversion path: replace empty current block, or insert
  // newly-parsed blocks after the current one.
  if (looksLikeMarkdown(text)) {
    e.preventDefault();
    const newBlocks = parseMarkdownToBlocks(text);
    if (!newBlocks.length) return;
    const found = findBlockAndList(block.id);
    if (!found) return;
    const isEmptyText = block.type === 'text' && !(block.content || '').replace(/<[^>]*>/g, '').trim();
    if (isEmptyText) {
      found.list.splice(found.index, 1, ...newBlocks);
    } else {
      found.list.splice(found.index + 1, 0, ...newBlocks);
    }
    saveState();
    renderEditor();
    const last = newBlocks[newBlocks.length - 1];
    if (last) focusBlock(last.id, 'end');
    return;
  }

  // Fall through to plain-text behavior (legacy path).
  e.preventDefault();
  const lines = text.split('\n');
  if (lines.length === 1) { document.execCommand('insertText', false, text); block.content = content.innerHTML; saveState(); return; }
  document.execCommand('insertText', false, lines[0]); block.content = content.innerHTML;
  let lastId = block.id;
  const found = findBlockAndList(block.id);
  const list = found ? found.list : null;
  for (let i = 1; i < lines.length; i++) {
    const nb = blk('text', escapeHTML(lines[i]));
    insertBlockAfter(nb, lastId, list); lastId = nb.id;
  }
  renderEditor(); focusBlock(lastId, 'end');
}

function moveCtxSel(items, dir) {
  if (!items || !items.length) return;
  let idx = items.findIndex(i => i.classList.contains('selected'));
  idx = (idx + dir + items.length) % items.length;
  items.forEach(i => i.classList.remove('selected'));
  items[idx].classList.add('selected');
  items[idx].scrollIntoView({ block: 'nearest' });
}

function showIconPicker(e, onPick, options = {}) {
  const picker = $('#icon-picker');
  iconPickerCtx = { onPick };
  let activeTab = 'emoji';

  function render() {
    picker.innerHTML = '';
    const tabs = document.createElement('div'); tabs.className = 'icon-picker-tabs';
    const eTab = document.createElement('div'); eTab.className = 'icon-picker-tab' + (activeTab === 'emoji' ? ' active' : '');
    eTab.textContent = '😀 絵文字'; eTab.onclick = () => { activeTab = 'emoji'; render(); };
    const mTab = document.createElement('div'); mTab.className = 'icon-picker-tab' + (activeTab === 'material' ? ' active' : '');
    mTab.textContent = '⬡ アイコン'; mTab.onclick = () => { activeTab = 'material'; render(); };
    tabs.appendChild(eTab); tabs.appendChild(mTab); picker.appendChild(tabs);

    const body = document.createElement('div'); body.className = 'icon-picker-body';
    const search = document.createElement('input'); search.className = 'icon-picker-search'; search.type = 'search';
    search.placeholder = activeTab === 'emoji' ? '絵文字を検索（カテゴリ名）...' : 'アイコン名を検索 (英語)...';
    body.appendChild(search);

    const top = document.createElement('div'); top.className = 'icon-picker-top';
    const randBtn = document.createElement('button'); randBtn.className = 'icon-picker-random'; randBtn.textContent = '🎲 ランダム';
    randBtn.onclick = () => {
      if (activeTab === 'emoji') { const a = Object.values(EMOJI_CATEGORIES).flat(); onPick(a[Math.floor(Math.random() * a.length)], 'emoji'); }
      else { const a = Object.values(MATERIAL_CATEGORIES).flat(); onPick(a[Math.floor(Math.random() * a.length)], 'material'); }
      hideIconPicker();
    };
    top.appendChild(randBtn);

    // Remove button (for callouts — "アイコンを削除")
    if (options.allowRemove && typeof options.onRemove === 'function') {
      const removeBtn = document.createElement('button');
      removeBtn.className = 'icon-picker-random';
      removeBtn.style.color = 'var(--red)';
      removeBtn.textContent = '削除';
      removeBtn.title = 'アイコンを削除';
      removeBtn.onclick = () => { options.onRemove(); hideIconPicker(); };
      top.appendChild(removeBtn);
    }

    body.appendChild(top);

    const grid = document.createElement('div'); grid.className = 'icon-picker-grid';
    body.appendChild(grid);

    function renderGrid(q) {
      grid.innerHTML = '';
      const ql = (q || '').toLowerCase();
      if (activeTab === 'emoji') {
        Object.entries(EMOJI_CATEGORIES).forEach(([cat, emojis]) => {
          const catMatch = cat.toLowerCase().includes(ql);
          if (ql && !catMatch) return;
          const h = document.createElement('div'); h.className = 'icon-picker-category'; h.textContent = cat; grid.appendChild(h);
          emojis.forEach(em => {
            const item = document.createElement('div'); item.className = 'icon-picker-item emoji'; item.textContent = em;
            item.onclick = () => { onPick(em, 'emoji'); hideIconPicker(); };
            grid.appendChild(item);
          });
        });
      } else {
        Object.entries(MATERIAL_CATEGORIES).forEach(([cat, icons]) => {
          const filtered = ql ? icons.filter(i => i.includes(ql)) : icons;
          if (!filtered.length) return;
          const h = document.createElement('div'); h.className = 'icon-picker-category'; h.textContent = cat; grid.appendChild(h);
          filtered.forEach(name => {
            const item = document.createElement('div'); item.className = 'icon-picker-item mat-icon';
            item.innerHTML = `<span class="material-icons-outlined">${escapeHTML(name)}</span>`;
            item.title = name;
            item.onclick = () => { onPick(name, 'material'); hideIconPicker(); };
            grid.appendChild(item);
          });
        });
      }
    }
    renderGrid('');
    search.oninput = () => renderGrid(search.value);
    picker.appendChild(body);
    setTimeout(() => search.focus(), 50);
  }

  render();
  const rect = e.target.getBoundingClientRect();
  picker.style.left = rect.left + 'px';
  picker.style.top = (rect.bottom + 4) + 'px';
  picker.hidden = false;
  adjustMenuPosition(picker);
}

function updateInlineToolbar() {
  const tb = $('#inline-toolbar'), sel = window.getSelection();
  if (!sel.rangeCount || sel.isCollapsed) { tb.hidden = true; return; }
  const range = sel.getRangeAt(0);
  const ed = range.commonAncestorContainer.nodeType === 1
    ? range.commonAncestorContainer.closest('[contenteditable]')
    : range.commonAncestorContainer.parentElement?.closest('[contenteditable]');
  if (!ed) { tb.hidden = true; return; }
  const rect = range.getBoundingClientRect();
  if (!rect.width && !rect.height) { tb.hidden = true; return; }
  tb.style.left = (rect.left + rect.width / 2 - tb.offsetWidth / 2) + 'px';
  tb.style.top = (rect.top - tb.offsetHeight - 6) + 'px';
  tb.hidden = false;
  adjustMenuPosition(tb);
}
document.addEventListener('selectionchange', () => { clearTimeout(window._inlineT); window._inlineT = setTimeout(updateInlineToolbar, 50); });
$('#inline-toolbar').querySelectorAll('.inline-btn').forEach(btn => {
  btn.onmousedown = (e) => e.preventDefault();
  btn.onclick = () => {
    const cmd = btn.dataset.cmd;
    if (cmd === 'code') {
      const sel = window.getSelection();
      if (sel.rangeCount && !sel.isCollapsed) {
        const r = sel.getRangeAt(0), ce = document.createElement('code');
        ce.style.cssText = 'background:var(--bg-code);border-radius:3px;padding:1px 4px;font-family:monospace;font-size:0.9em;';
        ce.appendChild(r.extractContents()); r.insertNode(ce);
      }
    } else document.execCommand(cmd);
    const active = document.activeElement;
    if (active && active.classList.contains('block-content')) {
      const f = findBlockAndList(active.dataset.blockId);
      if (f) { f.block.content = active.innerHTML; saveState(); }
    }
  };
});

/* ==================== Sidebar resize ==================== */
const SIDEBAR_WIDTH_KEY = 'localnotion_sidebar_width';
const SIDEBAR_MIN = 200, SIDEBAR_MAX = 480, SIDEBAR_DEFAULT = 260;
function applySidebarWidth(px) {
  const w = Math.min(SIDEBAR_MAX, Math.max(SIDEBAR_MIN, Math.round(px)));
  document.documentElement.style.setProperty('--sidebar-width', w + 'px');
  return w;
}
function loadSidebarWidth() {
  const _safeLocalStorageGet = (key) => {
    try { return localStorage.getItem(key); } catch (_) { return null; }
  };
  const saved = parseInt(_safeLocalStorageGet(SIDEBAR_WIDTH_KEY) || '', 10);
  applySidebarWidth(Number.isFinite(saved) ? saved : SIDEBAR_DEFAULT);
}
loadSidebarWidth();
(() => {
  const _safeLocalStorageSet = (key, value) => {
    try { localStorage.setItem(key, value); } catch (_) {}
  };
  const resizer = $('#sidebar-resizer');
  const sidebar = $('#sidebar');
  if (!resizer || !sidebar) return;
  let startX = 0, startW = 0, dragging = false;
  const onMove = (e) => {
    if (!dragging) return;
    const dx = e.clientX - startX;
    applySidebarWidth(startW + dx);
  };
  const onUp = () => {
    if (!dragging) return;
    dragging = false;
    sidebar.classList.remove('resizing');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    const w = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-width'), 10);
    if (Number.isFinite(w)) _safeLocalStorageSet(SIDEBAR_WIDTH_KEY, String(w));
  };
  resizer.addEventListener('mousedown', (e) => {
    if (window.matchMedia('(max-width: 768px)').matches) return;
    if (sidebar.classList.contains('collapsed')) return;
    e.preventDefault();
    dragging = true;
    startX = e.clientX;
    startW = sidebar.getBoundingClientRect().width;
    sidebar.classList.add('resizing');
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
  resizer.addEventListener('dblclick', () => {
    applySidebarWidth(SIDEBAR_DEFAULT);
    _safeLocalStorageSet(SIDEBAR_WIDTH_KEY, String(SIDEBAR_DEFAULT));
  });
})();

function formatTrashDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return 'たった今';
  if (diff < 3600) return Math.floor(diff / 60) + '分前';
  if (diff < 86400) return Math.floor(diff / 3600) + '時間前';
  if (diff < 86400 * 7) return Math.floor(diff / 86400) + '日前';
  return `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}`;

function formatAutoPurgeTimestamp(ts) {

  const day = String(d.getDate()).padStart(2, '0');
  const h = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  return `${y}/${m}/${day} ${h}:${mm}`;
}

    if (days > 0 && page.deletedAt) {

function applyThemeCustom() {
  const tc = state.themeCustom || {};

  // Accent (resolves separately for light / dark)
  const isDark = !!state.darkMode;
  const accent = isDark ? (tc.accentDark || '') : (tc.accent || '');
  if (accent) root.setProperty('--accent', accent);
  else root.removeProperty('--accent');
  // Page width
  const w = PAGE_WIDTH_MAP[tc.pageWidth] || '';
  if (w) root.setProperty('--page-max-width', w);
  else root.removeProperty('--page-max-width');
  // Font family
  const currentFont = FONT_FAMILY_LEGACY_MAP[tc.fontFamily] || tc.fontFamily || 'clarity';
  const f = FONT_FAMILY_MAP[currentFont] || '';
  if (f) root.setProperty('--font-family-base', f);
  else root.removeProperty('--font-family-base');
}

/* ==================== Full-App HTML Export ==================== */
$('#export-btn').addEventListener('click', async () => {
  const ok = await showConfirm('現在のアプリ全体を1つのHTMLファイルとして保存します。\n共有したり、別の場所で開けば同じ状態で続きから使えます。', { title: '保存', okText: '保存', cancelText: 'キャンセル' });
  if (!ok) return;

  try {
    // Fetch the current page's HTML — when viewing a local file this works
    const selfUrl = window.location.href;
    let sourceHTML;
    try {
      const res = await fetch(selfUrl);
      sourceHTML = await res.text();
    } catch (err) {
      // Fallback: use the document's current HTML
      sourceHTML = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
    }

    // Inject current state into the embedded-state script tag.
    // NOTE: we must never write a literal close-script sequence in source —
    // the HTML parser treats it as the end of the current <script>, even
    // inside strings/regexes. We build the tag name from parts.
    const SCRIPT = 'scr' + 'ipt';
    const CLOSE_SCRIPT = '<\/' + SCRIPT + '>'; // builds closing tag string
    const stateJSON = JSON.stringify(state);
    const stateEscaped = stateJSON.replace(new RegExp('<\\/' + SCRIPT + '>', 'gi'), '<\\\/' + SCRIPT + '>');

    // Replace the content of the embedded-state script tag
    const re = new RegExp('(<' + SCRIPT + '\\s+id="embedded-state"[^>]*>)([\\s\\S]*?)(<\\/' + SCRIPT + '>)', 'i');
    let modified;
    if (re.test(sourceHTML)) {
      modified = sourceHTML.replace(re, (_, open, __, close) => open + stateEscaped + close);
    } else {
      // If the tag is missing (shouldn't happen), inject before </body>
      const tag = '<' + SCRIPT + ' id="embedded-state" type="application/json">' + stateEscaped + CLOSE_SCRIPT;
      modified = sourceHTML.replace('</body>', tag + '\n</body>');
    }

    const blob = new Blob([modified], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    const dateStr = new Date().toISOString().slice(0, 10);
    // Use workspace name for filename, stripped of characters invalid in most filesystems
    const rawName = (state.workspaceName || 'notion-clone').trim();
    const safeName = rawName.replace(/[\\/:*?"<>|]/g, '_').replace(/\s+/g, '_').slice(0, 80) || 'notion-clone';
    a.download = `${safeName}-${dateStr}.html`;
    a.click();
    URL.revokeObjectURL(url);
  } catch (err) {
    showAlert('エクスポートに失敗しました: ' + err.message);
  }
});

const searchOverlay = $('#search-overlay');
const searchInput = $('#search-input');
const searchResults = $('#search-results');
let searchSelectedIdx = 0, searchItems = [];

function openSearchModal(preset = '') {
  const safePreset = (typeof preset === 'string') ? preset : '';
  searchOverlay.hidden = false;
  searchInput.value = safePreset;
  renderSearchResults(safePreset);

      try { searchInput.setSelectionRange(pos, pos); } catch (_) {}
    }

function flattenTextFromBlocks(blocks) {
  let out = [];
  const walk = (bs) => { for (const b of bs) { const txt = (b.content || '').replace(/<[^>]*>/g, ''); if (txt) out.push(txt); if (b.children) walk(b.children); } };
  walk(blocks);
  return out.join(' ');
}

function highlightMatch(text, q) {
  if (!q) return escapeHTML(text);
  const lower = text.toLowerCase(), ql = q.toLowerCase();
  let out = '', last = 0, idx;
  while ((idx = lower.indexOf(ql, last)) !== -1) {
    out += escapeHTML(text.slice(last, idx)) + '<span class="search-hit">' + escapeHTML(text.slice(idx, idx + q.length)) + '</span>';
    last = idx + q.length;
  }
  out += escapeHTML(text.slice(last));
  return out;
}

function getPagePath(page) {
  const parts = []; let cur = page;
  while (cur) { parts.unshift(cur.title || '無題'); cur = cur.parentId ? state.pages[cur.parentId] : null; }
  return parts.join(' / ');
}

function renderSearchResults(q) {
  searchResults.innerHTML = '';
  searchItems = [];

  const ql = q.trim().toLowerCase();
  const allPages = Object.values(state.pages).filter(p => !p.deletedAt);

  let pageMatches;
  if (!ql) {
    pageMatches = allPages.slice().sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0)).slice(0, 12);
  } else {
    pageMatches = allPages.filter(p => {
      const title = (p.title || '').toLowerCase();
      const body = flattenTextFromBlocks(p.blocks).toLowerCase();
      return title.includes(ql) || body.includes(ql);
    }).sort((a, b) => {
      const at = (a.title||'').toLowerCase().includes(ql) ? 0 : 1;
      const bt = (b.title||'').toLowerCase().includes(ql) ? 0 : 1;
      return at - bt;
    });
  }

  const h = document.createElement('div'); h.className = 'search-section';
  h.textContent = ql ? `ページ (${pageMatches.length})` : '最近のページ';
  searchResults.appendChild(h);

  if (!pageMatches.length && ql) {
    const empty = document.createElement('div'); empty.className = 'search-empty';
    empty.innerHTML = `結果がありません<br><small>Enter で「${escapeHTML(q)}」を新規ページとして作成</small>`;
    searchResults.appendChild(empty);
  }

  pageMatches.forEach((p) => {
    const item = document.createElement('div'); item.className = 'search-item';
    const icon = document.createElement('div'); icon.className = 'search-item-icon';
    const hasIcon = p.hasIcon !== false && p.icon;
    if (hasIcon) icon.innerHTML = renderIconHTML(p.icon, p.iconType || 'emoji', 18);
    else icon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:14px;height:14px;color:var(--text-tertiary)"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/></svg>';
    const body = document.createElement('div'); body.className = 'search-item-body';
    const title = document.createElement('div'); title.className = 'search-item-title';
    title.innerHTML = highlightMatch(p.title || '無題', ql);
    const path = document.createElement('div'); path.className = 'search-item-path';
    path.textContent = getPagePath(p);
    body.appendChild(title); body.appendChild(path);
    item.appendChild(icon); item.appendChild(body);
    item.onclick = () => { closeSearchModal(); switchPage(p.id); };
    item.onmouseenter = () => { searchItems.forEach(i => i.classList.remove('selected')); item.classList.add('selected'); searchSelectedIdx = searchItems.indexOf(item); };
    searchResults.appendChild(item);
    searchItems.push(item);
  });

  if (ql) {
    const createItem = document.createElement('div'); createItem.className = 'search-item';
    createItem.innerHTML = `<div class="search-item-icon">＋</div><div class="search-item-body"><div class="search-item-title">「${escapeHTML(q)}」を新規ページとして作成</div></div>`;
    createItem.onclick = () => { closeSearchModal(); const p = createPage(null, { title: q }); switchPage(p.id); };
    createItem.onmouseenter = () => { searchItems.forEach(i => i.classList.remove('selected')); createItem.classList.add('selected'); searchSelectedIdx = searchItems.indexOf(createItem); };
    searchResults.appendChild(createItem);
    searchItems.push(createItem);
  }

  searchSelectedIdx = 0;
  if (searchItems[0]) searchItems[0].classList.add('selected');
}

searchInput.addEventListener('input', () => renderSearchResults(searchInput.value));
searchInput.addEventListener('keydown', (e) => {
  if (e.isComposing) return;
  if (e.key === 'Escape') { e.preventDefault(); closeSearchModal(); return; }
  if (e.key === 'ArrowDown') { e.preventDefault(); if (searchItems.length) { searchItems.forEach(i => i.classList.remove('selected')); searchSelectedIdx = (searchSelectedIdx + 1) % searchItems.length; searchItems[searchSelectedIdx].classList.add('selected'); searchItems[searchSelectedIdx].scrollIntoView({block: 'nearest'}); } return; }
  if (e.key === 'ArrowUp')   { e.preventDefault(); if (searchItems.length) { searchItems.forEach(i => i.classList.remove('selected')); searchSelectedIdx = (searchSelectedIdx - 1 + searchItems.length) % searchItems.length; searchItems[searchSelectedIdx].classList.add('selected'); searchItems[searchSelectedIdx].scrollIntoView({block: 'nearest'}); } return; }
  if (e.key === 'Enter') { e.preventDefault(); if (searchItems[searchSelectedIdx]) searchItems[searchSelectedIdx].click(); return; }
});

searchOverlay.addEventListener('mousedown', (e) => { if (e.target === searchOverlay) closeSearchModal(); });
$('#search-btn').addEventListener('click', () => openSearchModal());

document.addEventListener('keydown', (e) => {
  const mod = e.ctrlKey || e.metaKey;
  if (mod && !e.shiftKey && (e.key === 'p' || e.key === 'k')) {
    e.preventDefault(); openSearchModal();
    return;
  }
  if (mod && e.key === '/') {
    e.preventDefault();
    if ($('#shortcuts-overlay').hidden) openShortcutsModal();
    else closeShortcutsModal();
    return;
  }
  if (e.key === 'Escape' && !$('#shortcuts-overlay').hidden) {
    e.preventDefault(); closeShortcutsModal(); return;
  }
  if (e.key === 'Escape' && !$('#trash-overlay').hidden) {
    e.preventDefault(); closeTrashModal(); return;
  }
  if (e.key === 'Escape' && !$('#theme-customizer-overlay').hidden) {
    e.preventDefault(); closeThemeCustomizer(); return;
  }

  // Undo / Redo (global, block the browser's default contenteditable undo
  // which only covers the current field and produces inconsistent state)
  if (mod && !e.altKey) {
    const key = e.key.toLowerCase();
    // Skip when user is typing inside an <input>/<textarea>/<select> that has
    // its own meaningful undo stack (our dialogs' input uses this).
    const t = e.target;
    const tag = t && t.tagName;
    const inField = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
    if (inField) return;

    if (key === 'z' && !e.shiftKey) {
      e.preventDefault(); undo(); return;
    }
    if ((key === 'y') || (key === 'z' && e.shiftKey)) {
      e.preventDefault(); redo(); return;
    }
  }
});

/* ==================== Multi-Block Selection ==================== */
const BlockSelection = (() => {
  const selectedIds = new Set();
  let isDragging = false;
  let dragStart = null;
  const marquee = document.getElementById('selection-marquee');
  const editorScroll = document.getElementById('editor-scroll');

  function clear() {
    selectedIds.forEach(id => {
      const el = document.querySelector('.block[data-id="' + id + '"]');
      if (el) el.classList.remove('selected');
    });
    selectedIds.clear();
  }
  function selectBlock(id) {
    if (selectedIds.has(id)) return;
    selectedIds.add(id);
    const el = document.querySelector('.block[data-id="' + id + '"]');
    if (el) el.classList.add('selected');
  }
  function unselectBlock(id) {
    selectedIds.delete(id);
    const el = document.querySelector('.block[data-id="' + id + '"]');
    if (el) el.classList.remove('selected');
  }
  function getSelectedIds() { return Array.from(selectedIds); }
  function hasSelection() { return selectedIds.size > 0; }
  function selectOne(id) { clear(); selectBlock(id); }

  function updateMarquee(x, y) {
    const left = Math.min(dragStart.x, x);
    const top = Math.min(dragStart.y, y);
    const right = Math.max(dragStart.x, x);
    const bottom = Math.max(dragStart.y, y);
    marquee.style.left = left + 'px';
    marquee.style.top = top + 'px';
    marquee.style.width = (right - left) + 'px';
    marquee.style.height = (bottom - top) + 'px';
    if ((right - left) < 3 && (bottom - top) < 3) return;
    const blocks = document.querySelectorAll('#blocks > .block');
    const newSelected = new Set();
    blocks.forEach(b => {
      const r = b.getBoundingClientRect();
      if (!(r.right < left || r.left > right || r.bottom < top || r.top > bottom)) {
        newSelected.add(b.dataset.id);
      }
    });
    selectedIds.forEach(id => { if (!newSelected.has(id)) unselectBlock(id); });
    newSelected.forEach(id => selectBlock(id));
  }

  // Start drag anywhere in #editor-scroll that is NOT inside an interactive element or a block.
  // This lets users drag from the left/right margin (the area around the page container).
  editorScroll.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    // Skip if clicking an interactive or editable element
    if (e.target.closest('.block') || e.target.closest('.page-title') ||
        e.target.closest('.page-icon-wrapper') || e.target.closest('.page-meta-buttons') ||
        e.target.closest('button') || e.target.closest('input') || e.target.closest('select') ||
        e.target.closest('[contenteditable="true"]') ||
        e.target.closest('[contenteditable="plaintext-only"]')) {
      return;
    }
    isDragging = true;
    dragStart = { x: e.clientX, y: e.clientY };
    marquee.style.display = 'block';
    marquee.style.left = e.clientX + 'px';
    marquee.style.top = e.clientY + 'px';
    marquee.style.width = '0px';
    marquee.style.height = '0px';
    document.body.classList.add('block-selecting');
    clear();
    e.preventDefault();
  });

  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    updateMarquee(e.clientX, e.clientY);
  });
  window.addEventListener('mouseup', () => {
    if (!isDragging) return;
    isDragging = false;
    marquee.style.display = 'none';
    document.body.classList.remove('block-selecting');
  });

  // Click anywhere except the block-type conversion menu clears selection.
  // (Note: inside #context-menu the user is picking a new block type, so we
  //  keep the selection alive until the menu actually applies the change.
  //  Also preserve selection when clicking the block drag handle so users
  //  can interact with selected blocks via the gutter.)
  document.addEventListener('mousedown', (e) => {
    if (isDragging) return;
    if (!hasSelection()) return;
    if (e.target.closest('#context-menu')) return;
    if (e.target.closest('.block-drag')) return;
    clear();
  }, true);

  return { clear, selectBlock, unselectBlock, selectOne, getSelectedIds, hasSelection };
})();

// Esc/Copy/Cut/Delete/SelectAll for selected blocks
document.addEventListener('keydown', (e) => {
  if (e.isComposing) return;
  const tag = e.target && e.target.tagName;
  const inField = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
  const mod = e.ctrlKey || e.metaKey;

  // Esc on a focused block → select that block instead
  if (e.key === 'Escape' && !inField) {
    const active = document.activeElement;
    if (active && active.closest) {
      const blockEl = active.closest('#blocks > .block');
      if (blockEl) {
        active.blur();
        BlockSelection.selectOne(blockEl.dataset.id);
        e.preventDefault();
        return;
      }
    }
  }

  if (!BlockSelection.hasSelection() || inField) return;

  const ids = BlockSelection.getSelectedIds();

  if (mod && e.key.toLowerCase() === 'c') {
    const parts = [];
    ids.forEach(id => {
      const found = findBlockAndList(id);
      if (found) {
        const tmp = document.createElement('div'); tmp.innerHTML = found.block.content || '';
        parts.push(tmp.textContent);
      }
    });
    navigator.clipboard.writeText(parts.join('\n')).catch(() => {});
    e.preventDefault();
    return;
  }
  if (mod && e.key.toLowerCase() === 'x') {
    const parts = [];
    ids.forEach(id => {
      const found = findBlockAndList(id);
      if (found) {
        const tmp = document.createElement('div'); tmp.innerHTML = found.block.content || '';
        parts.push(tmp.textContent);
      }
    });
    navigator.clipboard.writeText(parts.join('\n')).catch(() => {});
    ids.forEach(id => deleteBlock(id));
    BlockSelection.clear();
    saveState(); renderEditor();
    e.preventDefault();
    return;
  }
  if (e.key === 'Delete' || e.key === 'Backspace') {
    ids.forEach(id => deleteBlock(id));
    BlockSelection.clear();
    saveState(); renderEditor();
    e.preventDefault();
    return;
  }
  if (mod && e.key.toLowerCase() === 'a') {
    BlockSelection.clear();
    document.querySelectorAll('#blocks > .block').forEach(b => {
      BlockSelection.selectBlock(b.dataset.id);
    });
    e.preventDefault();
    return;
  }
});

/* ==================== Render All ==================== */
function renderAll() {
  // Sync workspace name from state (only if user isn't currently editing it)
  const wn = document.getElementById('workspace-name');
  if (wn && document.activeElement !== wn) {
    wn.textContent = state.workspaceName || 'マイワークスペース';
  }
  renderSidebar();
  renderEditor();
}

/* ==================== Init ==================== */
(async function init() {
  // Priority: embedded state (exported HTML) > IndexedDB
  const embedded = document.getElementById('embedded-state');
  let embeddedState = null;
  if (embedded && embedded.textContent.trim()) {
    try { embeddedState = JSON.parse(embedded.textContent); } catch (_) {}
  }

  if (embeddedState && embeddedState.pages) {
    state = embeddedState;
  } else {
    const loaded = await loadStateAsync();
    if (loaded) state = loaded;
  }
  // Sanitize all string content in state to neutralize injected HTML from
  // shared / tampered embedded-state or stored data (defense in depth).
  sanitizeStateInPlace(state);
  const didMigrateTabs = migrateTabsInState();
  if (!Number.isFinite(+state.trashAutoPurgeDays)) state.trashAutoPurgeDays = 0;
  if (typeof state.trashLastAutoPurge !== 'object' || !state.trashLastAutoPurge) state.trashLastAutoPurge = null;
  // Run auto-purge on startup so expired trash is cleaned up before render.
  const purgedOnStartup = autoPurgeTrash();

  // Back-compat: older saved states may not have workspaceName
  if (!state.workspaceName) state.workspaceName = 'マイワークスペース';

  // Wire up editable workspace name
  const wnEl = document.getElementById('workspace-name');
  if (wnEl) {
    wnEl.addEventListener('input', () => {
      state.workspaceName = wnEl.textContent.trim() || 'マイワークスペース';
      saveState();
    });
    // Enter key should blur (not insert a newline)
    wnEl.addEventListener('keydown', (e) => {
      if (e.isComposing) return;
      if (e.key === 'Enter') { e.preventDefault(); wnEl.blur(); }
    });
    // On blur: if empty, restore default
    wnEl.addEventListener('blur', () => {
      if (!wnEl.textContent.trim()) {
        wnEl.textContent = state.workspaceName || 'マイワークスペース';
      }
    });
  }

  applyTheme();
  applyThemeCustom();
  renderAll();
  if (didMigrateTabs) _doSave();
  notifyAutoPurgeResult(purgedOnStartup, +state.trashAutoPurgeDays || 0, 'startup');
  // Periodic backup save: write directly without bumping updatedAt or pushing
  // an undo snapshot. User-action paths still call saveState() to bump both.
  setInterval(_doSave, 3000);
})();
</script>
