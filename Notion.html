<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notion Clone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Serif+JP:wght@400;500;600;700&family=Source+Code+Pro:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f7f6f3;
      --bg-sidebar: #f7f6f3;
      --bg-hover: rgba(55, 53, 47, 0.08);
      --bg-active: rgba(55, 53, 47, 0.16);
      --text-primary: #37352f;
      --text-secondary: rgba(55, 53, 47, 0.65);
      --text-tertiary: rgba(55, 53, 47, 0.5);
      --border-color: rgba(55, 53, 47, 0.09);
      --blue: #2eaadc;
      --callout-bg: rgba(241, 241, 239, 1);
      --code-bg: rgba(135, 131, 120, 0.15);
      --quote-border: #37352f;
      --shadow: rgba(15, 15, 15, 0.05);
      --font-default: 'Noto Sans JP', sans-serif;
      --font-serif: 'Noto Serif JP', serif;
      --font-mono: 'Source Code Pro', monospace;
    }

    .dark-mode {
      --bg-primary: #191919;
      --bg-secondary: #202020;
      --bg-sidebar: #202020;
      --bg-hover: rgba(255, 255, 255, 0.055);
      --bg-active: rgba(255, 255, 255, 0.1);
      --text-primary: rgba(255, 255, 255, 0.9);
      --text-secondary: rgba(255, 255, 255, 0.6);
      --text-tertiary: rgba(255, 255, 255, 0.4);
      --border-color: rgba(255, 255, 255, 0.094);
      --callout-bg: rgba(255, 255, 255, 0.055);
      --quote-border: rgba(255, 255, 255, 0.6);
      --shadow: rgba(0, 0, 0, 0.2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-default);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 16px;
      line-height: 1.5;
      overflow: hidden;
    }

    body.font-serif {
      font-family: var(--font-serif);
    }

    body.font-mono {
      font-family: var(--font-mono);
    }

    body.small-text {
      font-size: 14px;
    }

    .material-icons {
      font-size: 20px;
      vertical-align: middle;
    }

    .app {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      min-width: 240px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      transition: transform 0.2s, width 0.2s, min-width 0.2s;
      z-index: 100;
    }

    .sidebar.collapsed {
      width: 0;
      min-width: 0;
      transform: translateX(-240px);
    }

    .sidebar-header {
      padding: 12px 12px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .workspace-name {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      font-size: 14px;
    }

    .workspace-name:hover {
      background: var(--bg-hover);
    }

    .workspace-icon {
      width: 22px;
      height: 22px;
      background: linear-gradient(135deg, #e8e8e8, #d0d0d0);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .dark-mode .workspace-icon {
      background: linear-gradient(135deg, #404040, #303030);
    }

    .icon-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
    }

    .icon-btn:hover {
      background: var(--bg-hover);
    }

    .sidebar-actions {
      padding: 4px 12px;
    }

    .sidebar-action {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .sidebar-action:hover {
      background: var(--bg-hover);
    }

    .sidebar-action .material-icons {
      font-size: 18px;
      opacity: 0.8;
    }

    .sidebar-section {
      padding: 8px 12px 4px;
    }

    .sidebar-section-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-tertiary);
      padding: 4px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-section-title:hover {
      background: var(--bg-hover);
      border-radius: 4px;
      cursor: pointer;
    }

    .page-list {
      padding: 0 4px;
      overflow-y: auto;
      flex: 1;
    }

    .page-item {
      display: flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      user-select: none;
      min-height: 28px;
    }

    .page-item:hover {
      background: var(--bg-hover);
    }

    .page-item.active {
      background: var(--bg-active);
    }

    .page-toggle {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      flex-shrink: 0;
      transition: transform 0.1s;
    }

    .page-toggle:hover {
      background: var(--bg-active);
    }

    .page-toggle.expanded {
      transform: rotate(90deg);
    }

    .page-toggle.hidden {
      visibility: hidden;
    }


    .page-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .page-actions {
      display: none;
      gap: 2px;
    }

    .page-item:hover .page-actions {
      display: flex;
    }

    .page-action {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      color: var(--text-secondary);
    }

    .page-action:hover {
      background: var(--bg-active);
    }

    .page-action .material-icons {
      font-size: 16px;
    }

    .nested-pages {
      margin-left: 12px;
      display: none;
    }

    .nested-pages.expanded {
      display: block;
    }

    .new-page-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      margin: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-secondary);
      border: 1px dashed var(--border-color);
    }

    .new-page-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    /* Main */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      min-height: 45px;
      border-bottom: 1px solid transparent;
    }

    .topbar:hover {
      border-bottom-color: var(--border-color);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .breadcrumb-item {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 6px;
      border-radius: 4px;
      cursor: pointer;
    }

    .breadcrumb-item:hover {
      background: var(--bg-hover);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .topbar-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      border: none;
      background: transparent;
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .topbar-btn:hover {
      background: var(--bg-hover);
    }

    .editor-container {
      flex: 1;
      overflow-y: auto;
      display: flex;
      justify-content: center;
    }

    .editor {
      width: 100%;
      max-width: 900px;
      padding: 48px 96px 200px;
    }

    .editor.full-width {
      max-width: none;
    }

    /* Page Header */
    .page-header {
      margin-bottom: 16px;
      position: relative;
    }

    .page-title-input {
      font-size: 40px;
      font-weight: 700;
      border: none;
      outline: none;
      background: transparent;
      width: 100%;
      color: var(--text-primary);
      font-family: inherit;
      line-height: 1.2;
    }

    .page-title-input::placeholder {
      color: var(--text-tertiary);
    }

    /* Mode Toggle */
    .mode-toggle {
      display: flex;
      background: var(--bg-secondary);
      border-radius: 6px;
      padding: 2px;
      gap: 2px;
    }

    .mode-btn {
      padding: 4px 14px;
      border: none;
      background: transparent;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-secondary);
      font-family: inherit;
    }

    .mode-btn.active {
      background: var(--bg-primary);
      color: var(--text-primary);
      box-shadow: 0 1px 3px var(--shadow);
    }

    /* Editor */
    .editor-textarea {
      width: 100%;
      min-height: 60vh;
      border: none;
      outline: none;
      resize: none;
      background: transparent;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 15px;
      line-height: 1.8;
      padding: 0;
      caret-color: var(--text-primary);
    }

    .editor-textarea::placeholder {
      color: var(--text-tertiary);
    }

    .editor-textarea.hidden {
      display: none;
    }

    /* Preview */
    .editor-preview {
      display: none;
      line-height: 1.7;
    }

    .editor-preview.active {
      display: block;
    }

    .editor-preview h1 {
      font-size: 2em;
      font-weight: 700;
      margin: 0.8em 0 0.4em;
      line-height: 1.2;
    }

    .editor-preview h2 {
      font-size: 1.5em;
      font-weight: 600;
      margin: 0.7em 0 0.35em;
      line-height: 1.3;
    }

    .editor-preview h3 {
      font-size: 1.2em;
      font-weight: 600;
      margin: 0.6em 0 0.3em;
      line-height: 1.3;
    }

    .editor-preview p {
      margin: 0.4em 0;
    }

    .editor-preview ul,
    .editor-preview ol {
      margin: 0.4em 0;
      padding-left: 1.6em;
    }

    .editor-preview li {
      margin: 0.2em 0;
    }

    .editor-preview li.task-item {
      list-style: none;
      margin-left: -1.2em;
    }

    .editor-preview li.task-item input[type="checkbox"] {
      margin-right: 6px;
    }

    .editor-preview blockquote {
      border-left: 3px solid var(--text-tertiary);
      padding-left: 1em;
      margin: 0.6em 0;
      color: var(--text-secondary);
    }

    .editor-preview pre {
      background: var(--code-bg);
      border-radius: 4px;
      padding: 14px 16px;
      overflow-x: auto;
      margin: 0.6em 0;
    }

    .editor-preview pre code {
      background: none;
      padding: 0;
      font-size: 14px;
      line-height: 1.6;
    }

    .editor-preview code {
      background: var(--code-bg);
      padding: 2px 5px;
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 87%;
    }

    .editor-preview hr {
      border: none;
      border-top: 1px solid var(--border-color);
      margin: 1em 0;
    }

    .editor-preview a {
      color: var(--blue);
      text-decoration: none;
    }

    .editor-preview a:hover {
      text-decoration: underline;
    }

    .editor-preview strong {
      font-weight: 700;
    }

    .editor-preview em {
      font-style: italic;
    }

    .editor-preview del {
      text-decoration: line-through;
      color: var(--text-tertiary);
    }

    /* Search Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding-top: 100px;
      z-index: 2000;
    }

    .modal-overlay.visible {
      display: flex;
    }

    .modal-overlay.centered {
      align-items: center;
      padding-top: 0;
    }

    .search-container {
      width: 600px;
      max-width: 90vw;
      background: var(--bg-primary);
      border-radius: 8px;
      box-shadow: 0 8px 32px var(--shadow);
      overflow: hidden;
    }

    .search-input-wrapper {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
      gap: 12px;
    }

    .search-input-wrapper .material-icons {
      color: var(--text-tertiary);
    }

    .search-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 16px;
      background: transparent;
      color: var(--text-primary);
      font-family: inherit;
    }

    .search-input::placeholder {
      color: var(--text-tertiary);
    }

    .search-results {
      max-height: 400px;
      overflow-y: auto;
    }

    .search-result-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
    }

    .search-result-item:hover {
      background: var(--bg-hover);
    }

    .search-result-item .result-icon {
      font-size: 18px;
    }

    .search-result-title {
      font-size: 14px;
    }

    .search-empty {
      padding: 24px;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 14px;
    }

    /* Settings */
    .settings-menu {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      box-shadow: 0 8px 32px var(--shadow);
      width: 400px;
      z-index: 2001;
      display: none;
    }

    .settings-menu.visible {
      display: block;
    }

    .settings-header {
      padding: 16px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .settings-title {
      font-size: 16px;
      font-weight: 600;
    }

    .settings-content {
      padding: 16px;
    }

    .settings-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-color);
    }

    .settings-item:last-child {
      border-bottom: none;
    }

    .settings-label {
      font-size: 14px;
    }

    .settings-toggle {
      width: 40px;
      height: 24px;
      background: var(--bg-active);
      border-radius: 12px;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
    }

    .settings-toggle.active {
      background: var(--blue);
    }

    .settings-toggle::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      background: white;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: transform 0.2s;
    }

    .settings-toggle.active::after {
      transform: translateX(16px);
    }

    .font-options {
      display: flex;
      gap: 8px;
    }

    .font-option {
      padding: 8px 16px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    .font-option:hover {
      background: var(--bg-hover);
    }

    .font-option.active {
      border-color: var(--blue);
      background: rgba(46, 170, 220, 0.1);
    }



    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--text-tertiary);
      border-radius: 5px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-secondary);
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 200;
      }

      .sidebar.collapsed {
        transform: translateX(-100%);
      }

      .editor {
        padding: 24px 16px 100px;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="workspace-name">
          <div class="workspace-icon"><span class="material-icons">edit_note</span></div>
          <span>Notion Plus</span>
        </div>
        <button class="icon-btn" onclick="toggleSidebar()" title="サイドバーを閉じる">
          <span class="material-icons">chevron_left</span>
        </button>
      </div>
      <div class="sidebar-actions">
        <div class="sidebar-action" onclick="openSearch()">
          <span class="material-icons">search</span>
          <span>検索</span>
        </div>
        <div class="sidebar-action" onclick="openSettings()">
          <span class="material-icons">settings</span>
          <span>設定</span>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title" onclick="toggleSection('all')">
          <div style="display:flex; align-items:center;">
            <span class="material-icons section-toggle" id="allToggleIcon"
              style="font-size: 16px; margin-right: 4px; transition: transform 0.1s;">keyboard_arrow_down</span>
            <span>全てのノート</span>
          </div>
          <button class="page-action" onclick="event.stopPropagation(); addNewPage()" title="ページを追加"
            style="border: none; background: transparent; cursor: pointer;">
            <span class="material-icons">add</span>
          </button>
        </div>
      </div>
      <div class="page-list" id="pagesList"></div>
      <div class="new-page-btn" onclick="addNewPage()">
        <span class="material-icons">add</span>
        <span>新規ページ</span>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="topbar-left">
          <button class="icon-btn" onclick="toggleSidebar()" id="sidebarToggle" style="display: none;">
            <span class="material-icons">menu</span>
          </button>
          <div class="breadcrumb" id="breadcrumb">
            <div class="breadcrumb-item"><span class="material-icons">description</span><span>無題</span></div>
          </div>
        </div>
        <div class="topbar-right">
          <div class="mode-toggle">
            <button class="mode-btn active" id="editModeBtn" onclick="setMode('edit')">編集</button>
            <button class="mode-btn" id="previewModeBtn" onclick="setMode('preview')">プレビュー</button>
          </div>
        </div>
      </div>
      <div class="editor-container">
        <div class="editor" id="editor">
          <div class="page-header">
            <input type="text" class="page-title-input" id="pageTitle" placeholder="無題">
          </div>
          <textarea class="editor-textarea" id="editorTextarea" placeholder="マークダウンで書く...&#10;&#10;# 見出し1&#10;## 見出し2&#10;**太字** *斜体* `コード`&#10;- リスト項目&#10;1. 番号付きリスト&#10;- [ ] チェックリスト&#10;> 引用&#10;```&#10;コードブロック&#10;```"></textarea>
          <div class="editor-preview" id="editorPreview"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Search Modal -->
  <div class="modal-overlay" id="searchModal" onclick="closeSearch(event)">
    <div class="search-container" onclick="event.stopPropagation()">
      <div class="search-input-wrapper">
        <span class="material-icons">search</span>
        <input type="text" class="search-input" id="searchInput" placeholder="検索...">
      </div>
      <div class="search-results" id="searchResults">
        <div class="search-empty">検索キーワードを入力してください</div>
      </div>
    </div>
  </div>

  <!-- Delete Modal -->
  <div class="modal-overlay centered" id="deleteModal">
    <div class="search-container" style="width: 400px; padding: 24px;">
      <h3 style="margin-bottom: 12px; font-size: 18px; font-weight: 600;">ページを削除</h3>
      <p id="deleteMessage" style="font-size: 14px; color: var(--text-secondary); margin-bottom: 24px;">
        このページを削除してもよろしいですか？</p>
      <div style="display: flex; justify-content: flex-end; gap: 12px;">
        <button onclick="closeDeleteModal()"
          style="padding: 6px 16px; border-radius: 4px; border: 1px solid var(--border-color); background: transparent; cursor: pointer; color: var(--text-primary);">キャンセル</button>
        <button onclick="executeDelete()"
          style="padding: 6px 16px; border-radius: 4px; border: none; background: #eb5757; color: white; cursor: pointer;">削除</button>
      </div>
    </div>
  </div>


  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsOverlay" onclick="closeSettings()"></div>
  <div class="settings-menu" id="settingsMenu">
    <div class="settings-header">
      <span class="settings-title">ページ設定</span>
      <button class="icon-btn" onclick="closeSettings()"><span class="material-icons">close</span></button>
    </div>
    <div class="settings-content">
      <div class="settings-item">
        <span class="settings-label">ダークモード</span>
        <div class="settings-toggle" id="darkModeToggle" onclick="toggleDarkMode()"></div>
      </div>
      <div class="settings-item">
        <span class="settings-label">全幅</span>
        <div class="settings-toggle" id="fullWidthToggle" onclick="toggleFullWidth()"></div>
      </div>
      <div class="settings-item">
        <span class="settings-label">小さいテキスト</span>
        <div class="settings-toggle" id="smallTextToggle" onclick="toggleSmallText()"></div>
      </div>
      <div class="settings-item" style="flex-direction: column; align-items: flex-start; gap: 12px;">
        <span class="settings-label">フォント</span>
        <div class="font-options">
          <div class="font-option active" data-font="default" onclick="setFont('default')">デフォルト</div>
          <div class="font-option" data-font="serif" onclick="setFont('serif')">Serif</div>
          <div class="font-option" data-font="mono" onclick="setFont('mono')">Mono</div>
        </div>
      </div>
    </div>
  </div>


  <script>
    // === State ===
    let state = {
      pages: [
        { id: '1', title: 'はじめに', children: [], content: '' },
        {
          id: '2', title: 'プロジェクト', children: [
            { id: '2-1', title: 'タスク一覧', children: [], content: '' }
          ], content: ''
        },
        { id: '3', title: 'メモ', children: [], content: '' }
      ],
      currentPage: null,
      settings: { darkMode: false, fullWidth: false, smallText: false, font: 'default' },
      sectionExpanded: { all: true }
    };
    let deleteTargetId = null;
    let opfsHandle = null;
    let saveTimeout = null;
    let currentMode = 'edit';

    // === Init ===
    document.addEventListener('DOMContentLoaded', () => {
      setupEventListeners();
      initFileSystem();
    });

    async function initFileSystem() {
      try {
        const root = await navigator.storage.getDirectory();
        opfsHandle = await root.getFileHandle('master-data-notion-plus.json', { create: true });
        const file = await opfsHandle.getFile();
        const text = await file.text();
        if (text) {
          const loaded = JSON.parse(text);
          if (loaded.pages) state.pages = loaded.pages.map(migratePageData);
          if (loaded.settings) state.settings = { ...state.settings, ...loaded.settings };
          if (loaded.sectionExpanded) state.sectionExpanded = loaded.sectionExpanded;
        }
      } catch (e) {
        console.error('File init error:', e);
      }
      state.currentPage = null;
      applySettings();
      renderPagesList();
      if (state.pages.length > 0) openPage(state.pages[0].id);
    }

    // Migrate old block-based page data to markdown content
    function migratePageData(page) {
      if (page.content === undefined && page.blocks) {
        page.content = blocksToMarkdown(page.blocks);
        delete page.blocks;
      }
      if (page.content === undefined) page.content = '';
      if (page.children) page.children = page.children.map(migratePageData);
      // Remove old fields
      delete page.icon; delete page.iconColor; delete page.favorite;
      return page;
    }

    function blocksToMarkdown(blocks) {
      if (!blocks || blocks.length === 0) return '';
      return blocks.map(b => {
        const c = b.content || '';
        switch (b.type) {
          case 'heading1': return `# ${c}`;
          case 'heading2': return `## ${c}`;
          case 'heading3': return `### ${c}`;
          case 'bullet': return `- ${c}`;
          case 'numbered': return `1. ${c}`;
          case 'todo': return `- [${b.checked ? 'x' : ' '}] ${c}`;
          case 'quote': return `> ${c}`;
          case 'callout': return `> 💡 ${c}`;
          case 'code': return `\`\`\`\n${c}\n\`\`\``;
          case 'divider': return '---';
          case 'toggle': return `- ${c}`;
          default: return c;
        }
      }).filter(s => s !== '').join('\n');
    }

    // === State Management ===
    function saveState() {
      if (!opfsHandle) return;
      if (state.currentPage) {
        state.currentPage.content = document.getElementById('editorTextarea').value;
      }
      if (saveTimeout) clearTimeout(saveTimeout);
      saveTimeout = setTimeout(async () => {
        const saveData = {
          pages: state.pages,
          settings: state.settings,
          sectionExpanded: state.sectionExpanded
        };
        try {
          const writable = await opfsHandle.createWritable();
          await writable.write(JSON.stringify(saveData, null, 2));
          await writable.close();
        } catch (e) {
          console.error('Save failed:', e);
        }
      }, 800);
    }
    function applySettings() {
      const s = state.settings || {};
      if (s.darkMode) { document.body.classList.add('dark-mode'); document.getElementById('darkModeToggle').classList.add('active'); }
      if (s.fullWidth) { document.getElementById('editor').classList.add('full-width'); document.getElementById('fullWidthToggle').classList.add('active'); }
      if (s.smallText) { document.body.classList.add('small-text'); document.getElementById('smallTextToggle').classList.add('active'); }
      setFont(s.font || 'default');
    }

    // === Sidebar ===
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('collapsed');
      document.getElementById('sidebarToggle').style.display = sidebar.classList.contains('collapsed') ? 'flex' : 'none';
    }

    // === Pages
    function renderPagesList() {
      const pagesList = document.getElementById('pagesList');
      pagesList.innerHTML = '';

      // Toggle Sections
      pagesList.style.display = state.sectionExpanded?.all !== false ? 'block' : 'none';
      if (document.getElementById('allToggleIcon')) document.getElementById('allToggleIcon').style.transform = state.sectionExpanded?.all !== false ? 'rotate(0deg)' : 'rotate(-90deg)';

      state.pages.forEach(page => {
        pagesList.appendChild(createPageItem(page, 0, 'all'));
      });
    }

    function toggleSection(section) {
      if (!state.sectionExpanded) state.sectionExpanded = { favorites: true, all: true };
      state.sectionExpanded[section] = !state.sectionExpanded[section];
      renderPagesList();
      saveState();
    }

    function createPageItem(page, depth, context) {
      const item = document.createElement('div');
      item.className = `page-item${state.currentPage?.id === page.id ? ' active' : ''}`;
      item.style.paddingLeft = `${8 + depth * 16}px`;
      item.dataset.pageId = page.id;
      const hasChildren = page.children && page.children.length > 0;
      const isExpanded = page.expandedContexts && page.expandedContexts[context];

      item.innerHTML = `
                <div class="page-toggle ${hasChildren ? '' : 'hidden'} ${isExpanded ? 'expanded' : ''}" onclick="event.stopPropagation(); togglePageExpand('${page.id}', '${context}')">
                    <span class="material-icons" style="font-size:16px">chevron_right</span>
                </div>
                <div class="page-title">${page.title || '無題'}</div>
                <div class="page-actions">
                    <div class="page-action" onclick="event.stopPropagation(); addSubPage('${page.id}', '${context}')" title="サブページを追加"><span class="material-icons">add</span></div>
                    <div class="page-action" onclick="event.stopPropagation(); confirmDeletePage('${page.id}')" title="削除"><span class="material-icons">delete_outline</span></div>
                </div>`;
      item.onclick = () => openPage(page.id);
      if (hasChildren) {
        const nested = document.createElement('div');
        nested.className = `nested-pages ${isExpanded ? 'expanded' : ''}`;
        nested.id = `nested-${page.id}-${context}`;
        page.children.forEach(child => nested.appendChild(createPageItem(child, depth + 1, context)));
        const wrapper = document.createElement('div');
        wrapper.appendChild(item);
        wrapper.appendChild(nested);
        return wrapper;
      }
      return item;
    }

    function togglePageExpand(pageId, context) {
      const page = findPage(pageId);
      if (page) {
        if (!page.expandedContexts) page.expandedContexts = {};
        page.expandedContexts[context] = !page.expandedContexts[context];
        saveState();
        renderPagesList();
      }
    }

    function findPage(pageId, pages = state.pages) {
      for (const p of pages) {
        if (p.id === pageId) return p;
        if (p.children) { const f = findPage(pageId, p.children); if (f) return f; }
      }
      return null;
    }

    function getAllPages(pages = state.pages, result = []) {
      for (const p of pages) { result.push(p); if (p.children) getAllPages(p.children, result); }
      return result;
    }

    function openPage(pageId) {
      const page = findPage(pageId);
      if (!page) return;
      state.currentPage = page;
      document.querySelectorAll('.page-item').forEach(item => {
        item.classList.remove('active');
        if (item.dataset.pageId === pageId) item.classList.add('active');
      });
      document.getElementById('pageTitle').value = page.title || '';
      document.getElementById('breadcrumb').innerHTML = `<div class="breadcrumb-item"><span>${page.title || '無題'}</span></div>`;
      const content = page.content || '';
      document.getElementById('editorTextarea').value = content;
      if (currentMode === 'preview') {
        document.getElementById('editorPreview').innerHTML = markdownToHtml(content);
      }
      saveState();
    }

    function addNewPage() {
      const newPage = { id: Date.now().toString(), title: '', children: [], content: '' };
      state.pages.push(newPage);
      renderPagesList();
      openPage(newPage.id);
      saveState();
      setTimeout(() => document.getElementById('pageTitle').focus(), 100);
    }

    function addSubPage(parentId, context) {
      const parent = findPage(parentId);
      if (!parent) return;
      const newPage = { id: Date.now().toString(), title: '', children: [], content: '' };
      if (!parent.children) parent.children = [];
      parent.children.push(newPage);

      // Decoupled logic
      if (!parent.expandedContexts) parent.expandedContexts = {};
      if (context) {
        parent.expandedContexts[context] = true;
      } else {
        parent.expandedContexts['all'] = true;
      }

      renderPagesList();
      openPage(newPage.id);
      saveState();
    }

    function confirmDeletePage(pageId) {
      deleteTargetId = pageId;
      const page = findPage(pageId);
      if (page) {
        document.getElementById('deleteMessage').textContent = `「${page.title || '無題'}」を削除しますか？この操作は取り消せません。`;
        document.getElementById('deleteModal').classList.add('visible');
      }
    }

    function closeDeleteModal() {
      document.getElementById('deleteModal').classList.remove('visible');
      deleteTargetId = null;
    }

    function executeDelete() {
      if (!deleteTargetId) return;
      const pageId = deleteTargetId;

      function removeFromArray(arr) {
        const idx = arr.findIndex(p => p.id === pageId);
        if (idx !== -1) { arr.splice(idx, 1); return true; }
        for (const p of arr) { if (p.children && removeFromArray(p.children)) return true; }
        return false;
      }
      removeFromArray(state.pages);
      if (state.currentPage?.id === pageId) { state.currentPage = null; if (state.pages.length > 0) openPage(state.pages[0].id); }
      renderPagesList();
      saveState();
      closeDeleteModal();
    }


    document.getElementById('pageTitle').addEventListener('input', (e) => {
      if (state.currentPage) {
        state.currentPage.title = e.target.value;
        renderPagesList();
        document.getElementById('breadcrumb').innerHTML = `<div class="breadcrumb-item"><span>${state.currentPage.title || '無題'}</span></div>`;
        saveState();
      }
    });

    document.getElementById('editorTextarea').addEventListener('input', (e) => {
      if (state.currentPage) {
        state.currentPage.content = e.target.value;
        saveState();
      }
    });

    // === Mode Toggle ===
    function setMode(mode) {
      currentMode = mode;
      const textarea = document.getElementById('editorTextarea');
      const preview = document.getElementById('editorPreview');
      const editBtn = document.getElementById('editModeBtn');
      const previewBtn = document.getElementById('previewModeBtn');
      if (mode === 'edit') {
        textarea.classList.remove('hidden');
        preview.classList.remove('active');
        editBtn.classList.add('active');
        previewBtn.classList.remove('active');
        textarea.focus();
      } else {
        if (state.currentPage) {
          state.currentPage.content = textarea.value;
        }
        textarea.classList.add('hidden');
        preview.classList.add('active');
        editBtn.classList.remove('active');
        previewBtn.classList.add('active');
        preview.innerHTML = markdownToHtml(state.currentPage?.content || '');
      }
    }

    // === Markdown Parser ===
    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function inlineMarkdown(text) {
      // Escape HTML first
      text = escapeHtml(text);
      // Bold **text** or __text__
      text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/__(.*?)__/g, '<strong>$1</strong>');
      // Italic *text* or _text_ (not inside words)
      text = text.replace(/(?<!\w)\*([^*\n]+)\*(?!\w)/g, '<em>$1</em>');
      text = text.replace(/(?<!\w)_([^_\n]+)_(?!\w)/g, '<em>$1</em>');
      // Strikethrough ~~text~~
      text = text.replace(/~~(.*?)~~/g, '<del>$1</del>');
      // Inline code `code`
      text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
      // Links [text](url)
      text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
      return text;
    }

    function markdownToHtml(md) {
      if (!md) return '<p style="color:var(--text-tertiary)">プレビューする内容がありません。</p>';
      const lines = md.split('\n');
      let html = '';
      let inCodeBlock = false;
      let codeBlockLang = '';
      let codeLines = [];
      let listType = null;   // 'ul' | 'ol'
      let listItems = '';

      function flushList() {
        if (!listType) return;
        html += `<${listType}>${listItems}</${listType}>`;
        listType = null;
        listItems = '';
      }

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        // Code block fence
        if (line.startsWith('```')) {
          if (!inCodeBlock) {
            flushList();
            inCodeBlock = true;
            codeBlockLang = line.slice(3).trim();
            codeLines = [];
          } else {
            html += `<pre><code>${codeLines.map(escapeHtml).join('\n')}</code></pre>`;
            inCodeBlock = false;
            codeLines = [];
            codeBlockLang = '';
          }
          continue;
        }
        if (inCodeBlock) { codeLines.push(line); continue; }

        // Horizontal rule
        if (/^(-{3,}|\*{3,}|_{3,})\s*$/.test(line)) {
          flushList(); html += '<hr>'; continue;
        }

        // Headings
        const h1 = line.match(/^# (.+)/);
        const h2 = line.match(/^## (.+)/);
        const h3 = line.match(/^### (.+)/);
        if (h1) { flushList(); html += `<h1>${inlineMarkdown(h1[1])}</h1>`; continue; }
        if (h2) { flushList(); html += `<h2>${inlineMarkdown(h2[1])}</h2>`; continue; }
        if (h3) { flushList(); html += `<h3>${inlineMarkdown(h3[1])}</h3>`; continue; }

        // Blockquote
        const bq = line.match(/^> (.+)/);
        if (bq) { flushList(); html += `<blockquote>${inlineMarkdown(bq[1])}</blockquote>`; continue; }

        // Ordered list
        const olMatch = line.match(/^(\d+)\. (.+)/);
        if (olMatch) {
          if (listType !== 'ol') { flushList(); listType = 'ol'; }
          listItems += `<li>${inlineMarkdown(olMatch[2])}</li>`;
          continue;
        }

        // Todo (before general bullet check)
        const todoX = line.match(/^- \[x\] (.+)/i);
        const todoSpace = line.match(/^- \[ \] (.+)/);
        if (todoX) {
          if (listType !== 'ul') { flushList(); listType = 'ul'; }
          listItems += `<li class="task-item"><input type="checkbox" checked disabled> <del>${inlineMarkdown(todoX[1])}</del></li>`;
          continue;
        }
        if (todoSpace) {
          if (listType !== 'ul') { flushList(); listType = 'ul'; }
          listItems += `<li class="task-item"><input type="checkbox" disabled> ${inlineMarkdown(todoSpace[1])}</li>`;
          continue;
        }

        // Unordered list
        const ulMatch = line.match(/^[-*+] (.+)/);
        if (ulMatch) {
          if (listType !== 'ul') { flushList(); listType = 'ul'; }
          listItems += `<li>${inlineMarkdown(ulMatch[1])}</li>`;
          continue;
        }

        // Empty line
        if (line.trim() === '') {
          flushList();
          // Consecutive empty lines → single break
          if (!html.endsWith('<br>') && !html.endsWith('>')) html += '<br>';
          continue;
        }

        // Paragraph
        flushList();
        html += `<p>${inlineMarkdown(line)}</p>`;
      }

      flushList();
      if (inCodeBlock) html += `<pre><code>${codeLines.map(escapeHtml).join('\n')}</code></pre>`;
      return html;
    }

    // === Search ===
    function openSearch() {
      document.getElementById('searchModal').classList.add('visible');
      const input = document.getElementById('searchInput');
      input.value = '';
      input.focus();
      renderSearchResults('');
    }

    function closeSearch(event) {
      if (event && event.target !== event.currentTarget) return;
      document.getElementById('searchModal').classList.remove('visible');
    }

    function renderSearchResults(query) {
      const container = document.getElementById('searchResults');
      const allPages = getAllPages();
      if (!query) {
        container.innerHTML = '<div class="search-empty">検索キーワードを入力してください</div>';
        return;
      }
      const q = query.toLowerCase();
      const matched = allPages.filter(page => {
        const titleMatch = (page.title || '無題').toLowerCase().includes(q);
        const contentMatch = (page.content || '').toLowerCase().includes(q);
        return titleMatch || contentMatch;
      });
      if (matched.length === 0) {
        container.innerHTML = `<div class="search-empty">「${query}」に一致する結果がありません</div>`;
        return;
      }
      container.innerHTML = matched.map(p => `
                <div class="search-result-item" onclick="openPageFromSearch('${p.id}')">
                    <div class="search-result-title">${p.title || '無題'}</div>
                </div>
            `).join('');
    }

    function openPageFromSearch(pageId) {
      document.getElementById('searchModal').classList.remove('visible');
      openPage(pageId);
    }

    // 検索入力のイベントリスナー
    document.getElementById('searchInput').addEventListener('input', (e) => {
      renderSearchResults(e.target.value.trim());
    });

    // === Settings ===
    function openSettings() { document.getElementById('settingsOverlay').classList.add('visible'); document.getElementById('settingsMenu').classList.add('visible'); }
    function closeSettings() { document.getElementById('settingsOverlay').classList.remove('visible'); document.getElementById('settingsMenu').classList.remove('visible'); }
    function toggleDarkMode() { state.settings.darkMode = !state.settings.darkMode; document.body.classList.toggle('dark-mode'); document.getElementById('darkModeToggle').classList.toggle('active'); saveState(); }
    function toggleFullWidth() { state.settings.fullWidth = !state.settings.fullWidth; document.getElementById('editor').classList.toggle('full-width'); document.getElementById('fullWidthToggle').classList.toggle('active'); saveState(); }
    function toggleSmallText() { state.settings.smallText = !state.settings.smallText; document.body.classList.toggle('small-text'); document.getElementById('smallTextToggle').classList.toggle('active'); saveState(); }
    function setFont(font) {
      state.settings.font = font;
      document.body.classList.remove('font-serif', 'font-mono');
      if (font !== 'default') document.body.classList.add(`font-${font}`);
      document.querySelectorAll('.font-option').forEach(opt => opt.classList.toggle('active', opt.dataset.font === font));
      saveState();
    }

    // === Event Listeners ===
    function setupEventListeners() {
      // Tab key in textarea → insert spaces
      document.getElementById('editorTextarea').addEventListener('keydown', (e) => {
        if (e.key === 'Tab') {
          e.preventDefault();
          const ta = e.target;
          const start = ta.selectionStart;
          const end = ta.selectionEnd;
          ta.value = ta.value.substring(0, start) + '  ' + ta.value.substring(end);
          ta.selectionStart = ta.selectionEnd = start + 2;
          if (state.currentPage) { state.currentPage.content = ta.value; saveState(); }
        }
      });

      // Keyboard shortcuts (global)
      document.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === '\\') { e.preventDefault(); toggleSidebar(); }
        if ((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'p')) { e.preventDefault(); openSearch(); }
        if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'L') { e.preventDefault(); toggleDarkMode(); }
        // Ctrl+E or Ctrl+Shift+P: toggle mode
        if ((e.metaKey || e.ctrlKey) && e.key === 'e') { e.preventDefault(); setMode(currentMode === 'edit' ? 'preview' : 'edit'); }
        if (e.key === 'Escape') { closeSettings(); document.getElementById('searchModal').classList.remove('visible'); }
      });
    }

  </script>
</body>

</html>
