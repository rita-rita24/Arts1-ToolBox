<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSV ツール ジェネレーター</title>

  <!-- ファビコン -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%2316a34a' d='M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z'/></svg>">

  <!-- Material Symbols アイコンフォント -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <style>
    /* ========================================
       カラーテーマ設定
       ======================================== */
    :root {
      --primary: #16a34a;
      --primary-hover: #15803d;
      --danger: #dc2626;
      --danger-hover: #b91c1c;
      --success: #16a34a;
      --warning: #f59e0b;
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-muted: #64748b;
      --header-bg: #f1f5f9;
    }

    [data-theme="dark"] {
      --primary: #22c55e;
      --primary-hover: #4ade80;
      --danger: #ef4444;
      --danger-hover: #f87171;
      --success: #22c55e;
      --warning: #fbbf24;
      --bg: #000000;
      --surface: #121212;
      --border: #404040;
      --text: #ffffff;
      --text-muted: #a3a3a3;
      --header-bg: #262626;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      font-size: 1.25em;
      line-height: 1;
      display: inline-block;
      vertical-align: middle;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .header h1 .material-symbols-outlined {
      font-size: 2rem;
      color: var(--primary);
    }

    .btn .material-symbols-outlined {
      font-size: 1.15rem;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ヘッダー */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .theme-toggle {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .theme-toggle:hover {
      background: var(--header-bg);
    }

    /* メインレイアウト */
    .main-layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 20px;
      align-items: start;
    }

    /* 入力パネル */
    .input-panel {
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 20px;
      position: sticky;
      top: 20px;
    }

    .input-panel h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-panel .description {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .input-panel label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }

    .input-panel input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.9rem;
      background: var(--bg);
      color: var(--text);
      margin-bottom: 14px;
      height: 38px;
    }

    .input-panel input[type="text"]:focus {
      outline: none;
      border-color: var(--primary);
    }

    .input-panel textarea {
      width: 100%;
      min-height: 260px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      resize: vertical;
      line-height: 1.8;
      margin-bottom: 14px;
    }

    .input-panel textarea:focus {
      outline: none;
      border-color: var(--primary);
    }

    .header-count {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    .header-count .value {
      font-weight: 600;
      color: var(--text);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      font-size: 0.9rem;
      font-weight: 500;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
      min-height: 40px;
      background: var(--header-bg);
      color: var(--text);
    }

    .btn:hover {
      background: var(--border);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: var(--danger-hover);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* 出力パネル */
    .output-panel {
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--header-bg);
      flex-wrap: wrap;
      gap: 10px;
    }

    .output-header h2 {
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .output-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .output-body {
      position: relative;
    }

    .output-body textarea {
      width: 100%;
      min-height: 500px;
      padding: 16px;
      border: none;
      font-size: 0.8rem;
      font-family: "SF Mono", "Consolas", "Monaco", monospace;
      background: var(--surface);
      color: var(--text);
      resize: vertical;
      line-height: 1.5;
      tab-size: 2;
    }

    .output-body textarea:focus {
      outline: none;
    }

    .output-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      color: var(--text-muted);
      text-align: center;
    }

    .output-placeholder .material-symbols-outlined {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .output-placeholder h3 {
      font-size: 1.1rem;
      margin-bottom: 8px;
      color: var(--text);
    }

    .output-placeholder p {
      font-size: 0.9rem;
    }

    /* プレビューヘッダー一覧 */
    .preview-headers {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .preview-headers h3 {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-muted);
    }

    .preview-headers .header-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .preview-headers .header-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      background: var(--header-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      font-size: 0.75rem;
      color: var(--text);
    }

    .preview-headers .header-tag .tag-num {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--text-muted);
      background: var(--border);
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    /* トースト */
    .toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      padding: 14px 24px;
      background: var(--text);
      color: var(--bg);
      border-radius: 10px;
      font-size: 0.9rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      animation: toastIn 0.3s ease, toastOut 0.3s ease 1.2s forwards;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toast.success { background: var(--success); color: white; }
    .toast.error   { background: var(--danger); color: white; }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes toastOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    /* レスポンシブ */
    @media (max-width: 900px) {
      .main-layout {
        grid-template-columns: 1fr;
      }
      .input-panel {
        position: static;
      }
    }

    @media (max-width: 768px) {
      .container { padding: 12px; }
      .header { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- ヘッダー -->
    <header class="header">
      <h1>
        <span class="material-symbols-outlined">build</span>
        CSV ツール ジェネレーター
      </h1>
      <div class="header-right">
        <button class="theme-toggle" onclick="toggleTheme()" title="ダークモード切替">
          <span class="material-symbols-outlined" id="themeIcon">dark_mode</span>
        </button>
      </div>
    </header>

    <!-- メインレイアウト -->
    <div class="main-layout">
      <!-- 入力パネル -->
      <div class="input-panel">
        <h2>
          <span class="material-symbols-outlined">edit</span>
          ヘッダー設定
        </h2>
        <p class="description">ヘッダー名を1行ずつ入力すると、CSVエディタのHTMLコードを自動生成します。</p>

        <label for="toolTitle">ツール名</label>
        <input type="text" id="toolTitle" placeholder="例: 注文データ エディタ" value="" oninput="handleToolTitleInput()">

        <label for="headerInput">CSVヘッダー（1行に1つ）</label>
        <textarea id="headerInput" placeholder="例:&#10;注文番号&#10;顧客名&#10;商品名&#10;数量&#10;単価&#10;合計金額" oninput="handleHeaderInput()"></textarea>

        <div class="header-count">
          列数: <span class="value" id="headerCount">0</span>
        </div>

        <div class="btn-group">
          <button class="btn btn-primary" onclick="generateCode()" id="generateBtn" disabled>
            <span class="material-symbols-outlined">code</span> コード生成
          </button>
          <button class="btn" onclick="clearInput()">
            <span class="material-symbols-outlined">delete</span> クリア
          </button>
        </div>

        <!-- プレビュー -->
        <div class="preview-headers" id="previewHeaders" style="display:none;">
          <h3>ヘッダープレビュー</h3>
          <div class="header-list" id="headerList"></div>
        </div>
      </div>

      <!-- 出力パネル -->
      <div class="output-panel">
        <div class="output-header">
          <h2>
            <span class="material-symbols-outlined">code</span>
            生成コード
          </h2>
          <div class="output-actions" id="outputActions" style="display:none;">
            <button class="btn" onclick="copyCode()">
              <span class="material-symbols-outlined">content_copy</span> コピー
            </button>
            <button class="btn btn-primary" onclick="downloadCode()">
              <span class="material-symbols-outlined">download</span> HTMLダウンロード
            </button>
          </div>
        </div>
        <div class="output-body">
          <!-- プレースホルダー -->
          <div class="output-placeholder" id="outputPlaceholder">
            <span class="material-symbols-outlined">code_blocks</span>
            <h3>コードがここに表示されます</h3>
            <p>左の入力欄にヘッダーを入力して「コード生成」を押してください</p>
          </div>
          <!-- 出力テキストエリア -->
          <textarea id="codeOutput" style="display:none;" readonly></textarea>
        </div>
      </div>
    </div>
  </div>

  <!-- トースト -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    // ============================================================
    // 定数
    // ============================================================
    const STORAGE_KEY = 'csvCreater_state';
    let generatedTitle = '';

    // ============================================================
    // 初期化
    // ============================================================

    document.addEventListener('DOMContentLoaded', () => {
      initTheme();
      loadFromStorage();
    });

    // ============================================================
    // テーマ切り替え
    // ============================================================

    function initTheme() {
      const saved = localStorage.getItem('csvCreater_theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      setTheme(saved || (prefersDark ? 'dark' : 'light'));
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      setTheme(next);
      localStorage.setItem('csvCreater_theme', next);
    }

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('themeIcon').textContent = theme === 'dark' ? 'light_mode' : 'dark_mode';
    }

    // ============================================================
    // ヘッダー入力処理
    // ============================================================

    function handleHeaderInput() {
      const headers = _getHeaders();
      document.getElementById('headerCount').textContent = headers.length;
      document.getElementById('generateBtn').disabled = headers.length === 0;
      _renderPreview(headers);
      _autoSave();
      _autoGenerate();
    }

    function _getHeaders() {
      const text = document.getElementById('headerInput').value;
      return text.split('\n').map(h => h.trim()).filter(h => h.length > 0);
    }

    function _renderPreview(headers) {
      const container = document.getElementById('previewHeaders');
      const list = document.getElementById('headerList');

      if (headers.length === 0) {
        container.style.display = 'none';
        return;
      }

      container.style.display = 'block';
      list.innerHTML = headers.map((h, i) =>
        `<span class="header-tag"><span class="tag-num">${i + 1}</span>${_escapeHTML(h)}</span>`
      ).join('');
    }

    function handleToolTitleInput() {
      _autoSave();
      _autoGenerate();
    }

    function clearInput() {
      document.getElementById('headerInput').value = '';
      document.getElementById('toolTitle').value = '';
      generatedTitle = '';
      handleHeaderInput();
      _hideOutput();
      localStorage.removeItem(STORAGE_KEY);
      showToast('入力をクリアしました');
    }

    // ============================================================
    // コード生成
    // ============================================================

    function _autoGenerate() {
      const headers = _getHeaders();
      if (headers.length === 0) return;
      const output = document.getElementById('codeOutput');
      if (output.style.display === 'none') return;
      _doGenerate(headers, false);
    }

    function generateCode() {
      const headers = _getHeaders();
      if (headers.length === 0) {
        showToast('ヘッダーを入力してください', 'error');
        return;
      }
      _doGenerate(headers, true);
    }

    function _doGenerate(headers, showNotification) {
      generatedTitle = document.getElementById('toolTitle').value.trim() || 'CSV エディタ';
      const code = _buildEditorHTML(generatedTitle, headers);

      document.getElementById('codeOutput').value = code;
      document.getElementById('codeOutput').style.display = 'block';
      document.getElementById('outputPlaceholder').style.display = 'none';
      document.getElementById('outputActions').style.display = 'flex';

      _autoSave();
      if (showNotification) {
        showToast(`${headers.length}列のCSVエディタを生成しました`, 'success');
      }
    }

    function _hideOutput() {
      document.getElementById('codeOutput').style.display = 'none';
      document.getElementById('outputPlaceholder').style.display = 'flex';
      document.getElementById('outputActions').style.display = 'none';
    }

    // ============================================================
    // HTMLテンプレート生成
    // ============================================================

    function _buildEditorHTML(title, headers) {
      const headersJSON = headers.map(h => `      '${h.replace(/'/g, "\\'")}'`).join(',\n');
      const storagePrefix = title.replace(/[^a-zA-Z0-9\u3040-\u9FFF]/g, '').substring(0, 20) || 'csvEditor';

      return `<!DOCTYPE html>

<head>

  <!-- Material Symbols アイコンフォント -->

      transition: all 0.15s ease;
      min-height: 36px;
      background: var(--header-bg);
      color: var(--text);
    }

    .btn:hover {
      background: var(--border);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: var(--danger-hover);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* 検索バー */
    .search-bar {
      display: none;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 16px;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-bar.show {
      display: flex;
    }

    .search-bar input {
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.9rem;
      background: var(--bg);
      color: var(--text);
      min-width: 200px;
      height: 36px;
    }

    .search-bar input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .search-info {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .search-nav {
      display: flex;
      gap: 4px;
    }

    .search-nav button {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      background: var(--bg);
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .search-nav button:hover {
      background: var(--header-bg);
    }

    .search-close {
      margin-left: auto;
    }

    /* ペーストエリア */
    .paste-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      background: var(--surface);
      transition: all 0.2s;
      cursor: pointer;
      margin-bottom: 20px;
    }

    .paste-zone:hover {
      border-color: var(--primary);
      background: var(--header-bg);
    }

    .paste-zone h2 {
      font-size: 1.2rem;
      margin-bottom: 8px;
      color: var(--text);
    }

    .paste-zone p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .paste-zone.has-data {
      display: none;
    }

    /* テーブルコンテナ */
    .table-container {
      display: none;
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 20px;
    }

    .table-container.show {
      display: block;
    }

    .table-scroll {
      overflow: auto;
      max-height: 70vh;
    }

    table {
      width: max-content;
      border-collapse: collapse;
      font-size: 0.9rem;
      table-layout: fixed;
    }

    th, td {
      padding: 10px 12px;
      border: 1px solid var(--border);
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    th {
      padding: 0;
      background: var(--header-bg);
      font-weight: 600;
      position: sticky;
      top: -1px;
      z-index: 10;
      user-select: none;
    }

    td {
      padding: 10px 12px;
      background: var(--surface);
    }

    th:hover {
      background: var(--border);
    }

    /* 列リサイズハンドル */
    .resize-handle {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 6px;
      cursor: col-resize;
      background: transparent;
      z-index: 100;
    }

    .resize-handle:hover,
    .resize-handle.resizing {
      background: var(--primary);
    }

    .th-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
    }

    .th-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
      cursor: pointer;
      padding: 8px 12px;
      flex: 1;
      width: 100%;
    }

    .th-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.8rem;
    }

    .th-colnum {
      font-size: 0.65rem;
      color: var(--text-muted);
      font-weight: 600;
      flex-shrink: 0;
      background: var(--border);
      padding: 1px 4px;
      border-radius: 3px;
      line-height: 1.4;
    }

    .th-menu-btn {
      padding: 4px;
      border-radius: 4px;
      opacity: 0.5;
      transition: opacity 0.15s;
    }

    th:hover .th-menu-btn {
      opacity: 1;
    }

    /* 行番号列 */
    .row-num {
      background: var(--header-bg);
      color: var(--text-muted);
      font-size: 0.8rem;
      text-align: center;
      width: 70px !important;
      min-width: 70px !important;
      max-width: 70px !important;
      font-weight: normal;
      padding: 0 !important;
      position: sticky;
      left: -1px;
      z-index: 20;
      border-right: 1px solid var(--border);
    }

    .row-num-wrapper {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      height: 100%;
      padding: 0 4px;
      position: relative;
    }

    .row-num-text {
      flex: 1;
      text-align: center;
    }

    .row-menu-btn {
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.5;
      transition: all 0.15s;
    }

    .row-num:hover .row-menu-btn,
    .row-menu-btn:focus-visible {
      opacity: 1;
    }

    .row-menu-btn:hover {
      background: var(--border);
      color: var(--text);
    }

    th.row-num {
      z-index: 30;
      padding: 10px 0 !important;
    }

    tr:hover td:not(.row-num) {
      background: var(--header-bg);
    }

    td[contenteditable] {
      outline: none;
    }

    td[contenteditable]:focus,
    td.selected {
      background: var(--header-bg);
      box-shadow: inset 0 0 0 2px var(--primary);
    }

    td.highlight {
      background: var(--highlight) !important;
    }

    td.current-match {
      background: var(--warning) !important;
    }

    /* 列メニュー */
    .column-menu {
      display: none;
      position: absolute;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      z-index: 1000;
      min-width: 200px;
      overflow: hidden;
    }

    .column-menu.show {
      display: block;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.1s;
    }

    .menu-item:hover {
      background: var(--header-bg);
    }

    .menu-item.danger {
      color: var(--danger);
    }

    .menu-item.danger:hover {
      background: #fee2e2;
    }

    [data-theme="dark"] .menu-item.danger:hover {

      height: 1px;
      background: var(--border);
      margin: 4px 0;

    /* トースト */
    .toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

      padding: 14px 24px;
      background: var(--text);
      color: var(--bg);
      border-radius: 10px;
      font-size: 0.9rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      animation: toastIn 0.3s ease, toastOut 0.3s ease 1.2s forwards;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toast.success { background: var(--success); color: white; }
    .toast.error   { background: var(--danger); color: white; }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes toastOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    /* モーダル */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 3000;
      align-items: center;
      justify-content: center;
      padding: 20px;

      border-radius: 16px;

      width: 100%;
      padding: 24px;

      font-size: 1.1rem;
      margin-bottom: 12px;

      color: var(--text-muted);
      font-size: 0.9rem;

      gap: 8px;
      justify-content: flex-end;
    }

    /* レスポンシブ */
    @media (max-width: 768px) {
      .container { padding: 12px; }
      .header { flex-direction: column; align-items: stretch; }
      .stats { justify-content: center; flex-wrap: wrap; }
      .toolbar { padding: 12px; }
      .btn { padding: 6px 12px; font-size: 0.8rem; }
      .paste-zone { padding: 24px; }
      th, td { padding: 8px; }
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- ヘッダー -->
    <header class="header">
      <h1>
        <span class="material-symbols-outlined">edit_document</span>
        ${_escapeHTML(title)}
      </h1>
      <div class="header-right">
        <!-- 統計 -->
        <div class="stats" id="stats">
          <span>行: <span class="value" id="rowCount">0</span></span>
          <span>列: <span class="value" id="colCount">0</span></span>
          <span>サイズ: <span class="value" id="dataSize">0 B</span></span>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" title="ダークモード切替">
          <span class="material-symbols-outlined" id="themeIcon">dark_mode</span>
        </button>
      </div>
    </header>

    <!-- 検索バー -->
    <div class="search-bar" id="searchBar">
      <input type="text" id="searchInput" placeholder="検索..." oninput="performSearch()">
      <input type="text" id="replaceInput" placeholder="置換...">
      <button class="btn" onclick="replaceNext()">置換</button>
      <button class="btn" onclick="replaceAll()">すべて置換</button>
      <div class="search-nav">
        <button onclick="navigateMatch(-1)" title="前へ"><span class="material-symbols-outlined">expand_less</span></button>
        <button onclick="navigateMatch(1)" title="次へ"><span class="material-symbols-outlined">expand_more</span></button>
      </div>
      <span class="search-info" id="searchInfo"></span>
      <button class="btn search-close" onclick="closeSearch()"><span class="material-symbols-outlined">close</span></button>
    </div>

    <!-- ツールバー -->
    <div class="toolbar">
      <!-- 履歴 -->
      <div class="toolbar-group">
        <button class="btn" id="undoBtn" onclick="undo()" disabled title="元に戻す">
          <span class="material-symbols-outlined">undo</span>
        </button>
        <button class="btn" id="redoBtn" onclick="redo()" disabled title="やり直し">
          <span class="material-symbols-outlined">redo</span>
        </button>
      </div>

      <!-- 編集 -->
      <div class="toolbar-group">
        <button class="btn" onclick="triggerPaste()" title="クリップボードから貼り付け">
          <span class="material-symbols-outlined">content_paste</span> 貼り付け
        </button>
        <button class="btn" onclick="addRow()" title="行を追加">
          <span class="material-symbols-outlined">add_box</span> 行追加
        </button>
      </div>

      <!-- 検索 -->
      <div class="toolbar-group">
        <button class="btn" onclick="openSearch()" title="検索・置換 (Ctrl+F)">
          <span class="material-symbols-outlined">search</span> 検索
        </button>
      </div>

      <!-- エクスポート -->
      <div class="toolbar-group">
        <button class="btn" onclick="copyData()" title="クリップボードにコピー">
          <span class="material-symbols-outlined">content_copy</span> CSVコピー
        </button>
        <button class="btn" onclick="downloadData()" title="ファイルとして保存">
          <span class="material-symbols-outlined">save</span> CSV保存
        </button>
      </div>

      <!-- クリア -->
      <div class="toolbar-group ml-auto">
        <button class="btn btn-danger" onclick="confirmClearAll()" title="すべてクリア">
          <span class="material-symbols-outlined">delete</span> クリア
        </button>
      </div>
    </div>

    <!-- ペーストエリア -->
    <div class="paste-zone" id="pasteZone" tabindex="0" onclick="triggerPaste()">
      <span class="material-symbols-outlined"
        style="font-size: 48px; color: var(--text-muted); margin-bottom: 16px;">content_paste</span>
      <h2>クリックしてCSVデータを貼り付け</h2>
      <p>Ctrl+V でもペーストできます</p>
      <p style="margin-top: 8px; font-size: 0.8rem; color: var(--text-muted);">
        ヘッダー行は自動的にスキップします
      </p>
    </div>

    <!-- テーブル -->
    <div class="table-container" id="tableContainer">
      <div class="table-scroll" id="tableScroll">
        <table id="dataTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 列メニュー -->
  <div class="column-menu" id="columnMenu">
    <div class="menu-item" onclick="sortColumn('asc')">
      <span class="material-symbols-outlined">arrow_upward</span> 昇順に並び替え
    </div>
    <div class="menu-item" onclick="sortColumn('desc')">
      <span class="material-symbols-outlined">arrow_downward</span> 降順に並び替え
    </div>
    <div class="menu-divider"></div>
    <div class="menu-item" onclick="copyColumn()">
      <span class="material-symbols-outlined">content_copy</span> 列をコピー
    </div>
  </div>

  <!-- 行メニュー -->
  <div class="column-menu" id="rowMenu">
    <div class="menu-item" onclick="copyRow()">
      <span class="material-symbols-outlined">content_copy</span> 行をコピー
    </div>
    <div class="menu-item" onclick="duplicateRow()">
      <span class="material-symbols-outlined">content_copy</span> 行を複製
    </div>
    <div class="menu-divider"></div>
    <div class="menu-item danger" onclick="confirmDeleteRowFromMenu()">
      <span class="material-symbols-outlined">delete</span> 行を削除
    </div>
  </div>

  <!-- トースト -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- 確認モーダル -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle">確認</h3>
      <p id="modalMessage"></p>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">キャンセル</button>
        <button class="btn btn-danger" id="modalConfirmBtn">確認</button>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // 定数: 固定ヘッダー定義
    // ============================================================
    const CSV_HEADERS = [
${headersJSON}
    ];

    // ============================================================
    // 状態管理
    // ============================================================

    const STORAGE_KEY = '${storagePrefix}_state';
    const THEME_KEY = '${storagePrefix}_theme';

    let state = {
      data: [],
      columnWidths: {}
    };

    let undoStack = [];
    let redoStack = [];
    const MAX_HISTORY = 20;

    let activeColumnIndex = -1;
    let activeRowIndex = -1;

    let searchMatches = [];
    let currentMatchIndex = -1;

    let isResizing = false;
    let resizeColumnIndex = -1;
    let resizeStartX = 0;
    let resizeStartWidth = 0;

    // ============================================================
    // 初期化
    // ============================================================

    document.addEventListener('DOMContentLoaded', () => {
      initEventListeners();
      initTheme();
      loadFromStorage();
      renderTable();
      updateStats();
    });

    function initEventListeners() {
      document.addEventListener('keydown', handleKeyDown);
      document.addEventListener('paste', handlePaste);
      document.addEventListener('mousemove', handleResizeMove);
      document.addEventListener('mouseup', handleResizeEnd);
      document.addEventListener('click', () => {
        closeColumnMenu();
        closeRowMenu();
      });
    }

    // ============================================================
    // キーボード操作
    // ============================================================

    function handleKeyDown(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
        e.preventDefault(); undo(); return;
      }
      if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) {
        e.preventDefault(); redo(); return;
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
        e.preventDefault(); openSearch(); return;
      }
      if (e.key === 'Escape') {
        closeSearch(); return;
      }
      const activeElement = document.activeElement;
      if (activeElement.tagName === 'TD' && activeElement.isContentEditable) {
        handleCellNavigation(e, activeElement);
      }
    }

    function handleCellNavigation(e, cell) {
      const row = parseInt(cell.dataset.row);
      const col = parseInt(cell.dataset.col);
      const colCount = CSV_HEADERS.length;
      let newRow = row;
      let newCol = col;
      let shouldMove = false;

      switch (e.key) {
        case 'Tab':
          e.preventDefault();
          if (e.shiftKey) {
            newCol = col - 1;
            if (newCol < 0) { newCol = colCount - 1; newRow = row - 1; }
          } else {
            newCol = col + 1;
            if (newCol >= colCount) { newCol = 0; newRow = row + 1; }
          }
          shouldMove = true;
          break;
        case 'Enter':
          if (!e.shiftKey) { e.preventDefault(); newRow = row + 1; shouldMove = true; }
          break;
        case 'ArrowUp':
          if (e.altKey) { e.preventDefault(); newRow = row - 1; shouldMove = true; }
          break;
        case 'ArrowDown':
          if (e.altKey) { e.preventDefault(); newRow = row + 1; shouldMove = true; }
          break;
        case 'ArrowLeft':
          if (e.altKey) { e.preventDefault(); newCol = col - 1; shouldMove = true; }
          break;
        case 'ArrowRight':
          if (e.altKey) { e.preventDefault(); newCol = col + 1; shouldMove = true; }
          break;
      }

      if (shouldMove) {
        if (newRow >= 0 && newRow < state.data.length && newCol >= 0 && newCol < colCount) {
          const newCell = document.querySelector(\`td[data-row="\${newRow}"][data-col="\${newCol}"]\`);
          if (newCell) newCell.focus();
        }
      }
    }

    // ============================================================
    // テーマ切り替え
    // ============================================================

    function initTheme() {
      const saved = localStorage.getItem(THEME_KEY);
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      setTheme(saved || (prefersDark ? 'dark' : 'light'));
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      setTheme(next);
      localStorage.setItem(THEME_KEY, next);
    }

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('themeIcon').textContent = theme === 'dark' ? 'light_mode' : 'dark_mode';
    }

    // ============================================================
    // データ入力処理
    // ============================================================

    function handlePaste(e) {
      const pasteZone = document.getElementById('pasteZone');
      if (pasteZone.classList.contains('has-data')) return;
      const text = e.clipboardData?.getData('text');
      if (text) { e.preventDefault(); processData(text); }
    }

    async function triggerPaste() {
      try {
        const text = await navigator.clipboard.readText();
        if (text) processData(text);
      } catch (err) {
        showToast('クリップボードにアクセスできません', 'error');
      }
    }

    function processData(text) {
      if (!text.trim()) {
        showToast('データが空です', 'error');
        return;
      }

      const parsed = parseCSV(text);

      if (parsed.length === 0) {
        showToast('データを解析できませんでした', 'error');
        return;
      }

      state.data = parsed;
      state.columnWidths = {};
      undoStack = [];
      redoStack = [];
      updateHistoryButtons();

      renderTable();
      updateStats();
      saveToStorage();
      showToast(\`\${state.data.length}行のデータを読み込みました\`, 'success');
    }

    // ============================================================
    // CSV パース
    // ============================================================

    function parseCSV(text) {
      const rows = _parseCSVRaw(text, ',');
      if (rows.length === 0) return [];

      const firstRow = rows[0];
      const isHeader = firstRow.length === CSV_HEADERS.length &&
        firstRow.every((cell, i) => cell.trim() === CSV_HEADERS[i]);

      const dataRows = isHeader ? rows.slice(1) : rows;

      return dataRows.map(row => {
        const normalized = [...row];
        while (normalized.length < CSV_HEADERS.length) normalized.push('');
        return normalized.slice(0, CSV_HEADERS.length);
      });
    }

    function _parseCSVRaw(text, delimiter) {
      const rows = [];
      let currentRow = [];
      let currentCell = '';
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (inQuotes) {
          if (char === '"') {
            if (nextChar === '"') { currentCell += '"'; i++; }
            else { inQuotes = false; }
          } else {
            currentCell += char;
          }
        } else {
          if (char === '"') {
            inQuotes = true;
          } else if (char === delimiter) {
            currentRow.push(currentCell);
            currentCell = '';
          } else if (char === '\\n' || (char === '\\r' && nextChar === '\\n')) {
            currentRow.push(currentCell);
            if (currentRow.some(c => c.trim())) rows.push(currentRow);
            currentRow = [];
            currentCell = '';
            if (char === '\\r') i++;
          } else if (char !== '\\r') {
            currentCell += char;
          }
        }
      }

      currentRow.push(currentCell);
      if (currentRow.some(c => c.trim())) rows.push(currentRow);

      return rows;
    }

    // ============================================================
    // テーブル表示
    // ============================================================

    function renderTable() {
      const tableHead = document.getElementById('tableHead');
      const tableBody = document.getElementById('tableBody');
      const container = document.getElementById('tableContainer');
      const pasteZone = document.getElementById('pasteZone');

      if (state.data.length === 0) {
        container.classList.remove('show');
        pasteZone.classList.remove('has-data');
        return;
      }

      container.classList.add('show');
      pasteZone.classList.add('has-data');

      let headHTML = '<tr><th class="row-num">#</th>';
      CSV_HEADERS.forEach((header, i) => {
        const width = state.columnWidths[i] || 150;
        headHTML += \`
          <th style="width: \${width}px; min-width: \${width}px;" data-col="\${i}">
            <div class="th-wrapper">
              <div class="th-content" onclick="openColumnMenu(event, \${i})">
                <span class="th-colnum">\${i + 1}</span>
                <span class="th-text" title="\${escapeHTML(header)}">\${escapeHTML(header)}</span>
                <span class="th-menu-btn material-symbols-outlined" style="font-size: 1.1rem;">more_vert</span>
              </div>
              <div class="resize-handle" onmousedown="startResize(event, \${i})"></div>
            </div>
          </th>
        \`;
      });
      headHTML += '</tr>';
      tableHead.innerHTML = headHTML;

      let bodyHTML = '';
      for (let i = 0; i < state.data.length; i++) {
        const row = state.data[i];
        bodyHTML += \`<tr data-row="\${i}">
          <td class="row-num">
            <div class="row-num-wrapper">
              <span class="row-num-text">\${i + 1}</span>
              <button class="row-menu-btn" onclick="openRowMenu(event, \${i})" title="行メニュー">
                <span class="material-symbols-outlined" style="font-size: 1.0rem;">more_vert</span>
              </button>
            </div>
          </td>\`;
        CSV_HEADERS.forEach((_, j) => {
          const width = state.columnWidths[j] || 150;
          const cellValue = row[j] !== undefined ? row[j] : '';
          bodyHTML += \`<td contenteditable="true" data-row="\${i}" data-col="\${j}"
            style="width: \${width}px; min-width: \${width}px;"
            onblur="handleCellBlur(this)">\${escapeHTML(cellValue)}</td>\`;
        });
        bodyHTML += \`</tr>\`;
      }
      tableBody.innerHTML = bodyHTML;

      if (document.getElementById('searchBar').classList.contains('show')) {
        performSearch();
      }
    }

    function escapeHTML(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ============================================================
    // 列リサイズ
    // ============================================================

    function startResize(e, colIndex) {
      e.stopPropagation();
      isResizing = true;
      resizeColumnIndex = colIndex;
      resizeStartX = e.clientX;
      const th = document.querySelector(\`th[data-col="\${colIndex}"]\`);
      resizeStartWidth = th.offsetWidth;
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
    }

    function handleResizeMove(e) {
      if (!isResizing) return;
      const newWidth = Math.max(60, resizeStartWidth + (e.clientX - resizeStartX));
      state.columnWidths[resizeColumnIndex] = newWidth;
      document.querySelectorAll(\`th[data-col="\${resizeColumnIndex}"], td[data-col="\${resizeColumnIndex}"]\`).forEach(el => {
        el.style.width = \`\${newWidth}px\`;
        el.style.minWidth = \`\${newWidth}px\`;
      });
    }

    function handleResizeEnd() {
      if (isResizing) {
        isResizing = false;
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        saveToStorage();
      }
    }

    // ============================================================
    // セル編集
    // ============================================================

    function handleCellBlur(cell) {
      const row = parseInt(cell.dataset.row);
      const col = parseInt(cell.dataset.col);
      const newValue = cell.textContent;

      if (state.data[row] && state.data[row][col] !== newValue) {
        saveToHistory();
        state.data[row][col] = newValue;
        updateStats();
        saveToStorage();
      }
    }

    // ============================================================
    // 検索・置換
    // ============================================================

    function openSearch() {
      document.getElementById('searchBar').classList.add('show');
      document.getElementById('searchInput').focus();
    }

    function closeSearch() {
      document.getElementById('searchBar').classList.remove('show');
      document.getElementById('searchInput').value = '';
      document.getElementById('replaceInput').value = '';
      clearHighlights();
      searchMatches = [];
      currentMatchIndex = -1;
      updateSearchInfo();
    }

    function performSearch() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      clearHighlights();
      searchMatches = [];
      currentMatchIndex = -1;

      if (!query) { updateSearchInfo(); return; }

      for (let i = 0; i < state.data.length; i++) {
        for (let j = 0; j < state.data[i].length; j++) {
          if (state.data[i][j].toLowerCase().includes(query)) {
            searchMatches.push({ row: i, col: j });
            const cell = document.querySelector(\`td[data-row="\${i}"][data-col="\${j}"]\`);
            if (cell) cell.classList.add('highlight');
          }
        }
      }

      if (searchMatches.length > 0) {
        currentMatchIndex = 0;
        highlightCurrentMatch();
      }
      updateSearchInfo();
    }

    function navigateMatch(direction) {
      if (searchMatches.length === 0) return;
      currentMatchIndex += direction;
      if (currentMatchIndex < 0) currentMatchIndex = searchMatches.length - 1;
      if (currentMatchIndex >= searchMatches.length) currentMatchIndex = 0;
      highlightCurrentMatch();
      updateSearchInfo();
    }

    function highlightCurrentMatch() {
      document.querySelectorAll('td.current-match').forEach(el => el.classList.remove('current-match'));
      if (currentMatchIndex >= 0 && currentMatchIndex < searchMatches.length) {
        const match = searchMatches[currentMatchIndex];
        const cell = document.querySelector(\`td[data-row="\${match.row}"][data-col="\${match.col}"]\`);
        if (cell) { cell.classList.add('current-match'); cell.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
      }
    }

    function clearHighlights() {
      document.querySelectorAll('td.highlight, td.current-match').forEach(el => el.classList.remove('highlight', 'current-match'));
    }

    function updateSearchInfo() {
      const info = document.getElementById('searchInfo');
      const query = document.getElementById('searchInput').value;
      info.textContent = searchMatches.length === 0
        ? (query ? '一致なし' : '')
        : \`\${currentMatchIndex + 1} / \${searchMatches.length}件\`;
    }

    function replaceNext() {
      if (currentMatchIndex < 0 || searchMatches.length === 0) return;
      const replaceValue = document.getElementById('replaceInput').value;
      const searchValue  = document.getElementById('searchInput').value;
      const match = searchMatches[currentMatchIndex];

      saveToHistory();
      state.data[match.row][match.col] = state.data[match.row][match.col].replace(
        new RegExp(escapeRegExp(searchValue), 'i'), replaceValue
      );
      renderTable(); saveToStorage(); performSearch();
      showToast('1件置換しました', 'success');
    }

    function replaceAll() {
      const replaceValue = document.getElementById('replaceInput').value;
      const searchValue  = document.getElementById('searchInput').value;
      if (!searchValue) return;

      saveToHistory();
      let count = 0;
      const regex = new RegExp(escapeRegExp(searchValue), 'gi');
      for (let i = 0; i < state.data.length; i++) {
        for (let j = 0; j < state.data[i].length; j++) {
          const original = state.data[i][j];
          const replaced = original.replace(regex, replaceValue);
          if (original !== replaced) { state.data[i][j] = replaced; count++; }
        }
      }
      renderTable(); saveToStorage(); performSearch();
      showToast(\`\${count}件置換しました\`, 'success');
    }

    function escapeRegExp(string) {
      return string.replace(/[.*+?^\${}()|[\\]\\\\]/g, '\\\\$&');
    }

    // ============================================================
    // 列操作
    // ============================================================

    function openColumnMenu(e, colIndex) {
      e.stopPropagation();
      activeColumnIndex = colIndex;
      closeRowMenu();
      const menu = document.getElementById('columnMenu');
      const rect = e.target.closest('th').getBoundingClientRect();
      menu.style.top  = \`\${rect.bottom + window.scrollY + 4}px\`;
      menu.style.left = \`\${Math.min(rect.left, window.innerWidth - 220)}px\`;
      menu.classList.add('show');
    }

    function sortColumn(direction) {
      if (activeColumnIndex < 0) return;
      saveToHistory();

      state.data.sort((a, b) => {
        const valA = a[activeColumnIndex] || '';
        const valB = b[activeColumnIndex] || '';
        const numA = parseFloat(valA);
        const numB = parseFloat(valB);
        if (!isNaN(numA) && !isNaN(numB)) return direction === 'asc' ? numA - numB : numB - numA;
        return direction === 'asc' ? valA.localeCompare(valB, 'ja') : valB.localeCompare(valA, 'ja');
      });

      renderTable(); saveToStorage(); closeColumnMenu();
      showToast(\`「\${CSV_HEADERS[activeColumnIndex]}」を\${direction === 'asc' ? '昇順' : '降順'}に並び替えました\`, 'success');
    }

    function copyColumn() {
      if (activeColumnIndex < 0) return;
      const text = state.data.map(row => row[activeColumnIndex] || '').join('\\n');
      navigator.clipboard.writeText(text + '\\n')
        .then(() => showToast(\`「\${CSV_HEADERS[activeColumnIndex]}」をコピーしました\`, 'success'))
        .catch(() => showToast('コピーに失敗しました', 'error'));
      closeColumnMenu();
    }

    function closeColumnMenu() {
      document.getElementById('columnMenu').classList.remove('show');
    }

    // ============================================================
    // 行操作
    // ============================================================

    function openRowMenu(e, rowIndex) {
      e.stopPropagation();
      activeRowIndex = rowIndex;
      closeColumnMenu();
      const menu = document.getElementById('rowMenu');
      const rect = e.target.getBoundingClientRect();
      menu.style.top  = \`\${rect.bottom + window.scrollY + 4}px\`;
      menu.style.left = \`\${Math.min(rect.left, window.innerWidth - 220)}px\`;
      menu.classList.add('show');
    }

    function copyRow() {
      if (activeRowIndex < 0) return;
      const text = _rowToCSV(state.data[activeRowIndex]);
      navigator.clipboard.writeText(text + '\\n')
        .then(() => showToast(\`\${activeRowIndex + 1}行目をコピーしました\`, 'success'))
        .catch(() => showToast('コピーに失敗しました', 'error'));
      closeRowMenu();
    }

    function duplicateRow() {
      if (activeRowIndex < 0) return;
      saveToHistory();
      const newRow = [...state.data[activeRowIndex]];
      state.data.splice(activeRowIndex + 1, 0, newRow);
      renderTable(); updateStats(); saveToStorage(); closeRowMenu();
      showToast(\`\${activeRowIndex + 1}行目を複製しました\`, 'success');
    }

    function confirmDeleteRowFromMenu() {
      closeRowMenu();
      if (activeRowIndex < 0) return;
      openModal('行を削除', \`\${activeRowIndex + 1}行目を削除しますか？\`, () => deleteRow(activeRowIndex));
    }

    function closeRowMenu() {
      document.getElementById('rowMenu').classList.remove('show');
    }

    function addRow() {
      saveToHistory();
      state.data.push(Array(CSV_HEADERS.length).fill(''));
      renderTable(); updateStats(); saveToStorage();
      showToast('行を追加しました', 'success');
    }

    function deleteRow(rowIndex) {
      saveToHistory();
      state.data.splice(rowIndex, 1);

      if (state.data.length === 0) {
        state.columnWidths = {};
        renderTable(); updateStats();
        localStorage.removeItem(STORAGE_KEY);
        closeModal();
        showToast('すべての行が削除されました', 'success');
        return;
      }
      renderTable(); updateStats(); saveToStorage(); closeModal();
      showToast('行を削除しました', 'success');
    }

    // ============================================================
    // コピー / ダウンロード
    // ============================================================

    function _rowToCSV(row) {
      return row.map(cell => {
        const s = String(cell || '');
        if (s.includes(',') || s.includes('"') || s.includes('\\n')) {
          return \`"\${s.replace(/"/g, '""')}"\`;
        }
        return s;
      }).join(',');
    }

    function _generateOutput() {
      return state.data.map(row => _rowToCSV(row)).join('\\n') + '\\n';
    }

    function copyData() {
      if (state.data.length === 0) {
        showToast('コピーするデータがありません', 'error');
        return;
      }
      const text = _generateOutput();
      navigator.clipboard.writeText(text)
        .then(() => showToast('CSVとしてコピーしました', 'success'))
        .catch(() => showToast('コピーに失敗しました', 'error'));
    }

    function downloadData() {
      if (state.data.length === 0) {
        showToast('ダウンロードするデータがありません', 'error');
        return;
      }
      const text = _generateOutput();
      const bom = '\\uFEFF';
      const blob = new Blob([bom + text], { type: 'text/csv; charset=utf-8' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = \`data_\${new Date().toISOString().slice(0, 10)}.csv\`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      showToast('CSVファイルをダウンロードしました', 'success');
    }

    // ============================================================
    // Undo / Redo
    // ============================================================

    function saveToHistory() {
      undoStack.push(structuredClone(state));
      if (undoStack.length > MAX_HISTORY) undoStack.shift();
      redoStack = [];
      updateHistoryButtons();
    }

    function undo() {
      if (undoStack.length === 0) return;
      redoStack.push(structuredClone(state));
      state = undoStack.pop();
      renderTable(); updateStats(); saveToStorage(); updateHistoryButtons();
      showToast('元に戻しました');
    }

    function redo() {
      if (redoStack.length === 0) return;
      undoStack.push(structuredClone(state));
      state = redoStack.pop();
      renderTable(); updateStats(); saveToStorage(); updateHistoryButtons();
      showToast('やり直しました');
    }

    function updateHistoryButtons() {
      document.getElementById('undoBtn').disabled = undoStack.length === 0;
      document.getElementById('redoBtn').disabled = redoStack.length === 0;
    }

    // ============================================================
    // 統計情報
    // ============================================================

    function updateStats() {
      const rowCount = state.data.length;
      const colCount = CSV_HEADERS.length;

      const bytes = new Blob([_generateOutput()]).size;
      const sizeStr = bytes < 1024
        ? \`\${bytes} B\`
        : bytes < 1024 * 1024
          ? \`\${(bytes / 1024).toFixed(1)} KB\`
          : \`\${(bytes / (1024 * 1024)).toFixed(1)} MB\`;

      document.getElementById('rowCount').textContent = rowCount.toLocaleString();
      document.getElementById('colCount').textContent = colCount;
      document.getElementById('dataSize').textContent = sizeStr;
    }

    // ============================================================
    // ローカルストレージ
    // ============================================================

    function saveToStorage() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (e) {
        console.warn('LocalStorage save failed:', e);
      }
    }

    function loadFromStorage() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const parsed = JSON.parse(saved);
          state.data = parsed.data || [];
          state.columnWidths = parsed.columnWidths || {};
        }
      } catch (e) {
        // ignore
      }
    }

    // ============================================================
    // データクリア
    // ============================================================

    function confirmClearAll() {
      if (state.data.length === 0) return;
      openModal('データをクリア', 'すべてのデータを削除しますか？', clearAll);
    }

    function clearAll() {
      saveToHistory();
      state.data = [];
      state.columnWidths = {};
      renderTable(); updateStats();
      localStorage.removeItem(STORAGE_KEY);
      closeModal();
      showToast('すべてのデータをクリアしました');
    }

    // ============================================================
    // UI: トースト / モーダル
    // ============================================================

    function showToast(message, type = '') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = \`toast \${type}\`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 1500);
    }

    function openModal(title, message, onConfirm) {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalMessage').textContent = message;
      document.getElementById('modalConfirmBtn').onclick = onConfirm;
      document.getElementById('modalOverlay').classList.add('show');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('show');
    }
  <` + `/script>
</body>

</html>`;
    }

    // ============================================================
    // コピー / ダウンロード
    // ============================================================

    function copyCode() {
      const code = document.getElementById('codeOutput').value;
      if (!code) {
        showToast('コピーするコードがありません', 'error');
        return;
      }
      navigator.clipboard.writeText(code)
        .then(() => showToast('コードをクリップボードにコピーしました', 'success'))
        .catch(() => showToast('コピーに失敗しました', 'error'));
    }

    function downloadCode() {
      const code = document.getElementById('codeOutput').value;
      if (!code) {
        showToast('ダウンロードするコードがありません', 'error');
        return;
      }

      const fileName = (generatedTitle || 'csv-editor').replace(/[^a-zA-Z0-9\u3040-\u9FFF_-]/g, '-').toLowerCase() + '.html';

      const blob = new Blob([code], { type: 'text/html; charset=utf-8' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      showToast(`${fileName} をダウンロードしました`, 'success');
    }

    // ============================================================
    // ローカルストレージ
    // ============================================================

    let saveTimeout;
    function _autoSave() {
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(() => {
        try {
          const data = {
            toolTitle: document.getElementById('toolTitle').value,
            headerInput: document.getElementById('headerInput').value
          };
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        } catch (e) {
          console.error('Storage error:', e);
        }
      }, 500);
    }

    function loadFromStorage() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const data = JSON.parse(saved);
          if (data.toolTitle) document.getElementById('toolTitle').value = data.toolTitle;
          if (data.headerInput) document.getElementById('headerInput').value = data.headerInput;
          handleHeaderInput();
        }
      } catch (e) {
        // ignore
      }
    }

    // ============================================================
    // ユーティリティ
    // ============================================================

    function _escapeHTML(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ============================================================
    // UI: トースト
    // ============================================================

    function showToast(message, type = '') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 1500);
    }
  </script>
</body>
